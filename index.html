<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Marketplace Tracker</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h1>🚀 Marketplace Tracker</h1>

<!-- FILTRE -->
<div style="margin-bottom: 15px;">
  <button onclick="setMarket('all')">Tous</button>
  <button onclick="setMarket('cdiscount')">Cdiscount</button>
</div>

<!-- ONGLETS -->
<div style="margin-bottom: 20px;">
  <button onclick="showTab('synthese')">Synthèse</button>
  <button onclick="showTab('produits')">Produits</button>
  <button onclick="showTab('positions')">Positions</button>
</div>

<div id="content"></div>

<script>
const API_PRODUCTS = "https://pmxsthzdxubqbemdgtbr.supabase.co/rest/v1/product_snapshots";
const API_POSITIONS = "https://pmxsthzdxubqbemdgtbr.supabase.co/rest/v1/positions";

const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBteHN0aHpkeHVicWJlbWRndGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDk4NDQsImV4cCI6MjA5MDAyNTg0NH0.GpfAw91eJ8D7RIeZLFIejCt9DTwGpXvOGcxYlhZS78I";

let latestArr = [];
let previous = {};
let currentMarket = "all";

// =====================
// LOAD PRODUITS
// =====================
async function loadProducts() {
  const res = await fetch(
    API_PRODUCTS + "?select=product_id,marketplace",
    {
      headers: {
        apikey: KEY,
        Authorization: "Bearer " + KEY
      }
    }
  );

  const data = await res.json();

  return data.map(d => d.product_id);
}

// =====================
// NAVIGATION
// =====================
function showTab(tab) {
  if (tab === "synthese") renderSynthese();
  if (tab === "produits") renderProduits();
  if (tab === "positions") renderPositions();
}

function setMarket(market) {
  currentMarket = market;
  showTab("positions");
}

// =====================
// SYNTHÈSE (simple)
function renderSynthese() {
  document.getElementById("content").innerHTML = `
    <h2>Synthèse</h2>
    <p>Utilise l’onglet Positions</p>
  `;
}

// =====================
// PRODUITS (optionnel)
function renderProduits() {
  document.getElementById("content").innerHTML = `
    <h2>Produits</h2>
    <p>Voir Positions pour analyse</p>
  `;
}

// =====================
// POSITIONS (VERSION BUSINESS)
// =====================
async function renderPositions() {

  // 1. mes produits
  const myProducts = await loadProducts();

  // 2. positions
  const res = await fetch(
    API_POSITIONS + "?select=keyword,product_id,position,seller,marketplace&limit=2000",
    {
      headers: {
        apikey: KEY,
        Authorization: "Bearer " + KEY
      }
    }
  );

  const data = await res.json();

  // 3. groupement
  const grouped = {};

  data.forEach(d => {
    if (currentMarket !== "all" && d.marketplace !== currentMarket) return;

    if (!grouped[d.keyword]) grouped[d.keyword] = [];
    grouped[d.keyword].push(d);
  });

  let html = `<h2>Positions (${currentMarket})</h2>`;

  Object.keys(grouped).forEach(keyword => {
    const items = grouped[keyword];

    // marché
    const total = items.length;

    // mes produits
    const myItems = items.filter(i => myProducts.includes(i.product_id));
    const myCount = myItems.length;

    // visibilité
    const visibility = total ? Math.round((myCount / total) * 100) : 0;

    // TOP VENDEURS
    const sellers = {};
    items.forEach(i => {
      sellers[i.seller] = (sellers[i.seller] || 0) + 1;
    });

    const top3 = Object.entries(sellers)
      .sort((a,b) => b[1] - a[1])
      .slice(0,3);

    html += `
      <div style="margin-bottom:25px; padding:15px; border:1px solid #ddd;">
        
        <strong style="font-size:16px;">${keyword}</strong><br><br>

        📦 Produits page 1 : ${total}<br>
        🟢 Mes produits : ${myCount}<br>
        👁️ Visibilité : ${visibility}%<br><br>

        🏆 Top vendeurs :
        <ul>
          ${top3.map(v => `<li>${v[0]} (${v[1]})</li>`).join("")}
        </ul>

      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

// =====================
// INIT
// =====================
showTab("positions");

</script>

</body>
</html>
