async function confirmOpeCreate() {
  const statusEl = document.getElementById("ope-status");
  const nom = document.getElementById("ope-nom")?.value?.trim();
  const type = document.getElementById("ope-type")?.value?.trim();
  const debut = document.getElementById("ope-debut")?.value;
  const fin = document.getElementById("ope-fin")?.value;
  const file = document.getElementById("ope-file")?.files[0];

  if (!nom || !debut || !fin) { statusEl.innerHTML='<span style="color:var(--rd)">Nom, date début et date fin obligatoires.</span>'; return; }
  if (debut > fin) { statusEl.innerHTML='<span style="color:var(--rd)">La date de fin doit être après le début.</span>'; return; }

  statusEl.innerHTML='<span style="color:var(--txS)">Création en cours...</span>';
  try {
    const ops = await sbInsert("commercial_operations", { marketplace: MARKETPLACE, nom, type_ope: type||null, date_debut: debut, date_fin: fin });
    const opId = ops[0]?.id;

    if (file && opId) {
      statusEl.innerHTML='<span style="color:var(--txS)">Import produits...</span>';
      const prods = await parseOpeXLS(file);
      if (prods.length) {
        const rows = prods.map(p => ({ operation_id: opId, marketplace: MARKETPLACE, ref: p.ref, nom_produit: p.nom, prix: p.prix, taux_commission: p.taux }));

async function parseOpeXLS(file) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array", cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
        console.log("Row 6 (headers):", rows[5]);
        console.log("Row 7 (data):", rows[6]);
        const clean = s => s ? String(s).replace(/^'+|'+$/g,"").trim() : null;
        const result = [];
        for (let i = 6; i < rows.length; i++) {
          const r = rows[i];
          if (!r || !r[1]) continue;
          const refVal = clean(r[0]);
if (!refVal) continue;
result.push({
  ref: refVal,
  nom: clean(r[1]),
  prix: r[2] ? parseFloat(String(r[2]).replace(/[€\s]/g,"").replace(",",".")) : null,
  taux: r[3] ? parseFloat(String(r[3]).replace(/[%\s]/g,"").replace(",",".")) : null
});
        }
        console.log("Premier produit parsé:", result[0]);
        resolve(result);
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function parseOpeXLSFull(file) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array", cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
        const clean = s => s ? String(s).replace(/^'+|'+$/g,"").trim() : null;
        const parseDate = v => {
          if (!v) return null;
          if (v instanceof Date) return v.toISOString().slice(0,10);
          const s = clean(v);
          if (!s) return null;
          if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);
          // Format DD/MM/YYYY
          const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
          if (m) return (m[3].length===2?"20"+m[3]:m[3])+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
          return null;
        };
        const typeOpe = clean(rows[1]?.[1])?.split("-").pop()?.trim() || null;
        const nomOpe = clean(rows[2]?.[1]);
        const prods = [];
        let debut = null, fin = null;
        for (let i = 6; i < rows.length; i++) {
          const r = rows[i];
          if (!r || !r[1]) continue;
          const d = parseDate(r[6]);
          const f = parseDate(r[7]);
          if (d && !debut) debut = d;
          if (f) fin = f;
          const refVal = clean(r[1]);
          if (!refVal) continue;
          prods.push({
            ref: refVal,
            nom: clean(r[2]),
            prix: r[3] ? parseFloat(String(r[3]).replace(/[€\s]/g,"").replace(",",".")) : null,
            taux: r[4] ? parseFloat(String(r[4]).replace(/[%\s]/g,"").replace(",","."))/100 : null
          });
        }
        const finalNom = nomOpe || (rows[6]?.[5] ? clean(rows[6][5]) : null);
        if (!finalNom || !debut || !fin) { resolve({ ops:[], prods:[] }); return; }
        resolve({ ops:[{ nom: finalNom, type: typeOpe, debut, fin, prods }], prods });
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

    return Object.assign({}, r, { ctr: ctr, tauxConv: tauxConv, grade: seaGrade(ctr, tauxConv), name: skuToName[r.ref] || "" });
  });
  rows.sort(function(a, b) {
    var va = a[seaSortCol] !== undefined ? a[seaSortCol] : 0;
    var vb = b[seaSortCol] !== undefined ? b[seaSortCol] : 0;
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb||"").toLowerCase(); }
    if (seaSortDir === 'asc') return va < vb ? -1 : va > vb ? 1 : 0;
    return va > vb ? -1 : va < vb ? 1 : 0;
  });
  function si(col) { return seaSortCol === col ? (seaSortDir === 'asc' ? ' ↑' : ' ↓') : ''; }
  function th(col, label, align) {
    return '<th style="cursor:pointer;padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;text-align:'+(align||'right')+'" onclick="toggleSeaSort(\''+col+'\')">'+label+si(col)+'</th>';
  }
  var tbody = rows.map(function(r, i) {
    var ctrFmt = r.impressions > 0 ? r.ctr.toFixed(2)+"%" : "—";
    var convFmt = r.clics > 0 ? r.tauxConv.toFixed(2)+"%" : "—";
    return '<tr style="'+(i%2?"background:var(--bg)":"")+';border-bottom:1px solid var(--borderL);cursor:pointer" onclick="openSEAProductDetail(\''+esc(r.ref)+'\')">'
      + '<td style="padding:7px 10px;font-weight:600;white-space:nowrap">'+esc(r.ref)+'</td>'
      + '<td style="padding:7px 10px;color:var(--txS);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.name)+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:600">'+(r.budget?Math.round(r.budget).toLocaleString("fr-FR")+"€":"—")+'</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(r.impressions?r.impressions.toLocaleString("fr-FR"):"—")+'</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(r.clics?r.clics.toLocaleString("fr-FR"):"—")+'</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(r.conversions||0)+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:500">'+ctrFmt+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:500">'+convFmt+'</td>'
      + '<td style="padding:7px 10px;text-align:center">'+pill(r.grade, seaGradeColor(r.grade))+'</td>'
      + '</tr>';
  }).join("");
  return '<div style="margin-top:20px">'
    + '<div style="font-size:13px;font-weight:700;margin-bottom:12px">Produits sponsorisés — YTD '+curYear+'</div>'
    + '<div class="card" style="padding:0;overflow:hidden"><div class="scroll-table"><table style="min-width:900px">'

    + th('ctr','CTR%')+th('tauxConv','Taux conv%')
    + '<th style="padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;text-align:center">Note</th>'
    + '</tr></thead><tbody>'+tbody+'</tbody></table></div></div></div>';
}

async function confirmSEAImport() {
  var statusEl = document.getElementById("sea-imp-status");
  var pwd = document.getElementById("sea-imp-pwd")?.value;
  var file = document.getElementById("sea-imp-file")?.files[0];
  var periodType = document.getElementById("sea-imp-type")?.value;

  var fin = document.getElementById("sea-imp-fin")?.value;

    if (!rows.length) { statusEl.innerHTML='<span style="color:var(--am)">Aucune ligne reconnue dans le fichier.</span>'; return; }
    // Détection doublons

      : "marketplace=eq."+MARKETPLACE+"&period_start=eq."+debut+"&period_type=eq.week&select=id";
    var existing = await sb("sea_product_stats", existingQ);

        ? "marketplace=eq."+MARKETPLACE+"&period_start=gte."+debut+"&period_end=lte."+fin+"&period_type=eq.week"

    }
    statusEl.innerHTML='<span style="color:var(--txS)">Import de '+rows.length+' lignes...</span>';
    var insertRows = rows.map(function(r) {

    });
    for (var i = 0; i < insertRows.length; i += 200) {
      await fetch(SB_URL+"/rest/v1/sea_product_stats", {
        method:"POST",
        headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,Prefer:"return=minimal"},
        body:JSON.stringify(insertRows.slice(i, i+200))
      });
    }
    statusEl.innerHTML='<span style="color:var(--gn)">'+rows.length+' produits importes !</span>';
    setTimeout(function() { closeModal(); loadData(); }, 1000);
  } catch(e) { statusEl.innerHTML='<span style="color:var(--rd)">Erreur : '+e.message+'</span>'; }
}

async function parseSEAXLS(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var wb = XLSX.read(e.target.result, { type: 'binary' });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        var dataRows = data.slice(1).filter(function(r) { return r[0] !== '' && r[0] != null; });
        var mp = MARKETPLACE;
        var results = [];
        var aggMap = {};
        var eanToSku = {}, scraperToSku = {};
        (STATE.products||[]).forEach(function(p) {
          if (p.ean && p.sku && p.marketplace === mp) eanToSku[p.ean] = p.sku;
          if (p.product_id_scraper && p.sku && p.marketplace === mp) scraperToSku[p.product_id_scraper] = p.sku;
        });
        function pf(v) { return parseFloat(String(v||"").replace(/\s/g,'').replace(',','.')) || 0; }
        dataRows.forEach(function(r) {
          var ref, imp, clics, budget, conv;
          if (mp === 'maisonsdumonde') {
            ref = scraperToSku[String(r[2]||"").trim()] || null;
            imp = pf(r[6]); clics = pf(r[7]); budget = pf(r[8]); conv = pf(r[9]);
          } else if (mp === 'but') {
            var rawRef = String(r[9]||"").trim();
            var eanBut = rawRef.includes("_") ? rawRef.split("_").slice(1).join("_") : rawRef;
            ref = eanToSku[eanBut] || null;
            imp = pf(r[11]); clics = pf(r[13]); budget = pf(r[16]); conv = 0;
          } else {
            var rawSku = String(r[0]||"").trim();
            var ean = rawSku.replace("BES","");
            ref = eanToSku[ean] || (rawSku && !rawSku.startsWith("BES") ? rawSku : null);
            imp = pf(r[2]); clics = pf(r[3]); budget = pf(r[5]); conv = pf(r[7]);
          }
          if (!ref) return;
          if (mp === 'but') {
            if (!aggMap[ref]) aggMap[ref] = { ref:ref, impressions:0, clics:0, budget:0, conversions:0 };
            aggMap[ref].impressions += imp; aggMap[ref].clics += clics; aggMap[ref].budget += budget;
          } else {
            results.push({ ref:ref, impressions:imp, clics:clics, budget:budget, conversions:conv });
