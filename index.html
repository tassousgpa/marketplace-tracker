const TRACKED_COMPETITORS_FALLBACK = {
  maisonsdumonde: ["BestMobilier","Premium Interiors","Usinestreet","Sweeek","Mobilier Déco","Homifab","Baita Home"],
  cdiscount:      ["BestMobilier","Loungitude","VidaXL","Vente-unique","Habitat et Jardin","Sweeek","IDOHOME","EAZSHOU","Tolaro"],
  conforama:      ["BestMobilier","Loungitude","VidaXL","Habitat et Jardin","Sweeek","Tendencio","Gutent (KOMHTOM)","IDOHOME","Intense Déco","Cosy (Menzzo)"],
  laredoute:      ["BestMobilier","Oviala","Sweeek","Homifab","Berah Getah","Tikamoon","Miliboo"],
  amazon:         ["BestMobilier","Loungitude","VidaXL","Sweeek","IDOHOME","Habitat et Jardin"],
};

// Noms BestMobilier reconnus
const BM_NAMES_SET = new Set(["BestMobilier","Best Mobilier","Lisa Design"]);

// Résolution d'un nom affiché vers le nom raw en base (pour les lookup seller_stats)
// BestMobilier peut être "BestMobilier" ou "Best Mobilier" ou "Lisa Design" en base
function resolveSellerNames(displayName) {
  if (displayName === "BestMobilier") return ["BestMobilier","Best Mobilier","Lisa Design"];
  // Correspondances entre nom affiché (tracked_sellers) et nom réel en base (seller_stats)
  const SELLER_NAME_MAP = {
    "Habitat et Jardin": ["Habitat & Jardin", "Habitat et Jardin"],
    "Gutent (KOMHTOM)":  ["Gutent", "Gutent (KOMHTOM)"],
    "VidaXL":            ["VidaXL", "vidaXL", "Vida XL", "VidaXl", "VIDAXL"],
  };
  if (SELLER_NAME_MAP[displayName]) return SELLER_NAME_MAP[displayName];
  // Fallback insensible à la casse pour VidaXL et variantes non listées
  const stats = STATE.sellerStats || [];
  const lower = displayName.toLowerCase().replace(/[\s\-_]/g, "");
  const matches = [...new Set(stats.map(s => s.seller).filter(s => s && s.toLowerCase().replace(/[\s\-_]/g, "") === lower))];
  if (matches.length) return matches;
  return [displayName];
}

// Type de marketplace : "cumul" (MdM, Conforama) ou "ltm" (Cdiscount, Amazon, La Redoute)
function mpType(mp) {
  if (mp === "conforama" || mp === "maisonsdumonde") return "cumul";
  return "ltm";
}

// Récupère les données d'un vendeur depuis seller_stats pour la marketplace courante
function getSellerData(displayName) {
  const stats = STATE.sellerStats || [];
  const rawNames = resolveSellerNames(displayName);

  // Toutes les entrées pour ce vendeur (tous noms raw confondus), triées ASC
  const allEntries = stats
    .filter(s => rawNames.includes(s.seller))
    .sort((a, b) => a.date > b.date ? 1 : -1);

  if (!allEntries.length) return null;

  const latest = allEntries[allEntries.length - 1];
  const prev   = allEntries.length >= 2 ? allEntries[allEntries.length - 2] : null;
  const first  = allEntries[0];

  // Pour les calculs LTM : on ignore les entrées où seller_sales est null
  // (scrapes partiels où le clic "En savoir plus" n'a pas fonctionné)
  const validSalesEntries = allEntries.filter(e => e.seller_sales != null);
  const latestValid = validSalesEntries.length ? validSalesEntries[validSalesEntries.length - 1] : null;
  const prevValid   = validSalesEntries.length >= 2 ? validSalesEntries[validSalesEntries.length - 2] : null;
  const firstValid  = validSalesEntries.length ? validSalesEntries[0] : null;

  // Calcul p1 moyen sur toutes les sessions
  const p1Values = allEntries.map(e => e.p1_count || 0);
  const p1Avg = p1Values.length ? Math.round(p1Values.reduce((a,b)=>a+b,0) / p1Values.length * 10) / 10 : 0;
  const p1Latest = latest.p1_count || 0;

  if (mpType(MARKETPLACE) === "cumul") {
    // Ventes cumulées depuis 1er scrape
    const salesLatest = latest.seller_sales || 0;
    const salesFirst  = first.seller_sales || 0;
    const salesVar    = salesLatest - salesFirst; // ventes depuis 1er scraping

    // Variation depuis dernier scraping
    const salesVarSincePrev = prev != null ? (salesLatest - (prev.seller_sales || 0)) : null;
    const daysSincePrev = prev != null
      ? Math.max(1, Math.round((new Date(latest.date) - new Date(prev.date)) / 86400000))
      : null;

    // Ventes quotidiennes moyennes depuis 1er scrape
    const daysSinceFirst = Math.max(1, Math.round((new Date(latest.date) - new Date(first.date)) / 86400000));
    const dailyAvg = daysSinceFirst > 0 && salesVar > 0 ? Math.round(salesVar / daysSinceFirst * 10) / 10 : null;

    return {
      type: "cumul",
      salesLatest, salesVar, salesVarSincePrev,
      daysSincePrev, dailyAvg,
      p1Latest, p1Avg,
      rating: latest.seller_rating,
      ratingsCount: latest.seller_ratings_count,
      sourceUrl: latest.source_url,
      bestSellerTitle: latest.best_seller_title || null,
      bestSellerPrice: latest.best_seller_price || null,
      bestSellerUrl:   latest.best_seller_url   || null,
      latestDate: latest.date,
    };
  } else {
    // LTM : Cdiscount, Amazon, La Redoute, BUT
    // Amazon + BUT : proxy = seller_ratings_count (seller_sales = null)
    let salesLatest, salesFirst12m;
    if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
      salesLatest = latest.seller_ratings_count || 0;
      const cutoff = new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
      const in12m = allEntries.filter(e => new Date(e.date) >= cutoff);
      salesFirst12m = in12m.length ? (in12m[0].seller_ratings_count || 0) : null;
    } else {
      salesLatest = latestValid?.seller_sales || 0;
      salesFirst12m = firstValid?.seller_sales || 0;
    }

    // Tendance vs dernier scrape précédent
    const yoyDelta = (() => {
      if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
        if (!prev || prev.seller_ratings_count == null) return null;
        const prevVal = prev.seller_ratings_count || 0;
        return prevVal > 0 ? (salesLatest - prevVal) / prevVal * 100 : null;
      }
      if (!prevValid || prevValid.seller_sales == null) return null;
      const prevVal = prevValid.seller_sales || 0;
      return prevVal > 0 ? (salesLatest - prevVal) / prevVal * 100 : null;
    })();

    // Tendance depuis 1er scrape
    const yoyDeltaFirst = (() => {
      if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
        if (!first || first.seller_ratings_count == null || allEntries.length < 2) return null;
        const fVal = first.seller_ratings_count || 0;
        return fVal > 0 ? (salesLatest - fVal) / fVal * 100 : null;
      }
      if (!firstValid || validSalesEntries.length < 2) return null;
      const fVal = firstValid.seller_sales || 0;
      return fVal > 0 ? (salesLatest - fVal) / fVal * 100 : null;
    })();

    const sessionsCount = allEntries.length;

    return {
      type: "ltm",
      salesLatest,
      yoyDelta,
      yoyDeltaFirst,
      sessionsCount,
      p1Latest, p1Avg,
      rating: latest.seller_rating,
      ratingsCount: latest.seller_ratings_count,
      sourceUrl: latest.source_url,
      bestSellerTitle: latest.best_seller_title || null,
      bestSellerPrice: latest.best_seller_price || null,
      bestSellerUrl:   latest.best_seller_url   || null,
      latestDate: latest.date,
    };
  }
}

function renderConcurrents() {
  const isCumul = mpType(MARKETPLACE) === "cumul";
  const isAmazon = MARKETPLACE === "amazon";
  const isBut    = MARKETPLACE === "but";
  const isAmazonOrBut = isAmazon || isBut;

  let trackedRows = STATE.trackedSellers || [];
  if (!trackedRows.length) {
    const fallback = TRACKED_COMPETITORS_FALLBACK[MARKETPLACE] || [];
    trackedRows = fallback.map(name => ({ seller_name: name, shop_url: null, active: true }));
  }

  const fmtNum = v => v != null ? Number(v).toLocaleString("fr-FR") : "—";
  // fmtDelta : toujours en valeur absolue, % en italique en dessous si dispo
  // absVal = valeur absolue de la variation (ex: +153 ventes)
  // pctVal = variation en % optionnelle (null = pas affichée)
  const fmtDelta = (v, unit="", pctVal=null) => {
    if (v == null) return '<span style="color:var(--txT);font-size:11px">—</span>';
    const color = v > 0 ? "var(--gn)" : v < 0 ? "var(--rd)" : "var(--txT)";
    const rounded = Math.round(v);
    const display = (rounded > 0 ? "+" : "") + rounded.toLocaleString("fr-FR") + unit;
    const pctHtml = pctVal != null
      ? `<div style="font-size:10px;color:${color};font-style:italic;margin-top:1px">(${pctVal > 0 ? "+" : ""}${Math.round(pctVal)}%)</div>`
      : "";
    return `<div style="font-size:15px;font-weight:700;color:${color}">${display}</div>${pctHtml}`;
  };

  const rows = trackedRows.map(ts => {
    const name = ts.seller_name;
    const isBM = BM_NAMES_SET.has(name) || name === "BestMobilier";
    const data = getSellerData(name);
    return { name, isBM, data, shopUrl: ts.shop_url };
  });

  const hasAnyData = rows.some(r => r.data);

  const CHART_COLORS = ["#2c5ea0","#e8963a","#2e9e6b","#c0392b","#8e44ad","#16a085","#d35400","#2980b9","#27ae60","#e74c3c"];

  // Métriques (lignes du tableau transposé)
  const metricRows = [
    { key:"col1", label: isCumul ? "Ventes totales" : (isAmazonOrBut ? "Avis vendeur (proxy)" : "Ventes LTM") },
    { key:"col2", label: isCumul ? "Variation (dernier scraping)" : "Tendance vs préc." },
    ...(!isCumul ? [{ key:"col7", label:"Tendance depuis 1er scrape" }] : []),
    ...(isCumul ? [{ key:"col3", label:"Ventes/jour moy." }] : []),
    { key:"col4", label:"Moy. appari. P1" },
    ...(!isCumul ? [{ key:"col5", label:"Best-seller" }] : []),
    { key:"col6", label:"Note vendeur" },
  ];

  function cellFor(r, key) {
    const d = r.data;
    if (!d) return '<span style="color:var(--txT);font-size:11px">—</span>';
    switch(key) {
      case "col1": {
        const v = fmtNum(d.salesLatest);
        const sub = isCumul ? "depuis inscr." : (isAmazonOrBut ? "avis" : "ventes LTM");
        return `<div style="font-size:16px;font-weight:700">${v}</div><div style="font-size:10px;color:var(--txT)">${sub}</div>`;
      }
      case "col2": {
        if (isCumul) {
          if (d.salesVarSincePrev == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
          // Calcul % par rapport à la valeur précédente
          const prevVal = d.salesLatest - d.salesVarSincePrev;
          const pct2 = prevVal > 0 ? d.salesVarSincePrev / prevVal * 100 : null;
          return fmtDelta(d.salesVarSincePrev, " ventes", pct2)
            + `<div style="font-size:10px;color:var(--txT);margin-top:1px">en ${d.daysSincePrev}j</div>`;
        } else {
          if (d.yoyDelta == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
          // Pour LTM : variation absolue des ventes + % en italique
          const absVar = d.salesLatest - Math.round(d.salesLatest / (1 + d.yoyDelta/100));
          return fmtDelta(absVar, "", d.yoyDelta)
            + `<div style="font-size:10px;color:var(--txT);margin-top:1px">vs préc.</div>`;
        }
      }
      case "col3":
        return d.dailyAvg != null
          ? `<div style="font-size:16px;font-weight:700">${d.dailyAvg.toLocaleString("fr-FR")}</div><div style="font-size:10px;color:var(--txT)">/j moy.</div>`
          : '<span style="color:var(--txT);font-size:11px">—</span>';
      case "col7": {
        if (d.yoyDeltaFirst == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
        const absFirst = d.salesLatest - Math.round(d.salesLatest / (1 + d.yoyDeltaFirst/100));
        return fmtDelta(absFirst, "", d.yoyDeltaFirst)
          + '<div style="font-size:10px;color:var(--txT);margin-top:1px">depuis 1er scrape</div>';
      }
      case "col4":
        return `<div style="font-size:16px;font-weight:700">${d.p1Avg.toLocaleString("fr-FR")}</div><div style="font-size:10px;color:var(--txT)">app. moy.</div>`;
      case "col5": {
        if (!d.bestSellerTitle) return '<span style="color:var(--txT);font-size:11px">—</span>';
        return `<div style="font-size:11px;font-weight:600;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(d.bestSellerTitle)}">${esc(d.bestSellerTitle)}</div>
          ${d.bestSellerPrice?`<div style="font-size:12px;color:var(--txS);font-weight:700">${d.bestSellerPrice}€</div>`:""}
          ${d.bestSellerUrl?`<a href="${esc(d.bestSellerUrl)}" target="_blank" class="link" style="font-size:10px">Voir ↗</a>`:""}`;
      }
      case "col6":
        return d.rating
          ? `<div style="font-size:16px;font-weight:700">${d.rating}<span style="font-size:11px;font-weight:400;color:var(--txT)">/5</span></div><div style="font-size:10px;color:var(--txT)">${d.ratingsCount?fmtNum(d.ratingsCount)+" avis":""}</div>`
          : '<span style="color:var(--txT);font-size:11px">—</span>';
      default: return "—";
    }
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:15px;font-weight:700">Suivi concurrents — ${MARKETPLACES.find(m=>m.id===MARKETPLACE)?.label||MARKETPLACE}</div>
      <div style="font-size:12px;color:var(--txS);margin-top:2px">${trackedRows.length} vendeurs suivis</div>
    </div>
    <button onclick="openAddCompetitorModal()" style="padding:7px 14px;border:.5px solid var(--ac);border-radius:8px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Ajouter un concurrent</button>
  </div>

  ${!hasAnyData ? `<div class="card" style="padding:30px;text-align:center;color:var(--txT)">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">Aucune donnée seller_stats pour cette marketplace</div>
    <div style="font-size:12px">Lancez d'abord l'extension de scraping des boutiques vendeurs.</div>
  </div>` : `

  <div class="card" style="padding:0;overflow:hidden">
    <div class="scroll-table">
      <table style="min-width:${100 + rows.length * 130}px;width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="border-bottom:2px solid var(--border);background:var(--bg)">
            <th style="min-width:150px;padding:10px 14px;text-align:left;font-size:11px;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;border-right:1px solid var(--border)">Métrique</th>
            ${rows.map((r, ci) => {
              const color = CHART_COLORS[ci % CHART_COLORS.length];
              const bmBg = r.isBM ? "background:var(--acBg);" : "";
              return `<th style="min-width:130px;padding:10px 14px;text-align:center;${bmBg}">
                <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
                  <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color}"></span>
                  <span style="font-size:13px;font-weight:700;color:${r.isBM?"var(--ac)":"var(--tx)"}">${esc(r.name)}</span>
                  ${r.isBM ? '<span class="pill pill-accent" style="font-size:10px">Vous</span>' : ""}
                  ${r.shopUrl ? `<a href="${esc(r.shopUrl)}" target="_blank" class="link" style="font-size:10px">Boutique ↗</a>` : (r.data?.sourceUrl ? `<a href="${esc(r.data.sourceUrl)}" target="_blank" class="link" style="font-size:10px">Boutique ↗</a>` : "")}
                  <button onclick="showSellerHistory('${esc(r.name)}')" title="Voir l'historique des ventes" style="background:var(--bg);border:.5px solid var(--border);border-radius:5px;padding:2px 6px;font-size:11px;cursor:pointer;margin-top:2px;font-family:inherit">📈</button>
                </div>
              </th>`;
            }).join("")}
          </tr>
        </thead>
        <tbody>
          ${metricRows.map(({ key, label }, ri) => `
          <tr style="${ri%2?"background:var(--bg)":""}">
            <td style="padding:10px 14px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;border-right:1px solid var(--border)">${label}</td>
            ${rows.map(r => {
              const bmBg = r.isBM ? "background:var(--acBg);" : "";
              return `<td style="padding:10px 14px;text-align:center;line-height:1.4;${bmBg}">${cellFor(r, key)}</td>`;
            }).join("")}
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>

  ${isCumul ? renderCombinedSalesChart(trackedRows, CHART_COLORS) : ""}`}`;
}

// ─── Historique ventes par vendeur (popup) ─────────────────────────────────
function showSellerHistory(displayName) {
  const rawNames = resolveSellerNames(displayName);
  const allStats = (STATE.sellerStats || [])
    .filter(s => rawNames.includes(s.seller))
    .sort((a, b) => a.date > b.date ? 1 : -1);

  if (!allStats.length) {
    openModal("Historique — " + displayName, '<div style="padding:20px;text-align:center;color:var(--txT)">Aucune donnée disponible pour ce vendeur.</div>');
    return;
  }

  const isCumul = mpType(MARKETPLACE) === "cumul";
  const isAmazonOrBut = MARKETPLACE === "amazon" || MARKETPLACE === "but";
  const fmtDate = d => new Date(d).toLocaleDateString("fr-FR", { day:"2-digit", month:"2-digit", year:"2-digit" });
  const fmtNum = v => v != null ? Number(v).toLocaleString("fr-FR") : "—";

  // Construire les lignes de l'historique
  // Dédupliquer par jour (garder le plus récent du jour)
  const byDay = {};
  allStats.forEach(s => {
    const day = s.date.slice(0, 10);
    if (!byDay[day] || s.date > byDay[day].date) byDay[day] = s;
  });
  const points = Object.values(byDay).sort((a, b) => a.date > b.date ? 1 : -1);

  let rows = "";
  if (isCumul) {
    // Cumul : variation entre chaque point consécutif
    rows = points.map((p, i) => {
      const prev = i > 0 ? points[i-1] : null;
      const sales = p.seller_sales;
      const prevSales = prev?.seller_sales;
      const delta = (sales != null && prevSales != null) ? sales - prevSales : null;
      const days = prev ? Math.max(1, Math.round((new Date(p.date) - new Date(prev.date)) / 86400000)) : null;
      const color = delta > 0 ? "var(--gn)" : delta < 0 ? "var(--rd)" : "var(--txT)";
      const period = prev
        ? `${fmtDate(prev.date)} → ${fmtDate(p.date)}`
        : `${fmtDate(p.date)} (1er scrape)`;
      return `<tr style="border-bottom:1px solid var(--borderL)">
        <td style="padding:7px 10px;font-size:12px;color:var(--txS)">${period}</td>
        <td style="padding:7px 10px;font-size:12px;text-align:right">${fmtNum(sales)}</td>
        <td style="padding:7px 10px;text-align:right">
          ${delta != null
            ? `<span style="font-weight:700;color:${color};font-size:13px">${delta > 0 ? "+" : ""}${fmtNum(delta)}</span>`
              + (days ? `<span style="font-size:10px;color:var(--txT);margin-left:4px">en ${days}j</span>` : "")
            : '<span style="color:var(--txT)">—</span>'}
        </td>
      </tr>`;
    }).join("");
  } else {
    // LTM : afficher la valeur brute + variation vs point précédent
    const metric = isAmazonOrBut ? "seller_ratings_count" : "seller_sales";
    const metricLabel = isAmazonOrBut ? "Avis (proxy ventes)" : "Ventes LTM";
    rows = points.map((p, i) => {
      const prev = i > 0 ? points[i-1] : null;
      const val = p[metric];
      const prevVal = prev?.[metric];
      const delta = (val != null && prevVal != null) ? val - prevVal : null;
      const pct = (delta != null && prevVal > 0) ? delta / prevVal * 100 : null;
      const color = delta > 0 ? "var(--gn)" : delta < 0 ? "var(--rd)" : "var(--txT)";
      const period = prev
        ? `${fmtDate(prev.date)} → ${fmtDate(p.date)}`
        : `${fmtDate(p.date)} (1er scrape)`;
      return `<tr style="border-bottom:1px solid var(--borderL)">
        <td style="padding:7px 10px;font-size:12px;color:var(--txS)">${period}</td>
        <td style="padding:7px 10px;font-size:12px;text-align:right">${fmtNum(val)}</td>
        <td style="padding:7px 10px;text-align:right">
          ${delta != null
            ? `<span style="font-weight:700;color:${color};font-size:13px">${delta > 0 ? "+" : ""}${fmtNum(delta)}</span>`
              + (pct != null ? `<span style="font-size:10px;color:${color};font-style:italic;margin-left:4px">(${pct > 0 ? "+" : ""}${Math.round(pct)}%)</span>` : "")
            : '<span style="color:var(--txT)">—</span>'}
        </td>
      </tr>`;
    }).join("");
  }

  const metricLabel = isCumul ? "Ventes cumulées" : (isAmazonOrBut ? "Avis vendeur (proxy)" : "Ventes LTM");
  const html = `
    <div style="font-size:12px;color:var(--txS);margin-bottom:12px">
      ${points.length} points · ${fmtDate(points[0].date)} → ${fmtDate(points[points.length-1].date)}
      <span style="margin-left:8px;background:var(--amBg);color:var(--am);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600">
        ${isCumul ? "Cumul depuis inscription" : "Valeur glissante 12 mois"}
      </span>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">
          <th style="padding:7px 10px;text-align:left;color:var(--txS);font-size:11px;text-transform:uppercase;letter-spacing:.04em">Période</th>
          <th style="padding:7px 10px;text-align:right;color:var(--txS);font-size:11px;text-transform:uppercase;letter-spacing:.04em">${metricLabel}</th>
          <th style="padding:7px 10px;text-align:right;color:var(--txS);font-size:11px;text-transform:uppercase;letter-spacing:.04em">Variation</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  openModal("📈 Historique — " + displayName, html);
}

function renderCombinedSalesChart(trackedRows, CHART_COLORS) {
  // Pour chaque vendeur : construire les points { month, inc }
  // inc = seller_sales(point) - seller_sales(1er scrape du mois)
  // On groupe par mois calendaire, et dans chaque mois on calcule l'incrément
  // depuis la 1ère valeur du mois (ou la dernière valeur du mois précédent si dispo)

  const series = [];

  trackedRows.forEach((ts, ci) => {
    const name = ts.seller_name;
    const rawNames = resolveSellerNames(name);
    let hist = null;
    rawNames.forEach(rn => {
      const h = (STATE.confoSellerHistory||{})[rn];
      if (h && (!hist || h.length > hist.length)) hist = h;
    });
    if (!hist || !hist.length) return;

    // Filtrer les entrées sans sales
    const validHist = hist.filter(h => h.sales != null);
    if (!validHist.length) return;

    // Grouper par mois : garder toutes les entrées avec leur date et valeur
    // monthPoints[mois] = [ {date, sales}, ... ]
    const monthPoints = {};
    validHist.forEach(h => {
      const month = h.date.slice(0, 7);
      if (!monthPoints[month]) monthPoints[month] = [];
      monthPoints[month].push({ date: h.date, sales: h.sales });
    });

    const months = Object.keys(monthPoints).sort();
    if (!months.length) return;

    // Pour chaque mois : calculer l'incrément
    // baseline = dernière valeur du mois précédent, ou 1ère valeur du 1er mois
    const monthData = {};
    months.forEach((m, i) => {
      const pts = monthPoints[m].sort((a, b) => a.date > b.date ? 1 : -1);
      const lastVal = pts[pts.length - 1].sales;

      if (i === 0) {
        // 1er mois : baseline = 1ère valeur du mois
        // incrément = dernière valeur - 1ère valeur (ventes réalisées dans le mois)
        const firstVal = pts[0].sales;
        monthData[m] = Math.max(0, lastVal - firstVal);
      } else {
        // Autres mois : baseline = dernière valeur du mois précédent
        const prevPts = monthPoints[months[i-1]].sort((a, b) => a.date > b.date ? 1 : -1);
        const baseline = prevPts[prevPts.length - 1].sales;
        monthData[m] = Math.max(0, lastVal - baseline);
      }
    });

    const isBM = BM_NAMES_SET.has(name) || name === "BestMobilier";
    series.push({ name, color: CHART_COLORS[ci % CHART_COLORS.length], isBM, monthData, months });
  });

  if (!series.length) return "";

  // Tous les mois couverts (y compris ceux avec incrément 0 — on les affiche quand même)
  const allMonths = [...new Set(series.flatMap(s => s.months))].sort();
  if (!allMonths.length) return "";

  const fmtMonth = m => {
    const [y, mo] = m.split("-");
    const names = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    return names[parseInt(mo)-1] + " " + y;
  };

  // Dimensions SVG
  const BAR_W   = 20;
  const BAR_GAP = 3;
  const GROUP_GAP = 28;
  const nSeries = series.length;
  const groupW  = nSeries * (BAR_W + BAR_GAP) - BAR_GAP + GROUP_GAP;
  const PAD_L = 52, PAD_R = 20, PAD_T = 16, PAD_B = 48;
  const W = PAD_L + allMonths.length * groupW + PAD_R;
  const H = 220;
  const CH = H - PAD_T - PAD_B;

  const maxVal = Math.max(...series.flatMap(s => allMonths.map(m => s.monthData[m] || 0)), 1);

  // Grille Y
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(r => ({
    v: Math.round(r * maxVal),
    y: PAD_T + CH - r * CH
  }));
  const yGrid = yTicks.map(t =>
    `<line x1="${PAD_L}" y1="${t.y.toFixed(1)}" x2="${W - PAD_R}" y2="${t.y.toFixed(1)}" stroke="#e8e6e1" stroke-width="1"/>
     <text x="${PAD_L - 4}" y="${(t.y + 4).toFixed(1)}" text-anchor="end" fill="#9c9a92" font-size="10">${t.v.toLocaleString("fr-FR")}</text>`
  ).join("");

  // Barres
  const bars = allMonths.map((m, mi) => {
    const groupX = PAD_L + mi * groupW;
    const labelX = groupX + (nSeries * (BAR_W + BAR_GAP) - BAR_GAP) / 2;
    const isCurrentMonth = m === new Date().toISOString().slice(0, 7);
    const monthLabel = fmtMonth(m) + (isCurrentMonth ? " *" : "");
    const label = `<text x="${labelX.toFixed(1)}" y="${(H - 6).toFixed(1)}" text-anchor="middle" fill="#6b6a65" font-size="10" font-weight="500">${monthLabel}</text>`;

    const rects = series.map((s, si) => {
      const val = s.monthData[m] || 0;
      const barH = val > 0 ? Math.max((val / maxVal) * CH, 2) : 0;
      const x = groupX + si * (BAR_W + BAR_GAP);
      const y = PAD_T + CH - barH;
      const stroke = s.isBM ? ` stroke="${s.color}" stroke-width="1.5"` : "";
      const opacity = s.isBM ? "1" : "0.82";
      const valLabel = val > 0 && barH > 14
        ? `<text x="${(x + BAR_W/2).toFixed(1)}" y="${(y - 3).toFixed(1)}" text-anchor="middle" fill="${s.color}" font-size="9" font-weight="600">${val >= 1000 ? (val/1000).toFixed(1)+"k" : val}</text>`
        : "";
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${BAR_W}" height="${barH.toFixed(1)}" fill="${s.color}" opacity="${opacity}" rx="2"${stroke}/>${valLabel}`;
    }).join("");

    return label + rects;
  }).join("");

  // Légende
  const legend = series.map(s =>
    `<div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:${s.isBM?700:500};color:${s.isBM?"var(--ac)":"var(--tx)"}">
      <span style="display:inline-block;width:12px;height:12px;background:${s.color};border-radius:2px;flex-shrink:0;opacity:${s.isBM?1:0.82}"></span>
      ${esc(s.name)}
    </div>`
  ).join("");

  const svgW = Math.max(W, 400);
  const noteCurrentMonth = allMonths.some(m => m === new Date().toISOString().slice(0, 7))
    ? '<div style="font-size:10px;color:var(--txT);margin-top:6px">* Mois en cours — incrément partiel</div>'
    : "";

  return `<div class="card" style="margin-top:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Ventes mensuelles par acteur</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px">${legend}</div>
    </div>
    <div style="font-size:11px;color:var(--txT);margin-bottom:8px">Ventes réalisées dans le mois (incrément depuis début du mois ou fin du mois précédent).</div>
    <div style="overflow-x:auto">
      <svg viewBox="0 0 ${svgW} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:${Math.min(svgW,400)}px;display:block">
        ${yGrid}${bars}
      </svg>
    </div>
    ${noteCurrentMonth}
  </div>`;
}

// Conserver les fonctions utilitaires pour les sparklines (toujours utilisées dans le nouveau concurrent)
function buildSellerStatsMap() {
  const byName = {};
  (STATE.sellerStats || []).forEach(s => {
    if (!byName[s.seller]) byName[s.seller] = [];
    byName[s.seller].push(s);
  });
  const result = {};
  Object.entries(byName).forEach(([seller, rows]) => {
    const sorted = rows.sort((a, b) => new Date(b.date) - new Date(a.date));
    result[seller] = { latest: sorted[0] || null, prev: sorted[1] || null, all: sorted };
  });
  return result;
}

function buildVendorsSortedFromStats(statsMap) {
  const vendors = {};
  Object.entries(statsMap).forEach(([name, data]) => {
    const latest = data.latest;
    const p1 = latest?.p1_count || 0;
    const displayName = name === "Lisa Design" ? "BestMobilier" : name;
    if (!vendors[displayName]) {
      vendors[displayName] = { name: displayName, total: p1, p1, keywords: {}, sessionsCount: data.all?.length || 1, _rawNames: [name] };
    } else {
      vendors[displayName].total += p1;
      vendors[displayName].p1 += p1;
      vendors[displayName]._rawNames.push(name);
    }
  });
  return Object.values(vendors).sort((a, b) => b.total - a.total);
}

// Génère un SVG sparkline inline pour la courbe incrémentale Conforama
function renderConfoSparkline(sellerName) {
  const history = (STATE.confoSellerHistory || {})[sellerName];
  if (!history || history.length < 2) return '<div style="font-size:11px;color:var(--txT);padding:8px 0">Pas encore assez de données (min. 2 scrapes)</div>';

  const x0 = history[0].sales;
  const points = history.map(h => ({ date: h.date, inc: h.sales - x0 }));
  const maxInc = Math.max(...points.map(p => p.inc), 1);
  const W = 280, H = 60, PAD = 4;
  const n = points.length;

  const xs = points.map((_, i) => PAD + (i / (n - 1)) * (W - PAD * 2));
  const ys = points.map(p => H - PAD - ((p.inc / maxInc) * (H - PAD * 2)));

  const pathD = xs.map((x, i) => `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(' ');
  const fillD = `${pathD} L ${xs[n-1].toFixed(1)} ${(H-PAD).toFixed(1)} L ${PAD} ${(H-PAD).toFixed(1)} Z`;

  // Labels: première et dernière date
  const fmt = d => new Date(d).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
  const lastInc = points[points.length - 1].inc;

  return `
    <div class="sparkline-wrap">
      <div class="sparkline-title">Ventes incrémentales depuis 1er scrape (+${lastInc.toLocaleString("fr-FR")} au total)</div>
      <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="spk-grad-${sellerName.replace(/\s/g,'')}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--ac)" stop-opacity=".25"/>
            <stop offset="100%" stop-color="var(--ac)" stop-opacity=".02"/>
          </linearGradient>
        </defs>
        <path d="${fillD}" fill="url(#spk-grad-${sellerName.replace(/\s/g,'')})" />
        <path d="${pathD}" stroke="var(--ac)" stroke-width="1.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
        ${xs.map((x, i) => `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="2.5" fill="var(--ac)"/>`).join('')}
      </svg>
      <div class="sparkline-labels">
        <span>${fmt(points[0].date)}</span>
        ${n > 2 ? `<span style="color:var(--ac);font-weight:600">+${lastInc.toLocaleString("fr-FR")} ventes</span>` : ''}
        <span>${fmt(points[n-1].date)}</span>
      </div>
    </div>`;
}

    ${brokenUrls.length>0?`<div class="card anomaly-section"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="anomaly-dot" style="background:var(--rd)"></span><span style="font-size:14px;font-weight:600">URLs cassées (${brokenUrls.length})</span></div>${brokenUrls.map(p=>productRowHTML(p)).join("")}</div>`:''}

async function addProduct() {
  const statusEl=document.getElementById("add-status");

  const match=url.match(/-([a-zA-Z0-9]+)\.html/);
  const scraperId=match?match[1].toLowerCase():"";
  statusEl.innerHTML='<span style="color:var(--txS)">Ajout en cours...</span>';
  try {
    await sbInsert("products",{product_id:id,name,sku,sku_marketplace:skuMp,url,product_id_scraper:scraperId,type,marketplace:MARKETPLACE,active:true});

  const headers=["ID produit","Nom","SKU","EAN","Marketplace","Type","Canal attribué","URL","Statut"];
  const csvCell=function(v){const s=String(v!=null?v:"");return(s.indexOf(";")!==-1||s.indexOf('"')!==-1||s.indexOf("\n")!==-1)?'"'+s.replace(/"/g,'""')+'"':s;};
  const rows=list.map(function(p){return[p.product_id||"",p.name||"",p.sku||"",p.ean||"",p.marketplace||MARKETPLACE,p.type||"",p.canal_attribue||"",p.url||"",p.active!==false?"Actif":"Inactif"];});
  const csv=[headers].concat(rows).map(function(row){return row.map(csvCell).join(";");}).join("\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  const today=new Date().toLocaleDateString("fr-FR").replace(/\//g,"-");
  a.download="gestion_produits_"+MARKETPLACE+"_"+today+".csv";
  a.click();
  URL.revokeObjectURL(url);
}

// Parse un fichier XLS/XLSX et retourne { marketplace: total }
async function parseXLSFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
        console.log("Row 6 (headers):", rows[5]);
        console.log("Row 7 (data):", rows[6]);
        console.log("Row 7:", rows[6]);
        console.log("Row 8:", rows[7]);

        // Agréger par marketplace
        const totals = {};
        Object.keys(MP_MATCHING).forEach(mp => totals[mp] = 0);

        rows.forEach(row => {
          if (!row || !row[0] || !row[1]) return;
          const label = String(row[0]).toLowerCase().replace(/\s/g, "");
          const val = parseFloat(String(row[1]).replace(",", "."));
          if (isNaN(val)) return;

          for (const [mp, keys] of Object.entries(MP_MATCHING)) {
            if (keys.some(k => label.includes(k))) {
              totals[mp] += val;
              break;
            }
          }
        });

        // Arrondir
        Object.keys(totals).forEach(k => totals[k] = Math.round(totals[k] * 100) / 100);
        resolve(totals);
      } catch(e) {
        reject(e);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// ── PARSE ODOO XLS — ventes produits hebdomadaires ──────────────
const ODOO_CHANNEL_MAP = {
  "amazon_fr":"amazon","amazon_be":"amazon",
  "cdiscount_octopia":"cdiscount",
  "maisonsdumonde":"maisonsdumonde",
  "laredoute_mirakl":"laredoute",
  "conforama":"conforama",
  "manomano_fr":"manomano","manomano_fr_b2b":"manomano",
  "but_mirakl":"but",
};
const ODOO_SKIP = ["Livraison","Retrait","Bon de réduction","Remise"];

async function parseOdooXLS(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
        let currentChannel = null;
        const agg = {};
        rows.forEach(row => {
          if (!row || row.length < 3) return;
          const desc = row[0] != null ? String(row[0]).trim() : "";
          const qtyRaw = row[2];
          if (!desc || desc === "Total" || desc.includes("Total HT")) return;
          if (ODOO_SKIP.some(p => desc.startsWith(p))) return;
          const refMatch = desc.match(/\[([^\]]+)\]/);
          if (refMatch) {
            const ref = refMatch[1].trim();
            const name = desc.replace(/\[[^\]]+\]\s*/, "").trim().slice(0, 100);
            const qty = parseInt(qtyRaw) || 0;
            const caHt = parseFloat(String(row[1] || 0).replace(",", ".")) || 0;
            const mp = currentChannel ? ODOO_CHANNEL_MAP[currentChannel] : null;
            if (mp && qty > 0) {
              const key = ref + "|" + mp;
              if (!agg[key]) agg[key] = { ref, name, marketplace: mp, qty: 0, ca_ht: 0 };
              agg[key].qty += qty;
              agg[key].ca_ht += caHt;
            }
          } else {
            currentChannel = desc;
          }
        });
        resolve(Object.values(agg));
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

const AUDIT_SCORE_FORMULA = (r) => {
  const v = val => (val === null || val === undefined || val === "") ? null : parseFloat(val);
  const t = (val, max) => { const n = v(val); return n === null ? 0 : n; };
  const tScore = (val, max) => { const n = v(val); return n === null ? 0 : n; };

  const titreTotal = t(r.titre_longueur)+t(r.titre_marque)+t(r.titre_collection)+t(r.titre_couleur)+t(r.titre_matiere)+t(r.titre_fonctions);
  const descTotal  = t(r.desc_bullets_nb)+t(r.desc_bullets_pertinence)+t(r.desc_caract_tech)+t(r.desc_dimensions)+t(r.desc_colis)+t(r.desc_textes_mkt);
  const visTotal   = t(r.visuels_fond_blanc)+t(r.visuels_dimensions)+t(r.visuels_lifestyle)+t(r.visuels_zoom_matiere)+t(r.visuels_fonction)+t(r.visuels_qualite_carrousel);
  const gdvTotal   = t(r.gdv_couleur)+t(r.gdv_autre);
  const aplusTotal = t(r.aplus_fiche)+t(r.aplus_video);

  // Score global : NULL = max (convention Excel — case non auditée = meilleur score)
  const titreScore = tScore(r.titre_longueur,2)+tScore(r.titre_marque,1)+tScore(r.titre_collection,1)+tScore(r.titre_couleur,1)+tScore(r.titre_matiere,1)+tScore(r.titre_fonctions,2);
  const descScore  = tScore(r.desc_bullets_nb,4)+tScore(r.desc_bullets_pertinence,4)+tScore(r.desc_caract_tech,1)+tScore(r.desc_dimensions,1)+tScore(r.desc_colis,1)+tScore(r.desc_textes_mkt,1);
  const visScore   = tScore(r.visuels_fond_blanc,1)+tScore(r.visuels_dimensions,1)+tScore(r.visuels_lifestyle,1)+tScore(r.visuels_zoom_matiere,1)+tScore(r.visuels_fonction,1)+tScore(r.visuels_qualite_carrousel,5);
  const gdvScore   = tScore(r.gdv_couleur,1)+tScore(r.gdv_autre,1);
  const aplusScore = tScore(r.aplus_fiche,2)+tScore(r.aplus_video,1);

  const score = Math.round((titreScore + descScore + visScore + gdvScore + aplusScore) / 35 * 100);
  return { titreTotal, descTotal, visTotal, gdvTotal, aplusTotal, score };
};

        <button onclick="openAuditAddProductModal()" style="padding:6px 14px;border:.5px solid var(--ac);border-radius:6px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Ajouter produit</button>

  const filters = `

    ${auditFilters.niveau!=="all"||auditFilters.type!=="all"||auditFilters.categorie!=="all"||auditFilters.search

  </div>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
    <div style="font-size:12px;color:var(--txS)">${list.length} référence${list.length>1?"s":""}</div>
    <button onclick="auditSortByScore()" style="padding:4px 10px;border:.5px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;background:var(--bg)" id="audit-sort-btn">Score ↕</button>

  // Colonnes du tableau
  const colGroups = [

      {key:"sku",label:"SKU",w:90,editable:false},
      {key:"nom_produit",label:"Produit",w:180,editable:true},
      {key:"lien_mkp",label:"Lien",w:60,editable:true,isLink:true},
      {key:"categorie",label:"Catég.",w:80,editable:true},
      {key:"type_ref",label:"Type",w:90,editable:true},
    ]},
    { label:"TITRE (8 pts)", cols:[
      {key:"titre_longueur",label:"Long. (0-2)",w:60,editable:true,max:2},
      {key:"titre_marque",label:"Marque (0-1)",w:60,editable:true,max:1},
      {key:"titre_collection",label:"Collec. (0-1)",w:60,editable:true,max:1},
      {key:"titre_couleur",label:"Couleur (0-1)",w:60,editable:true,max:1},
      {key:"titre_matiere",label:"Matière (0-1)",w:60,editable:true,max:1},
      {key:"titre_fonctions",label:"Fonct. (0-2)",w:60,editable:true,max:2},
      {key:"_titre_total",label:"TOTAL",w:55,editable:false,isTotal:true},
    ]},
    { label:"DESCRIPTION (12 pts)", cols:[
      {key:"desc_bullets_nb",label:"Bullets nb (0-4)",w:70,editable:true,max:4},
      {key:"desc_bullets_pertinence",label:"Pertinence (0-4)",w:70,editable:true,max:4},
      {key:"desc_caract_tech",label:"Caract. tech (0-1)",w:65,editable:true,max:1},
      {key:"desc_dimensions",label:"Dims (0-1)",w:60,editable:true,max:1},
      {key:"desc_colis",label:"Colis (0-1)",w:55,editable:true,max:1},
      {key:"desc_textes_mkt",label:"Textes MKT (0-1)",w:70,editable:true,max:1},
      {key:"_desc_total",label:"TOTAL",w:55,editable:false,isTotal:true},
    ]},
    { label:"VISUELS (10 pts)", cols:[
      {key:"visuels_fond_blanc",label:"Fond blanc (0-1)",w:70,editable:true,max:1},
      {key:"visuels_dimensions",label:"Dims (0-1)",w:55,editable:true,max:1},
      {key:"visuels_lifestyle",label:"Lifestyle (0-1)",w:65,editable:true,max:1},
      {key:"visuels_zoom_matiere",label:"Zoom mat. (0-1)",w:70,editable:true,max:1},
      {key:"visuels_fonction",label:"Fonction (0-1)",w:65,editable:true,max:1},
      {key:"visuels_qualite_carrousel",label:"Carrousel (0-5)",w:70,editable:true,max:5},
      {key:"_vis_total",label:"TOTAL",w:55,editable:false,isTotal:true},
    ]},
    { label:"GDV (2 pts)", cols:[
      {key:"gdv_couleur",label:"Couleur (0-1)",w:65,editable:true,max:1},
      {key:"gdv_autre",label:"Autre (0-1)",w:60,editable:true,max:1},
      {key:"_gdv_total",label:"TOTAL",w:55,editable:false,isTotal:true},
    ]},
    { label:"FICHE A+ (3 pts)", cols:[
      {key:"aplus_fiche",label:"Fiche A+ (0-2)",w:70,editable:true,max:2},
      {key:"aplus_video",label:"Vidéo (0-1)",w:60,editable:true,max:1},
      {key:"_aplus_total",label:"TOTAL",w:55,editable:false,isTotal:true},
    ]},
    { label:"SCORE", cols:[
      {key:"_score",label:"IDQ /100",w:70,editable:false,isScore:true},
      {key:"_niveau",label:"Niveau",w:100,editable:false,isNiveau:true},
      {key:"plan_action",label:"Plan d'action",w:160,editable:true},
    ]},
    { label:"COMMENTAIRES", cols:[
      {key:"commentaire_1",label:"Titre",w:140,editable:true},
      {key:"commentaire_2",label:"Description",w:140,editable:true},
      {key:"commentaire_3",label:"Visuels",w:140,editable:true},
      {key:"commentaire_4",label:"GDV",w:140,editable:true},
      {key:"commentaire_5",label:"Fiche A+",w:140,editable:true},
      {key:"commentaire_6",label:"Divers",w:140,editable:true},
    ]},
  ];

  const allCols = colGroups.flatMap(g=>g.cols);
  const totalW = allCols.reduce((s,c)=>s+c.w,0)+60;

  const thRow1 = colGroups.map(g=>'<th colspan="'+g.cols.length+'" style="padding:6px 10px;font-size:10px;font-weight:700;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;text-align:center;border-right:1px solid var(--border)">'+g.label+'</th>').join("");
  const thRow2 = allCols.map(c=>'<th style="padding:6px 8px;font-size:10px;font-weight:600;color:var(--txS);white-space:nowrap;min-width:'+c.w+'px;text-align:center'+(c.isTotal||c.isScore?';background:var(--borderL)':'')+'">'+(c.label||'')+'</th>').join("");
  const thead = '<thead><tr style="background:var(--bg);border-bottom:1px solid var(--borderL)">'+thRow1+'<th style="padding:6px 10px"></th></tr><tr style="background:var(--bg);border-bottom:2px solid var(--border)">'+thRow2+'<th style="display:none"></th></tr></thead>';

  return synthese + filters +
    '<div id="audit-scroll-top" style="overflow-x:auto;overflow-y:hidden;height:12px;margin-bottom:2px"><div style="height:1px"></div></div>' +

    '<tbody id="audit-tbody">'+buildAuditRows(list)+'</tbody>' +

  // Appliquer zoom initial après render

    const t = document.getElementById('audit-table');
    if (t) t.style.fontSize = '85%';
    // Sync scroll haut ↔ bas

      const inner = topBar.querySelector('div');
      if (inner) inner.style.width = scrollWrap.scrollWidth + 'px';
      topBar.addEventListener('scroll', () => { scrollWrap.scrollLeft = topBar.scrollLeft; });
      scrollWrap.addEventListener('scroll', () => { topBar.scrollLeft = scrollWrap.scrollLeft; });
    }
  }, 50);
}

function buildAuditRows(filteredList) {
  let list = filteredList;
  if (!list) {
    list = auditData;
    if (auditFilters.type !== "all") list = list.filter(r=>r.type_ref===auditFilters.type);
    if (auditFilters.categorie !== "all") list = list.filter(r=>r.categorie===auditFilters.categorie);
    if (auditFilters.niveau !== "all") list = list.filter(r=>AUDIT_NIVEAU(AUDIT_SCORE_FORMULA(r).score)===auditFilters.niveau);
    if (auditFilters.search) {
      const s = auditFilters.search.toLowerCase();
      list = list.filter(r=>(r.sku||"").toLowerCase().includes(s)||(r.nom_produit||"").toLowerCase().includes(s));
    }
  }

  const colGroups = [
    {cols:[
      {key:"sku",w:90,editable:false},
      {key:"nom_produit",w:180,editable:false},
      {key:"lien_mkp",w:60,editable:true,isLink:true},
      {key:"categorie",w:80,editable:true,isSelect:true,options:["Canapé","Meubles","Outdoor","Autre"]},
      {key:"type_ref",w:90,editable:true,isSelect:true,options:["Top Ref","Nouveauté","Autre"]},
    ]},
    {cols:[
      {key:"titre_longueur",w:60,editable:true,max:2},
      {key:"titre_marque",w:60,editable:true,max:1},
      {key:"titre_collection",w:60,editable:true,max:1},
      {key:"titre_couleur",w:60,editable:true,max:1},
      {key:"titre_matiere",w:60,editable:true,max:1},
      {key:"titre_fonctions",w:60,editable:true,max:2},
      {key:"_titre_total",w:55,editable:false,isTotal:true},
    ]},
    {cols:[
      {key:"desc_bullets_nb",w:70,editable:true,max:4},
      {key:"desc_bullets_pertinence",w:70,editable:true,max:4},
      {key:"desc_caract_tech",w:65,editable:true,max:1},
      {key:"desc_dimensions",w:60,editable:true,max:1},
      {key:"desc_colis",w:55,editable:true,max:1},
      {key:"desc_textes_mkt",w:70,editable:true,max:1},
      {key:"_desc_total",w:55,editable:false,isTotal:true},
    ]},
    {cols:[
      {key:"visuels_fond_blanc",w:70,editable:true,max:1},
      {key:"visuels_dimensions",w:55,editable:true,max:1},
      {key:"visuels_lifestyle",w:65,editable:true,max:1},
      {key:"visuels_zoom_matiere",w:70,editable:true,max:1},
      {key:"visuels_fonction",w:65,editable:true,max:1},
      {key:"visuels_qualite_carrousel",w:70,editable:true,max:5},
      {key:"_vis_total",w:55,editable:false,isTotal:true},
    ]},
    {cols:[
      {key:"gdv_couleur",w:65,editable:true,max:1},
      {key:"gdv_autre",w:60,editable:true,max:1},
      {key:"_gdv_total",w:55,editable:false,isTotal:true},
    ]},
    {cols:[
      {key:"aplus_fiche",w:70,editable:true,max:2},
      {key:"aplus_video",w:60,editable:true,max:1},
      {key:"_aplus_total",w:55,editable:false,isTotal:true},
    ]},
    {cols:[
      {key:"_score",w:70,editable:false,isScore:true},
      {key:"_niveau",w:100,editable:false,isNiveau:true},
      {key:"plan_action",w:160,editable:false,isPlan:true},
    ]},
    {cols:[
      {key:"commentaire_1",w:160,editable:true,isTextarea:true},
      {key:"commentaire_2",w:160,editable:true,isTextarea:true},
      {key:"commentaire_3",w:160,editable:true,isTextarea:true},
      {key:"commentaire_4",w:160,editable:true,isTextarea:true},
      {key:"commentaire_5",w:160,editable:true,isTextarea:true},
      {key:"commentaire_6",w:160,editable:true,isTextarea:true},
    ]},
  ];
  const allCols = colGroups.flatMap(g=>g.cols);

  if (!list.length) {
    return '<tr><td colspan="50" style="padding:30px;text-align:center;color:var(--txT)">Aucune donnée — importez un fichier XLS ou ajoutez des références.</td></tr>';
  }

  return list.map(function(r, i) {
    const calc = AUDIT_SCORE_FORMULA(r);
    const niveau = AUDIT_NIVEAU(calc.score);
    const totals = {
      _titre_total: calc.titreTotal,
      _desc_total:  calc.descTotal,
      _vis_total:   calc.visTotal,
      _gdv_total:   calc.gdvTotal,
      _aplus_total: calc.aplusTotal,
      _score:       calc.score,
      _niveau:      niveau
    };
    const bg = i%2 ? "background:var(--bg)" : "";

    const cells = allCols.map(function(c) {

      if (c.isTotal) {
        const v = totals[c.key] != null ? totals[c.key] : "—";
        return '<td style="text-align:center;font-weight:700;background:var(--borderL);padding:4px 6px">' + v + '</td>';
      }

      if (c.isScore) {
        const s = totals._score;
        const col = AUDIT_NIVEAU_COLOR(AUDIT_NIVEAU(s));
        return '<td style="text-align:center;background:var(--borderL);padding:4px 6px;white-space:nowrap">'
          + '<span style="font-weight:800;font-size:14px;color:' + col + '">' + (s || "—") + '</span>'
          + '<button onclick="showAuditHistory(' + r.id + ',\'' + esc(r.sku) + '\')" title="Historique" style="background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;vertical-align:middle">📈</button>'
          + '</td>';
      }

      if (c.isNiveau) {
        const n = totals._niveau;
        return '<td style="text-align:center;padding:4px 6px">'
          + '<span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:' + AUDIT_NIVEAU_BG(n) + ';color:' + AUDIT_NIVEAU_COLOR(n) + '">' + (n || "—") + '</span>'
          + '</td>';
      }

      if (c.isPlan) {
        const n = totals._niveau;
        const sc = totals._score;
        const pa = sc >= 90 ? "OK — Surveiller" : sc >= 75 ? "Ajustements mineurs" : sc >= 50 ? "Optimisation contenu + visuels" : "Refonte complète urgente";
        return '<td style="padding:4px 8px;font-size:11px;color:' + AUDIT_NIVEAU_COLOR(n) + ';font-weight:600;white-space:nowrap">' + pa + '</td>';
      }

      if (c.isLink) {
        const v = r[c.key] || "";
        const isReal = v && v !== "Pas en ligne" && v.startsWith("http");
        return '<td style="text-align:center;padding:4px 6px">'
          + (isReal ? '<a href="' + esc(v) + '" target="_blank" class="link">Voir ↗</a>' : '<span style="color:var(--txT);font-size:10px">—</span>')
          + '</td>';
      }

      if (!c.editable) {
        return '<td style="padding:4px 8px;font-size:12px;font-weight:500">' + esc(String(r[c.key] || "")) + '</td>';
      }

      if (c.isSelect) {
        const v = r[c.key] || "";
        const isOther = v && !c.options.slice(0, -1).includes(v);
        const opts = c.options.map(function(o) {
          const sel = ((isOther && o === 'Autre') || v === o) ? ' selected' : '';
          return '<option value="' + esc(o) + '"' + sel + '>' + esc(o) + '</option>';
        }).join("");
        return '<td style="padding:2px 4px;min-width:' + c.w + 'px">'
          + '<select onchange="auditHandleSelect(' + r.id + ',\'' + c.key + '\',this.value,this)" style="width:100%;padding:3px 4px;border:.5px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;background:transparent">'
          + opts
          + '</select>'
          + (isOther ? '<input value="' + esc(v) + '" style="width:100%;margin-top:2px;padding:2px 4px;border:.5px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit" onblur="auditSaveCell(' + r.id + ',\'' + c.key + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">' : "")
          + '</td>';
      }

      const v = (r[c.key] !== null && r[c.key] !== undefined) ? r[c.key] : "";

      if (c.max !== undefined) {
        return '<td style="text-align:center;padding:2px 4px">'
          + '<input type="text" value="' + esc(String(v)) + '" style="width:' + (c.w - 10) + 'px;text-align:center;padding:3px 4px;border:.5px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;background:transparent" title="Max: ' + c.max + '"'
          + ' onblur="auditSaveCell(' + r.id + ',\'' + c.key + '\',this.value)"'
          + ' onkeydown="if(event.key===\'Enter\')this.blur()">'
          + '</td>';
      }

      // textarea commentaire
      return '<td style="padding:2px 4px;min-width:' + c.w + 'px">'
        + '<textarea rows="3" style="width:' + (c.w - 8) + 'px;padding:3px 5px;border:.5px solid var(--border);border-radius:4px;font-size:10px;font-family:inherit;resize:vertical;background:transparent;min-height:52px"'
        + ' onblur="auditSaveCell(' + r.id + ',\'' + c.key + '\',this.value)">'
        + esc(String(v))
        + '</textarea></td>';

    }).join("");

    return '<tr style="' + bg + ';border-bottom:1px solid var(--borderL)" id="audit-row-' + r.id + '">'
      + cells
      + '<td style="display:none"></td>'
      + '</tr>';

  }).join("");
}

async function auditSaveCell(id, field, value) {
  const key = id + "_" + field;
  if (auditSaving[key]) return;
  auditSaving[key] = true;
  try {
    const updateData = { [field]: value === "" ? null : value, updated_at: new Date().toISOString() };
    await sbUpdate("audit_idq", "id=eq."+id, updateData);
    // Mettre à jour auditData local
    const row = auditData.find(r=>r.id===id);
    if (row) {
      row[field] = value === "" ? null : value;
      // Si c'est un champ de score, mettre à jour l'historique
      const scoreFields = ["titre_longueur","titre_marque","titre_collection","titre_couleur","titre_matiere","titre_fonctions","desc_bullets_nb","desc_bullets_pertinence","desc_caract_tech","desc_dimensions","desc_colis","desc_textes_mkt","visuels_fond_blanc","visuels_dimensions","visuels_lifestyle","visuels_zoom_matiere","visuels_fonction","visuels_qualite_carrousel","gdv_couleur","gdv_autre","aplus_fiche","aplus_video"];
      if (scoreFields.includes(field)) {
        const calc = AUDIT_SCORE_FORMULA(row);
        const niveau = AUDIT_NIVEAU(calc.score);
        // Mettre à jour l'affichage du score dans la ligne
        const rowEl = document.getElementById("audit-row-" + id);
        if (rowEl) {
          // Re-render juste la ligne
          const newRow = buildAuditRows([row]);
          rowEl.outerHTML = newRow;
        }
      }
    }
  } catch(e) {
    console.error("Erreur sauvegarde audit:", e.message);
  } finally {
    delete auditSaving[key];
  }
}

async function showAuditHistory(id, sku) {
  try {
    const history = await sb("audit_idq_history", "audit_idq_id=eq."+id+"&select=*&order=recorded_at.desc&limit=20");
    const row = auditData.find(r=>r.id===id);
    const currentScore = row ? AUDIT_SCORE_FORMULA(row).score : null;
    const currentNiveau = row ? AUDIT_NIVEAU(currentScore) : "";
    if (!history.length && !currentScore) {
      openModal("Historique — " + sku, '<div style="padding:20px;text-align:center;color:var(--txT)">Aucun historique disponible.</div>');
      return;
    }
    const fmtDate = d => new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});

    const currentRow = currentScore
      ? '<tr style="background:var(--acBg);border-bottom:1px solid var(--borderL)">'
        + '<td style="padding:8px 12px;font-weight:600">Actuel</td>'
        + '<td style="padding:8px 12px;text-align:center;font-size:18px;font-weight:800;color:'+AUDIT_NIVEAU_COLOR(currentNiveau)+'">'+currentScore+'</td>'
        + '<td style="padding:8px 12px;text-align:center"><span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:'+AUDIT_NIVEAU_BG(currentNiveau)+';color:'+AUDIT_NIVEAU_COLOR(currentNiveau)+'">'+currentNiveau+'</span></td>'
        + '<td style="padding:8px 12px;text-align:center;color:var(--txT)">'+(row && row.semaine ? row.semaine : "—")+'</td>'
        + '</tr>'
      : "";

    const histRows = history.map(function(h, i) {
      const n = AUDIT_NIVEAU(h.score_idq);
      const prev = history[i+1];
      const delta = prev ? h.score_idq - prev.score_idq : null;
      const deltaHtml = delta !== null
        ? '<span style="font-size:10px;font-weight:600;color:'+(delta>0?"var(--gn)":delta<0?"var(--rd)":"var(--txT)")+'">'+( delta>0?"+":"")+delta+'</span>'

        + '<td style="padding:7px 12px;font-size:11px;color:var(--txS)">'+fmtDate(h.recorded_at)+'</td>'
        + '<td style="padding:7px 12px;text-align:center;font-size:16px;font-weight:700;color:'+AUDIT_NIVEAU_COLOR(n)+'">'+(h.score_idq||"—")+deltaHtml+'</td>'
        + '<td style="padding:7px 12px;text-align:center"><span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:'+AUDIT_NIVEAU_BG(n)+';color:'+AUDIT_NIVEAU_COLOR(n)+'">'+n+'</span></td>'
        + '<td style="padding:7px 12px;text-align:center;color:var(--txS)">'+(h.semaine||"—")+'</td>'
        + '</tr>';
    }).join("");

    const html = '<div style="font-size:12px;color:var(--txS);margin-bottom:10px">'+history.length+' entrée'+(history.length>1?"s":"")+" dans l'historique</div>"
      + '<div style="overflow-x:auto">'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px">'
      + '<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">'
      + '<th style="padding:7px 12px;text-align:left;color:var(--txS)">Date</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Score IDQ</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Niveau</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Semaine</th>'
      + '</tr></thead>'
      + '<tbody>'+currentRow+histRows+'</tbody>'
      + '</table></div>'
      + '<button onclick="saveAuditSnapshot('+id+',\''+esc(sku)+'\')" style="margin-top:12px;padding:8px 16px;background:var(--ac);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">+ Enregistrer le score actuel dans l\'historique</button>';

    openModal("Historique IDQ — " + sku, html);
  } catch(e) {
    openModal("Historique — " + sku, '<div style="color:var(--rd);padding:20px">'+e.message+'</div>');

async function saveAuditSnapshot(id, sku) {
  const row = auditData.find(r=>r.id===id);

  const calc = AUDIT_SCORE_FORMULA(row);

    });

  } catch(e) {

  }
}

async function confirmAuditImport() {
  const statusEl = document.getElementById("audit-import-status");
  const pwd = document.getElementById("audit-pwd")?.value;
  const file = document.getElementById("audit-file")?.files[0];
  const semaine = document.getElementById("audit-semaine")?.value?.trim();

  if (pwd !== ADMIN_PASSWORD) { statusEl.innerHTML='<span style="color:var(--rd)">❌ Mot de passe incorrect.</span>'; return; }
  if (!file || !semaine) { statusEl.innerHTML='<span style="color:var(--rd)">Fichier et semaine obligatoires.</span>'; return; }

  statusEl.innerHTML = '<span style="color:var(--txS)">Lecture du fichier...</span>';

  try {
    const rows = await parseAuditXLS(file, semaine);
    const mpRows = rows.filter(r => normalizeAuditMp(r.marketplace) === MARKETPLACE);
    if (!mpRows.length) {
      statusEl.innerHTML = `<span style="color:var(--am)">⚠ Aucune ligne trouvée pour ${MARKETPLACE} dans ce fichier.</span>`;
      return;
    }

    statusEl.innerHTML = `<span style="color:var(--txS)">Import de ${mpRows.length} lignes...</span>`;

    // Sauvegarder les scores actuels dans l'historique avant d'écraser
    const existing = await sb("audit_idq", `marketplace=eq.${MARKETPLACE}&select=id,sku,score_idq,niveau,semaine`).catch(()=>[]);
    if (existing.length) {
      const histRows = existing.filter(e=>e.score_idq).map(e=>({
        audit_idq_id: e.id, marketplace: MARKETPLACE, sku: e.sku,
        score_idq: e.score_idq, niveau: e.niveau, semaine: e.semaine,
        recorded_at: new Date().toISOString()
      }));
      if (histRows.length) {
        await fetch(`${SB_URL}/rest/v1/audit_idq_history`, {
          method:"POST", headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=minimal"},
          body:JSON.stringify(histRows)
        });
      }
    }

    // Upsert les nouvelles données (par marketplace+sku)
    for (const row of mpRows) {
      const existingRow = existing.find(e=>e.sku===row.sku);
      if (existingRow) {
        await sbUpdate("audit_idq", `id=eq.${existingRow.id}`, {...row, updated_at: new Date().toISOString()});
      } else {
        await sbInsert("audit_idq", row);
      }
    }

    statusEl.innerHTML = `<span style="color:var(--gn)">✓ ${mpRows.length} lignes importées pour ${MARKETPLACE}.</span>`;
    setTimeout(()=>{ closeModal(); renderAudit(); }, 1000);
  } catch(e) {
    statusEl.innerHTML = `<span style="color:var(--rd)">Erreur : ${e.message}</span>`;
  }
}

function normalizeAuditMp(mp) {
  if (!mp) return null;
  const m = mp.toLowerCase().trim();
  if (m.includes("cdiscount")) return "cdiscount";
  if (m.includes("maison")) return "maisonsdumonde";
  if (m.includes("but")) return "but";
  if (m.includes("redoute")) return "laredoute";
  if (m.includes("leroy")) return "leredoute"; // hors dashboard
  if (m.includes("amazon")) return "amazon";
  if (m.includes("conforama")) return "conforama";
  if (m.includes("manomano")) return "manomano";
  return m;
}

async function parseAuditXLS(file, semaine) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type:"array" });
        const ws = wb.Sheets["Top et Nouveautés"] || wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

        const result = [];
        // Les données commencent à la ligne 5 (index 4)
        for (let i = 4; i < rows.length; i++) {
          const r = rows[i];
          if (!r || !r[0] || !r[2]) continue; // SKU et Marketplace obligatoires
          const na = v => (v === "N/A" || v === null || v === undefined) ? null : (isNaN(parseFloat(v)) ? String(v) : parseFloat(v));
          const str = v => v ? String(v).trim() : null;
          result.push({
            marketplace: str(r[2]),
            sku: str(r[0]),
            nom_produit: str(r[1]),
            lien_mkp: str(r[3]),
            categorie: str(r[4]),
            type_ref: str(r[5]),
            titre_longueur: na(r[6]),
            titre_marque: na(r[7]),
            titre_collection: na(r[8]),
            titre_couleur: na(r[9]),
            titre_matiere: na(r[10]),
            titre_fonctions: na(r[11]),
            desc_bullets_nb: na(r[13]),
            desc_bullets_pertinence: na(r[14]),
            desc_caract_tech: na(r[15]),
            desc_dimensions: na(r[16]),
            desc_colis: na(r[17]),
            desc_textes_mkt: na(r[18]),
            visuels_fond_blanc: na(r[20]),
            visuels_dimensions: na(r[21]),
            visuels_lifestyle: na(r[22]),
            visuels_zoom_matiere: na(r[23]),
            visuels_fonction: na(r[24]),
            visuels_qualite_carrousel: na(r[25]),
            gdv_couleur: na(r[27]),
            gdv_autre: na(r[28]),
            aplus_fiche: na(r[30]),
            aplus_video: na(r[31]),
            plan_action: str(r[35]),
            commentaire_1: str(r[38]),
            commentaire_2: str(r[39]),
            commentaire_3: str(r[40]),
            commentaire_4: str(r[41]),
            commentaire_5: str(r[42]),
            commentaire_6: str(r[43]),
            semaine: semaine,
          });
        }
        resolve(result);
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function auditHandleSelect(id, field, value, selectEl) {
  const td = selectEl.closest('td');
  if (value === 'Autre') {
    let inp = td.querySelector('input');
    if (!inp) {
      inp = document.createElement('input');
      inp.style.cssText = 'width:100%;margin-top:2px;padding:2px 4px;border:.5px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit';
      inp.addEventListener('blur', () => auditSaveCell(id, field, inp.value));
      inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });
      td.appendChild(inp);
    }
    inp.focus();
  } else {
    const inp = td.querySelector('input');
    if (inp) inp.remove();
    auditSaveCell(id, field, value);
  }
}


function exportAuditCSV() {
  const headers = ["SKU","Produit","Marketplace","Lien","Catégorie","Type","Titre Long.","Titre Marque","Titre Collec.","Titre Couleur","Titre Matière","Titre Fonct.","Total Titre","Bullets nb","Pertinence","Caract. tech","Dims","Colis","Textes MKT","Total Desc","Fond blanc","Dims vis.","Lifestyle","Zoom mat.","Fonction","Carrousel","Total Visuels","GDV Couleur","GDV Autre","Total GDV","Fiche A+","Vidéo","Total A+","Score IDQ","Niveau","Plan d'action","Commentaire Titre","Commentaire Desc","Commentaire Visuels","Commentaire GDV","Commentaire A+","Commentaire Divers","Semaine"];
  const rows = auditData.map(r => {
    const calc = AUDIT_SCORE_FORMULA(r);
    const niveau = AUDIT_NIVEAU(calc.score);
    const pa = calc.score >= 90 ? "OK — Surveiller" : calc.score >= 75 ? "Ajustements mineurs" : calc.score >= 50 ? "Optimisation contenu + visuels" : "Refonte complète urgente";
    return [r.sku,r.nom_produit,r.marketplace,r.lien_mkp,r.categorie,r.type_ref,r.titre_longueur,r.titre_marque,r.titre_collection,r.titre_couleur,r.titre_matiere,r.titre_fonctions,calc.titreTotal,r.desc_bullets_nb,r.desc_bullets_pertinence,r.desc_caract_tech,r.desc_dimensions,r.desc_colis,r.desc_textes_mkt,calc.descTotal,r.visuels_fond_blanc,r.visuels_dimensions,r.visuels_lifestyle,r.visuels_zoom_matiere,r.visuels_fonction,r.visuels_qualite_carrousel,calc.visTotal,r.gdv_couleur,r.gdv_autre,calc.gdvTotal,r.aplus_fiche,r.aplus_video,calc.aplusTotal,calc.score,niveau,pa,r.commentaire_1,r.commentaire_2,r.commentaire_3,r.commentaire_4,r.commentaire_5,r.commentaire_6,r.semaine];
  });
  const csvCell = v => { const s = String(v??''); return s.includes(';')||s.includes('"')||s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s; };
  const csv = [headers,...rows].map(row=>row.map(csvCell).join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`audit_idq_${MARKETPLACE}_${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

let auditSortDir = 'desc';
function auditSortByScore() {

  auditData.sort((a,b) => {

let opeData = [];
const OPE_COLORS = ["#2c5ea0","#e8963a","#2e9e6b","#c0392b","#8e44ad","#16a085","#d35400","#e74c3c","#27ae60","#2980b9"];

function opeColor(id) {
  return OPE_COLORS[id % OPE_COLORS.length];
}

function opeIsActive(op) {
  const now = new Date();
  const d = new Date(op.date_debut);
  const f = new Date(op.date_fin);
  return now >= d && now <= f;
}

async function renderOpeCommerciales() {
  const el = document.getElementById("content");
  el.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>Chargement des opérations...</div></div>';
  try {
    opeData = await sb("commercial_operations", "marketplace=eq."+MARKETPLACE+"&select=*&order=date_debut.desc");
  } catch(e) { opeData = []; }
  try {
    const opProds = await sb("operation_products", "marketplace=eq."+MARKETPLACE+"&select=operation_id,taux_commission");
    const countMap = {}, commMap = {};
    opProds.forEach(p => {
      const id = p.operation_id;
      if (!countMap[id]) { countMap[id] = 0; commMap[id] = []; }
      countMap[id]++;
      if (p.taux_commission != null) commMap[id].push(p.taux_commission);
    });
    opeData.forEach(op => {
      op._prodCount = countMap[op.id] || 0;
      const comms = commMap[op.id] || [];
      op._commAvg = comms.length ? Math.round(comms.reduce((s,v) => s+v, 0) / comms.length * 1000) / 10 : null;
    });
  } catch(e) {}
  el.innerHTML = buildOpeHTML();
}

function buildOpeHTML() {
  const now = new Date();
  const months = [];
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleDateString("fr-FR", {month:"long", year:"numeric"}) });
  }

  const active = opeData.filter(op => opeIsActive(op));
  const expired = opeData.filter(op => new Date(op.date_fin) < now);
  const future = opeData.filter(op => new Date(op.date_debut) > now);

  // KPIs
  const kpis = '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">'
    + '<div class="metric"><div class="metric-label">Opérations actives</div><div class="metric-value" style="color:var(--gn)">'+active.length+'</div></div>'
    + '<div class="metric"><div class="metric-label">À venir</div><div class="metric-value" style="color:var(--ac)">'+future.length+'</div></div>'
    + '<div class="metric"><div class="metric-label">Expirées</div><div class="metric-value" style="color:var(--txT)">'+expired.length+'</div></div>'
    + '<div class="metric"><div class="metric-label">Total produits actifs</div><div class="metric-value" style="color:var(--am)">'
    + active.reduce((s,op) => s + (op._prodCount||0), 0)
    + '</div></div>'
    + '</div>';

  // Timeline
  const COL_W = 180;
  const LEFT_W = 60;
  const ROW_H = 60;
  const HEADER_H = 72;
  const BAR_H = 34;

  // Filtrer les opérations visibles sur la timeline (actives + futures + expirées du mois courant)
  const timelineOps = opeData.filter(op => {
    const fin = new Date(op.date_fin);
    const start = new Date(months[0].year, months[0].month, 1);
    const end = new Date(months[5].year, months[5].month + 1, 0);
    return fin >= start && new Date(op.date_debut) <= end;
  });

  const timelineH = Math.max(timelineOps.length * ROW_H + HEADER_H + 20, HEADER_H + 60);
  const totalW = LEFT_W + COL_W * 6;

  // SVG timeline
  let svg = '<svg viewBox="0 0 '+totalW+' '+timelineH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;font-family:DM Sans,sans-serif">';

  // Fond header
  svg += '<rect x="0" y="0" width="'+totalW+'" height="'+HEADER_H+'" fill="#f0eee9" rx="0"/>';

  // Colonne gauche (HIST.)
  svg += '<rect x="0" y="0" width="'+LEFT_W+'" height="'+timelineH+'" fill="#fafaf8"/>';
  svg += '<text x="'+(LEFT_W/2)+'" y="22" text-anchor="middle" font-size="10" fill="#6b6a65" font-weight="600">HIST.</text>';
  svg += '<text x="'+(LEFT_W/2)+'" y="56" text-anchor="middle" font-size="20" fill="#2c5ea0" font-weight="700" style="cursor:pointer" onclick="openOpeHistory()">+</text>';

  // Colonnes mois
  months.forEach(function(m, mi) {
    const x = LEFT_W + mi * COL_W;
    const isCurrentMonth = (m.year === now.getFullYear() && m.month === now.getMonth());
    const accentColor = isCurrentMonth ? "#2c5ea0" : "#6b6a65";
    svg += '<rect x="'+x+'" y="0" width="'+COL_W+'" height="'+HEADER_H+'" fill="'+(isCurrentMonth?"#e8f0fa":"#f0eee9")+'"/>';
    svg += '<text x="'+(x+COL_W/2)+'" y="22" text-anchor="middle" font-size="12" fill="'+(isCurrentMonth?"#2c5ea0":"#1a1a18")+'" font-weight="700">'+m.label.charAt(0).toUpperCase()+m.label.slice(1)+'</text>';
    // Bouton + entièrement dans le header (pas de dépassement sur les barres)
    svg += '<rect x="'+(x+COL_W/2-14)+'" y="36" width="28" height="22" rx="6" fill="'+accentColor+'" opacity="0.12" style="cursor:pointer" onclick="openOpeCreate(\''+m.year+'-'+String(m.month+1).padStart(2,'0')+'\')"/>';
    svg += '<text x="'+(x+COL_W/2)+'" y="52" text-anchor="middle" font-size="15" fill="'+accentColor+'" font-weight="700" style="cursor:pointer" onclick="openOpeCreate(\''+m.year+'-'+String(m.month+1).padStart(2,'0')+'\')">＋</text>';
    // Ligne verticale
    svg += '<line x1="'+x+'" y1="0" x2="'+x+'" y2="'+timelineH+'" stroke="#e8e6e1" stroke-width="1"/>';
  });

  // Ligne horizontale header
  svg += '<line x1="0" y1="'+HEADER_H+'" x2="'+totalW+'" y2="'+HEADER_H+'" stroke="#e8e6e1" stroke-width="1.5"/>';

  // Barre "aujourd'hui"
  const todayX = LEFT_W + (now.getDate() / new Date(now.getFullYear(), now.getMonth()+1, 0).getDate()) * COL_W;
  svg += '<line x1="'+todayX+'" y1="'+HEADER_H+'" x2="'+todayX+'" y2="'+timelineH+'" stroke="#e8963a" stroke-width="1.5" stroke-dasharray="4,3"/>';
  svg += '<circle cx="'+todayX+'" cy="'+(HEADER_H+6)+'" r="4" fill="#e8963a"/>';

  // Opérations
  const timelineStart = new Date(months[0].year, months[0].month, 1);
  const timelineEnd = new Date(months[5].year, months[5].month + 1, 0);
  const totalDays = (timelineEnd - timelineStart) / 86400000;

  timelineOps.forEach(function(op, ri) {
    const color = opeColor(op.id);
    const isAct = opeIsActive(op);
    const debut = new Date(Math.max(new Date(op.date_debut), timelineStart));
    const fin = new Date(Math.min(new Date(op.date_fin), timelineEnd));
    const x1 = LEFT_W + ((debut - timelineStart) / 86400000 / totalDays) * (COL_W * 6);
    const x2 = LEFT_W + ((fin - timelineStart + 86400000) / 86400000 / totalDays) * (COL_W * 6);
    const w = Math.max(x2 - x1, 30);
    const cy = HEADER_H + ROW_H / 2 + ri * ROW_H;

    svg += '<rect x="'+x1.toFixed(1)+'" y="'+(cy - BAR_H/2).toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+BAR_H+'" rx="6" fill="'+color+'" opacity="'+(isAct?1:0.5)+'" style="cursor:pointer" onclick="openOpeDetail('+op.id+')"/>';
    // Nom tronqué (ligne haute de la barre)
    const maxChars = Math.floor(w / 6.5);
    const nom = op.nom.length > maxChars ? op.nom.slice(0, Math.max(1, maxChars-1))+"…" : op.nom;
    svg += '<text x="'+(x1+8).toFixed(1)+'" y="'+(cy-4).toFixed(1)+'" font-size="11" fill="#fff" font-weight="600">'+esc(nom)+'</text>';
    // Sous-ligne : statut · nb produits · commission moy. (ligne basse de la barre)
    if (w > 40) {
      const statusLabel = isAct ? "● Actif" : (new Date(op.date_debut) > now ? "○ A venir" : "○ Expire");
      const subParts = [statusLabel];
      if (op._prodCount) subParts.push(op._prodCount+" prod.");
      if (op._commAvg != null) subParts.push(op._commAvg+"%");
      svg += '<text x="'+(x1+8).toFixed(1)+'" y="'+(cy+11).toFixed(1)+'" font-size="9" fill="#fff" opacity="0.85">'+subParts.join(" · ")+'</text>';
    }
  });

  if (!timelineOps.length) {
    svg += '<text x="'+(totalW/2)+'" y="'+(HEADER_H+50)+'" text-anchor="middle" font-size="12" fill="#9c9a92">Aucune opération sur cette période — cliquez + pour créer</text>';
  }

  svg += '</svg>';

  // Bouton import + créer
  const actions = '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    + '<button onclick="openOpeCreate(null)" style="padding:7px 16px;border:.5px solid var(--ac);border-radius:8px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Nouvelle opération</button>'
    + '</div>';

  return kpis + actions
    + '<div class="card" style="padding:0;overflow:hidden">'
    + '<div style="overflow-x:auto">'
    + svg
    + '</div></div>'
    + (opeData.length ? renderOpeCards() : "");
}

function renderOpeCards() {
  const now = new Date();
  const active = opeData.filter(op => opeIsActive(op));
  const future = opeData.filter(op => new Date(op.date_debut) > now);
  if (!active.length && !future.length) return "";

  function opeCard(op) {
    const color = opeColor(op.id);
    const isAct = opeIsActive(op);
    const fmtD = d => new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
    return '<div style="background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 16px;min-width:200px;flex:1;cursor:pointer;border-left:4px solid '+color+'" onclick="openOpeDetail('+op.id+')">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      + '<div style="font-size:13px;font-weight:700;color:var(--tx)">'+esc(op.nom)+'</div>'
      + '<span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:'+(isAct?"var(--gnBg)":"var(--acBg)")+';color:'+(isAct?"var(--gn)":"var(--ac)")+'">'+( isAct?"● Actif":"⏳ À venir")+'</span>'
      + '</div>'
      + '<div style="font-size:11px;color:var(--txS);margin-bottom:8px">'+fmtD(op.date_debut)+' → '+fmtD(op.date_fin)+'</div>'
      + (op.type_ope ? '<div style="font-size:10px;color:var(--txT);margin-bottom:6px">'+esc(op.type_ope)+'</div>' : "")
      + '<div style="font-size:11px;color:var(--txS)">'+(op._prodCount||0)+' produit'+(op._prodCount>1?"s":"")+(op._commAvg!=null?' · Comm. moy. <strong>'+op._commAvg+'%</strong>':'')+'</div>'
      + '</div>';
  }

  let html = "";
  if (active.length) {
    html += '<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">🟢 Opérations actives</div>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap">'+active.map(opeCard).join("")+'</div></div>';
  }
  if (future.length) {
    html += '<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">⏳ À venir</div>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap">'+future.map(opeCard).join("")+'</div></div>';
  }
  return html;
}

  const html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    + '<div style="width:12px;height:12px;border-radius:50%;background:'+color+'"></div>'
    + '<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:'+(isAct?"var(--gnBg)":"var(--rdBg)")+';color:'+(isAct?"var(--gn)":"var(--rd)")+'">'+( isAct?"● Actif":"○ Expiré")+'</span>'

    + '<div style="background:var(--bg);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Commission moy.</div><div style="font-size:13px;font-weight:600">'+avgComm+'%</div></div>'
    + '</div>'
    + '<div style="font-size:12px;font-weight:600;color:var(--txS);text-transform:uppercase;margin-bottom:8px">'+prods.length+' produit'+(prods.length>1?"s":"")+'</div>'
    + '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    + '<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">'
    + '<th style="padding:6px 10px;text-align:left">Réf</th>'
    + '<th style="padding:6px 10px;text-align:left">Produit</th>'
    + '<th style="padding:6px 10px;text-align:right">Prix</th>'
    + '<th style="padding:6px 10px;text-align:right">Commission</th>'
    + '</tr></thead><tbody>'+prodRows+'</tbody></table></div>'

    + '<button onclick="openOpeEdit('+id+')" style="padding:7px 14px;border:.5px solid var(--ac);border-radius:6px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">✏️ Modifier</button>'
    + '<button onclick="deleteOpe('+id+')" style="padding:7px 14px;border:.5px solid var(--rd);border-radius:6px;font-size:12px;background:var(--rdBg);color:var(--rd);cursor:pointer;font-weight:600;font-family:inherit">🗑 Supprimer</button>'
    + '</div>';

    + '<div><label style="font-size:11px;color:var(--txS);display:block;margin-bottom:3px">Type</label><input id="ope-type" placeholder="ex: DEALS EXCLUSIFS" style="width:100%;padding:7px 10px;border:.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit"></div>'
