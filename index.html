<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.header{padding:20px 28px 0;border-bottom:1px solid var(--border);background:var(--card)}

.title{font-size:20px;font-weight:700;letter-spacing:-0.02em}

.mp-btns{display:flex;gap:6px;align-items:center}
.mp-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--border);background:transparent;color:var(--txS);font-family:inherit;position:relative}
.mp-btn.active{border-color:var(--ac);background:var(--acBg);color:var(--ac)}
/* Scraping badge */
.scraping-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}

.content{padding:20px 28px}

<script>
const SB_URL = "https://pmxsthzdxubqbemdgtbr.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBteHN0aHpkeHVicWJlbWRndGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDk4NDQsImV4cCI6MjA5MDAyNTg0NH0.GpfAw91eJ8D7RIeZLFIejCt9DTwGpXvOGcxYlhZS78I";
let MARKETPLACE = "cdiscount";

// Marketplaces disponibles
const MARKETPLACES = [
  { id: "cdiscount", label: "Cdiscount" },
  { id: "amazon", label: "Amazon" },
  { id: "maisonsdumonde", label: "Maisons du Monde" },
  { id: "conforama", label: "Conforama" },
  { id: "laredoute", label: "La Redoute" },
  { id: "but", label: "BUT" },
  { id: "manomano", label: "ManoMano" },
];

// Marketplaces sans onglet Concurrents (pas de seller_stats vendeurs)
const NO_COMPETITORS_MP = new Set(["manomano"]);
// Marketplaces sans onglet Positions (pas de scraping positions page 1)
const NO_POSITIONS_MP = new Set(["manomano"]);

// Cache des derniers timestamps de scraping par marketplace (pour l'indicateur)
const MP_LAST_SCRAPING = {};

async function sb(table, params="") {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      "Range-Unit": "items",
      "Range": "0-4999"   // Force Supabase à renvoyer jusqu'à 5000 lignes (défaut = 1000)
    }
  });
  if (!r.ok) throw new Error(`Supabase error: ${r.status}`);
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, { method:"POST", headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=representation"}, body:JSON.stringify(data) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Insert error ${r.status}: ${t}`); }
  return r.json();
}
async function sbUpdate(table, filter, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, { method:"PATCH", headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=representation"}, body:JSON.stringify(data) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Update error ${r.status}: ${t}`); }
  return r.json();
}
async function sbDelete(table, filter) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, { method:"DELETE", headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`} });
  if (!r.ok) throw new Error(`Delete error: ${r.status}`);
}

// =============================================
// INDICATEURS DE SCRAPING — toutes marketplaces
// =============================================
async function loadScrapingIndicators() {
  try {
    // On récupère le snapshot le plus récent par marketplace (table product_snapshots)
    const rows = await sb("product_snapshots", `select=marketplace,date&order=date.desc&limit=500`);
    const latestByMp = {};
    rows.forEach(r => {
      if (r.marketplace && r.date) {
        if (!latestByMp[r.marketplace] || r.date > latestByMp[r.marketplace]) {
          latestByMp[r.marketplace] = r.date;
        }
      }
    });

    // Fallback: seller_stats pour marketplaces sans snapshots
    const statsRows = await sb("seller_stats", `select=marketplace,date&order=date.desc&limit=200`);
    statsRows.forEach(r => {
      if (r.marketplace && r.date) {
        if (!latestByMp[r.marketplace] || r.date > latestByMp[r.marketplace]) {
          latestByMp[r.marketplace] = r.date;
        }
      }
    });

    Object.assign(MP_LAST_SCRAPING, latestByMp);
    renderScrapingIndicators();
  } catch(e) {
    console.warn("Indicateurs scraping:", e.message);
  }
}

function renderScrapingIndicators() {
  const now = Date.now();
  const container = document.getElementById("mp-indicator-row");
  if (!container) return;

  const html = MARKETPLACES.map(mp => {
    const lastDate = MP_LAST_SCRAPING[mp.id];
    if (!lastDate) return `<div class="mp-indicator"><span class="mp-indicator-name">${mp.label}</span><span class="scraping-badge" style="background:var(--borderL);color:var(--txT);border:.5px solid var(--border)">Aucune donnée</span></div>`;

    const lastMs = new Date(lastDate).getTime();
    const diffSec = Math.round((now - lastMs) / 1000);
    const isLive = diffSec < 90;

    let badge;
    if (isLive) {
      badge = `<span class="scraping-badge live"><span class="dot"></span>Scraping en cours</span>`;
    } else {
      const label = formatRelativeDate(lastDate);
      badge = `<span class="scraping-badge ok">✓ ${label}</span>`;
    }
    return `<div class="mp-indicator"><span class="mp-indicator-name">${mp.label}</span>${badge}</div>`;
  }).join("");

  container.innerHTML = html;
}

function formatRelativeDate(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.round(diffMs / 60000);
  const diffH = Math.round(diffMs / 3600000);
  const diffD = Math.round(diffMs / 86400000);
  if (diffMin < 2) return "à l'instant";
  if (diffMin < 60) return `il y a ${diffMin} min`;
  if (diffH < 24) return `il y a ${diffH}h`;
  if (diffD === 1) return "hier";
  if (diffD < 7) return `il y a ${diffD}j`;
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
}

// Rafraîchir les indicateurs toutes les 20s (pour détecter un scraping en cours)
setInterval(() => {
  loadScrapingIndicators();
}, 20000);

let STATE = { products:[], snapshots:[], positions:[], dates:[], sellerStats:[], tab:0 };

// =============================================
// normalizeKeyword — globale (utilisée dans loadData ET renderPositions)
// =============================================
const URL_LABEL_MAP_GLOBAL = {
  "canape-salon-sejour/canape/tous-les-canapes":       "Tous les canapés",
  "canape-salon-sejour/canape/canape-convertible":     "Canapé convertible",
  "canape-salon-sejour/banquette/banquette-clic-clac": "Banquette clic-clac",
  "canape-salon-sejour/sejour/table":                  "Tables de séjour",
  "canape-salon-sejour/salon/meuble-tv":               "Meuble TV",
  "mobilier-de-jardin/salon-de-jardin":                "Salon de jardin",
  "chambre-adulte/lit-adulte":                         "Lit coffre",
};
function normalizeKeyword(kw) {
  if (!kw) return kw;
  try {
    if (kw.startsWith("http") || kw.startsWith("//")) {
      const urlStr = kw.startsWith("//") ? "https:" + kw : kw;
      const url = new URL(urlStr);
      const fromSearch = url.searchParams.get("fromSearch");
      if (fromSearch) return decodeURIComponent(fromSearch).trim();
      const fullPath = url.hostname + url.pathname;
      for (const [key, label] of Object.entries(URL_LABEL_MAP_GLOBAL)) {
        if (fullPath.includes(key)) return label;
      }
      const segments = url.pathname.split("/").filter(s => s && !/^c$/.test(s) && !/^\d+/.test(s));
      const last = segments[segments.length - 1] || "";
      return decodeURIComponent(last.replace(/-/g, " ")).trim() || kw;
    }
  } catch(e) {}
  return kw;
}

const TAB_NAMES      = ["Synthèse","Produits","Historique","Positions","Concurrents","Anomalies","Gestion"];
const TAB_NAMES_LIGHT = ["Synthèse","Produits","Historique","Anomalies","Gestion"]; // sans Positions ni Concurrents

function switchMarketplace(mp, btn) {
  MARKETPLACE = mp;
  document.querySelectorAll('.mp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  STATE.tab = 0;
  loadData();
}

async function loadData() {
  try {
    // Pour les positions : on récupère d'abord la date du dernier scraping (1 ligne),
    // puis on fetche TOUTES les positions de ce jour-là pour garantir les 18 keywords.
    // Évite le problème de la limite 5000 qui tronquerait les premiers keywords.
    // La table positions ne contient que le dernier run (purge côté scraper avant chaque session)
    // → select * sans filtre ni limite, requête simple et fiable
    const [products, allProducts, snapshots, positions, sellerStats, revenueEntries, trackedSellers, revenueImports] = await Promise.all([
      sb("products", `marketplace=eq.${MARKETPLACE}&active=eq.true&select=*&order=product_id`),
      sb("products", `marketplace=eq.${MARKETPLACE}&select=*&order=product_id`),
      sb("product_snapshots", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=5000`).catch(()=>[]),
      sb("positions", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=5000`).catch(()=>[]),
      sb("seller_stats", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=2000`).catch(()=>[]),
      sb("revenue_entries", `marketplace=eq.${MARKETPLACE}&select=*&order=week_start_date.asc`).catch(()=>[]),
      sb("tracked_sellers", `marketplace=eq.${MARKETPLACE}&active=eq.true&select=*&order=id.asc`).catch(()=>[]),
      sb("revenue_imports", `marketplace=eq.${MARKETPLACE}&select=*&order=period_start.asc`).catch(()=>[]),
    ]);

    // Mettre à jour le cache de scraping avec les données fraîchement chargées
    if (snapshots.length > 0) {
      const latest = snapshots.reduce((a, b) => a.date > b.date ? a : b);
      if (!MP_LAST_SCRAPING[MARKETPLACE] || latest.date > MP_LAST_SCRAPING[MARKETPLACE]) {
        MP_LAST_SCRAPING[MARKETPLACE] = latest.date;
        renderScrapingIndicators();
      }
    }

    const prodByScraper = {};
    products.forEach(p => { if (p.product_id_scraper) prodByScraper[p.product_id_scraper.toLowerCase()] = p; });
    snapshots.forEach(s => { s._product = prodByScraper[(s.product_id||"").toLowerCase()] || null; });

    // sessionKey à l'heure : pour les positions (dernière session < 1h)
    function sessionKey(ts) { return new Date(ts).toISOString().slice(0, 13); }
    // dayKey au jour : plusieurs scrapes le même jour = 1 seule colonne dans l'historique
    function dayKey(ts) { return new Date(ts).toISOString().slice(0, 10); }

    const daySet = new Set();
    snapshots.forEach(s => { if (s.date) daySet.add(dayKey(s.date)); });
    const dates = [...daySet].sort(); // ex: ["2026-03-28", "2026-03-30"]

    const history = {};
    snapshots.forEach(s => {
      const key = (s.product_id||"").toLowerCase();
      if (!history[key]) history[key] = {};
      const dk = dayKey(s.date);
      // On garde le snapshot le plus récent du jour (id le plus grand)
      if (dk && (!history[key][dk] || s.id > history[key][dk].id)) history[key][dk] = s;
    });

    const latestDate = dates[dates.length-1] || "";
    const prevDate = dates.length >= 2 ? dates[dates.length-2] : "";

    products.forEach(p => {
      const key = (p.product_id_scraper||"").toLowerCase();
      const h = history[key] || {};
      const latest = h[latestDate], prev = h[prevDate];
      p._latest = latest || null; p._history = h;
      p._price = latest?.price ?? null; p._available = latest?.available ?? null;
      p._rating = latest?.rating ?? null; p._delivery = latest?.delivery_days ?? null;
      p._tags = [];
      if (latest && prev) {
        if (latest.price!=null && prev.price!=null && prev.price>0) { const pct=(latest.price-prev.price)/prev.price; if(pct>.10) p._tags.push("prix_up"); else if(pct<-.15) p._tags.push("prix_down"); }
        if (latest.delivery_days!=null && prev.delivery_days!=null) { const d=latest.delivery_days-prev.delivery_days; if(d>5) p._tags.push("delai_up"); else if(d<-5) p._tags.push("delai_down"); }
        if (latest.rating!=null && prev.rating!=null) { const d=latest.rating-prev.rating; if(d>=.2) p._tags.push("note_up"); else if(d<=-.2) p._tags.push("note_down"); }
      }
    });

    // Grouper les positions par JOUR (pas par heure) pour ne pas rater des recherches
    // qui auraient été scrapées à des heures différentes dans la même journée.
    // On prend toutes les positions du jour le plus récent.
    const posDaySet = new Set();
    positions.forEach(p => { if (p.date) posDaySet.add(dayKey(p.date)); });
    const posDaysSorted = [...posDaySet].sort();
    const latestPosDay = posDaysSorted[posDaysSorted.length-1] || "";
    // On déduplique par (keyword, product_id) : si le même produit a été scrappé
    // deux fois le même jour sur le même keyword, on ne garde que la ligne la plus récente.
    const posSeenKey = new Set();
    const latestPositions = [];
    positions
      .filter(p => p.date && dayKey(p.date) === latestPosDay)
      .sort((a, b) => new Date(b.date) - new Date(a.date)) // plus récent en premier
      .forEach(p => {
        const dedupeKey = (p.keyword||"") + "||" + (p.product_id||"") + "||" + (p.seller||"");
        if (!posSeenKey.has(dedupeKey)) {
          posSeenKey.add(dedupeKey);
          latestPositions.push(p);
        }
      });
    const latestPosSession = latestPosDay; // utilisé pour la synchro snapshotDay

    // Normalise le keyword : extrait le terme de recherche depuis les URLs Conforama
    // ex: "https://www.conforama.fr/recherche-conforama/canap%C3%A9%20panoramique?fromSearch=canap%C3%A9%20panoramique"
    // → "canapé panoramique"
    const keywordData = {};
    latestPositions.forEach(p => {
      const kw = normalizeKeyword(p.keyword);
      if (!keywordData[kw]) keywordData[kw] = [];
      const prod = prodByScraper[(p.product_id||"").toLowerCase()];
      keywordData[kw].push({...p, keyword: kw, _product:prod});
    });

    // leaderCounts : comptage brut par (keyword normalisé, seller) pour "Leader par catégorie"
    // Construit depuis toutes les positions du jour AVANT dédup, avec keyword normalisé
    const leaderCounts = {};
    positions
      .filter(p => p.date && dayKey(p.date) === latestPosDay)
      .forEach(p => {
        const kw = normalizeKeyword(p.keyword);
        if (!leaderCounts[kw]) leaderCounts[kw] = {};
        leaderCounts[kw][p.seller] = (leaderCounts[kw][p.seller] || 0) + 1;
      });

    // vendorsSorted est maintenant construit depuis seller_stats (p1_count)
    // plus depuis positions — voir buildSellerStatsMap() dans renderConcurrents
    const vendorsSorted = []; // placeholder, remplacé au render

    // ─── Matching BestMobilier ───────────────────────────────────────
    // On utilise seller === "BestMobilier" comme critère primaire,
    // plus fiable que le matching product_id_scraper qui peut être vide.
    // On construit aussi un index product_id → produit suivi (pour les liens).
    const bmScraperIds = new Set(products.map(p=>(p.product_id_scraper||"").toLowerCase()).filter(Boolean));
    const trackedByScraperId = {}; // product_id_scraper → product row
    products.forEach(p => { if (p.product_id_scraper) trackedByScraperId[p.product_id_scraper.toLowerCase()] = p; });

    // Un product est BM si : seller === nom BM reconnu OU (sur Cdiscount uniquement) product_id matche un product_id_scraper suivi
    // Le matching par product_id_scraper est désactivé sur MdM/BUT/Conforama car les IDs peuvent
    // coïncider par accident avec des EANs ou IDs d'autres marketplaces
    const BM_SELLER_NAMES = new Set(["BestMobilier", "Best Mobilier", "Lisa Design"]);
    const USE_SCRAPER_ID_MATCHING = (MARKETPLACE === "cdiscount" || MARKETPLACE === "amazon" || MARKETPLACE === "laredoute");
    function isBMPosition(p) {
      return BM_SELLER_NAMES.has(p.seller) || (USE_SCRAPER_ID_MATCHING && bmScraperIds.has((p.product_id||"").toLowerCase()));
    }

    // bmByKeyword : nombre de produits BM en page 1 par keyword
    // On initialise TOUS les keywords présents dans les positions du jour (avant et après dédup)
    // pour garantir que les 18 catégories apparaissent même si BM = 0
    const allKeywordsToday = new Set(positions.map(p => normalizeKeyword(p.keyword)));
    const bmByKeyword = {};
    allKeywordsToday.forEach(kw => { bmByKeyword[kw] = 0; }); // initialise à 0
    Object.entries(keywordData).forEach(([kw, items]) => {
      bmByKeyword[kw] = items.filter(i => isBMPosition(i)).length;
    });

    // productsInPage1 : set des product_id_scraper BM présents en page 1
    // page1Keywords : product_id_scraper → keywords où ce produit est en page 1
    // On indexe par product_id_scraper (côté products) et non par product_id brut des positions
    // pour éviter les faux matchings entre marketplaces
    const productsInPage1 = new Set();
    const page1Keywords = {};
    latestPositions.forEach(p => {
      if (!isBMPosition(p)) return;
      const posId = (p.product_id||"").toLowerCase();
      const kw = normalizeKeyword(p.keyword);

      // Cherche le produit suivi dont le product_id_scraper correspond à ce product_id de position
      // C'est le seul matching valide — on n'utilise pas posId directement comme clé
      const matchedProduct = trackedByScraperId[posId];
      const indexKey = matchedProduct
        ? (matchedProduct.product_id_scraper||"").toLowerCase()
        : (BM_SELLER_NAMES.has(p.seller) ? posId : null); // seller BM sans produit suivi : on garde l'ID position

      if (!indexKey) return;

      productsInPage1.add(indexKey);
      if (!page1Keywords[indexKey]) page1Keywords[indexKey] = new Set();
      page1Keywords[indexKey].add(kw);
    });

    // =============================================
    // CONFORAMA: calcul incrémental des ventes
    // seller_sales = total cumulé depuis début, on calcule xn - x0 par session
    // =============================================
    // confoSellerHistory sert aussi pour MdM (même logique : ventes cumulées totales)
    const confoSellerHistory = {}; // { sellerName: [{date, sales}] trié par date ASC }
    if (MARKETPLACE === "conforama" || MARKETPLACE === "maisonsdumonde") {
      const allStats = await sb("seller_stats", `marketplace=eq.${MARKETPLACE}&select=*&order=date.asc&limit=5000`);
      allStats.forEach(s => {
        if (!s.seller || s.seller_sales == null) return;
        if (!confoSellerHistory[s.seller]) confoSellerHistory[s.seller] = [];
        confoSellerHistory[s.seller].push({ date: s.date, sales: s.seller_sales, rating: s.seller_rating, ratingsCount: s.seller_ratings_count, sourceUrl: s.source_url });
      });
    }

    // AMAZON: on utilise seller_ratings_count comme proxy des ventes
    // On calcule delta avis 12m = dernière valeur - valeur la plus ancienne dans les 12 derniers mois
    const amazonReviewsProxy = {};
    if (MARKETPLACE === "amazon") {
      sellerStats.forEach(s => {
        if (!s.seller) return;
        if (!amazonReviewsProxy[s.seller]) amazonReviewsProxy[s.seller] = { latest: null, oldest12m: null };
        const entry = { date: s.date, count: s.seller_ratings_count, rating: s.seller_rating, sourceUrl: s.source_url };
        const d = amazonReviewsProxy[s.seller];
        if (!d.latest || s.date > d.latest.date) d.latest = entry;
        // "oldest in 12m" = la plus ancienne entrée dans les 12 derniers mois
        const cutoff = new Date();
        cutoff.setFullYear(cutoff.getFullYear() - 1);
        if (new Date(s.date) >= cutoff) {
          if (!d.oldest12m || s.date < d.oldest12m.date) d.oldest12m = entry;
        }
      });
    }

    // Vérification synchronisation : les positions doivent être du même jour que les snapshots produits.
    // On compare uniquement la date (YYYY-MM-DD), pas l'heure.
    const snapshotDay = latestDate ? latestDate.slice(0, 10) : null;
    const posDay = latestPosSession ? latestPosSession.slice(0, 10) : null;
    const positionsOutdated = !posDay || !snapshotDay || posDay < snapshotDay;

    STATE = { products, allProducts, snapshots, positions:latestPositions, dates, latestDate, prevDate, history, keywordData, leaderCounts, bmByKeyword, productsInPage1, page1Keywords, prodByScraper, trackedByScraperId, bmScraperIds, latestPosDate: latestPosSession, positionsOutdated, snapshotDay, posDay, sellerStats, confoSellerHistory, amazonReviewsProxy, revenueEntries: revenueEntries||[], trackedSellers: trackedSellers||[], revenueImports: revenueImports||[], tab:STATE.tab||0 };

    const sessionDisplay = latestDate ? new Date(latestDate + "T12:00:00Z").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}) : "N/A";
    document.getElementById("header-subtitle").textContent = `${products.length} produits · Relevé du ${sessionDisplay}`;
    renderTabs(); renderContent();
  } catch(e) {
    document.getElementById("content").innerHTML = `<div class="loading" style="color:var(--rd)"><div style="font-size:16px;font-weight:600;margin-bottom:8px">Erreur de chargement</div><div style="font-size:13px">${e.message}</div></div>`;
    console.error(e);
  }
}

function isLightMp() { return NO_POSITIONS_MP.has(MARKETPLACE); }
function getTabNames() { return isLightMp() ? TAB_NAMES_LIGHT : TAB_NAMES; }
// Mapping tab index light → render function (indices diffèrent selon le mode)
// Light: 0=Synthèse 1=Produits 2=Historique 3=Anomalies 4=Gestion
// Full:  0=Synthèse 1=Produits 2=Historique 3=Positions 4=Concurrents 5=Anomalies 6=Gestion
function renderTabs() {
  const names = getTabNames();
  document.getElementById("tabs").innerHTML = names.map((t,i) => `<button class="tab ${i===STATE.tab?'active':''}" onclick="switchTab(${i})">${t}</button>`).join("");
}
function switchTab(i) { STATE.tab=i; renderTabs(); renderContent(); }
function renderContent() {
  const el = document.getElementById("content");
  if (isLightMp()) {
    switch(STATE.tab) {
      case 0: el.innerHTML=renderSynthese(); break;
      case 1: el.innerHTML=renderProduits(); break;
      case 2: el.innerHTML=renderHistorique(); break;
      case 3: el.innerHTML=renderAnomalies(); break;
      case 4: el.innerHTML=renderGestion(); break;
      default: el.innerHTML='';
    }
    return;
  }
  switch(STATE.tab) {
    case 0: el.innerHTML=renderSynthese(); break;
    case 1: el.innerHTML=renderProduits(); break;
    case 2: el.innerHTML=renderHistorique(); break;
    case 3: el.innerHTML=renderPositions(); break;
    case 4: el.innerHTML=renderConcurrents(); break;
    case 5: el.innerHTML=renderAnomalies(); break;
    case 6: el.innerHTML=renderGestion(); break;
  }
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function pill(text,color="default"){return `<span class="pill pill-${color}">${text}</span>`}
function bar(label,value,max,color="var(--ac)",sub){const pct=max>0?Math.min(Math.round(value/max*100),100):0;return `<div class="bar-row"><div class="bar-header"><span class="bar-label">${label}</span><span class="bar-sub">${sub||value}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`}
function productRowHTML(p){return `<div class="product-row"><div class="product-row-name">${esc(p.name)}</div><div class="product-row-refs"><span>ID: ${esc(p.product_id)}</span><span>SKU: ${esc(p.sku||'—')}</span>${p.ean?`<span style="color:var(--txT)">EAN: ${esc(p.ean)}</span>`:''}<span style="color:var(--txT)">Scraper: ${esc(p.product_id_scraper||'—')}</span>${p.url?`<a href="${esc(p.url)}" target="_blank" class="link">Voir ↗</a>`:'<span style="color:var(--rd)">Pas d\'URL</span>'}</div></div>`}
function openModal(title,html){document.getElementById("modal-title").textContent=title;document.getElementById("modal-body").innerHTML=html;document.getElementById("modal-overlay").classList.remove("hidden")}
function closeModal(){document.getElementById("modal-overlay").classList.add("hidden")}
const tagLabel=t=>({prix_up:"Prix ↑",prix_down:"Prix ↓",delai_up:"Délai ↑",delai_down:"Délai ↓",note_up:"Note ↑",note_down:"Note ↓"}[t]||t);
const tagColor=t=>(t.includes("up")&&t!=="note_up")?"red":(t.includes("down")&&t!=="note_down")?"green":t==="note_up"?"green":"red";

// =============================================
// TAB 0: SYNTHESE
// =============================================
function renderSynthese() {
  const P=STATE.products;
  const avail=P.filter(p=>p._available===true).length, unavail=P.filter(p=>p._available===false).length;
  // Produits distincts BM présents en page 1
  const page1 = STATE.productsInPage1 ? STATE.productsInPage1.size : 0;
  const prices=P.filter(p=>p._price!=null).map(p=>p._price);
  const ratings=P.filter(p=>p._rating!=null).map(p=>p._rating);
  const deliveries=P.filter(p=>p._delivery!=null).map(p=>p._delivery);
  const avgPrice=prices.length?Math.round(prices.reduce((a,b)=>a+b,0)/prices.length):"—";
  const avgRating=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):"—";
  const avgDelivery=deliveries.length?Math.round(deliveries.reduce((a,b)=>a+b,0)/deliveries.length):"—";
  const du=P.filter(p=>p._tags.includes("delai_up")),dd=P.filter(p=>p._tags.includes("delai_down")),pu=P.filter(p=>p._tags.includes("prix_up"));
  const totalWithPrev=P.filter(p=>p._latest&&STATE.prevDate&&p._history[STATE.prevDate]).length;
  const pctDU=totalWithPrev>0?Math.round(du.length/totalWithPrev*100):0;
  const pctPU=totalWithPrev>0?Math.round(pu.length/totalWithPrev*100):0;
  const pctDD=totalWithPrev>0?Math.round(dd.length/totalWithPrev*100):0;

  return `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Produits suivis</div><div class="metric-value">${P.length}</div></div>
      <div class="metric"><div class="metric-label">En page 1</div><div class="metric-value" style="color:var(--ac)">${page1}</div><div class="metric-sub">${P.length>0?Math.round(page1/P.length*100):0}% du catalogue</div></div>
      <div class="metric"><div class="metric-label">Indisponibles</div><div class="metric-value" style="color:var(--rd)">${unavail}</div></div>
      <div class="metric"><div class="metric-label">Délai moyen</div><div class="metric-value" style="color:var(--am)">${avgDelivery}j</div></div>
      <div class="metric"><div class="metric-label">Note moyenne</div><div class="metric-value" style="color:var(--am)">${avgRating}</div></div>
    </div>

    <div class="card"><div class="card-title">Indicateurs clés</div><div class="grid-2">${[
      {l:"Prix moyen",v:avgPrice+"€"},{l:"Délai moyen",v:avgDelivery+" jours"},{l:"Note moyenne",v:avgRating+" / 5"},
      {l:"Taux dispo",v:(P.length>0?Math.round(avail/P.length*100):0)+"%"},{l:"Taux page 1",v:(P.length>0?Math.round(page1/P.length*100):0)+"%"},
      {l:"Prix en hausse (>10%)",v:`${pctPU}% (${pu.length})`,click:pu.length>0?"showVariation('prix_up')":null,color:pu.length>0?"var(--rd)":""},
      {l:"Délai en hausse (>5j)",v:`${pctDU}% (${du.length})`,click:du.length>0?"showVariation('delai_up')":null,color:du.length>0?"var(--rd)":""},
      {l:"Délai en baisse (>5j)",v:`${pctDD}% (${dd.length})`,click:dd.length>0?"showVariation('delai_down')":null,color:dd.length>0?"var(--gn)":""},
    ].map(k=>`<div class="kpi-row"><span class="kpi-label">${k.l}</span><div><span class="kpi-value" ${k.color?`style="color:${k.color}"`:''}>${k.v}</span>${k.click?`<button class="btn-see" onclick="${k.click}">voir</button>`:''}</div></div>`).join("")}</div></div>
    ${renderRevenueBlock()}`;
}

function showVariation(tag) {
  const prods=STATE.products.filter(p=>p._tags.includes(tag));
  const titles={prix_up:"Prix en hausse >10%",prix_down:"Prix en baisse >15%",delai_up:"Délai en hausse >5j",delai_down:"Délai en baisse >5j",note_up:"Note en hausse",note_down:"Note en baisse"};
  openModal(titles[tag]||tag,prods.length>0?prods.map(p=>{const curr=p._history[STATE.latestDate],prev=p._history[STATE.prevDate];let delta="";if(tag.startsWith("prix")&&curr?.price!=null&&prev?.price!=null)delta=`${prev.price}€ → ${curr.price}€`;else if(tag.startsWith("delai")&&curr?.delivery_days!=null&&prev?.delivery_days!=null)delta=`${prev.delivery_days}j → ${curr.delivery_days}j`;else if(tag.startsWith("note")&&curr?.rating!=null&&prev?.rating!=null)delta=`${prev.rating} → ${curr.rating}`;return `<div class="product-row"><div class="product-row-name">${esc(p.name)}</div><div class="product-row-refs"><span>ID: ${esc(p.product_id)}</span><span style="color:${tag.includes('down')?'var(--gn)':'var(--rd)'};font-weight:500">${delta}</span>${p.url?`<a href="${esc(p.url)}" target="_blank" class="link">Voir ↗</a>`:''}</div></div>`;}).join(""):'<div style="padding:20px;text-align:center;color:var(--txT)">Aucun produit concerné</div>');
}

// =============================================
// BLOC CA (Synthèse)
// =============================================
function renderRevenueBlock() {
  const imports = (STATE.revenueImports || []);
  const entries = (STATE.revenueEntries || []).slice().sort((a,b) => a.week_start_date > b.week_start_date ? 1 : -1);
  const hasAnyData = imports.length > 0 || entries.length > 0;
  const now = new Date();

  const fmtCA = v => {
    if (v == null || isNaN(v) || v === 0) return "—";
    if (Math.abs(v) >= 1000000) return (v/1000000).toFixed(2).replace(".",",") + "M€";
    if (Math.abs(v) >= 1000) return (v/1000).toFixed(1).replace(".",",") + "k€";
    return Math.round(v) + "€";
  };
  const fmtPct = (n, n1) => {
    if (!n1 || n1 === 0) return "";
    const pct = Math.round((n - n1) / n1 * 100);
    const color = pct >= 0 ? "var(--gn)" : "var(--rd)";
    return `<span style="font-size:15px;font-weight:700;color:${color}">${pct>=0?"+":""}${pct}%</span>`;
  };
  const fmtMonthLabel = m => {
    const [y, mo] = m.split("-");
    const names = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    return names[parseInt(mo)-1] + " " + y;
  };

  const btnRow = `<div style="display:flex;gap:8px;flex-wrap:wrap">
    <button onclick="openRevenueModal()" style="padding:6px 14px;border:.5px solid var(--ac);border-radius:6px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Semaine manuelle</button>
    <button onclick="openImportXLSModal('ytd')" style="padding:6px 14px;border:.5px solid var(--pu);border-radius:6px;font-size:12px;background:var(--puBg);color:var(--pu);cursor:pointer;font-weight:600;font-family:inherit">⬆ Import YTD</button>
    <button onclick="openImportXLSModal('week')" style="padding:6px 14px;border:.5px solid var(--am);border-radius:6px;font-size:12px;background:var(--amBg);color:var(--am);cursor:pointer;font-weight:600;font-family:inherit">⬆ Import Semaine</button>
  </div>`;

  if (!hasAnyData) {
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div class="card-title" style="margin:0">Chiffre d'affaires</div>
        ${btnRow}
      </div>
      <div style="padding:30px;text-align:center;color:var(--txT);font-size:13px">Aucune donnée CA. Importez un fichier XLS ou saisissez une semaine manuellement.</div>
    </div>`;
  }

  // ── YTD ─────────────────────────────────────────────────────────────
  const ytdImports = imports.filter(i => (new Date(i.period_end) - new Date(i.period_start)) / 86400000 > 14);
  const ytdLabels = [...new Set(ytdImports.map(i => i.period_label))];
  const latestYtdLabel = ytdLabels.sort().pop();
  const ytdRevN  = ytdImports.filter(i => i.period_label === latestYtdLabel && i.year_type === "N").reduce((s,i) => s+(i.revenue||0), 0);
  const ytdRevN1 = ytdImports.filter(i => i.period_label === latestYtdLabel && i.year_type === "N-1").reduce((s,i) => s+(i.revenue||0), 0);

  // ── SEMAINES ────────────────────────────────────────────────────────
  const weekImportsN  = imports.filter(i => (new Date(i.period_end)-new Date(i.period_start))/86400000 <= 14 && i.year_type === "N").sort((a,b) => a.period_start>b.period_start?1:-1);
  const weekImportsN1 = imports.filter(i => (new Date(i.period_end)-new Date(i.period_start))/86400000 <= 14 && i.year_type === "N-1");

  const allWeeks = [
    ...weekImportsN.map(i => ({ label: i.period_label, rev: i.revenue, start: i.period_start, end: i.period_end, source: "import" })),
    ...entries.map(e => ({ label: e.week_label, rev: e.revenue, start: e.week_start_date, end: e.week_start_date, source: "manual" }))
  ].sort((a,b) => a.start>b.start?1:-1);

  // ── MOIS ─────────────────────────────────────────────────────────────
  const monthRevs = {}, monthRevsN1 = {};
  allWeeks.forEach(w => {
    const wStart = new Date(w.start), wEnd = w.end ? new Date(w.end) : new Date(w.start);
    const totalDays = Math.max(1, Math.round((wEnd-wStart)/86400000)+1);
    let d = new Date(wStart);
    while (d <= wEnd) {
      const m = d.toISOString().slice(0,7);
      monthRevs[m] = (monthRevs[m]||0) + w.rev/totalDays;
      d.setDate(d.getDate()+1);
    }
  });
  weekImportsN1.forEach(w => {
    const wStart = new Date(w.period_start), wEnd = new Date(w.period_end);
    const totalDays = Math.max(1, Math.round((wEnd-wStart)/86400000)+1);
    let d = new Date(wStart);
    while (d <= wEnd) {
      const m = d.toISOString().slice(0,7);
      monthRevsN1[m] = (monthRevsN1[m]||0) + w.revenue/totalDays;
      d.setDate(d.getDate()+1);
    }
  });
  Object.keys(monthRevs).forEach(m => monthRevs[m] = Math.round(monthRevs[m]));
  Object.keys(monthRevsN1).forEach(m => monthRevsN1[m] = Math.round(monthRevsN1[m]));

  const curMonth = now.toISOString().slice(0,7);
  const caMonthN  = monthRevs[curMonth] || 0;
  const curMonthN1key = `${now.getFullYear()-1}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const caMonthN1 = monthRevsN1[curMonthN1key] || 0;

  const lastWeek  = allWeeks[allWeeks.length-1];
  const lastRevN  = lastWeek?.rev || 0;
  const lastWeekN1 = lastWeek ? weekImportsN1.find(i => i.period_label === lastWeek.label) : null;
  const lastRevN1 = lastWeekN1?.revenue || 0;

  // ── KPI card helper ──────────────────────────────────────────────────
  const kpiCard = (title, n, n1, sublabel) => {
    const pct = (n && n1 && n1 > 0) ? Math.round((n-n1)/n1*100) : null;
    const pctColor = pct != null ? (pct >= 0 ? "var(--gn)" : "var(--rd)") : "";
    return `<div style="background:var(--bg);border-radius:10px;padding:14px 16px">
      <div style="font-size:11px;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">${title}</div>
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
        <div style="font-size:22px;font-weight:700;color:var(--ac)">${fmtCA(n)}</div>
        ${n1 > 0 ? `<div style="color:var(--borderL);font-size:18px;font-weight:300">|</div>
        <div style="font-size:16px;font-weight:600;color:var(--txS)">${fmtCA(n1)}</div>
        ${pct != null ? `<div style="font-size:15px;font-weight:700;color:${pctColor}">${pct>=0?"+":""}${pct}%</div>` : ""}` : ""}
      </div>
      <div style="font-size:11px;color:var(--txT);margin-top:5px;font-style:italic">${sublabel}</div>
    </div>`;
  };

  const weekSublabel = lastWeek ? lastWeek.label + (lastWeekN1 ? ` · N-1 : ${lastWeek.label}` : "") : "";
  const monthSublabel = fmtMonthLabel(curMonth) + (caMonthN1 > 0 ? ` · N-1 : ${fmtMonthLabel(curMonthN1key)}` : "");
  const ytdSublabel = latestYtdLabel || "YTD";

  // ── Tableau mois ─────────────────────────────────────────────────────
  const monthRows = Object.entries(monthRevs).sort(([a],[b]) => a>b?1:-1).map(([m, rev], i) => {
    const n1key = `${parseInt(m.slice(0,4))-1}-${m.slice(5,7)}`;
    const revN1 = monthRevsN1[n1key] || 0;
    const pct = revN1 > 0 ? Math.round((rev-revN1)/revN1*100) : null;
    const pctHtml = pct != null ? `<span style="font-weight:600;color:${pct>=0?"var(--gn)":"var(--rd)"}">${pct>=0?"+":""}${pct}%</span>` : "—";
    return `<tr class="${i%2?"stripe":""}">
      <td style="font-weight:500">${fmtMonthLabel(m)}</td>
      <td style="text-align:right;font-weight:600">${fmtCA(rev)}</td>
      <td style="text-align:right;color:var(--txS)">${revN1>0?fmtCA(revN1):"—"}</td>
      <td style="text-align:center">${pctHtml}</td>
    </tr>`;
  }).join("");

  // ── Tableau semaines ─────────────────────────────────────────────────
  const weekRows = allWeeks.slice().reverse().map((w, i) => {
    const n1 = weekImportsN1.find(x => x.period_label === w.label);
    const n1Rev = n1?.revenue || null;
    const pct = (n1Rev && n1Rev > 0) ? Math.round((w.rev-n1Rev)/n1Rev*100) : null;
    const pctHtml = pct != null ? `<span style="font-weight:600;color:${pct>=0?"var(--gn)":"var(--rd)"}">${pct>=0?"+":""}${pct}%</span>` : "—";
    const deleteBtn = w.source === "manual"
      ? `<button onclick="deleteRevenue('${esc(w.label)}')" style="padding:2px 8px;border-radius:5px;border:.5px solid var(--rd);background:var(--rdBg);color:var(--rd);font-size:11px;cursor:pointer;font-family:inherit">Suppr.</button>`
      : `<button onclick="deleteImportWeek('${esc(w.label)}')" style="padding:2px 8px;border-radius:5px;border:.5px solid var(--rd);background:var(--rdBg);color:var(--rd);font-size:11px;cursor:pointer;font-family:inherit">Suppr.</button>`;
    return `<tr class="${i%2?"stripe":""}">
      <td style="font-weight:500">${esc(w.label)}</td>
      <td style="color:var(--txS)">${w.start||""}</td>
      <td style="text-align:right;font-weight:600">${fmtCA(w.rev)}</td>
      <td style="text-align:right;color:var(--txS)">${n1Rev!=null?fmtCA(n1Rev):"—"}</td>
      <td style="text-align:center">${pctHtml}</td>
      <td style="text-align:center">${deleteBtn}</td>
    </tr>`;
  }).join("");

  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Chiffre d'affaires</div>
      ${btnRow}
    </div>

    <!-- 3 KPIs -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      ${kpiCard("Dernière semaine", lastRevN, lastRevN1, lastWeek?.label || "—")}
      ${kpiCard("Mois en cours", caMonthN, caMonthN1, monthSublabel)}
      ${kpiCard("YTD", ytdRevN, ytdRevN1, ytdSublabel)}
    </div>

    <!-- Détail par mois (déroulant) -->
    ${monthRows ? `<div style="border-top:1px solid var(--borderL);padding-top:10px;margin-bottom:8px">
      <details style="font-size:12px">
        <summary style="cursor:pointer;color:var(--txS);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Détail par mois (${Object.keys(monthRevs).length})</summary>
        <div class="scroll-table"><table style="min-width:360px">
          <thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">
            <th>Mois</th><th style="text-align:right">CA N</th><th style="text-align:right">CA N-1</th><th style="text-align:center">Évol.</th>
          </tr></thead>
          <tbody>${monthRows}</tbody>
        </table></div>
      </details>
    </div>` : ""}

    <!-- Toutes les semaines (déroulant) -->
    <div style="border-top:1px solid var(--borderL);padding-top:10px">
      <details style="font-size:12px">
        <summary style="cursor:pointer;color:var(--txS);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Toutes les semaines (${allWeeks.length})</summary>
        <div class="scroll-table"><table style="min-width:400px">
          <thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">
            <th>Semaine</th><th>Début</th><th style="text-align:right">CA N</th><th style="text-align:right">CA N-1</th><th style="text-align:center">Évol.</th><th style="text-align:center">Actions</th>
          </tr></thead>
          <tbody>${weekRows}</tbody>
        </table></div>
      </details>
    </div>
  </div>`;
}
function openRevenueModal() {
  // Générer un label semaine automatique
  const now = new Date();
  const yr = now.getFullYear();
  const start = new Date(yr, 0, 1);
  const weekNum = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  const defaultLabel = `S${weekNum}`;
  const defaultDate = now.toISOString().slice(0,10);

  openModal("Ajouter une semaine de CA", `
    <div style="display:grid;gap:12px">
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Label semaine *</label>
        <input id="rev-label" value="${defaultLabel}" placeholder="ex: S15" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Date de début de semaine *</label>
        <input id="rev-date" type="date" value="${defaultDate}" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">CA (€) *</label>
        <input id="rev-amount" type="number" placeholder="ex: 12500" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <button onclick="saveRevenue()" style="padding:10px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Enregistrer</button>
      <div id="rev-status" style="font-size:12px;text-align:center"></div>
    </div>`);
}

async function saveRevenue() {
  const label = document.getElementById("rev-label")?.value?.trim();
  const date  = document.getElementById("rev-date")?.value?.trim();
  const amt   = parseFloat(document.getElementById("rev-amount")?.value);
  const statusEl = document.getElementById("rev-status");
  if (!label || !date || isNaN(amt) || amt <= 0) { statusEl.innerHTML='<span style="color:var(--rd)">Tous les champs sont obligatoires.</span>'; return; }
  statusEl.innerHTML = '<span style="color:var(--txS)">Enregistrement...</span>';
  try {
    await sbInsert("revenue_entries", { marketplace: MARKETPLACE, week_label: label, week_start_date: date, revenue: amt });
    statusEl.innerHTML = '<span style="color:var(--gn)">✓ Semaine ajoutée !</span>';
    setTimeout(() => { closeModal(); loadData(); }, 800);
  } catch(e) { statusEl.innerHTML = `<span style="color:var(--rd)">Erreur : ${e.message}</span>`; }
}

async function deleteImportWeek(label) {
  if (!confirm(`Supprimer la semaine "${label}" ?`)) return;
  try {
    await sbDelete("revenue_imports", `marketplace=eq.${MARKETPLACE}&period_label=eq.${encodeURIComponent(label)}`);
    await loadData();
  } catch(e) { alert("Erreur : " + e.message); }
}

async function deleteRevenue(label) {
  if (!confirm(`Supprimer la semaine "${label}" ?`)) return;
  try {
    await sbDelete("revenue_entries", `marketplace=eq.${MARKETPLACE}&week_label=eq.${encodeURIComponent(label)}`);
    await loadData();
  } catch(e) { alert("Erreur : " + e.message); }
}

let prodFilters={search:"",type:"all",avail:"all",page1:"all",tag:"all",sort:"name",dir:"asc"};

function renderProduits() {

  const si=col=>f.sort===col?(f.dir==="asc"?" ↑":" ↓"):"";
  return `
    <div class="filters">
      <input placeholder="Rechercher..." value="${esc(f.search)}" oninput="prodFilters.search=this.value;renderContent()"/>
      <select onchange="prodFilters.type=this.value;renderContent()"><option value="all">Tous types</option><option value="Top ref" ${f.type==='Top ref'?'selected':''}>Top ref</option><option value="Nouveautés" ${f.type==='Nouveautés'?'selected':''}>Nouveautés</option><option value="Classe A" ${f.type==='Classe A'?'selected':''}>Classe A</option><option value="Nouveautés Q4+Q1" ${f.type==='Nouveautés Q4+Q1'?'selected':''}>Nouveautés Q4+Q1</option><option value="Deals exclus" ${f.type==='Deals exclus'?'selected':''}>Deals exclus</option></select>
      <select onchange="prodFilters.avail=this.value;renderContent()"><option value="all">Dispo + Indispo</option><option value="dispo" ${f.avail==='dispo'?'selected':''}>Disponible</option><option value="indispo" ${f.avail==='indispo'?'selected':''}>Indisponible</option></select>
      <select onchange="prodFilters.page1=this.value;renderContent()"><option value="all">Toutes positions</option><option value="yes" ${f.page1==='yes'?'selected':''}>En page 1</option><option value="no" ${f.page1==='no'?'selected':''}>Pas en page 1</option></select>
      <select onchange="prodFilters.tag=this.value;renderContent()"><option value="all">Toutes variations</option><option value="prix_up">Prix ↑</option><option value="prix_down">Prix ↓</option><option value="delai_up">Délai ↑</option><option value="delai_down">Délai ↓</option><option value="note_up">Note ↑</option><option value="note_down">Note ↓</option></select>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:12px;color:var(--txS)">${list.length} produit${list.length>1?'s':''}</div>

          ${STATE.dates.slice().reverse().map((d,i)=>{
            const dt=new Date(d+"T12:00:00Z");
            const label=dt.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"});
            return`<option value="${i+1}" ${exportSessions===i+1?'selected':''}>${i+1} jour${i>0?'s':''} (jusqu'au ${label})</option>`;
          }).join("")}
        </select>
        <button onclick="exportCSV()" style="padding:6px 14px;border:.5px solid var(--ac);border-radius:6px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">⬇ Export CSV</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden"><div class="scroll-table"><table style="min-width:1000px">
      <thead><tr style="border-bottom:1px solid var(--border);background:var(--bg)">
        <th style="cursor:pointer" onclick="toggleProdSort('name')">Produit${si('name')}</th><th>Réfs</th><th style="text-align:center">Type</th>
        <th style="cursor:pointer;text-align:right" onclick="toggleProdSort('price')">Prix${si('price')}</th>
        <th style="text-align:center">Dispo</th><th style="cursor:pointer;text-align:right" onclick="toggleProdSort('rating')">Note${si('rating')}</th>

        <th>Page 1</th><th>Variations</th><th>Lien</th>
      </tr></thead><tbody>
      ${list.map((p,i)=>`<tr class="${i%2?'stripe':''}">
        <td style="font-weight:500;max-width:240px"><div style="line-height:1.3">${esc(p.name)}</div></td>

function toggleProdSort(col){if(prodFilters.sort===col)prodFilters.dir=prodFilters.dir==="asc"?"desc":"asc";else{prodFilters.sort=col;prodFilters.dir="asc";}renderContent();}

function exportCSV() {
  const sessions = STATE.dates.slice(-exportSessions);
  const fmtSession = sess => {
    const dt = new Date(sess + "T12:00:00Z");
    return dt.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "2-digit" });
  };
  const sessionHeaders = sessions.flatMap(s => [`Dispo ${fmtSession(s)}`,`Prix ${fmtSession(s)}`,`Note ${fmtSession(s)}`,`Délai ${fmtSession(s)}`]);
  const headers = ["Produit", "ID produit", "SKU", "EAN", "Lien", ...sessionHeaders];
  const rows = STATE.products.map(p => {
    const key = (p.product_id_scraper || "").toLowerCase();
    const h = STATE.history[key] || {};
    const sessionCells = sessions.flatMap(sess => {
      const snap = h[sess];
      return [snap?.available!=null?(snap.available?"Dispo":"Indispo"):"",snap?.price!=null?snap.price:"",snap?.rating!=null?snap.rating:"",snap?.delivery_days!=null?snap.delivery_days:""];
    });
    return [p.name, p.product_id, p.sku||"", p.ean||"", p.url||"", ...sessionCells];
  });
  const csvCell = v => { const s=String(v??""); return s.includes(";")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:`${s}`; };
  const csv = [headers, ...rows].map(row => row.map(csvCell).join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const today = new Date().toLocaleDateString("fr-FR").replace(/\//g, "-");
  a.download = `produits_${MARKETPLACE}_${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

let histMetric="price";
function renderHistorique() {
  const dates=STATE.dates.slice(-5);
  const prods=STATE.products; // tous les produits suivis actifs, avec ou sans historique
  const withData=prods.filter(p=>Object.keys(p._history).length>0).length;
  const getVal=(p,d)=>{const e=p._history[d];if(!e)return null;if(histMetric==="price")return e.price;if(histMetric==="rating")return e.rating;if(histMetric==="delivery")return e.delivery_days;if(histMetric==="dispo")return e.available;return null;};
  const fmtVal=v=>{if(v==null)return"—";if(histMetric==="price")return Math.round(v)+"€";if(histMetric==="rating")return v;if(histMetric==="delivery")return v+"j";if(histMetric==="dispo")return v?"✓":"✗";return v;};
  const hasVar=(p,d,di)=>{if(di===0)return null;const prev=getVal(p,dates[di-1]),curr=getVal(p,d);if(prev==null||curr==null)return null;if(histMetric==="price"&&prev>0){const pct=(curr-prev)/prev;if(pct>.10)return"up";if(pct<-.15)return"down";}if(histMetric==="delivery"){const diff=curr-prev;if(diff>5)return"up";if(diff<-5)return"down";}if(histMetric==="rating"){const diff=curr-prev;if(diff>=.2)return"good";if(diff<=-.2)return"bad";}if(histMetric==="dispo"&&prev!==curr)return curr?"good":"bad";return null;};
  const varBg=v=>({up:"var(--rdBg)",down:"var(--gnBg)",good:"var(--gnBg)",bad:"var(--rdBg)"}[v]||"");
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="toggle-group">${["price","rating","delivery","dispo"].map(m=>`<button class="toggle-btn ${histMetric===m?'active':''}" onclick="histMetric='${m}';renderContent()">${{price:"Prix",rating:"Note",delivery:"Délai",dispo:"Dispo"}[m]}</button>`).join("")}</div>
      <div style="display:flex;gap:8px;align-items:center">
        ${histMetric==="delivery"?`<button onclick="exportDeliveryCSV()" style="padding:6px 14px;border:.5px solid var(--ac);border-radius:6px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">⬇ Export délais (tout l'historique)</button>`:''}
      </div>
    </div>
    <div style="font-size:12px;color:var(--txS);margin-bottom:8px">${prods.length} produits suivis · ${withData} avec données · ${dates.length} dates affichées · <span style="color:var(--txT)">${STATE.dates.length} total en base</span></div>
    <div class="card" style="padding:0;overflow:hidden"><div class="scroll-table"><table style="min-width:700px">
      <thead><tr style="border-bottom:1px solid var(--border);background:var(--bg)"><th style="min-width:200px">Produit</th><th>Réfs</th>${dates.map(d=>{const dt=new Date(d+"T12:00:00Z");return`<th style="text-align:center;white-space:nowrap">${dt.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})}</th>`;}).join("")}</tr></thead>
      <tbody>${prods.map((p,i)=>`<tr class="${i%2?'stripe':''}"><td style="font-weight:500;font-size:12px;max-width:200px">${esc(p.name)}</td><td style="font-size:10px;color:var(--txT);white-space:nowrap">${esc(p.product_id)}<br>${esc(p.sku)}</td>${dates.map((d,di)=>{const v=getVal(p,d),vr=hasVar(p,d,di);return`<td style="text-align:center;${vr?`background:${varBg(vr)};font-weight:600`:''}">${fmtVal(v)}</td>`;}).join("")}</tr>`).join("")}</tbody>
    </table></div></div>`;
}

// Export délais : toutes les refs, tout l'historique, une colonne par date
function exportDeliveryCSV() {
  const allDates = STATE.dates; // toutes les dates dispo en base (triées ASC)
  const prods = STATE.products; // tous les produits suivis actifs
  if (!allDates.length || !prods.length) { alert("Aucune donnée à exporter."); return; }

  const fmtDate = d => {
    const dt = new Date(d + "T12:00:00Z");
    return dt.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "2-digit" });
  };

  // En-têtes : ID produit | Nom | SKU | une colonne par date
  const headers = ["ID produit", "Nom", "SKU", ...allDates.map(fmtDate)];

  const rows = prods.map(p => {
    const key = (p.product_id_scraper || "").toLowerCase();
    const h = STATE.history[key] || {};
    const delayCols = allDates.map(d => {
      const snap = h[d];
      return snap?.delivery_days != null ? snap.delivery_days : "";
    });
    return [p.product_id, p.name, p.sku || "", ...delayCols];
  });

  const csvCell = v => { const s = String(v ?? ""); return s.includes(";") || s.includes('"') || s.includes("\n") ? `"${s.replace(/"/g,'""')}"` : s; };
  const csv = [headers, ...rows].map(row => row.map(csvCell).join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const today = new Date().toLocaleDateString("fr-FR").replace(/\//g, "-");
  a.download = `historique_delais_${MARKETPLACE}_${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Liste des concurrents à suivre par marketplace (ordre = ordre d'affichage)
// ⚠️ Plus utilisé directement — source de vérité = table Supabase tracked_sellers
// Conservé comme fallback si Supabase ne répond pas
const TRACKED_COMPETITORS_FALLBACK = {
  maisonsdumonde: ["BestMobilier","Premium Interiors","Usinestreet","Sweeek","Mobilier Déco","Homifab","Baita Home"],
  cdiscount:      ["BestMobilier","Loungitude","VidaXL","Vente-unique","Habitat et Jardin","Sweeek","IDOHOME","EAZSHOU","Tolaro"],
  conforama:      ["BestMobilier","Loungitude","VidaXL","Habitat et Jardin","Sweeek","Tendencio","Gutent (KOMHTOM)","IDOHOME","Intense Déco","Cosy (Menzzo)"],
  laredoute:      ["BestMobilier","Oviala","Sweeek","Homifab","Berah Getah","Tikamoon","Miliboo"],
  amazon:         ["BestMobilier","Loungitude","VidaXL","Sweeek","IDOHOME","Habitat et Jardin"],
};

// Noms BestMobilier reconnus
const BM_NAMES_SET = new Set(["BestMobilier","Best Mobilier","Lisa Design"]);

// Résolution d'un nom affiché vers le nom raw en base (pour les lookup seller_stats)
// BestMobilier peut être "BestMobilier" ou "Best Mobilier" ou "Lisa Design" en base
function resolveSellerNames(displayName) {
  if (displayName === "BestMobilier") return ["BestMobilier","Best Mobilier","Lisa Design"];
  // Correspondances entre nom affiché (tracked_sellers) et nom réel en base (seller_stats)
  const SELLER_NAME_MAP = {
    "Habitat et Jardin": ["Habitat & Jardin", "Habitat et Jardin"],
    "Gutent (KOMHTOM)":  ["Gutent", "Gutent (KOMHTOM)"],
    "VidaXL":            ["VidaXL", "vidaXL", "Vida XL", "VidaXl", "VIDAXL"],
  };
  if (SELLER_NAME_MAP[displayName]) return SELLER_NAME_MAP[displayName];
  // Fallback insensible à la casse pour VidaXL et variantes non listées
  const stats = STATE.sellerStats || [];
  const lower = displayName.toLowerCase().replace(/[\s\-_]/g, "");
  const matches = [...new Set(stats.map(s => s.seller).filter(s => s && s.toLowerCase().replace(/[\s\-_]/g, "") === lower))];
  if (matches.length) return matches;
  return [displayName];
}

// Type de marketplace : "cumul" (MdM, Conforama) ou "ltm" (Cdiscount, Amazon, La Redoute)
function mpType(mp) {
  if (mp === "conforama" || mp === "maisonsdumonde") return "cumul";
  if (mp === "manomano") return "ltm"; // ventes LTM comme Amazon
  return "ltm";
}

// Récupère les données d'un vendeur depuis seller_stats pour la marketplace courante
function getSellerData(displayName) {
  const stats = STATE.sellerStats || [];
  const rawNames = resolveSellerNames(displayName);

  // Toutes les entrées pour ce vendeur (tous noms raw confondus), triées ASC
  const allEntries = stats
    .filter(s => rawNames.includes(s.seller))
    .sort((a, b) => a.date > b.date ? 1 : -1);

  if (!allEntries.length) return null;

  const latest = allEntries[allEntries.length - 1];
  const prev   = allEntries.length >= 2 ? allEntries[allEntries.length - 2] : null;
  const first  = allEntries[0];

  // Pour les calculs LTM : on ignore les entrées où seller_sales est null
  // (scrapes partiels où le clic "En savoir plus" n'a pas fonctionné)
  const validSalesEntries = allEntries.filter(e => e.seller_sales != null);
  const latestValid = validSalesEntries.length ? validSalesEntries[validSalesEntries.length - 1] : null;
  const prevValid   = validSalesEntries.length >= 2 ? validSalesEntries[validSalesEntries.length - 2] : null;
  const firstValid  = validSalesEntries.length ? validSalesEntries[0] : null;

  // Calcul p1 moyen sur toutes les sessions
  const p1Values = allEntries.map(e => e.p1_count || 0);
  const p1Avg = p1Values.length ? Math.round(p1Values.reduce((a,b)=>a+b,0) / p1Values.length * 10) / 10 : 0;
  const p1Latest = latest.p1_count || 0;

  if (mpType(MARKETPLACE) === "cumul") {
    // Ventes cumulées depuis 1er scrape
    const salesLatest = latest.seller_sales || 0;
    const salesFirst  = first.seller_sales || 0;
    const salesVar    = salesLatest - salesFirst; // ventes depuis 1er scraping

    // Variation depuis dernier scraping
    const salesVarSincePrev = prev != null ? (salesLatest - (prev.seller_sales || 0)) : null;
    const daysSincePrev = prev != null
      ? Math.max(1, Math.round((new Date(latest.date) - new Date(prev.date)) / 86400000))
      : null;

    // Ventes quotidiennes moyennes depuis 1er scrape
    const daysSinceFirst = Math.max(1, Math.round((new Date(latest.date) - new Date(first.date)) / 86400000));
    const dailyAvg = daysSinceFirst > 0 && salesVar > 0 ? Math.round(salesVar / daysSinceFirst * 10) / 10 : null;

    return {
      type: "cumul",
      salesLatest, salesVar, salesVarSincePrev,
      daysSincePrev, dailyAvg,
      p1Latest, p1Avg,
      rating: latest.seller_rating,
      ratingsCount: latest.seller_ratings_count,
      sourceUrl: latest.source_url,
      bestSellerTitle: latest.best_seller_title || null,
      bestSellerPrice: latest.best_seller_price || null,
      bestSellerUrl:   latest.best_seller_url   || null,
      latestDate: latest.date,
    };
  } else {
    // LTM : Cdiscount, Amazon, La Redoute
    // Amazon : proxy = seller_ratings_count
    let salesLatest, salesFirst12m;
    if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
      salesLatest = latest.seller_ratings_count || 0;
      // oldest dans les 12 derniers mois
      const cutoff = new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
      const in12m = allEntries.filter(e => new Date(e.date) >= cutoff);
      salesFirst12m = in12m.length ? (in12m[0].seller_ratings_count || 0) : null;
    } else {
      salesLatest = latestValid?.seller_sales || 0;
      salesFirst12m = firstValid?.seller_sales || 0;
    }

    // Tendance vs dernier scrape précédent (court terme) — sur entrées valides uniquement
    const yoyDelta = (() => {
      if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
        if (!prev || prev.seller_ratings_count == null) return null;
        const prevVal = prev.seller_ratings_count || 0;
        return prevVal > 0 ? (salesLatest - prevVal) / prevVal * 100 : null;
      }
      if (!prevValid || prevValid.seller_sales == null) return null;
      const prevVal = prevValid.seller_sales || 0;
      return prevVal > 0 ? (salesLatest - prevVal) / prevVal * 100 : null;
    })();

    // Tendance depuis 1er scrape (long terme) — sur entrées valides uniquement
    const yoyDeltaFirst = (() => {
      if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
        if (!first || first.seller_ratings_count == null || allEntries.length < 2) return null;
        const fVal = first.seller_ratings_count || 0;
        return fVal > 0 ? (salesLatest - fVal) / fVal * 100 : null;
      }
      if (!firstValid || validSalesEntries.length < 2) return null;
      const fVal = firstValid.seller_sales || 0;
      return fVal > 0 ? (salesLatest - fVal) / fVal * 100 : null;
    })();

    const sessionsCount = allEntries.length;

    return {
      type: "ltm",
      salesLatest,
      yoyDelta,
      yoyDeltaFirst,
      sessionsCount,
      p1Latest, p1Avg,
      rating: latest.seller_rating,
      ratingsCount: latest.seller_ratings_count,
      sourceUrl: latest.source_url,
      bestSellerTitle: latest.best_seller_title || null,
      bestSellerPrice: latest.best_seller_price || null,
      bestSellerUrl:   latest.best_seller_url   || null,
      latestDate: latest.date,
    };
  }
}

function renderConcurrents() {
  const isCumul = mpType(MARKETPLACE) === "cumul";
  const isAmazon = MARKETPLACE === "amazon";
  const isBut   = MARKETPLACE === "but"; // BUT : seller_ratings_count = proxy ventes (nb avis)

  let trackedRows = STATE.trackedSellers || [];
  if (!trackedRows.length) {
    const fallback = TRACKED_COMPETITORS_FALLBACK[MARKETPLACE] || [];
    trackedRows = fallback.map(name => ({ seller_name: name, shop_url: null, active: true }));
  }

  const fmtNum = v => v != null ? Number(v).toLocaleString("fr-FR") : "—";
  const fmtDelta = (v, unit="") => {
    if (v == null) return '<span style="color:var(--txT);font-size:11px">—</span>';
    const color = v > 0 ? "var(--gn)" : v < 0 ? "var(--rd)" : "var(--txT)";
    const rounded = Math.round(v);
    // Variation non nulle mais < 0.5% en valeur absolue → afficher "<1%" ou ">-1%"
    const display = (rounded === 0 && v !== 0)
      ? (v > 0 ? "<+1" : ">-1")
      : (rounded > 0 ? "+" : "") + rounded;
    return `<span style="color:${color};font-size:15px;font-weight:700">${display}${unit}</span>`;
  };

  const rows = trackedRows.map(ts => {
    const name = ts.seller_name;
    const isBM = BM_NAMES_SET.has(name) || name === "BestMobilier";
    const data = getSellerData(name);
    return { name, isBM, data, shopUrl: ts.shop_url };
  });

  const hasAnyData = rows.some(r => r.data);

  const CHART_COLORS = ["#2c5ea0","#e8963a","#2e9e6b","#c0392b","#8e44ad","#16a085","#d35400","#2980b9","#27ae60","#e74c3c"];

  // Métriques (lignes du tableau transposé)
  const metricRows = [
    { key:"col1", label: isCumul ? "Ventes totales" : (isAmazon || isBut ? "Avis vendeur (proxy)" : "Ventes LTM") },
    { key:"col2", label: isCumul ? "Variation (dernier scraping)" : "Tendance vs préc." },
    ...(!isCumul ? [{ key:"col7", label:"Tendance depuis 1er scrape" }] : []),
    ...(isCumul ? [{ key:"col3", label:"Ventes/jour moy." }] : []),
    { key:"col4", label:"Moy. appari. P1" },
    ...(!isCumul ? [{ key:"col5", label:"Best-seller" }] : []),
    { key:"col6", label:"Note vendeur" },
  ];

  function cellFor(r, key) {
    const d = r.data;
    if (!d) return '<span style="color:var(--txT);font-size:11px">—</span>';
    switch(key) {
      case "col1": {
        const v = fmtNum(d.salesLatest);
        const sub = isCumul ? "depuis inscr." : (isAmazon ? "avis" : "ventes LTM");
        return `<div style="font-size:16px;font-weight:700">${v}</div><div style="font-size:10px;color:var(--txT)">${sub}</div>`;
      }
      case "col2": {
        if (isCumul) {
          if (d.salesVarSincePrev == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
          return `${fmtDelta(d.salesVarSincePrev," ventes")}<div style="font-size:10px;color:var(--txT);margin-top:1px">en ${d.daysSincePrev}j</div>`;
        } else {
          if (d.yoyDelta == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
          return `${fmtDelta(d.yoyDelta,"%")}<div style="font-size:10px;color:var(--txT);margin-top:1px">vs préc.</div>`;
        }
      }
      case "col3":
        return d.dailyAvg != null
          ? `<div style="font-size:16px;font-weight:700">${d.dailyAvg.toLocaleString("fr-FR")}</div><div style="font-size:10px;color:var(--txT)">/j moy.</div>`
          : '<span style="color:var(--txT);font-size:11px">—</span>';
      case "col7":
        if (d.yoyDeltaFirst == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
        return `${fmtDelta(d.yoyDeltaFirst,"%")}<div style="font-size:10px;color:var(--txT);margin-top:1px">depuis 1er scrape</div>`;
      case "col4":
        return `<div style="font-size:16px;font-weight:700">${d.p1Avg.toLocaleString("fr-FR")}</div><div style="font-size:10px;color:var(--txT)">app. moy.</div>`;
      case "col5": {
        if (!d.bestSellerTitle) return '<span style="color:var(--txT);font-size:11px">—</span>';
        return `<div style="font-size:11px;font-weight:600;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(d.bestSellerTitle)}">${esc(d.bestSellerTitle)}</div>
          ${d.bestSellerPrice?`<div style="font-size:12px;color:var(--txS);font-weight:700">${d.bestSellerPrice}€</div>`:""}
          ${d.bestSellerUrl?`<a href="${esc(d.bestSellerUrl)}" target="_blank" class="link" style="font-size:10px">Voir ↗</a>`:""}`;
      }
      case "col6":
        return d.rating
          ? `<div style="font-size:16px;font-weight:700">${d.rating}<span style="font-size:11px;font-weight:400;color:var(--txT)">/5</span></div><div style="font-size:10px;color:var(--txT)">${d.ratingsCount?fmtNum(d.ratingsCount)+" avis":""}</div>`
          : '<span style="color:var(--txT);font-size:11px">—</span>';
      default: return "—";
    }
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:15px;font-weight:700">Suivi concurrents — ${MARKETPLACES.find(m=>m.id===MARKETPLACE)?.label||MARKETPLACE}</div>
      <div style="font-size:12px;color:var(--txS);margin-top:2px">${trackedRows.length} vendeurs suivis</div>
    </div>
    <button onclick="openAddCompetitorModal()" style="padding:7px 14px;border:.5px solid var(--ac);border-radius:8px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Ajouter un concurrent</button>
  </div>

  ${!hasAnyData ? `<div class="card" style="padding:30px;text-align:center;color:var(--txT)">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">Aucune donnée seller_stats pour cette marketplace</div>
    <div style="font-size:12px">Lancez d'abord l'extension de scraping des boutiques vendeurs.</div>
  </div>` : `

  <div class="card" style="padding:0;overflow:hidden">
    <div class="scroll-table">
      <table style="min-width:${100 + rows.length * 130}px;width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="border-bottom:2px solid var(--border);background:var(--bg)">
            <th style="min-width:150px;padding:10px 14px;text-align:left;font-size:11px;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;border-right:1px solid var(--border)">Métrique</th>
            ${rows.map((r, ci) => {
              const color = CHART_COLORS[ci % CHART_COLORS.length];
              const bmBg = r.isBM ? "background:var(--acBg);" : "";
              return `<th style="min-width:130px;padding:10px 14px;text-align:center;${bmBg}">
                <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
                  <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color}"></span>
                  <span style="font-size:13px;font-weight:700;color:${r.isBM?"var(--ac)":"var(--tx)"}">${esc(r.name)}</span>
                  ${r.isBM ? '<span class="pill pill-accent" style="font-size:10px">Vous</span>' : ""}
                  ${r.shopUrl ? `<a href="${esc(r.shopUrl)}" target="_blank" class="link" style="font-size:10px">Boutique ↗</a>` : (r.data?.sourceUrl ? `<a href="${esc(r.data.sourceUrl)}" target="_blank" class="link" style="font-size:10px">Boutique ↗</a>` : "")}
                </div>
              </th>`;

        </thead>
        <tbody>
          ${metricRows.map(({ key, label }, ri) => `
          <tr style="${ri%2?"background:var(--bg)":""}">
            <td style="padding:10px 14px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;border-right:1px solid var(--border)">${label}</td>
            ${rows.map(r => {
              const bmBg = r.isBM ? "background:var(--acBg);" : "";
              return `<td style="padding:10px 14px;text-align:center;line-height:1.4;${bmBg}">${cellFor(r, key)}</td>`;
            }).join("")}
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>

  ${isCumul ? renderCombinedSalesChart(trackedRows, CHART_COLORS) : ""}`}`;
}

function renderCombinedSalesChart(trackedRows, CHART_COLORS) {
  // Pour chaque vendeur : construire les points { month, inc }
  // inc = seller_sales(point) - seller_sales(1er scrape du mois)
  // On groupe par mois calendaire, et dans chaque mois on calcule l'incrément
  // depuis la 1ère valeur du mois (ou la dernière valeur du mois précédent si dispo)

  const series = [];

  trackedRows.forEach((ts, ci) => {
    const name = ts.seller_name;
    const rawNames = resolveSellerNames(name);
    let hist = null;
    rawNames.forEach(rn => {
      const h = (STATE.confoSellerHistory||{})[rn];
      if (h && (!hist || h.length > hist.length)) hist = h;
    });
    if (!hist || !hist.length) return;

    // Filtrer les entrées sans sales
    const validHist = hist.filter(h => h.sales != null);
    if (!validHist.length) return;

    // Grouper par mois : garder toutes les entrées avec leur date et valeur
    // monthPoints[mois] = [ {date, sales}, ... ]
    const monthPoints = {};
    validHist.forEach(h => {
      const month = h.date.slice(0, 7);
      if (!monthPoints[month]) monthPoints[month] = [];
      monthPoints[month].push({ date: h.date, sales: h.sales });
    });

    const months = Object.keys(monthPoints).sort();
    if (!months.length) return;

    // Pour chaque mois : calculer l'incrément
    // baseline = dernière valeur du mois précédent, ou 1ère valeur du 1er mois
    const monthData = {};
    months.forEach((m, i) => {
      const pts = monthPoints[m].sort((a, b) => a.date > b.date ? 1 : -1);
      const lastVal = pts[pts.length - 1].sales;

      if (i === 0) {
        // 1er mois : baseline = 1ère valeur du mois
        // incrément = dernière valeur - 1ère valeur (ventes réalisées dans le mois)
        const firstVal = pts[0].sales;
        monthData[m] = Math.max(0, lastVal - firstVal);
      } else {
        // Autres mois : baseline = dernière valeur du mois précédent
        const prevPts = monthPoints[months[i-1]].sort((a, b) => a.date > b.date ? 1 : -1);
        const baseline = prevPts[prevPts.length - 1].sales;
        monthData[m] = Math.max(0, lastVal - baseline);
      }
    });

    const isBM = BM_NAMES_SET.has(name) || name === "BestMobilier";
    series.push({ name, color: CHART_COLORS[ci % CHART_COLORS.length], isBM, monthData, months });
  });

  if (!series.length) return "";

  // Tous les mois couverts (y compris ceux avec incrément 0 — on les affiche quand même)
  const allMonths = [...new Set(series.flatMap(s => s.months))].sort();
  if (!allMonths.length) return "";

  const fmtMonth = m => {
    const [y, mo] = m.split("-");
    const names = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    return names[parseInt(mo)-1] + " " + y;
  };

  // Dimensions SVG
  const BAR_W   = 20;
  const BAR_GAP = 3;
  const GROUP_GAP = 28;
  const nSeries = series.length;
  const groupW  = nSeries * (BAR_W + BAR_GAP) - BAR_GAP + GROUP_GAP;
  const PAD_L = 52, PAD_R = 20, PAD_T = 16, PAD_B = 48;
  const W = PAD_L + allMonths.length * groupW + PAD_R;
  const H = 220;
  const CH = H - PAD_T - PAD_B;

  const maxVal = Math.max(...series.flatMap(s => allMonths.map(m => s.monthData[m] || 0)), 1);

  // Grille Y
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(r => ({
    v: Math.round(r * maxVal),
    y: PAD_T + CH - r * CH
  }));
  const yGrid = yTicks.map(t =>
    `<line x1="${PAD_L}" y1="${t.y.toFixed(1)}" x2="${W - PAD_R}" y2="${t.y.toFixed(1)}" stroke="#e8e6e1" stroke-width="1"/>
     <text x="${PAD_L - 4}" y="${(t.y + 4).toFixed(1)}" text-anchor="end" fill="#9c9a92" font-size="10">${t.v.toLocaleString("fr-FR")}</text>`
  ).join("");

  // Barres
  const bars = allMonths.map((m, mi) => {
    const groupX = PAD_L + mi * groupW;
    const labelX = groupX + (nSeries * (BAR_W + BAR_GAP) - BAR_GAP) / 2;
    const isCurrentMonth = m === new Date().toISOString().slice(0, 7);
    const monthLabel = fmtMonth(m) + (isCurrentMonth ? " *" : "");
    const label = `<text x="${labelX.toFixed(1)}" y="${(H - 6).toFixed(1)}" text-anchor="middle" fill="#6b6a65" font-size="10" font-weight="500">${monthLabel}</text>`;

    const rects = series.map((s, si) => {
      const val = s.monthData[m] || 0;
      const barH = val > 0 ? Math.max((val / maxVal) * CH, 2) : 0;
      const x = groupX + si * (BAR_W + BAR_GAP);
      const y = PAD_T + CH - barH;
      const stroke = s.isBM ? ` stroke="${s.color}" stroke-width="1.5"` : "";
      const opacity = s.isBM ? "1" : "0.82";
      const valLabel = val > 0 && barH > 14
        ? `<text x="${(x + BAR_W/2).toFixed(1)}" y="${(y - 3).toFixed(1)}" text-anchor="middle" fill="${s.color}" font-size="9" font-weight="600">${val >= 1000 ? (val/1000).toFixed(1)+"k" : val}</text>`
        : "";
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${BAR_W}" height="${barH.toFixed(1)}" fill="${s.color}" opacity="${opacity}" rx="2"${stroke}/>${valLabel}`;
    }).join("");

    return label + rects;
  }).join("");

  // Légende
  const legend = series.map(s =>
    `<div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:${s.isBM?700:500};color:${s.isBM?"var(--ac)":"var(--tx)"}">
      <span style="display:inline-block;width:12px;height:12px;background:${s.color};border-radius:2px;flex-shrink:0;opacity:${s.isBM?1:0.82}"></span>
      ${esc(s.name)}
    </div>`
  ).join("");

  const svgW = Math.max(W, 400);
  const noteCurrentMonth = allMonths.some(m => m === new Date().toISOString().slice(0, 7))
    ? '<div style="font-size:10px;color:var(--txT);margin-top:6px">* Mois en cours — incrément partiel</div>'
    : "";

  return `<div class="card" style="margin-top:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Ventes mensuelles par acteur</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px">${legend}</div>
    </div>
    <div style="font-size:11px;color:var(--txT);margin-bottom:8px">Ventes réalisées dans le mois (incrément depuis début du mois ou fin du mois précédent).</div>
    <div style="overflow-x:auto">
      <svg viewBox="0 0 ${svgW} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:${Math.min(svgW,400)}px;display:block">
        ${yGrid}${bars}
      </svg>
    </div>
    ${noteCurrentMonth}
  </div>`;
}

async function saveCustomCompetitor() {
  const name = document.getElementById("cc-name")?.value?.trim();
  const url  = document.getElementById("cc-url")?.value?.trim();
  const statusEl = document.getElementById("cc-status");
  if (!name) { statusEl.innerHTML='<span style="color:var(--rd)">Le nom est obligatoire.</span>'; return; }

  if ((STATE.trackedSellers||[]).find(s => s.seller_name === name)) {

  }
  statusEl.innerHTML='<span style="color:var(--txS)">Enregistrement...</span>';
  try {
    await sbInsert("tracked_sellers", { marketplace: MARKETPLACE, seller_name: name, shop_url: url||null, active: true });

  }
}

// Conserver les fonctions utilitaires pour les sparklines (toujours utilisées dans le nouveau concurrent)
function buildSellerStatsMap() {
  const byName = {};
  (STATE.sellerStats || []).forEach(s => {
    if (!byName[s.seller]) byName[s.seller] = [];
    byName[s.seller].push(s);
  });
  const result = {};
  Object.entries(byName).forEach(([seller, rows]) => {
    const sorted = rows.sort((a, b) => new Date(b.date) - new Date(a.date));
    result[seller] = { latest: sorted[0] || null, prev: sorted[1] || null, all: sorted };
  });
  return result;
}

function buildVendorsSortedFromStats(statsMap) {
  const vendors = {};
  Object.entries(statsMap).forEach(([name, data]) => {
    const latest = data.latest;
    const p1 = latest?.p1_count || 0;
    const displayName = name === "Lisa Design" ? "BestMobilier" : name;
    if (!vendors[displayName]) {
      vendors[displayName] = { name: displayName, total: p1, p1, keywords: {}, sessionsCount: data.all?.length || 1, _rawNames: [name] };
    } else {
      vendors[displayName].total += p1;
      vendors[displayName].p1 += p1;
      vendors[displayName]._rawNames.push(name);
    }
  });
  return Object.values(vendors).sort((a, b) => b.total - a.total);
}

// Génère un SVG sparkline inline pour la courbe incrémentale Conforama
function renderConfoSparkline(sellerName) {
  const history = (STATE.confoSellerHistory || {})[sellerName];
  if (!history || history.length < 2) return '<div style="font-size:11px;color:var(--txT);padding:8px 0">Pas encore assez de données (min. 2 scrapes)</div>';

  const x0 = history[0].sales;
  const points = history.map(h => ({ date: h.date, inc: h.sales - x0 }));
  const maxInc = Math.max(...points.map(p => p.inc), 1);
  const W = 280, H = 60, PAD = 4;
  const n = points.length;

  const xs = points.map((_, i) => PAD + (i / (n - 1)) * (W - PAD * 2));
  const ys = points.map(p => H - PAD - ((p.inc / maxInc) * (H - PAD * 2)));

  const pathD = xs.map((x, i) => `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(' ');
  const fillD = `${pathD} L ${xs[n-1].toFixed(1)} ${(H-PAD).toFixed(1)} L ${PAD} ${(H-PAD).toFixed(1)} Z`;

  // Labels: première et dernière date
  const fmt = d => new Date(d).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
  const lastInc = points[points.length - 1].inc;

  return `
    <div class="sparkline-wrap">
      <div class="sparkline-title">Ventes incrémentales depuis 1er scrape (+${lastInc.toLocaleString("fr-FR")} au total)</div>
      <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="spk-grad-${sellerName.replace(/\s/g,'')}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--ac)" stop-opacity=".25"/>
            <stop offset="100%" stop-color="var(--ac)" stop-opacity=".02"/>
          </linearGradient>
        </defs>
        <path d="${fillD}" fill="url(#spk-grad-${sellerName.replace(/\s/g,'')})" />
        <path d="${pathD}" stroke="var(--ac)" stroke-width="1.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
        ${xs.map((x, i) => `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="2.5" fill="var(--ac)"/>`).join('')}
      </svg>
      <div class="sparkline-labels">
        <span>${fmt(points[0].date)}</span>
        ${n > 2 ? `<span style="color:var(--ac);font-weight:600">+${lastInc.toLocaleString("fr-FR")} ventes</span>` : ''}
        <span>${fmt(points[n-1].date)}</span>
      </div>
    </div>`;
}

function renderAnomalies() {
