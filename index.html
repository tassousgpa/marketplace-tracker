    }
    function blockBody(w) {
      return w.src==="odoo" ? renderCompletedBlock(w.label) : renderPsOnlyBlock(w.label);
    }
    out += "<div class='card' style='padding:14px;margin-top:14px'>"
      + blockHeader(first)
      + blockBody(first);
    const hist = rest.map(w => {
      const srcLabel = w.src==="ps" ? " <span style='font-weight:400;color:var(--txT)'>(PS)</span>" : "";
      return "<details style='margin-top:8px'>"
        +"<summary style='cursor:pointer;font-size:11px;color:var(--txS);font-weight:600;padding:4px 0'>Top 10 — "+w.label+srcLabel+"</summary>"
        +"<div style='margin-top:8px'>"+blockBody(w)+"</div>"
        +"</details>";
    }).join("");
    if (hist) out += "<div style='border-top:1px solid var(--borderL);margin-top:12px;padding-top:8px'>"+hist+"</div>";
    out += "</div>";
  }

  return out+"</div>";
}
  
function renderRevenueBlock() {
  const imports = (STATE.revenueImports || []);
  const entries = (STATE.revenueEntries || []).slice().sort((a,b) => a.week_start_date > b.week_start_date ? 1 : -1);
  const now = new Date();

  // Historique mensuel
  const monthlyHistory = STATE.monthlyHistory || [];
  const monthRevsHistory = {};
  monthlyHistory.forEach(h => {
    const key = h.year + "-" + String(h.month).padStart(2,"0");
    monthRevsHistory[key] = (monthRevsHistory[key]||0) + h.revenue;
  });

  const fmtCA = v => {
    if (v == null || isNaN(v) || v === 0) return "—";
    if (Math.abs(v) >= 1000000) return (v/1000000).toFixed(2).replace(".",",") + "M€";
    if (Math.abs(v) >= 1000) return (v/1000).toFixed(1).replace(".",",") + "k€";
    return Math.round(v) + "€";
  };
  const fmtMonthLabel = m => {
    const [y, mo] = m.split("-");
    const names = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    return names[parseInt(mo)-1] + " " + y;
  };

  const btnRow = `<div style="display:flex;gap:8px;flex-wrap:wrap">
    <button onclick="openRevenueModal()" style="padding:6px 14px;border:.5px solid var(--ac);border-radius:6px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Semaine manuelle</button>
    <button onclick="openImportXLSModal('week')" style="padding:6px 14px;border:.5px solid var(--am);border-radius:6px;font-size:12px;background:var(--amBg);color:var(--am);cursor:pointer;font-weight:600;font-family:inherit">⬆ Import Odoo Semaine</button>
    <button onclick="openImportXLSModal('ytd')" style="padding:6px 14px;border:.5px solid var(--pu);border-radius:6px;font-size:12px;background:var(--puBg);color:var(--pu);cursor:pointer;font-weight:600;font-family:inherit">⬆ Import YTD</button>
  </div>`;

  // ── Somme CA PS sur une semaine ──────────────────────────────────
  function getPsWeekCA(weekLabel) {
    const parsed = parseWeekLabel(weekLabel);
    if (!parsed) return 0;
    const startStr = isoWeekStartFromNum(parsed.year, parsed.week);
    const startD = new Date(startStr+"T00:00:00Z");
    const weekDates = new Set();
    for (let i = 0; i < 7; i++) {
      const d = new Date(startD); d.setUTCDate(startD.getUTCDate()+i);
      weekDates.add(d.toISOString().slice(0,10));
    }
    let total = 0;
    (STATE.psSalesDaily||[]).forEach(s => {
      if (weekDates.has(String(s.sale_date||"").slice(0,10))) total += (s.revenue_ht||0) + (s.shipping_ht||0);
    });
    return Math.round(total);
  }

  // ── CA semaine par ordre de priorité ────────────────────────────
  // 1. Import Odoo (year_type=N, ≤14j)  2. Saisie manuelle  3. PS daily  4. Hist XLS
  function getWeekCA(weekLabel) {
    const odoo = imports.find(i => i.period_label===weekLabel && i.year_type==="N" && (new Date(i.period_end)-new Date(i.period_start))/86400000<=14);
    if (odoo && odoo.revenue > 0) return odoo.revenue;
    const entry = entries.find(e => e.week_label===weekLabel);
    if (entry && entry.revenue > 0) return entry.revenue;
    const ps = getPsWeekCA(weekLabel);
    if (ps > 0) return ps;
    const hist = imports.find(i => i.period_label===weekLabel && i.year_type==="hist");
    if (hist && hist.revenue > 0) return hist.revenue;
    return 0;
  }

  // ── Dernière semaine terminée ────────────────────────────────────
  const dow = now.getUTCDay() || 7;
  const lastSunD = new Date(now);
  lastSunD.setUTCDate(now.getUTCDate() - (dow===7 ? 0 : dow));
  const lastWkInfo = isoWeekLabel(lastSunD.toISOString().slice(0,10));
  const lastWkParsed = lastWkInfo ? parseWeekLabel(lastWkInfo.label) : null;

  // ── KPI 1 : Dernière semaine ─────────────────────────────────────
  const caLast   = lastWkParsed ? getWeekCA(lastWkInfo.label) : 0;
  const n1WkLabel = lastWkParsed ? `S${lastWkParsed.week} ${lastWkParsed.year-1}` : null;
  const caLastN1  = n1WkLabel ? getWeekCA(n1WkLabel) : 0;
  const prevWk    = lastWkParsed ? (lastWkParsed.week > 1 ? {week:lastWkParsed.week-1,year:lastWkParsed.year} : {week:52,year:lastWkParsed.year-1}) : null;
  const prevWkLabel = prevWk ? `S${prevWk.week} ${prevWk.year}` : null;
  const caLastPrev  = prevWkLabel ? getWeekCA(prevWkLabel) : 0;

  // ── KPI 2 : 3 dernières semaines ────────────────────────────────
  const last3Labels=[], last3N1Labels=[], prev3Labels=[];
  if (lastWkParsed) {
    for (let i=0; i<3; i++) {
      const wk=lastWkParsed.week-i, yr=wk>0?lastWkParsed.year:lastWkParsed.year-1, w=wk>0?wk:wk+52;
      last3Labels.unshift(`S${w} ${yr}`);
      last3N1Labels.unshift(`S${w} ${yr-1}`);
    }
    for (let i=3; i<6; i++) {
      const wk=lastWkParsed.week-i, yr=wk>0?lastWkParsed.year:lastWkParsed.year-1, w=wk>0?wk:wk+52;
      prev3Labels.unshift(`S${w} ${yr}`);
    }
  }
  const caLast3    = last3Labels.reduce((s,l)=>s+getWeekCA(l), 0);
  const caLast3N1  = last3N1Labels.reduce((s,l)=>s+getWeekCA(l), 0);
  const caLast3Prv = prev3Labels.reduce((s,l)=>s+getWeekCA(l), 0);
  const last3Range = last3Labels.length ? `${last3Labels[0].split(' ')[0]}→${last3Labels[2].split(' ')[0]}` : "";
  const prev3Range = prev3Labels.length ? `${prev3Labels[0].split(' ')[0]}→${prev3Labels[2].split(' ')[0]}` : "";

  // ── KPI 3 : YTD ─────────────────────────────────────────────────
  const curYear   = lastWkParsed ? lastWkParsed.year : now.getUTCFullYear();
  const lastWkNum = lastWkParsed ? lastWkParsed.week : 0;
  // YTD N : utilise l'historique mensuel comme source de vérité pour les mois complets,
  // puis les données hebdo pour le mois en cours (évite la sous-estimation frais de livraison)
  let caYtdN = 0;
  { const _ytdSeenMo = new Set();
    for (let w = 1; w <= lastWkNum; w++) {
      const wStart = isoWeekStartFromNum(curYear, w);
      const wMo = wStart ? wStart.slice(0, 7) : null;
      if (wMo && monthRevsHistory[wMo]) {
        if (!_ytdSeenMo.has(wMo)) { caYtdN += monthRevsHistory[wMo]; _ytdSeenMo.add(wMo); }
        // mois déjà compté → on passe
      } else {
        caYtdN += getWeekCA(`S${w} ${curYear}`);
      }
    }
  }
  let caYtdN1=0, caYtdN2=0, caYtdN3=0;
  for (let w=1; w<=lastWkNum; w++) {
    caYtdN1 += getWeekCA(`S${w} ${curYear-1}`);
    caYtdN2 += getWeekCA(`S${w} ${curYear-2}`);
    caYtdN3 += getWeekCA(`S${w} ${curYear-3}`);
  }

  // ── KPI card multi-comparaisons ──────────────────────────────────
  const kpiCard = (title, n, comps, sublabel) => {
    const compHtml = comps.map(c => {
      if (!c.v || c.v===0) return "";
      const pct = n&&c.v>0 ? Math.round((n-c.v)/c.v*100) : null;
      const col = pct!=null ? (pct>=0?"var(--gn)":"var(--rd)") : "var(--txT)";
      return `<div style="font-size:11px;color:var(--txS);margin-top:3px">${c.lbl} : <b>${fmtCA(c.v)}</b>${pct!=null?` <span style="color:${col};font-weight:700">${pct>=0?"+":""}${pct}%</span>`:""}</div>`;
    }).join("");
    return `<div style="background:var(--bg);border-radius:10px;padding:14px 16px">
      <div style="font-size:11px;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">${title}</div>
      <div style="font-size:22px;font-weight:700;color:var(--ac);margin-bottom:4px">${n?fmtCA(n):"—"}</div>
      ${compHtml}
      <div style="font-size:10px;color:var(--txT);margin-top:5px;font-style:italic">${sublabel}</div>
    </div>`;
  };

  // ── Tableau mois (inchangé) ──────────────────────────────────────
  const weekImportsN = imports.filter(i=>(new Date(i.period_end)-new Date(i.period_start))/86400000<=14&&i.year_type==="N").sort((a,b)=>a.period_start>b.period_start?1:-1);
  const weekImportsN1 = imports.filter(i=>(new Date(i.period_end)-new Date(i.period_start))/86400000<=14&&i.year_type==="N-1");
  const allWeeks = [
    ...weekImportsN.map(i=>({label:i.period_label,rev:i.revenue,start:i.period_start,end:i.period_end,source:"import"})),
    ...entries.map(e=>({label:e.week_label,rev:e.revenue,start:e.week_start_date,end:e.week_start_date,source:"manual"}))
  ].sort((a,b)=>a.start>b.start?1:-1);
  const monthRevs = {};
  allWeeks.forEach(w => {
    const wStart=new Date(w.start), wEnd=w.end?new Date(w.end):new Date(w.start);
    const totalDays=Math.max(1,Math.round((wEnd-wStart)/86400000)+1);
    let d=new Date(wStart);
    while(d<=wEnd){const m=d.toISOString().slice(0,7);monthRevs[m]=(monthRevs[m]||0)+w.rev/totalDays;d.setDate(d.getDate()+1);}
  });
  Object.keys(monthRevs).forEach(m=>monthRevs[m]=Math.round(monthRevs[m]));
  const MONTH_NAMES = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
  const MONTH_NAMES_FULL = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  // Priorité : historique mensuel (source de vérité Odoo) > agrégation hebdo
  const mergedMonthRevs = Object.assign({}, monthRevs, monthRevsHistory);
  const allYears = [...new Set(Object.keys(mergedMonthRevs).map(m=>m.slice(0,4)))].sort();
  const _mCurYr = String(now.getUTCFullYear());
  const _mHistYrs = ["2022","2023","2024","2025"];
  const monthRows = MONTH_NAMES.map((mName,mi) => {
    const mNum=String(mi+1).padStart(2,"0");
    const cells=allYears.map(y=>{const key=y+"-"+mNum;const rev=mergedMonthRevs[key];return rev?'<td style="text-align:right;font-weight:600">'+fmtCA(rev)+'</td>':'<td style="text-align:right;color:var(--txT)">—</td>';}).join("");
    const fullMo=MONTH_NAMES_FULL[mi];
    const v2026=mergedMonthRevs[_mCurYr+"-"+mNum]||null;
    const mHistVals=_mHistYrs.map(y=>({year:y,val:mergedMonthRevs[y+"-"+mNum]||null,curLabel:fullMo+' '+_mCurYr,histLabel:fullMo+' '+y}));
    const trendCell='<td style="text-align:center">'+trendDots(v2026,mHistVals)+'</td>';
    return '<tr class="'+(mi%2?"stripe":"")+'"><td style="font-weight:500;white-space:nowrap">'+mName+'</td>'+cells+trendCell+'</tr>';
  }).join("");
  const totalRow = '<tr style="border-top:2px solid var(--border);font-weight:700"><td>Total</td>'
    +allYears.map(y=>{const total=Object.entries(mergedMonthRevs).filter(([k])=>k.startsWith(y)).reduce((s,[,v])=>s+v,0);return'<td style="text-align:right">'+fmtCA(total)+'</td>';}).join("")
    +'<td></td></tr>';

  // ── Tableau pivot hebdomadaire S1-S52 × années ───────────────────
  const curYearNum = now.getUTCFullYear();
  const histYears = new Set([curYearNum-3, curYearNum-2, curYearNum-1, curYearNum]);
  imports.forEach(i=>{if(i.year_type==="hist"||i.year_type==="N"){const p=parseWeekLabel(i.period_label);if(p)histYears.add(p.year);}});
  entries.forEach(e=>{const p=parseWeekLabel(e.week_label);if(p)histYears.add(p.year);});
  if(lastWkParsed) histYears.add(lastWkParsed.year);
  (STATE.psSalesDaily||[]).forEach(s=>{const p=isoWeekLabel(String(s.sale_date||"").slice(0,10));if(p){const yr=parseWeekLabel(p.label)?.year;if(yr)histYears.add(yr);}});
  const pivotYears = [...histYears].sort();
  const _pivotHistYrs = [2023, 2024, 2025];
  const pivotRows = Array.from({length:52},(_,i)=>{
    const wk=`S${i+1}`;
    const cells=pivotYears.map(y=>{
      const label=`${wk} ${y}`;
      const ca=getWeekCA(label);
      const isCur=y===lastWkParsed?.year;
      const isFuture=isCur&&i+1>lastWkParsed.week;
      if(isFuture||!ca) return '<td style="text-align:right;color:var(--txT)">—</td>';
      const isLast=isCur&&i+1===lastWkParsed.week;
      return`<td style="text-align:right;font-weight:${isLast?700:600};color:${isLast?'var(--ac)':'var(--tx)'}">${fmtCA(ca)}</td>`;
    }).join("");
    const ca2026=getWeekCA(`${wk} ${curYearNum}`)||null;
    const pivotHistVals=_pivotHistYrs.map(y=>({year:y,val:getWeekCA(`${wk} ${y}`)||null,curLabel:`${wk} ${curYearNum}`,histLabel:`${wk} ${y}`}));
    const isCurWk=lastWkParsed&&i+1===lastWkParsed.week;
    const isFutureWk=lastWkParsed&&i+1>lastWkParsed.week;
    const trendCell=isFutureWk?'<td></td>':'<td style="text-align:center">'+trendDots(ca2026,pivotHistVals)+'</td>';
    const isLast=lastWkParsed&&i+1===lastWkParsed.week;
    return`<tr style="${isLast?'background:var(--acBg)':i%2?'background:var(--bg)':''};border-bottom:1px solid var(--borderL)"><td style="font-weight:${isLast?700:500};white-space:nowrap;color:${isLast?'var(--ac)':'var(--tx)'}">${wk}</td>${cells}${trendCell}</tr>`;
  }).join("");
  const pivotTotalRow='<tr style="border-top:2px solid var(--border);font-weight:700"><td>Total</td>'
    +pivotYears.map(y=>{let t=0;for(let w=1;w<=52;w++)t+=getWeekCA(`S${w} ${y}`);return`<td style="text-align:right">${fmtCA(t)}</td>`;}).join("")
    +'<td></td></tr>';

  // ── Tableau gestion imports Odoo / saisies ───────────────────────
  const manageRows = allWeeks.slice().reverse().map((w,i)=>{
    const n1=weekImportsN1.find(x=>x.period_label===w.label);
    const n1Rev=n1?.revenue||null;
    const pct=(n1Rev&&n1Rev>0)?Math.round((w.rev-n1Rev)/n1Rev*100):null;
    const pctHtml=pct!=null?`<span style="font-weight:600;color:${pct>=0?"var(--gn)":"var(--rd)"}">${pct>=0?"+":""}${pct}%</span>`:"—";
    const delBtn=w.source==="manual"
      ?`<button onclick="deleteRevenue('${esc(w.label)}')" style="padding:2px 8px;border-radius:5px;border:.5px solid var(--rd);background:var(--rdBg);color:var(--rd);font-size:11px;cursor:pointer;font-family:inherit">Suppr.</button>`
      :`<button onclick="deleteImportWeek('${esc(w.label)}')" style="padding:2px 8px;border-radius:5px;border:.5px solid var(--rd);background:var(--rdBg);color:var(--rd);font-size:11px;cursor:pointer;font-family:inherit">Suppr.</button>`;
    return`<tr class="${i%2?"stripe":""}"><td style="font-weight:500">${esc(w.label)}</td><td style="color:var(--txS)">${w.start||""}</td><td style="text-align:right;font-weight:600">${fmtCA(w.rev)}</td><td style="text-align:right;color:var(--txS)">${n1Rev!=null?fmtCA(n1Rev):"—"}</td><td style="text-align:center">${pctHtml}</td><td style="text-align:center">${delBtn}</td></tr>`;
  }).join("");

  const hasAnyData = imports.length>0||entries.length>0||(STATE.psSalesDaily||[]).length>0;
  if (!hasAnyData) {
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px"><div class="card-title" style="margin:0">Chiffre d'affaires</div>${btnRow}</div><div style="padding:30px;text-align:center;color:var(--txT);font-size:13px">Aucune donnée CA. Importez un fichier XLS ou saisissez une semaine manuellement.</div></div>`;
  }

  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Chiffre d'affaires</div>
      ${btnRow}
    </div>

    <!-- 3 KPIs -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      ${kpiCard(`Dernière semaine${lastWkInfo ? ` — ${lastWkInfo.label}` : ""}`, caLast, [
        {lbl:`vs ${n1WkLabel||"N-1"}`, v:caLastN1},
        {lbl:`vs ${prevWkLabel||"sem. préc."}`, v:caLastPrev}
      ], "")}
      ${kpiCard(`3 dernières semaines${last3Range ? ` — ${last3Range}` : ""}`, caLast3, [
        {lbl:`vs ${last3Range||"…"} ${curYear-1}`, v:caLast3N1},
        {lbl:`vs ${prev3Range||"…"} ${curYear}`, v:caLast3Prv}
      ], "")}
      ${kpiCard(`YTD — S1→S${lastWkNum} ${curYear}`, caYtdN, [
        {lbl:`vs ${curYear-1}`, v:caYtdN1},
        {lbl:`vs ${curYear-2}`, v:caYtdN2},
        {lbl:`vs ${curYear-3}`, v:caYtdN3}
      ], "")}
    </div>

    <!-- Tableau hebdomadaire pivot -->
    ${pivotYears.length ? '<div style="border-top:1px solid var(--borderL);padding-top:10px;margin-bottom:8px">'
    +'<details style="font-size:12px">'
    +'<summary style="cursor:pointer;color:var(--txS);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Ventes par semaine</summary>'
    +'<div class="scroll-table"><table style="min-width:320px;border-collapse:collapse">'
    +'<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">'
    +'<th style="white-space:nowrap">Semaine</th>'
    +pivotYears.map(y=>`<th style="text-align:right">${y}</th>`).join("")
    +'<th style="text-align:center;white-space:nowrap;color:var(--txS)">Tendance 2026 vs Hist.</th>'
    +'</tr></thead><tbody>'+pivotRows+pivotTotalRow+'</tbody></table></div>'
    +'</details></div>' : ""}

    <!-- Détail par mois -->
    ${monthRows ? '<div style="border-top:1px solid var(--borderL);padding-top:10px;margin-bottom:8px">'
    +'<details style="font-size:12px">'
    +'<summary style="cursor:pointer;color:var(--txS);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Détail par mois</summary>'
    +'<div class="scroll-table"><table style="min-width:400px;border-collapse:collapse">'
    +'<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)"><th>Mois</th>'
    +allYears.map(y=>'<th style="text-align:right">'+y+'</th>').join("")
    +'<th style="text-align:center;white-space:nowrap;color:var(--txS)">Tendance 2026 vs Hist.</th>'
    +'</tr></thead><tbody>'+monthRows+totalRow+'</tbody></table></div>'
    +'</details></div>' : ""}

    <!-- Gestion imports Odoo / saisies manuelles -->
    ${allWeeks.length ? '<div style="border-top:1px solid var(--borderL);padding-top:10px">'
    +'<details style="font-size:12px">'
    +`<summary style="cursor:pointer;color:var(--txS);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Imports Odoo / saisies manuelles (${allWeeks.length})</summary>`
    +'<div class="scroll-table"><table style="min-width:400px">'
    +'<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)"><th>Semaine</th><th>Début</th><th style="text-align:right">CA N</th><th style="text-align:right">CA N-1</th><th style="text-align:center">Évol.</th><th style="text-align:center">Actions</th></tr></thead>'
    +'<tbody>'+manageRows+'</tbody></table></div>'
    +'</details></div>' : ""}
  </div>`;
}
function openRevenueModal() {
  // Générer un label semaine automatique
  const now = new Date();
  const yr = now.getFullYear();
  const start = new Date(yr, 0, 1);
  const weekNum = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  const defaultLabel = `S${weekNum}`;
  const defaultDate = now.toISOString().slice(0,10);

  openModal("Ajouter une semaine de CA", `
    <div style="display:grid;gap:12px">
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Label semaine *</label>
        <input id="rev-label" value="${defaultLabel}" placeholder="ex: S15" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Date de début de semaine *</label>
        <input id="rev-date" type="date" value="${defaultDate}" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">CA (€) *</label>
        <input id="rev-amount" type="number" placeholder="ex: 12500" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <button onclick="saveRevenue()" style="padding:10px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Enregistrer</button>
      <div id="rev-status" style="font-size:12px;text-align:center"></div>
    </div>`);
}

async function saveRevenue() {
  const label = document.getElementById("rev-label")?.value?.trim();
  const date  = document.getElementById("rev-date")?.value?.trim();
  const amt   = parseFloat(document.getElementById("rev-amount")?.value);
  const statusEl = document.getElementById("rev-status");
  if (!label || !date || isNaN(amt) || amt <= 0) { statusEl.innerHTML='<span style="color:var(--rd)">Tous les champs sont obligatoires.</span>'; return; }
  statusEl.innerHTML = '<span style="color:var(--txS)">Enregistrement...</span>';
  try {
    await sbInsert("revenue_entries", { marketplace: MARKETPLACE, week_label: label, week_start_date: date, revenue: amt });
    statusEl.innerHTML = '<span style="color:var(--gn)">✓ Semaine ajoutée !</span>';
    setTimeout(() => { closeModal(); loadData(); }, 800);
  } catch(e) { statusEl.innerHTML = `<span style="color:var(--rd)">Erreur : ${e.message}</span>`; }
}

async function deleteImportWeek(label) {
  if (!confirm(`Supprimer la semaine "${label}" ?`)) return;
  try {
    await sbDelete("revenue_imports", `marketplace=eq.${MARKETPLACE}&period_label=eq.${encodeURIComponent(label)}`);
    await loadData();
  } catch(e) { alert("Erreur : " + e.message); }
}

async function deleteRevenue(label) {
  if (!confirm(`Supprimer la semaine "${label}" ?`)) return;
  try {
    await sbDelete("revenue_entries", `marketplace=eq.${MARKETPLACE}&week_label=eq.${encodeURIComponent(label)}`);
    await loadData();
  } catch(e) { alert("Erreur : " + e.message); }
}

  const si=col=>f.sort===col?(f.dir==="asc"?" ↑":" ↓"):"";
  // Semaine de référence pour la colonne Ventes-SXX : semaine précédente ISO

  const _prevWkInfo = isoWeekLabel((() => {

  const _prevWkLabel = _prevWkInfo?.label || "";

function showProduitsKpiHistory() {
  const prods = STATE.products;
  const dates = STATE.dates;
  if (!dates.length) { openModal("Historique KPI Produits", '<div style="padding:20px;text-align:center;color:var(--txT)">Aucune donnée historique disponible.</div>'); return; }

  const fmtDate = d => { try { return new Date(d+"T12:00:00Z").toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"}); } catch(e){ return d; } };

  const rows = dates.slice().reverse().map((date, i) => {
    let nbDispo=0, nbIndispo=0, nbSansLien=0, nbSansLienValide=0, nbSansData=0;
    prods.forEach(p => {
      const key = (p.product_id_scraper||"").toLowerCase();
      const snap = (STATE.history[key]||{})[date];
      const hasValidUrl = p.url && p.url.startsWith("http");
      const available = snap?.available ?? null;
      const price = snap?.price ?? null;
      if (available === true) nbDispo++;
      else if (available === false) nbIndispo++;
      else nbSansData++;
      if (!hasValidUrl) nbSansLien++;
      if (!hasValidUrl || (hasValidUrl && price==null && available!==false)) nbSansLienValide++;
    });
    const total = prods.length;
    const pctIndispo = total>0?Math.round(nbIndispo/total*100):0;
    const pctSansLienValide = total>0?Math.round(nbSansLienValide/total*100):0;
    const pctDispo = total>0?Math.round(nbDispo/total*100):0;
    const isLatest = i===0;
    const bg = isLatest?"background:var(--acBg)":(i%2===1?"background:var(--bg)":"");
    return '<tr style="'+bg+';border-bottom:1px solid var(--borderL)">'
      + '<td style="padding:7px 12px;font-size:11px;white-space:nowrap;font-weight:'+(isLatest?"700":"400")+'">' + fmtDate(date) + (isLatest?' <span style="font-size:10px;color:var(--ac);font-weight:600">(dernier)</span>':'')+  '</td>'
      + '<td style="padding:7px 12px;text-align:center;font-weight:700;color:var(--gn)">' + pctDispo + '%</td>'
      + '<td style="padding:7px 12px;text-align:center;color:var(--txS)">' + nbDispo + '</td>'
      + '<td style="padding:7px 12px;text-align:center;font-weight:700;color:'+(pctIndispo>10?"var(--rd)":"var(--txS)")+'">' + pctIndispo + '%</td>'
      + '<td style="padding:7px 12px;text-align:center;color:var(--txS)">' + nbIndispo + '</td>'
      + '<td style="padding:7px 12px;text-align:center;font-weight:700;color:'+(pctSansLienValide>10?"var(--am)":"var(--txS)")+'">' + pctSansLienValide + '%</td>'
      + '<td style="padding:7px 12px;text-align:center;color:var(--txS)">' + nbSansLienValide + '</td>'
      + '<td style="padding:7px 12px;text-align:center;color:var(--txT);font-size:11px">' + nbSansData + '</td>'
      + '</tr>';
  }).join("");

  const html = '<div style="font-size:11px;color:var(--txS);margin-bottom:10px">'
    + dates.length + ' dates de scraping · ' + prods.length + ' produits suivis'
    + '</div>'
    + '<div style="overflow-x:auto">'
    + '<table style="width:100%;border-collapse:collapse;font-size:12px">'
    + '<thead><tr style="background:var(--bg);border-bottom:2px solid var(--border)">'
    + '<th style="padding:7px 12px;text-align:left;color:var(--txS)">Date scraping</th>'
    + '<th style="padding:7px 12px;text-align:center;color:var(--gn)">% Dispo</th>'
    + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Nb dispo</th>'
    + '<th style="padding:7px 12px;text-align:center;color:var(--rd)">% Indispo</th>'
    + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Nb indispo</th>'
    + '<th style="padding:7px 12px;text-align:center;color:var(--am)">% Sans URL renseigné</th>'
    + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Nb sans URL</th>'
    + '<th style="padding:7px 12px;text-align:center;color:var(--txT)">Sans données</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div>';
  openModal("Historique KPI Produits — " + MARKETPLACES.find(m=>m.id===MARKETPLACE)?.label, html);
}

function exportCSV() {
  const sessions = STATE.dates.slice(-exportSessions);
  const fmtSession = sess => {
    const dt = new Date(sess + "T12:00:00Z");
    return dt.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "2-digit" });
  };
  const sessionHeaders = sessions.flatMap(s => [`Dispo ${fmtSession(s)}`,`Prix ${fmtSession(s)}`,`Note ${fmtSession(s)}`,`Délai ${fmtSession(s)}`]);
  const headers = ["Produit", "ID produit", "SKU", "SKU Marketplace", "Lien", ...sessionHeaders];
  const rows = STATE.products.map(p => {
    const key = (p.product_id_scraper || "").toLowerCase();
    const h = STATE.history[key] || {};
    const sessionCells = sessions.flatMap(sess => {
      const snap = h[sess];
      return [snap?.available!=null?(snap.available?"Dispo":"Indispo"):"",snap?.price!=null?snap.price:"",snap?.rating!=null?snap.rating:"",snap?.delivery_days!=null?snap.delivery_days:""];
    });
    return [p.name, p.product_id, p.sku||"", p.sku_marketplace||"", p.url||"", ...sessionCells];
  });
  const csvCell = v => { const s=String(v??""); return s.includes(";")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:`${s}`; };
  const csv = [headers, ...rows].map(row => row.map(csvCell).join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const today = new Date().toLocaleDateString("fr-FR").replace(/\//g, "-");
  a.download = `produits_${MARKETPLACE}_${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

let histMetric="price";
function renderHistorique() {
  const dates=STATE.dates.slice(-5);
  const prods=STATE.products.filter(p=>Object.keys(p._history).length>0);
  const getVal=(p,d)=>{const e=p._history[d];if(!e)return null;if(histMetric==="price")return e.price;if(histMetric==="rating")return e.rating;if(histMetric==="delivery")return e.delivery_days;if(histMetric==="dispo")return e.available;return null;};
  const fmtVal=v=>{if(v==null)return"—";if(histMetric==="price")return Math.round(v)+"€";if(histMetric==="rating")return v;if(histMetric==="delivery")return v+"j";if(histMetric==="dispo")return v?"✓":"✗";return v;};
  const hasVar=(p,d,di)=>{if(di===0)return null;const prev=getVal(p,dates[di-1]),curr=getVal(p,d);if(prev==null||curr==null)return null;if(histMetric==="price"&&prev>0){const pct=(curr-prev)/prev;if(pct>.10)return"up";if(pct<-.15)return"down";}if(histMetric==="delivery"){const diff=curr-prev;if(diff>5)return"up";if(diff<-5)return"down";}if(histMetric==="rating"){const diff=curr-prev;if(diff>=.2)return"good";if(diff<=-.2)return"bad";}if(histMetric==="dispo"&&prev!==curr)return curr?"good":"bad";return null;};
  const varBg=v=>({up:"var(--rdBg)",down:"var(--gnBg)",good:"var(--gnBg)",bad:"var(--rdBg)"}[v]||"");
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="toggle-group">${["price","rating","delivery","dispo"].map(m=>`<button class="toggle-btn ${histMetric===m?'active':''}" onclick="histMetric='${m}';renderContent()">${{price:"Prix",rating:"Note",delivery:"Délai",dispo:"Dispo"}[m]}</button>`).join("")}</div>
      <div style="display:flex;gap:8px;align-items:center">
        ${histMetric==="delivery"?`<button onclick="exportDeliveryCSV()" style="padding:6px 14px;border:.5px solid var(--ac);border-radius:6px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">⬇ Export délais (tout l'historique)</button>`:''}
      </div>
    </div>
    <div style="font-size:12px;color:var(--txS);margin-bottom:8px">${prods.length} produits · ${dates.length} dates affichées · <span style="color:var(--txT)">${STATE.dates.length} total en base</span></div>
    <div class="card" style="padding:0;overflow:hidden"><div class="scroll-table"><table style="min-width:700px">
      <thead><tr style="border-bottom:1px solid var(--border);background:var(--bg)"><th style="min-width:200px">Produit</th><th>Réfs</th>${dates.map(d=>{const dt=new Date(d+"T12:00:00Z");return`<th style="text-align:center;white-space:nowrap">${dt.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})}</th>`;}).join("")}</tr></thead>
      <tbody>${prods.map((p,i)=>`<tr class="${i%2?'stripe':''}"><td style="font-weight:500;font-size:12px;max-width:200px">${esc(p.name)}</td><td style="font-size:10px;color:var(--txT);white-space:nowrap">${esc(p.product_id)}<br>${esc(p.sku)}</td>${dates.map((d,di)=>{const v=getVal(p,d),vr=hasVar(p,d,di);return`<td style="text-align:center;${vr?`background:${varBg(vr)};font-weight:600`:''}">${fmtVal(v)}</td>`;}).join("")}</tr>`).join("")}</tbody>
    </table></div></div>`;
}

// Export délais : toutes les refs, tout l'historique, une colonne par date
function exportDeliveryCSV() {
  const allDates = STATE.dates; // toutes les dates dispo en base (triées ASC)
  const prods = STATE.products.filter(p => Object.keys(p._history).length > 0);
  if (!allDates.length || !prods.length) { alert("Aucune donnée à exporter."); return; }

  const fmtDate = d => {
    const dt = new Date(d + "T12:00:00Z");
    return dt.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "2-digit" });
  };

  // En-têtes : ID produit | Nom | SKU | une colonne par date
  const headers = ["ID produit", "Nom", "SKU", ...allDates.map(fmtDate)];

  const rows = prods.map(p => {
    const key = (p.product_id_scraper || "").toLowerCase();
    const h = STATE.history[key] || {};
    const delayCols = allDates.map(d => {
      const snap = h[d];
      return snap?.delivery_days != null ? snap.delivery_days : "";
    });
    return [p.product_id, p.name, p.sku || "", ...delayCols];
  });

  const csvCell = v => { const s = String(v ?? ""); return s.includes(";") || s.includes('"') || s.includes("\n") ? `"${s.replace(/"/g,'""')}"` : s; };
  const csv = [headers, ...rows].map(row => row.map(csvCell).join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.download = `historique_delais_${MARKETPLACE}_${today}.csv`;
  a.click();

}

function expUpdateNumFilter(field) {

async function getMpExportData(mpId) {
  if (mpId === MARKETPLACE) {
    return { products: STATE.products, history: STATE.history, dates: STATE.dates,
             productsInPage1: STATE.productsInPage1,
             activeOps: STATE.activeOps||[], activeOpProducts: STATE.activeOpProducts||[] };
  }
  const [products, snapshots, activeOps, activeOpProducts] = await Promise.all([
    sb("products", "marketplace=eq."+mpId+"&active=eq.true&select=*&order=product_id"),
    sb("product_snapshots", "marketplace=eq."+mpId+"&select=*&order=date.desc&limit=10000"),
    sb("commercial_operations", "marketplace=eq."+mpId+"&select=*").catch(()=>[]),
    sb("operation_products", "marketplace=eq."+mpId+"&select=ref,operation_id").catch(()=>[]),
  ]);
  function dayKey(ts) { return new Date(ts).toISOString().slice(0,10); }
  const daySet = new Set();
  snapshots.forEach(s => { if (s.date) daySet.add(dayKey(s.date)); });
  const dates = [...daySet].sort();
  const history = {};
  snapshots.forEach(s => {
    const key = (s.product_id||"").toLowerCase();
    if (!history[key]) history[key] = {};
    const dk = dayKey(s.date);
    if (dk && (!history[key][dk] || s.id > history[key][dk].id)) history[key][dk] = s;
  });
  const latestDate = dates[dates.length-1]||"";
  const prevDate = dates.length >= 2 ? dates[dates.length-2] : "";
  products.forEach(p => {
    const key = (p.product_id_scraper||"").toLowerCase();
    const h = history[key]||{};
    const latest = h[latestDate], prev = h[prevDate];
    p._latest = latest||null; p._history = h;
    p._price = latest?.price??null; p._available = latest?.available??null;
    p._rating = latest?.rating??null; p._delivery = latest?.delivery_days??null;
    p._tags = [];
    if (latest && prev) {
      if (latest.price!=null&&prev.price!=null&&prev.price>0){const pct=(latest.price-prev.price)/prev.price;if(pct>.10)p._tags.push("prix_up");else if(pct<-.15)p._tags.push("prix_down");}
      if (latest.delivery_days!=null&&prev.delivery_days!=null){const d=latest.delivery_days-prev.delivery_days;if(d>5)p._tags.push("delai_up");else if(d<-5)p._tags.push("delai_down");}
      if (latest.rating!=null&&prev.rating!=null){const d=latest.rating-prev.rating;if(d>=.2)p._tags.push("note_up");else if(d<=-.2)p._tags.push("note_down");}
    }
  });
  return { products, history, dates, productsInPage1: new Set(), activeOps, activeOpProducts };
}

function buildExportSheetData(mpData, baseCols, metrics, sessionsCount, filters) {
  const { products, history, dates, productsInPage1, activeOps, activeOpProducts } = mpData;
  const sessions = dates.slice(-sessionsCount);
  const fmtD = d => { const dt = new Date(d+"T12:00:00Z"); return dt.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"}); };
  const now = new Date();
  const activeOpIds = new Set((activeOps||[]).filter(op=>new Date(op.date_debut)<=now&&new Date(op.date_fin)>=now).map(op=>op.id));
  const dealMap = {};
  (activeOpProducts||[]).forEach(r => { if (activeOpIds.has(r.operation_id)) dealMap[r.ref] = true; });
  const hasDeal = sku => sku && !!dealMap[sku];
  const colLabels = {name:'Produit',product_id:'ID produit',sku:'SKU',sku_marketplace:'SKU Marketplace',type:'Type',canal:'Canal',url:'Lien'};
  const metricLabels = {dispo:'Dispo',prix:'Prix',note:'Note',delai:'Délai'};
  const headers = [
    ...baseCols.map(c=>colLabels[c]),
    ...sessions.flatMap(s=>metrics.map(m=>metricLabels[m]+' '+fmtD(s)))
  ];
  let list = [...products];
  if (filters.avail==='dispo') list = list.filter(p=>p._available===true);
  else if (filters.avail==='indispo') list = list.filter(p=>p._available!==true);
  if (filters.noteOp!=='none' && !isNaN(filters.noteV1)) {
    list = list.filter(p => {
      if (p._rating==null) return false;
      if (filters.noteOp==='eq') return Math.abs(p._rating-filters.noteV1)<0.001;
      if (filters.noteOp==='gt') return p._rating>filters.noteV1;
      if (filters.noteOp==='lt') return p._rating<filters.noteV1;
      if (filters.noteOp==='between') return !isNaN(filters.noteV2)&&p._rating>=filters.noteV1&&p._rating<=filters.noteV2;
      return true;
    });
  }
  if (filters.delaiOp!=='none' && !isNaN(filters.delaiV1)) {
    list = list.filter(p => {
      if (p._delivery==null) return false;
      if (filters.delaiOp==='eq') return p._delivery===filters.delaiV1;
      if (filters.delaiOp==='gt') return p._delivery>filters.delaiV1;
      if (filters.delaiOp==='lt') return p._delivery<filters.delaiV1;
      if (filters.delaiOp==='between') return !isNaN(filters.delaiV2)&&p._delivery>=filters.delaiV1&&p._delivery<=filters.delaiV2;
      return true;
    });
  }
  if (filters.selectedVars.length>0) list = list.filter(p=>filters.selectedVars.some(v=>(p._tags||[]).includes(v)));
  if (filters.dealOnly) list = list.filter(p=>hasDeal(p.sku));
  if (filters.page1Only) list = list.filter(p=>productsInPage1.has((p.product_id_scraper||"").toLowerCase()));
  const rows = list.map(p => {
    const key = (p.product_id_scraper||"").toLowerCase();
    const h = history[key]||{};
    const baseVals = baseCols.map(c => {
      if(c==='name') return p.name||""; if(c==='product_id') return p.product_id||"";
      if(c==='sku') return p.sku||""; if(c==='sku_marketplace') return p.sku_marketplace||"";
      if(c==='type') return p.type||""; if(c==='canal') return p.canal_attribue||"";
      if(c==='url') return p.url||""; return "";
    });
    const metricVals = sessions.flatMap(sess => {
      const snap = h[sess];
      return metrics.map(m => {
        if(m==='dispo') return snap?.available!=null?(snap.available?"Dispo":"Indispo"):"";
        if(m==='prix') return snap?.price!=null?snap.price:"";
        if(m==='note') return snap?.rating!=null?snap.rating:"";
        if(m==='delai') return snap?.delivery_days!=null?snap.delivery_days:"";
        return "";
      });
    });
    return [...baseVals, ...metricVals];
  });
  return { headers, rows };
}

async function runExport() {
  const sessionsCount = 1;
  const baseCols = ['name','product_id','sku','sku_marketplace','type','canal','url'].filter(id=>document.getElementById('exp-col-'+id)?.checked);
  const metrics = ['dispo','prix','note','delai'].filter(id=>document.getElementById('exp-metric-'+id)?.checked);
  const selectedMps = MARKETPLACES.filter(mp=>document.getElementById('exp-mp-'+mp.id)?.checked);
  if (!selectedMps.length) { alert("Sélectionnez au moins une marketplace."); return; }
  if (!baseCols.length && !metrics.length) { alert("Sélectionnez au moins une colonne."); return; }
  const noteOp = (document.getElementById('exp-note-op')||{}).value||'none';
  const noteV1 = parseFloat((document.getElementById('exp-note-v1')||{}).value);
  const noteV2 = parseFloat((document.getElementById('exp-note-v2')||{}).value);
  const delaiOp = (document.getElementById('exp-delai-op')||{}).value||'none';
  const delaiV1 = parseFloat((document.getElementById('exp-delai-v1')||{}).value);
  const delaiV2 = parseFloat((document.getElementById('exp-delai-v2')||{}).value);
  const selectedVars = ['prix_up','prix_down','delai_up','delai_down','note_up','note_down'].filter(id=>document.getElementById('exp-var-'+id)?.checked);
  const filters = {
    avail: (document.getElementById('exp-avail')||{}).value||'all',
    noteOp, noteV1, noteV2, delaiOp, delaiV1, delaiV2, selectedVars,
    dealOnly: !!document.getElementById('exp-deal-only')?.checked,
    page1Only: !!document.getElementById('exp-page1-only')?.checked,
  };
  const btn = document.getElementById('exp-run-btn');
  if (btn) { btn.textContent = "Génération..."; btn.disabled = true; }
  const scrapingDateStr = STATE.latestDate
    ? new Date(STATE.latestDate+"T12:00:00Z").toLocaleDateString("fr-FR").replace(/\//g,"-")
    : new Date().toLocaleDateString("fr-FR").replace(/\//g,"-");
  try {
    if (selectedMps.length === 1) {
      const mpData = await getMpExportData(selectedMps[0].id);
      const { headers, rows } = buildExportSheetData(mpData, baseCols, metrics, sessionsCount, filters);
      const csvCell = v => { const s=String(v??""); return s.includes(";")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s; };
      const csv = [headers,...rows].map(row=>row.map(csvCell).join(";")).join("\n");
      const blob = new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download="produits_"+selectedMps[0].id+"_"+scrapingDateStr+".csv"; a.click();
      URL.revokeObjectURL(url);
    } else {
      const wb = XLSX.utils.book_new();
      for (const mp of selectedMps) {
        const mpData = await getMpExportData(mp.id);
        const { headers, rows } = buildExportSheetData(mpData, baseCols, metrics, sessionsCount, filters);
        const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
        XLSX.utils.book_append_sheet(wb, ws, mp.label.substring(0,31));
      }
      XLSX.writeFile(wb, "produits_export_"+scrapingDateStr+".xlsx");
    }
    closeModal();
  } catch(e) {
    alert("Erreur lors de l'export : "+e.message);
    if (btn) { btn.textContent = "⬇ Générer l'export"; btn.disabled = false; }
  }
}

}
  function renderMarketplaceDominance() {
  const MP_SELF_SELLERS = {

    if (!countsBySellerCats[s]) countsBySellerCats[s] = new Set();
    countsBySellerCats[s].add(normalizeKeyword(p.keyword));
  });
  const top3Total = Object.entries(countsBySellerTotal).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const top3Cats  = Object.entries(countsBySellerCats).sort((a,b)=>b[1].size-a[1].size).slice(0,3);
  const medals = ["🥇","🥈","🥉"];
  const colors  = ["#c9a227","#9e9e9e","#a0522d"];
  function podiumCard(entries, valueGetter, sublabel) {
    return entries.map(([seller, val], i) => {
      const isBM = ["bestmobilier","best mobilier","lisa design"].includes(seller.toLowerCase());
      const bg     = isBM ? "var(--acBg)" : "var(--bg)";

  return `

          <span style="font-size:12px;color:var(--txS)">Produits catalogue (en propre mkp)</span>
          <span style="font-size:13px;font-weight:700;color:${pctColor}">${pct}%</span>
        </div>
        <div style="height:10px;background:var(--borderL);border-radius:5px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${pctColor};border-radius:5px"></div>
        </div>
        <div style="font-size:11px;color:var(--txT);margin-top:4px">${selfCount} produits catalogue sur ${total} en page 1</div>
      </div>
      <div style="text-align:center;min-width:80px">
        <div style="font-size:32px;font-weight:800;color:${pctColor}">${pct}%</div>
        <div style="font-size:10px;color:var(--txT)">dominance</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Top 3 — apparitions P1</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${top3Total.length ? podiumCard(top3Total, v=>v, "apparitions P1") : '<span style="color:var(--txT);font-size:12px">Aucune donnée</span>'}
        </div>

        <div style="font-size:12px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Top 3 — catégories couvertes</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">

}
// Helper global : résoudre un produit tracké depuis un product_id (avec/sans query params)
function lookupTrackedProduct(pid) {
  if (!pid) return null;
  var k = (pid||"").toLowerCase();
  var tbs = STATE.trackedByScraperId || {};
  var r = tbs[k] || tbs[stripUrlParams(k)];
  if (r) return r;
  // Fallback M-ref pour MdM (ex: ...diane-M26041258.htm?offer=... → M26041258)
  var mRef = function(url) { var m = String(url||"").match(/-(M\d+)\.htm/i); return m ? m[1].toLowerCase() : null; }(k);
  return mRef ? (tbs[mRef] || null) : null;
}
// Helper global : un product_id/seller appartient-il à BM ?
function isHistBMProduct(pid, seller) {
  var BM_S = new Set(["BestMobilier", "Best Mobilier", "Lisa Design"]);
  if (seller && BM_S.has(seller)) return true;
  return !!lookupTrackedProduct(pid);
}

function showPositionHistoryDay(date) {
  var kw = window._posHistKw || "";
  var allRows = window._posHistRows || [];

  // Dédupliquer par product_id (stripped) pour ce jour
  var byPid = {};
  for (var ri = 0; ri < allRows.length; ri++) {
    var r = allRows[ri];
    if (!r.date || r.date.slice(0, 10) !== date) continue;
    var pid = stripUrlParams(r.product_id || "");
    if (!pid) continue;
    if (!byPid[pid]) byPid[pid] = { product_id: pid, seller: r.seller, is_sponsored: false, isBM: isHistBMProduct(pid, r.seller) };
    if (r.is_sponsored === true) byPid[pid].is_sponsored = true;
  }
  // Trier : BM d'abord, puis autres
  var rows = Object.values(byPid).sort(function(a, b) { return (b.isBM ? 1 : 0) - (a.isBM ? 1 : 0); });

  // URL depuis positions actuelles (fallback)
  var urlByPid = {};
  (STATE.positions || []).forEach(function(p) {
    if (p.product_id && p.url) urlByPid[stripUrlParams(p.product_id)] = p.url;
  });

  var dt = new Date(date + "T12:00:00Z");
  var dateLabel = dt.toLocaleDateString("fr-FR", {day:"2-digit", month:"2-digit", year:"numeric"});
  var bmCount = rows.filter(function(r) { return r.isBM; }).length;
  var title = "P1 le " + dateLabel + " — " + kw + " (" + bmCount + " BM / " + rows.length + " total)";

  var html;
  if (!rows.length) {
    html = '<div style="padding:20px;text-align:center;color:var(--txT)">Aucune donnée pour ce jour.</div>';
  } else {
    html = rows.map(function(r) {
      var pid = r.product_id;
      var tracked = lookupTrackedProduct(pid);
      var name = tracked ? esc(tracked.name) : (r.seller ? esc(r.seller) + ' — ' + esc(pid) : esc(pid));
      var url = tracked ? tracked.url : (urlByPid[pid] || "");
      var bmTag = r.isBM
        ? ' <span style="display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;background:var(--acBg);color:var(--ac)">✓ BM</span>'
        : '';
      var spoTag = r.is_sponsored
        ? ' <span style="display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;background:#fff3e0;color:#e65100">⚡ Sponso</span>'
        : '';
      var rowBg = r.isBM ? 'background:var(--acBg)' : '';
      return '<div class="product-row" style="' + rowBg + '">'
        + '<div class="product-row-name">' + name + bmTag + spoTag + '</div>'
        + '<div class="product-row-refs">'
        + '<span style="color:var(--txS);font-size:11px">' + esc(r.seller||'—') + '</span>'
        + (url ? '<a href="' + esc(url) + '" target="_blank" class="link">Voir ↗</a>' : '')
        + '</div>'
        + '</div>';
    }).join('');
  }

  openModal(title, html);
}

function cleanUrl(url) {
  if (!url) return null;
  const doubled = url.match(/(https?:\/\/[^\/]+)(https?:\/\/.+)/);
  if (doubled) return doubled[2];
  return url;
}

function isProductUrl(url, marketplace) {
  if (!url) return false;
  const clean = cleanUrl(url);
  if (marketplace === 'cdiscount')
    return clean.includes('/maison/') || clean.includes('/f-');
  if (marketplace === 'maisonsdumonde')
    return clean.includes('/FR/fr/p/') || clean.includes('/fr/p/');
  if (marketplace === 'amazon')
    return clean.includes('/dp/') || clean.includes('/gp/product/');
  if (marketplace === 'conforama')
    return clean.includes('/p/');
  if (marketplace === 'laredoute')
    return clean.includes('/produit/') || clean.includes('/p-');
  if (marketplace === 'but')
    return clean.includes('/produits/') || clean.includes('/p/') || clean.includes('/produit/');
  if (marketplace === 'manomano')
    return clean.includes('/p/') || clean.includes('/product/');
  return true;
}

function showCompetitorProducts(el) {
  const kw = el.getAttribute('data-kw');
  const seller = el.getAttribute('data-seller');
  const items = (STATE.keywordData[kw] || []).filter(function(i) {
    return i.seller === seller && isProductUrl(i.url, MARKETPLACE);
  });
  items.sort(function(a, b) { return (a.position || 99) - (b.position || 99); });
  const title = seller + ' — ' + kw + ' (' + items.length + ' produit' + (items.length > 1 ? 's' : '') + ')';
  if (!items.length) {
    openModal(title, '<div style="padding:20px;text-align:center;color:var(--txT)">Aucune fiche produit disponible pour ce vendeur sur ce keyword.</div>');
    return;
  }
  function extractName(url) {
    const s = url.replace(/\?.*/, '').replace(/#.*/, '').replace(/\/$/, '');
    return (s.split('/').pop() || '').replace(/-/g, ' ');
  }
  const rows = items.map(function(i) {
    const url = cleanUrl(i.url) || '';
    const name = extractName(url);
    const spoTag = i.is_sponsored === true
      ? ' <span style="display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;background:#fff3e0;color:#e65100">⚡ Sponso</span>'
      : '';
    return '<div style="display:flex;align-items:baseline;gap:12px;padding:8px 0;border-bottom:1px solid var(--borderL)">'
      + '<span style="font-size:13px;font-weight:700;color:var(--ac);min-width:28px">#' + (i.position || '?') + '</span>'
      + '<div style="flex:1;min-width:0">'
      + '<div style="font-size:11px;color:var(--txS);margin-bottom:2px">' + esc(i.product_id || '—') + '</div>'
      + '<div style="font-size:13px;font-weight:500;word-break:break-word">' + esc(name) + '</div>'
      + '</div>'
      + (url ? '<div style="white-space:nowrap"><a href="' + esc(url) + '" target="_blank" class="link">Voir ↗</a>' + spoTag + '</div>' : '')
      + '</div>';
  }).join('');
  openModal(title, '<div style="padding:4px 0">' + rows + '</div>');
}

// Liste des concurrents à suivre par marketplace (ordre = ordre d'affichage)
// ⚠️ Plus utilisé directement — source de vérité = table Supabase tracked_sellers
// Conservé comme fallback si Supabase ne répond pas
const TRACKED_COMPETITORS_FALLBACK = {
  maisonsdumonde: ["BestMobilier","Premium Interiors","Usinestreet","Sweeek","Mobilier Déco","Homifab","Baita Home"],
  cdiscount:      ["BestMobilier","Loungitude","VidaXL","Vente-unique","Habitat et Jardin","Sweeek","IDOHOME","EAZSHOU","Tolaro"],
  conforama:      ["BestMobilier","Loungitude","VidaXL","Habitat et Jardin","Sweeek","Tendencio","Gutent (KOMHTOM)","IDOHOME","Intense Déco","Cosy (Menzzo)"],
  laredoute:      ["BestMobilier","Oviala","Sweeek","Homifab","Berah Getah","Tikamoon","Miliboo"],
  amazon:         ["BestMobilier","Loungitude","VidaXL","Sweeek","IDOHOME","Habitat et Jardin"],
};

// Noms BestMobilier reconnus
const BM_NAMES_SET = new Set(["BestMobilier","Best Mobilier","Lisa Design"]);

// Résolution d'un nom affiché vers le nom raw en base (pour les lookup seller_stats)
// BestMobilier peut être "BestMobilier" ou "Best Mobilier" ou "Lisa Design" en base
function resolveSellerNames(displayName) {
  if (displayName === "BestMobilier") return ["BestMobilier","Best Mobilier","Lisa Design"];
  // Correspondances entre nom affiché (tracked_sellers) et nom réel en base (seller_stats)
  const SELLER_NAME_MAP = {
    "Habitat et Jardin": ["Habitat & Jardin", "Habitat et Jardin"],
    "Gutent (KOMHTOM)":  ["Gutent", "Gutent (KOMHTOM)"],
    "VidaXL":            ["VidaXL", "vidaXL", "Vida XL", "VidaXl", "VIDAXL"],
  };
  if (SELLER_NAME_MAP[displayName]) return SELLER_NAME_MAP[displayName];
  // Fallback insensible à la casse pour VidaXL et variantes non listées
  const stats = STATE.sellerStats || [];
  const lower = displayName.toLowerCase().replace(/[\s\-_]/g, "");
  const matches = [...new Set(stats.map(s => s.seller).filter(s => s && s.toLowerCase().replace(/[\s\-_]/g, "") === lower))];
  if (matches.length) return matches;
  return [displayName];
}

// Type de marketplace : "cumul" (MdM, Conforama) ou "ltm" (Cdiscount, Amazon, La Redoute)
function mpType(mp) {
  if (mp === "conforama" || mp === "maisonsdumonde") return "cumul";
  return "ltm";
}

// Récupère les données d'un vendeur depuis seller_stats pour la marketplace courante
function getSellerData(displayName) {
  const stats = STATE.sellerStats || [];
  const rawNames = resolveSellerNames(displayName);

  // Toutes les entrées pour ce vendeur (tous noms raw confondus), triées ASC
  const allEntries = stats
    .filter(s => rawNames.includes(s.seller))
    .sort((a, b) => a.date > b.date ? 1 : -1);

  if (!allEntries.length) return null;

  const latest = allEntries[allEntries.length - 1];
  const prev   = allEntries.length >= 2 ? allEntries[allEntries.length - 2] : null;
  const first  = allEntries[0];

  // Pour les calculs LTM : on ignore les entrées où seller_sales est null
  // (scrapes partiels où le clic "En savoir plus" n'a pas fonctionné)
  const validSalesEntries = allEntries.filter(e => e.seller_sales != null);
  const latestValid = validSalesEntries.length ? validSalesEntries[validSalesEntries.length - 1] : null;
  const prevValid   = validSalesEntries.length >= 2 ? validSalesEntries[validSalesEntries.length - 2] : null;
  const firstValid  = validSalesEntries.length ? validSalesEntries[0] : null;

  // Calcul p1 moyen sur toutes les sessions
  const p1Values = allEntries.map(e => e.p1_count || 0);
  const p1Avg = p1Values.length ? Math.round(p1Values.reduce((a,b)=>a+b,0) / p1Values.length * 10) / 10 : 0;
  const p1Latest = latest.p1_count || 0;

  if (mpType(MARKETPLACE) === "cumul") {
    // Ventes cumulées depuis 1er scrape
    const salesLatest = latest.seller_sales || 0;
    const salesFirst  = first.seller_sales || 0;
    const salesVar    = salesLatest - salesFirst; // ventes depuis 1er scraping

    // Variation depuis dernier scraping
    const salesVarSincePrev = prev != null ? (salesLatest - (prev.seller_sales || 0)) : null;
    const daysSincePrev = prev != null
      ? Math.max(1, Math.round((new Date(latest.date) - new Date(prev.date)) / 86400000))
      : null;

    // Ventes quotidiennes moyennes depuis 1er scrape
    const daysSinceFirst = Math.max(1, Math.round((new Date(latest.date) - new Date(first.date)) / 86400000));
    const dailyAvg = daysSinceFirst > 0 && salesVar > 0 ? Math.round(salesVar / daysSinceFirst * 10) / 10 : null;

    return {
      type: "cumul",
      salesLatest, salesVar, salesVarSincePrev,
      daysSincePrev, dailyAvg,
      p1Latest, p1Avg,
      rating: latest.seller_rating,
      ratingsCount: latest.seller_ratings_count,
      sourceUrl: latest.source_url,
      bestSellerTitle: latest.best_seller_title || null,
      bestSellerPrice: latest.best_seller_price || null,
      bestSellerUrl:   latest.best_seller_url   || null,
      latestDate: latest.date,
    };
  } else {
    // LTM : Cdiscount, Amazon, La Redoute, BUT
    // Amazon + BUT : proxy = seller_ratings_count (seller_sales = null)
    let salesLatest, salesFirst12m;
    if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
      salesLatest = latest.seller_ratings_count || 0;
      const cutoff = new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
      const in12m = allEntries.filter(e => new Date(e.date) >= cutoff);
      salesFirst12m = in12m.length ? (in12m[0].seller_ratings_count || 0) : null;
    } else {
      salesLatest = latestValid?.seller_sales || 0;
      salesFirst12m = firstValid?.seller_sales || 0;
    }

    // Tendance vs dernier scrape précédent
    const yoyDelta = (() => {
      if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
        if (!prev || prev.seller_ratings_count == null) return null;
        const prevVal = prev.seller_ratings_count || 0;
        return prevVal > 0 ? (salesLatest - prevVal) / prevVal * 100 : null;
      }
      if (!prevValid || prevValid.seller_sales == null) return null;
      const prevVal = prevValid.seller_sales || 0;
      return prevVal > 0 ? (salesLatest - prevVal) / prevVal * 100 : null;
    })();

    // Tendance depuis 1er scrape
    const yoyDeltaFirst = (() => {
      if (MARKETPLACE === "amazon" || MARKETPLACE === "but") {
        if (!first || first.seller_ratings_count == null || allEntries.length < 2) return null;
        const fVal = first.seller_ratings_count || 0;
        return fVal > 0 ? (salesLatest - fVal) / fVal * 100 : null;
      }
      if (!firstValid || validSalesEntries.length < 2) return null;
      const fVal = firstValid.seller_sales || 0;
      return fVal > 0 ? (salesLatest - fVal) / fVal * 100 : null;
    })();

    const sessionsCount = allEntries.length;

    return {
      type: "ltm",
      salesLatest,
      yoyDelta,
      yoyDeltaFirst,
      sessionsCount,
      p1Latest, p1Avg,
      rating: latest.seller_rating,
      ratingsCount: latest.seller_ratings_count,
      sourceUrl: latest.source_url,
      bestSellerTitle: latest.best_seller_title || null,
      bestSellerPrice: latest.best_seller_price || null,
      bestSellerUrl:   latest.best_seller_url   || null,
      latestDate: latest.date,
    };
  }
}

function renderConcurrents() {
  const isCumul = mpType(MARKETPLACE) === "cumul";
  const isAmazon = MARKETPLACE === "amazon";
  const isBut    = MARKETPLACE === "but";
  const isAmazonOrBut = isAmazon || isBut;

  let trackedRows = STATE.trackedSellers || [];
  if (!trackedRows.length) {
    const fallback = TRACKED_COMPETITORS_FALLBACK[MARKETPLACE] || [];
    trackedRows = fallback.map(name => ({ seller_name: name, shop_url: null, active: true }));
  }

  const fmtNum = v => v != null ? Number(v).toLocaleString("fr-FR") : "—";
  // fmtDelta : toujours en valeur absolue, % en italique en dessous si dispo
  // absVal = valeur absolue de la variation (ex: +153 ventes)
  // pctVal = variation en % optionnelle (null = pas affichée)
  const fmtDelta = (v, unit="", pctVal=null) => {
    if (v == null) return '<span style="color:var(--txT);font-size:11px">—</span>';
    const color = v > 0 ? "var(--gn)" : v < 0 ? "var(--rd)" : "var(--txT)";
    const rounded = Math.round(v);
    const display = (rounded > 0 ? "+" : "") + rounded.toLocaleString("fr-FR") + unit;
    const pctHtml = pctVal != null
      ? `<div style="font-size:10px;color:${color};font-style:italic;margin-top:1px">(${pctVal > 0 ? "+" : ""}${Math.round(pctVal)}%)</div>`
      : "";
    return `<div style="font-size:15px;font-weight:700;color:${color}">${display}</div>${pctHtml}`;
  };

  const rows = trackedRows.map(ts => {
    const name = ts.seller_name;
    const isBM = BM_NAMES_SET.has(name) || name === "BestMobilier";
    const data = getSellerData(name);
    return { name, isBM, data, shopUrl: ts.shop_url };
  });

  const hasAnyData = rows.some(r => r.data);

  const CHART_COLORS = ["#2c5ea0","#e8963a","#2e9e6b","#c0392b","#8e44ad","#16a085","#d35400","#2980b9","#27ae60","#e74c3c"];

  // Métriques (lignes du tableau transposé)
  const metricRows = [
    { key:"col1", label: isCumul ? "Ventes totales" : (isAmazonOrBut ? "Avis vendeur (proxy)" : "Ventes LTM") },
    { key:"col2", label: isCumul ? "Variation (dernier scraping)" : "Tendance vs préc." },
    ...(!isCumul ? [{ key:"col7", label:"Tendance depuis 1er scrape" }] : []),
    ...(isCumul ? [{ key:"col3", label:"Ventes/jour moy." }] : []),
    { key:"col4", label:"Moy. appari. P1" },
    ...(!isCumul ? [{ key:"col5", label:"Best-seller" }] : []),
    { key:"col6", label:"Note vendeur" },
  ];

  function cellFor(r, key) {
    const d = r.data;
    if (!d) return '<span style="color:var(--txT);font-size:11px">—</span>';
    switch(key) {
      case "col1": {
        const v = fmtNum(d.salesLatest);
        const sub = isCumul ? "depuis inscr." : (isAmazonOrBut ? "avis" : "ventes LTM");
        return `<div style="font-size:16px;font-weight:700">${v}</div><div style="font-size:10px;color:var(--txT)">${sub}</div>`;
      }
      case "col2": {
        if (isCumul) {
          if (d.salesVarSincePrev == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
          // Calcul % par rapport à la valeur précédente
          const prevVal = d.salesLatest - d.salesVarSincePrev;
          const pct2 = prevVal > 0 ? d.salesVarSincePrev / prevVal * 100 : null;
          return fmtDelta(d.salesVarSincePrev, " ventes", pct2)
            + `<div style="font-size:10px;color:var(--txT);margin-top:1px">en ${d.daysSincePrev}j</div>`;
        } else {
          if (d.yoyDelta == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
          // Pour LTM : variation absolue des ventes + % en italique
          const absVar = d.salesLatest - Math.round(d.salesLatest / (1 + d.yoyDelta/100));
          return fmtDelta(absVar, "", d.yoyDelta)
            + `<div style="font-size:10px;color:var(--txT);margin-top:1px">vs préc.</div>`;
        }
      }
      case "col3":
        return d.dailyAvg != null
          ? `<div style="font-size:16px;font-weight:700">${d.dailyAvg.toLocaleString("fr-FR")}</div><div style="font-size:10px;color:var(--txT)">/j moy.</div>`
          : '<span style="color:var(--txT);font-size:11px">—</span>';
      case "col7": {
        if (d.yoyDeltaFirst == null) return '<span style="color:var(--txT);font-size:11px">1ère mesure</span>';
        const absFirst = d.salesLatest - Math.round(d.salesLatest / (1 + d.yoyDeltaFirst/100));
        return fmtDelta(absFirst, "", d.yoyDeltaFirst)
          + '<div style="font-size:10px;color:var(--txT);margin-top:1px">depuis 1er scrape</div>';
      }
      case "col4":
        return `<div style="font-size:16px;font-weight:700">${d.p1Avg.toLocaleString("fr-FR")}</div><div style="font-size:10px;color:var(--txT)">app. moy.</div>`;
      case "col5": {
        if (!d.bestSellerTitle) return '<span style="color:var(--txT);font-size:11px">—</span>';
        return `<div style="font-size:11px;font-weight:600;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(d.bestSellerTitle)}">${esc(d.bestSellerTitle)}</div>
          ${d.bestSellerPrice?`<div style="font-size:12px;color:var(--txS);font-weight:700">${d.bestSellerPrice}€</div>`:""}
          ${d.bestSellerUrl?`<a href="${esc(d.bestSellerUrl)}" target="_blank" class="link" style="font-size:10px">Voir ↗</a>`:""}`;
      }
      case "col6":
        return d.rating
          ? `<div style="font-size:16px;font-weight:700">${d.rating}<span style="font-size:11px;font-weight:400;color:var(--txT)">/5</span></div><div style="font-size:10px;color:var(--txT)">${d.ratingsCount?fmtNum(d.ratingsCount)+" avis":""}</div>`
          : '<span style="color:var(--txT);font-size:11px">—</span>';
      default: return "—";
    }
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:15px;font-weight:700">Suivi concurrents — ${MARKETPLACES.find(m=>m.id===MARKETPLACE)?.label||MARKETPLACE}</div>
      <div style="font-size:12px;color:var(--txS);margin-top:2px">${trackedRows.length} vendeurs suivis</div>
    </div>
    <button onclick="openAddCompetitorModal()" style="padding:7px 14px;border:.5px solid var(--ac);border-radius:8px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Ajouter un concurrent</button>
  </div>

  ${!hasAnyData ? `<div class="card" style="padding:30px;text-align:center;color:var(--txT)">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">Aucune donnée seller_stats pour cette marketplace</div>
    <div style="font-size:12px">Lancez d'abord l'extension de scraping des boutiques vendeurs.</div>
  </div>` : `

  <div class="card" style="padding:0;overflow:hidden">
    <div class="scroll-table">
      <table style="min-width:${100 + rows.length * 130}px;width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="border-bottom:2px solid var(--border);background:var(--bg)">
            <th style="min-width:150px;padding:10px 14px;text-align:left;font-size:11px;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;border-right:1px solid var(--border)">Métrique</th>
            ${rows.map((r, ci) => {
              const color = CHART_COLORS[ci % CHART_COLORS.length];
              const bmBg = r.isBM ? "background:var(--acBg);" : "";
              return `<th style="min-width:130px;padding:10px 14px;text-align:center;${bmBg}">
                <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
                  <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color}"></span>
                  <span style="font-size:13px;font-weight:700;color:${r.isBM?"var(--ac)":"var(--tx)"}">${esc(r.name)}</span>
                  ${r.isBM ? '<span class="pill pill-accent" style="font-size:10px">Vous</span>' : ""}
                  ${r.shopUrl ? `<a href="${esc(r.shopUrl)}" target="_blank" class="link" style="font-size:10px">Boutique ↗</a>` : (r.data?.sourceUrl ? `<a href="${esc(r.data.sourceUrl)}" target="_blank" class="link" style="font-size:10px">Boutique ↗</a>` : "")}
                  <button onclick="showSellerHistory('${esc(r.name)}')" title="Voir l'historique des ventes" style="background:var(--bg);border:.5px solid var(--border);border-radius:5px;padding:2px 6px;font-size:11px;cursor:pointer;margin-top:2px;font-family:inherit">📈</button>
                </div>
              </th>`;
            }).join("")}
          </tr>
        </thead>
        <tbody>
          ${metricRows.map(({ key, label }, ri) => `
          <tr style="${ri%2?"background:var(--bg)":""}">
            <td style="padding:10px 14px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;border-right:1px solid var(--border)">${label}</td>
            ${rows.map(r => {
              const bmBg = r.isBM ? "background:var(--acBg);" : "";
              return `<td style="padding:10px 14px;text-align:center;line-height:1.4;${bmBg}">${cellFor(r, key)}</td>`;
            }).join("")}
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>

  ${isCumul ? renderCombinedSalesChart(trackedRows, CHART_COLORS) : ""}`}`;
}

// ─── Historique ventes par vendeur (popup) ─────────────────────────────────
function showSellerHistory(displayName) {
  const rawNames = resolveSellerNames(displayName);
  const allStats = (STATE.sellerStats || [])
    .filter(s => rawNames.includes(s.seller))
    .sort((a, b) => a.date > b.date ? 1 : -1);

  if (!allStats.length) {
    openModal("Historique — " + displayName, '<div style="padding:20px;text-align:center;color:var(--txT)">Aucune donnée disponible pour ce vendeur.</div>');
    return;
  }

  const isCumul = mpType(MARKETPLACE) === "cumul";
  const isAmazonOrBut = MARKETPLACE === "amazon" || MARKETPLACE === "but";
  const fmtDate = d => new Date(d).toLocaleDateString("fr-FR", { day:"2-digit", month:"2-digit", year:"2-digit" });
  const fmtNum = v => v != null ? Number(v).toLocaleString("fr-FR") : "—";

  // Construire les lignes de l'historique
  // Dédupliquer par jour (garder le plus récent du jour)
  const byDay = {};
  allStats.forEach(s => {
    const day = s.date.slice(0, 10);
    if (!byDay[day] || s.date > byDay[day].date) byDay[day] = s;
  });
  const points = Object.values(byDay).sort((a, b) => a.date > b.date ? 1 : -1);

  let rows = "";
  if (isCumul) {
    // Cumul : variation entre chaque point consécutif
    rows = points.map((p, i) => {
      const prev = i > 0 ? points[i-1] : null;
      const sales = p.seller_sales;
      const prevSales = prev?.seller_sales;
      const delta = (sales != null && prevSales != null) ? sales - prevSales : null;
      const days = prev ? Math.max(1, Math.round((new Date(p.date) - new Date(prev.date)) / 86400000)) : null;
      const color = delta > 0 ? "var(--gn)" : delta < 0 ? "var(--rd)" : "var(--txT)";
      const period = prev
        ? `${fmtDate(prev.date)} → ${fmtDate(p.date)}`
        : `${fmtDate(p.date)} (1er scrape)`;
      return `<tr style="border-bottom:1px solid var(--borderL)">
        <td style="padding:7px 10px;font-size:12px;color:var(--txS)">${period}</td>
        <td style="padding:7px 10px;font-size:12px;text-align:right">${fmtNum(sales)}</td>
        <td style="padding:7px 10px;text-align:right">
          ${delta != null
            ? `<span style="font-weight:700;color:${color};font-size:13px">${delta > 0 ? "+" : ""}${fmtNum(delta)}</span>`
              + (days ? `<span style="font-size:10px;color:var(--txT);margin-left:4px">en ${days}j</span>` : "")
            : '<span style="color:var(--txT)">—</span>'}
        </td>
      </tr>`;
    }).join("");
  } else {
    // LTM : afficher la valeur brute + variation vs point précédent
    const metric = isAmazonOrBut ? "seller_ratings_count" : "seller_sales";
    const metricLabel = isAmazonOrBut ? "Avis (proxy ventes)" : "Ventes LTM";
    rows = points.map((p, i) => {
      const prev = i > 0 ? points[i-1] : null;
      const val = p[metric];
      const prevVal = prev?.[metric];
      const delta = (val != null && prevVal != null) ? val - prevVal : null;
      const pct = (delta != null && prevVal > 0) ? delta / prevVal * 100 : null;
      const color = delta > 0 ? "var(--gn)" : delta < 0 ? "var(--rd)" : "var(--txT)";
      const period = prev
        ? `${fmtDate(prev.date)} → ${fmtDate(p.date)}`

  const metricLabel = isCumul ? "Ventes cumulées" : (isAmazonOrBut ? "Avis vendeur (proxy)" : "Ventes LTM");

  openModal("📈 Historique — " + displayName, html);
}

function renderCombinedSalesChart(trackedRows, CHART_COLORS) {
  // Pour chaque vendeur : construire les points { month, inc }
  // inc = seller_sales(point) - seller_sales(1er scrape du mois)
  // On groupe par mois calendaire, et dans chaque mois on calcule l'incrément
  // depuis la 1ère valeur du mois (ou la dernière valeur du mois précédent si dispo)

  const series = [];

  trackedRows.forEach((ts, ci) => {
    const name = ts.seller_name;
    const rawNames = resolveSellerNames(name);
    let hist = null;
    rawNames.forEach(rn => {
      const h = (STATE.confoSellerHistory||{})[rn];
      if (h && (!hist || h.length > hist.length)) hist = h;
    });
    if (!hist || !hist.length) return;

    // Filtrer les entrées sans sales
    const validHist = hist.filter(h => h.sales != null);
    if (!validHist.length) return;

    // Grouper par mois : garder toutes les entrées avec leur date et valeur
    // monthPoints[mois] = [ {date, sales}, ... ]
    const monthPoints = {};
    validHist.forEach(h => {
      const month = h.date.slice(0, 7);
      if (!monthPoints[month]) monthPoints[month] = [];
      monthPoints[month].push({ date: h.date, sales: h.sales });
    });

    const months = Object.keys(monthPoints).sort();
    if (!months.length) return;

    // Pour chaque mois : calculer l'incrément
    // baseline = dernière valeur du mois précédent, ou 1ère valeur du 1er mois
    const monthData = {};
    months.forEach((m, i) => {
      const pts = monthPoints[m].sort((a, b) => a.date > b.date ? 1 : -1);
      const lastVal = pts[pts.length - 1].sales;

      if (i === 0) {
        // 1er mois : baseline = 1ère valeur du mois
        // incrément = dernière valeur - 1ère valeur (ventes réalisées dans le mois)
        const firstVal = pts[0].sales;
        monthData[m] = Math.max(0, lastVal - firstVal);
      } else {
        // Autres mois : baseline = dernière valeur du mois précédent
        const prevPts = monthPoints[months[i-1]].sort((a, b) => a.date > b.date ? 1 : -1);
        const baseline = prevPts[prevPts.length - 1].sales;
        monthData[m] = Math.max(0, lastVal - baseline);
      }
    });

    const isBM = BM_NAMES_SET.has(name) || name === "BestMobilier";
    series.push({ name, color: CHART_COLORS[ci % CHART_COLORS.length], isBM, monthData, months });
  });

  if (!series.length) return "";

  // Tous les mois couverts (y compris ceux avec incrément 0 — on les affiche quand même)
  const allMonths = [...new Set(series.flatMap(s => s.months))].sort();
  if (!allMonths.length) return "";

  const fmtMonth = m => {
    const [y, mo] = m.split("-");
    const names = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    return names[parseInt(mo)-1] + " " + y;
  };

  // Dimensions SVG
  const BAR_W   = 20;
  const BAR_GAP = 3;
  const GROUP_GAP = 28;
  const nSeries = series.length;
  const groupW  = nSeries * (BAR_W + BAR_GAP) - BAR_GAP + GROUP_GAP;
  const PAD_L = 52, PAD_R = 20, PAD_T = 16, PAD_B = 48;
  const W = PAD_L + allMonths.length * groupW + PAD_R;
  const H = 220;
  const CH = H - PAD_T - PAD_B;

  const maxVal = Math.max(...series.flatMap(s => allMonths.map(m => s.monthData[m] || 0)), 1);

  // Grille Y
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(r => ({
    v: Math.round(r * maxVal),
    y: PAD_T + CH - r * CH
  }));
  const yGrid = yTicks.map(t =>
    `<line x1="${PAD_L}" y1="${t.y.toFixed(1)}" x2="${W - PAD_R}" y2="${t.y.toFixed(1)}" stroke="#e8e6e1" stroke-width="1"/>
     <text x="${PAD_L - 4}" y="${(t.y + 4).toFixed(1)}" text-anchor="end" fill="#9c9a92" font-size="10">${t.v.toLocaleString("fr-FR")}</text>`
  ).join("");

  // Barres
  const bars = allMonths.map((m, mi) => {
    const groupX = PAD_L + mi * groupW;
    const labelX = groupX + (nSeries * (BAR_W + BAR_GAP) - BAR_GAP) / 2;
    const isCurrentMonth = m === new Date().toISOString().slice(0, 7);
    const monthLabel = fmtMonth(m) + (isCurrentMonth ? " *" : "");
    const label = `<text x="${labelX.toFixed(1)}" y="${(H - 6).toFixed(1)}" text-anchor="middle" fill="#6b6a65" font-size="10" font-weight="500">${monthLabel}</text>`;

    const rects = series.map((s, si) => {
      const val = s.monthData[m] || 0;
      const barH = val > 0 ? Math.max((val / maxVal) * CH, 2) : 0;
      const x = groupX + si * (BAR_W + BAR_GAP);
      const y = PAD_T + CH - barH;
      const stroke = s.isBM ? ` stroke="${s.color}" stroke-width="1.5"` : "";
      const opacity = s.isBM ? "1" : "0.82";
      const valLabel = val > 0 && barH > 14
        ? `<text x="${(x + BAR_W/2).toFixed(1)}" y="${(y - 3).toFixed(1)}" text-anchor="middle" fill="${s.color}" font-size="9" font-weight="600">${val >= 1000 ? (val/1000).toFixed(1)+"k" : val}</text>`
        : "";
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${BAR_W}" height="${barH.toFixed(1)}" fill="${s.color}" opacity="${opacity}" rx="2"${stroke}/>${valLabel}`;
    }).join("");

    return label + rects;
  }).join("");

  // Légende
  const legend = series.map(s =>
    `<div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:${s.isBM?700:500};color:${s.isBM?"var(--ac)":"var(--tx)"}">
      <span style="display:inline-block;width:12px;height:12px;background:${s.color};border-radius:2px;flex-shrink:0;opacity:${s.isBM?1:0.82}"></span>
      ${esc(s.name)}
    </div>`
  ).join("");

  const svgW = Math.max(W, 400);
  const noteCurrentMonth = allMonths.some(m => m === new Date().toISOString().slice(0, 7))
    ? '<div style="font-size:10px;color:var(--txT);margin-top:6px">* Mois en cours — incrément partiel</div>'
    : "";

  return `<div class="card" style="margin-top:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Ventes mensuelles par acteur</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px">${legend}</div>
    </div>
    <div style="font-size:11px;color:var(--txT);margin-bottom:8px">Ventes réalisées dans le mois (incrément depuis début du mois ou fin du mois précédent).</div>
    <div style="overflow-x:auto">
      <svg viewBox="0 0 ${svgW} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:${Math.min(svgW,400)}px;display:block">
        ${yGrid}${bars}
      </svg>
    </div>
    ${noteCurrentMonth}
  </div>`;
}

// Conserver les fonctions utilitaires pour les sparklines (toujours utilisées dans le nouveau concurrent)
function buildSellerStatsMap() {
  const byName = {};
  (STATE.sellerStats || []).forEach(s => {
    if (!byName[s.seller]) byName[s.seller] = [];
    byName[s.seller].push(s);
  });
  const result = {};
  Object.entries(byName).forEach(([seller, rows]) => {
    const sorted = rows.sort((a, b) => new Date(b.date) - new Date(a.date));
    result[seller] = { latest: sorted[0] || null, prev: sorted[1] || null, all: sorted };
  });
  return result;
}

function buildVendorsSortedFromStats(statsMap) {
  const vendors = {};
  Object.entries(statsMap).forEach(([name, data]) => {
    const latest = data.latest;
    const p1 = latest?.p1_count || 0;
    const displayName = name === "Lisa Design" ? "BestMobilier" : name;
    if (!vendors[displayName]) {
      vendors[displayName] = { name: displayName, total: p1, p1, keywords: {}, sessionsCount: data.all?.length || 1, _rawNames: [name] };
    } else {
      vendors[displayName].total += p1;
      vendors[displayName].p1 += p1;
      vendors[displayName]._rawNames.push(name);
    }
  });
  return Object.values(vendors).sort((a, b) => b.total - a.total);
}

// Génère un SVG sparkline inline pour la courbe incrémentale Conforama
function renderConfoSparkline(sellerName) {
  const history = (STATE.confoSellerHistory || {})[sellerName];
  if (!history || history.length < 2) return '<div style="font-size:11px;color:var(--txT);padding:8px 0">Pas encore assez de données (min. 2 scrapes)</div>';

  const x0 = history[0].sales;
  const points = history.map(h => ({ date: h.date, inc: h.sales - x0 }));
  const maxInc = Math.max(...points.map(p => p.inc), 1);
  const W = 280, H = 60, PAD = 4;
  const n = points.length;

  const xs = points.map((_, i) => PAD + (i / (n - 1)) * (W - PAD * 2));
  const ys = points.map(p => H - PAD - ((p.inc / maxInc) * (H - PAD * 2)));

  const pathD = xs.map((x, i) => `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(' ');
  const fillD = `${pathD} L ${xs[n-1].toFixed(1)} ${(H-PAD).toFixed(1)} L ${PAD} ${(H-PAD).toFixed(1)} Z`;

  // Labels: première et dernière date
  const fmt = d => new Date(d).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
  const lastInc = points[points.length - 1].inc;

  return `
    <div class="sparkline-wrap">
      <div class="sparkline-title">Ventes incrémentales depuis 1er scrape (+${lastInc.toLocaleString("fr-FR")} au total)</div>
      <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="spk-grad-${sellerName.replace(/\s/g,'')}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--ac)" stop-opacity=".25"/>
            <stop offset="100%" stop-color="var(--ac)" stop-opacity=".02"/>
          </linearGradient>
        </defs>
        <path d="${fillD}" fill="url(#spk-grad-${sellerName.replace(/\s/g,'')})" />
        <path d="${pathD}" stroke="var(--ac)" stroke-width="1.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
        ${xs.map((x, i) => `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="2.5" fill="var(--ac)"/>`).join('')}
      </svg>
      <div class="sparkline-labels">
        <span>${fmt(points[0].date)}</span>
        ${n > 2 ? `<span style="color:var(--ac);font-weight:600">+${lastInc.toLocaleString("fr-FR")} ventes</span>` : ''}
        <span>${fmt(points[n-1].date)}</span>
      </div>
    </div>`;
}
