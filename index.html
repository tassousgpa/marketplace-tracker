function exportGestionCSV(){
  let list=STATE.allProducts||STATE.products;
  if(gestionSearch){const s=gestionSearch.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(s)||p.product_id.includes(s)||(p.sku||"").toLowerCase().includes(s));}

  const headers=["ID produit","Nom","SKU","EAN","Marketplace","Type","Canal attribué","URL","Statut"];
  const csvCell=function(v){const s=String(v!=null?v:"");return(s.indexOf(";")!==-1||s.indexOf('"')!==-1||s.indexOf("\n")!==-1)?'"'+s.replace(/"/g,'""')+'"':s;};

  const csv=[headers].concat(rows).map(function(row){return row.map(csvCell).join(";");}).join("\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);

// Parse un fichier XLS/XLSX et retourne { marketplace: total }
async function parseXLSFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
        console.log("Row 6 (headers):", rows[5]);
        console.log("Row 7 (data):", rows[6]);
        console.log("Row 7:", rows[6]);
        console.log("Row 8:", rows[7]);

        // Agréger par marketplace
        const totals = {};
        Object.keys(MP_MATCHING).forEach(mp => totals[mp] = 0);

        rows.forEach(row => {
          if (!row || !row[0] || !row[1]) return;
          const label = String(row[0]).toLowerCase().replace(/\s/g, "");
          const val = parseFloat(String(row[1]).replace(",", "."));
          if (isNaN(val)) return;

          for (const [mp, keys] of Object.entries(MP_MATCHING)) {
            if (keys.some(k => label.includes(k))) {
              totals[mp] += val;
              break;
            }
          }
        });

        // Arrondir
        Object.keys(totals).forEach(k => totals[k] = Math.round(totals[k] * 100) / 100);
        resolve(totals);
      } catch(e) {
        reject(e);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// ── PARSE ODOO XLS — ventes produits hebdomadaires ──────────────
const ODOO_CHANNEL_MAP = {
  "amazon_fr":"amazon","amazon_be":"amazon",
  "cdiscount_octopia":"cdiscount",
  "maisonsdumonde":"maisonsdumonde",
  "laredoute_mirakl":"laredoute",
  "conforama":"conforama",
  "manomano_fr":"manomano","manomano_fr_b2b":"manomano",
  "but_mirakl":"but",
  "leroymerlin_mirakl":"leroymerlin","leroy_merlin_mirakl":"leroymerlin",
  "leroymerlin":"leroymerlin","leroy merlin":"leroymerlin",
};
// Résolution souple du canal Odoo : exact d'abord, puis inclusion partielle
function resolveOdooMp(ch) {
  if (!ch) return null;
  var direct = ODOO_CHANNEL_MAP[ch];
  if (direct) return direct;
  var d = ch.toLowerCase().replace(/\s+/g,'_');
  for (var k in ODOO_CHANNEL_MAP) { if (d.includes(k) || k.includes(d)) return ODOO_CHANNEL_MAP[k]; }
  // Fallback générique par mot-clé
  if (d.includes('leroy')) return 'leroymerlin';
  if (d.includes('amazon')) return 'amazon';
  if (d.includes('cdiscount')) return 'cdiscount';
  if (d.includes('maison')) return 'maisonsdumonde';
  if (d.includes('redoute')) return 'laredoute';
  if (d.includes('conforama')) return 'conforama';
  if (d.includes('manomano')) return 'manomano';
  if (/\bbut\b/.test(d) || d.includes('but_')) return 'but';
  return null;
}
const ODOO_SKIP = ["Livraison","Retrait","Bon de réduction","Remise"];

// ── MAPPING colonnes XLS historique "Ventes par semaines" → marketplace ──
function resolveXlsColMp(colHeader) {
  if (!colHeader) return null;
  const h = String(colHeader).toLowerCase().trim();
  // Essai via resolveOdooMp (normalise les espaces en underscores)
  const byOdoo = resolveOdooMp(h.replace(/\s+/g,'_'));
  if (byOdoo) return byOdoo;
  // Cas supplémentaires spécifiques aux fichiers XLS historiques
  if (h.includes('maisonsdumonde') || h.includes('maisondumonde')) return 'maisonsdumonde';
  if (h.includes('redoute')) return 'laredoute';
  if (h.includes('limonetik') || (h.includes('conforama') && !h.includes('clogistique'))) return 'conforama';
  if (h.includes('cdiscount') || h.includes('clogistique')) return 'cdiscount';
  if (h.includes('amazon')) return 'amazon';
  if (h.includes('manomano')) return 'manomano';
  if (h.includes('leroymerlin') || h.includes('leroy')) return 'leroymerlin';
  if (/\bbut\b/.test(h) || h.includes('but_')) return 'but';
  return null;
}

// Parser pour les fichiers XLS multi-colonnes (format "Ventes par semaines")
// Row 0 = en-têtes (modes de paiement), col 0 = label semaine
async function parseHistoricalWeekXLS(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type:"array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
        if (!rows.length) { resolve([]); return; }
        // Ligne 0 = en-têtes des colonnes
        const headers = rows[0];
        const colMpMap = {};
        headers.forEach((h, i) => {
          if (i === 0) return;
          const mp = resolveXlsColMp(h);
          if (mp) colMpMap[i] = mp;
        });
        const result = [];
        rows.slice(1).forEach(row => {
          if (!row || !row[0]) return;
          const rawLabel = String(row[0]).trim();
          const wkMatch = rawLabel.match(/S(\d+)\s+(\d{4})/);
          if (!wkMatch) return;
          const weekNum = parseInt(wkMatch[1]);
          const year    = parseInt(wkMatch[2]);
          const weekLabel = `S${weekNum} ${year}`;
          const mpRevs = {};
          Object.entries(colMpMap).forEach(([ci, mp]) => {
            const v = parseFloat(String(row[ci]||0).replace(',','.')) || 0;
            if (v > 0) mpRevs[mp] = (mpRevs[mp]||0) + v;
          });
          Object.entries(mpRevs).forEach(([mp, rev]) => {
            result.push({ week_label:weekLabel, year, week:weekNum, marketplace:mp, revenue:Math.round(rev) });
          });
        });
        resolve(result);
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function parseOdooXLS(file, defaultMp = null) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
        let currentChannel = null;
        const agg = {};
        rows.forEach(row => {
          if (!row || row.length < 3) return;
          const desc = row[0] != null ? String(row[0]).trim() : "";
          const qtyRaw = row[2];
          if (!desc || desc === "Total" || desc.includes("Total HT")) return;
          if (ODOO_SKIP.some(p => desc.startsWith(p))) return;
          const refMatch = desc.match(/\[([^\]]+)\]/);
          if (refMatch) {
            const ref = refMatch[1].trim();
            const name = desc.replace(/\[[^\]]+\]\s*/, "").trim().slice(0, 100);
            const qty = parseInt(qtyRaw) || 0;
            const caHt = parseFloat(String(row[1] || 0).replace(",", ".")) || 0;
            // Si pas d'entête canal (export monocanal), on utilise defaultMp (= MARKETPLACE courant)
            const mp = currentChannel ? resolveOdooMp(currentChannel) : (defaultMp || null);
            if (mp && qty > 0) {
              const key = ref + "|" + mp;
              if (!agg[key]) agg[key] = { ref, name, marketplace: mp, qty: 0, ca_ht: 0 };
              agg[key].qty += qty;
              agg[key].ca_ht += caHt;
            }
          } else {
            currentChannel = desc;
          }
        });
        resolve(Object.values(agg));
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

const AUDIT_SCORE_FORMULA = (r) => {
  const v = val => { if (val === null || val === undefined || val === "") return null; const n = parseFloat(val); return isNaN(n) ? null : n; };
  // NULL = max du critère (N/A = non applicable = meilleur score, convention Excel)
  const t = (val, max) => { const n = v(val); return n === null ? (max||0) : n; };
  const tScore = (val, max) => { const n = v(val); return n === null ? (max||0) : n; };

  const titreTotal = t(r.titre_longueur)+t(r.titre_marque)+t(r.titre_collection)+t(r.titre_couleur)+t(r.titre_matiere)+t(r.titre_fonctions);
  const descTotal  = t(r.desc_bullets_nb)+t(r.desc_bullets_pertinence)+t(r.desc_caract_tech)+t(r.desc_dimensions)+t(r.desc_colis)+t(r.desc_textes_mkt);
  const visTotal   = t(r.visuels_fond_blanc)+t(r.visuels_dimensions)+t(r.visuels_lifestyle)+t(r.visuels_zoom_matiere)+t(r.visuels_fonction)+t(r.visuels_qualite_carrousel);
  const gdvTotal   = t(r.gdv_couleur)+t(r.gdv_autre);
  const aplusTotal = t(r.aplus_fiche)+t(r.aplus_video);

  // Score global : NULL = max (convention Excel — case non auditée = meilleur score)
  const titreScore = tScore(r.titre_longueur,2)+tScore(r.titre_marque,1)+tScore(r.titre_collection,1)+tScore(r.titre_couleur,1)+tScore(r.titre_matiere,1)+tScore(r.titre_fonctions,2);
  const descScore  = tScore(r.desc_bullets_nb,4)+tScore(r.desc_bullets_pertinence,4)+tScore(r.desc_caract_tech,1)+tScore(r.desc_dimensions,1)+tScore(r.desc_colis,1)+tScore(r.desc_textes_mkt,1);
  const visScore   = tScore(r.visuels_fond_blanc,1)+tScore(r.visuels_dimensions,1)+tScore(r.visuels_lifestyle,1)+tScore(r.visuels_zoom_matiere,1)+tScore(r.visuels_fonction,1)+tScore(r.visuels_qualite_carrousel,5);
  const gdvScore   = tScore(r.gdv_couleur,1)+tScore(r.gdv_autre,1);
  const aplusScore = tScore(r.aplus_fiche,2)+tScore(r.aplus_video,1);

  // Score = 0 uniquement si aucun champ n'a jamais été saisi (tout null = non audité)
  // N/A (null avec champ saisi) = note maximale — distinct de "non audité" grâce aux autres champs
  const allNull = [r.titre_longueur,r.titre_marque,r.titre_collection,r.titre_couleur,r.titre_matiere,r.titre_fonctions,
    r.desc_bullets_nb,r.desc_bullets_pertinence,r.desc_caract_tech,r.desc_dimensions,r.desc_colis,r.desc_textes_mkt,
    r.visuels_fond_blanc,r.visuels_dimensions,r.visuels_lifestyle,r.visuels_zoom_matiere,r.visuels_fonction,r.visuels_qualite_carrousel,
    r.gdv_couleur,r.gdv_autre,r.aplus_fiche,r.aplus_video].every(val => val === null || val === undefined || val === "");
  const score = allNull ? 0 : Math.round((titreScore + descScore + visScore + gdvScore + aplusScore) / 35 * 100);
  return { titreTotal, descTotal, visTotal, gdvTotal, aplusTotal, score };
};

  const options = [{val:'', label:'Tous'}, {val:'__empty__', label:'Vide (N/A)'}]
    .concat(Array.from({length: max+1}, (_,i) => ({val:String(i), label:String(i)})));
  options.forEach(opt => {
    const item = document.createElement('div');
    const isActive = curVal === opt.val;
    item.style.cssText = 'padding:6px 14px;cursor:pointer;color:'+(isActive?'var(--ac)':'var(--tx)')+';font-weight:'+(isActive?'600':'400')+';white-space:nowrap;display:flex;align-items:center;gap:6px';
    item.innerHTML = (isActive ? '<span style="font-size:10px">✓</span> ' : '<span style="font-size:10px;opacity:0"> </span> ') + esc(opt.label);
    item.onmouseenter = () => { item.style.background = 'var(--bg)'; };
    item.onmouseleave = () => { item.style.background = ''; };
    item.onclick = () => {
      if (opt.val === '') delete auditColFilters[key]; else auditColFilters[key] = opt.val;
      popup.remove(); _auditFilterPopup = null;
      updateAuditFiltered();
    };
    popup.appendChild(item);
  });
  document.body.appendChild(popup);
  _auditFilterPopup = popup;
  setTimeout(() => {
    document.addEventListener('click', function _close() { popup.remove(); _auditFilterPopup = null; document.removeEventListener('click', _close); }, {once:true});
  }, 0);
}

function updateAuditFiltered() {
  const skuToCanal = {};
  (STATE.products||[]).forEach(p=>{ if(p.sku) skuToCanal[p.sku] = p.canal_attribue||""; });
  let list = auditData;
  if (auditFilters.type !== "all") list = list.filter(r=>r.type_ref===auditFilters.type);
  if (auditFilters.categorie !== "all") list = list.filter(r=>r.categorie===auditFilters.categorie);
  if (auditFilters.niveau !== "all") list = list.filter(r=>AUDIT_NIVEAU(AUDIT_SCORE_FORMULA(r).score)===auditFilters.niveau);
  if (auditFilters.canal !== "all") list = list.filter(r=>(skuToCanal[r.sku]||"")===auditFilters.canal);
  if (auditFilters.search) {
    const s = auditFilters.search.toLowerCase();
    list = list.filter(r=>(r.sku||"").toLowerCase().includes(s)||(r.nom_produit||"").toLowerCase().includes(s));
  }
  list = applyAuditColFilters(list);
  const kpiEl = document.getElementById("audit-kpi-section");
  if (kpiEl) kpiEl.innerHTML = buildAuditKpiCardsHTML(list);
  const tbodyEl = document.getElementById("audit-tbody");
  if (tbodyEl) tbodyEl.innerHTML = buildAuditRows(list);
  const countEl = document.querySelector("#audit-count-label");
  if (countEl) countEl.textContent = list.length+" référence"+(list.length>1?"s":"");
  // Rafraîchir les tags de filtres colonnes
  const tagsEl = document.getElementById('audit-col-filter-tags');
  if (tagsEl) tagsEl.outerHTML = buildAuditColFilterTagsHTML();
  // Mettre à jour les icônes des colonnes filtrées
  document.querySelectorAll('[data-acf-key]').forEach(btn => {
    const k = btn.getAttribute('data-acf-key');
    btn.style.color = auditColFilters[k] ? 'var(--ac)' : 'var(--txT)';
    btn.style.opacity = auditColFilters[k] ? '1' : '0.35';
  });
}

    ]},
    {cols:[
      {key:"visuels_fond_blanc",w:70,editable:true,max:1},
      {key:"visuels_dimensions",w:55,editable:true,max:1},
      {key:"visuels_lifestyle",w:65,editable:true,max:1},
      {key:"visuels_zoom_matiere",w:70,editable:true,max:1},
      {key:"visuels_fonction",w:65,editable:true,max:1},
      {key:"visuels_qualite_carrousel",w:70,editable:true,max:5},
      {key:"_vis_total",w:55,editable:false,isTotal:true},
    ]},
    {cols:[
      {key:"gdv_couleur",w:65,editable:true,max:1},
      {key:"gdv_autre",w:60,editable:true,max:1},
      {key:"_gdv_total",w:55,editable:false,isTotal:true},
    ]},
    {cols:[
      {key:"aplus_fiche",w:70,editable:true,max:2},
      {key:"aplus_video",w:60,editable:true,max:1},
      {key:"_aplus_total",w:55,editable:false,isTotal:true},
    ]},
    {cols:[
      {key:"_score",w:70,editable:false,isScore:true},
      {key:"_save",w:90,editable:false,isSave:true},
      {key:"_niveau",w:100,editable:false,isNiveau:true},
      {key:"plan_action",w:160,editable:false,isPlan:true},
    ]},
    {cols:[
      {key:"commentaire_5",w:140,editable:true,isTextarea:true},
      {key:"commentaire_6",w:140,editable:true,isTextarea:true},
      {key:"commentaire_1",w:140,editable:true,isTextarea:true},
      {key:"commentaire_2",w:140,editable:true,isTextarea:true},
      {key:"commentaire_3",w:140,editable:true,isTextarea:true},
      {key:"commentaire_4",w:140,editable:true,isTextarea:true},
    ]},
  ];

  // Marquer colonnes IDENTIFICATION comme sticky-left
  let _cl = 0;
  colGroups[0].cols.forEach((c, ci) => {
    c.stickyLeft = _cl;
    c.isLastIdent = ci === colGroups[0].cols.length - 1;
    _cl += c.w;
  });

  const allCols = colGroups.flatMap(g=>g.cols);

  if (!list.length) {
    return '<tr><td colspan="50" style="padding:30px;text-align:center;color:var(--txT)">Aucune donnée — importez un fichier XLS ou ajoutez des références.</td></tr>';
  }

  return list.map(function(r, i) {
    const calc = AUDIT_SCORE_FORMULA(r);
    const niveau = AUDIT_NIVEAU(calc.score);
    const totals = {
      _titre_total: calc.titreTotal,
      _desc_total:  calc.descTotal,
      _vis_total:   calc.visTotal,
      _gdv_total:   calc.gdvTotal,
      _aplus_total: calc.aplusTotal,
      _score:       calc.score,
      _niveau:      niveau
    };
    const rowBg = i%2 ? 'var(--bg)' : 'var(--card)';
    const hasPendingRow = !!(auditPendingChanges[r.id] && Object.keys(auditPendingChanges[r.id]).length > 0);
    const bg = i%2 ? "background:var(--bg)" : "";

    // Helper : injecte le sticky style dans la cellule si colonne IDENTIFICATION
    function stickyWrap(cellHtml, c) {
      if (c.stickyLeft === undefined) return cellHtml;
      const extra = 'position:sticky;left:'+c.stickyLeft+'px;z-index:2;background:'+rowBg+';'+(c.isLastIdent?'border-right:2px solid var(--border);':'');
      return cellHtml.replace('<td style="', '<td style="'+extra);
    }

    const cells = allCols.map(function(c) {

      if (c.isTotal) {
        const v = totals[c.key] != null ? totals[c.key] : "—";
        return '<td style="text-align:center;font-weight:700;background:var(--borderL);padding:4px 6px">' + v + '</td>';
      }

      if (c.isScore) {
        const s = totals._score;
        const col = AUDIT_NIVEAU_COLOR(AUDIT_NIVEAU(s));
        return '<td style="text-align:center;background:var(--borderL);padding:4px 6px;white-space:nowrap">'
          + '<span style="font-weight:800;font-size:14px;color:' + col + '">' + (s || "—") + '</span>'
          + '<button onclick="showAuditHistory(' + r.id + ',\'' + esc(r.sku) + '\')" title="Historique" style="background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;vertical-align:middle">📈</button>'
          + '</td>';
      }

      if (c.isSave) {
        const hasPending = !!(auditPendingChanges[r.id] && Object.keys(auditPendingChanges[r.id]).length > 0);
        return '<td style="text-align:center;background:var(--borderL);padding:4px 6px">'
          + '<button data-save-row="'+r.id+'" onclick="auditSaveRow('+r.id+')" '+(hasPending?'':'disabled ')
          + 'style="padding:4px 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:'+(hasPending?'pointer':'default')+';font-family:inherit;transition:all .15s;'
          + (hasPending ? 'background:var(--gn);color:#fff' : 'background:var(--borderL);color:var(--txT);opacity:.5')+'">💾 Enreg.</button>'
          + '</td>';
      }

      if (c.isNiveau) {
        const n = totals._niveau;
        return '<td style="text-align:center;padding:4px 6px">'
          + '<span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:' + AUDIT_NIVEAU_BG(n) + ';color:' + AUDIT_NIVEAU_COLOR(n) + '">' + (n || "—") + '</span>'
          + '</td>';
      }

      if (c.isPlan) {
        const n = totals._niveau;
        const sc = totals._score;
        const pa = sc >= 90 ? "OK — Surveiller" : sc >= 75 ? "Ajustements mineurs" : sc >= 50 ? "Optimisation contenu + visuels" : "Refonte complète urgente";
        return '<td style="padding:4px 8px;font-size:11px;color:' + AUDIT_NIVEAU_COLOR(n) + ';font-weight:600;white-space:nowrap">' + pa + '</td>';
      }

      if (c.isCanal) {
        const cv = skuToCanal[r.sku] || "";
        return stickyWrap('<td style="text-align:center;padding:4px 6px">'
          + (cv ? '<span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:var(--acBg);color:var(--ac)">' + esc(cv) + '</span>' : '<span style="color:var(--txT);font-size:10px">—</span>')
          + '</td>', c);
      }

      if (c.isLink) {
        const v = r[c.key] || "";
        const isReal = v && v !== "Pas en ligne" && v.startsWith("http");
        return stickyWrap('<td style="text-align:center;padding:4px 6px">'
          + (isReal ? '<a href="' + esc(v) + '" target="_blank" class="link">Voir ↗</a>' : '<span style="color:var(--txT);font-size:10px">—</span>')
          + '</td>', c);
      }

      if (!c.editable) {
        return stickyWrap('<td style="padding:4px 8px;font-size:12px;font-weight:500">' + esc(String(r[c.key] || "")) + '</td>', c);
      }

      if (c.isSelect) {
        const v = r[c.key] || "";
        const isOther = v && !c.options.slice(0, -1).includes(v);
        const opts = c.options.map(function(o) {
          const sel = ((isOther && o === 'Autre') || v === o) ? ' selected' : '';
          return '<option value="' + esc(o) + '"' + sel + '>' + esc(o) + '</option>';
        }).join("");
        return stickyWrap('<td style="padding:2px 4px;min-width:' + c.w + 'px">'
          + '<select onchange="auditHandleSelect(' + r.id + ',\'' + c.key + '\',this.value,this)" style="width:100%;padding:3px 4px;border:.5px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;background:transparent">'
          + opts + '</select>'
          + (isOther ? '<input value="' + esc(v) + '" style="width:100%;margin-top:2px;padding:2px 4px;border:.5px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit" onblur="auditSaveCell(' + r.id + ',\'' + c.key + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">' : "")
          + '</td>', c);
      }

      const v = (r[c.key] !== null && r[c.key] !== undefined) ? r[c.key] : "";

      // Dropdown pour les champs de note (max défini)
      if (c.max !== undefined) {
        const curVal = (v === "" || v === null) ? "" : String(v);
        const opts = '<option value=""'+(curVal===''?' selected':'')+'>—</option>'
          + Array.from({length: c.max+1}, (_,i) => '<option value="'+i+'"'+(curVal===String(i)?' selected':'')+'>'+i+'</option>').join('');
        return '<td style="text-align:center;padding:2px 3px">'
          + '<select onchange="auditMarkPending('+r.id+',\''+c.key+'\',this.value)" style="width:'+(c.w-6)+'px;text-align:center;padding:2px 1px;border:none;border-bottom:.5px solid rgba(0,0,0,0.12);border-radius:0;font-size:11px;font-family:inherit;background:transparent;color:var(--tx);cursor:pointer;outline:none">'
          + opts + '</select>'
          + '</td>';
      }

      // textarea commentaire
      return '<td style="padding:2px 4px;min-width:' + c.w + 'px">'
        + '<textarea rows="3" style="width:' + (c.w - 8) + 'px;padding:3px 5px;border:.5px solid var(--border);border-radius:4px;font-size:10px;font-family:inherit;resize:vertical;background:transparent;min-height:52px"'
        + ' onblur="auditSaveCell(' + r.id + ',\'' + c.key + '\',this.value)">'
        + esc(String(v))
        + '</textarea></td>';

    }).join("");

    return '<tr style="' + bg + ';border-bottom:1px solid var(--borderL);'+(hasPendingRow?'outline:2px solid var(--am);outline-offset:-1px;':'')+'" id="audit-row-' + r.id + '">'
      + cells
      + '<td style="display:none"></td>'
      + '</tr>';

  }).join("");
}

function auditMarkPending(id, field, newValue) {
  const row = auditData.find(r => r.id === id);
  if (!row) return;
  const parsed = newValue === "" ? null : newValue;
  if (!auditPendingChanges[id]) auditPendingChanges[id] = {};
  const existing = auditPendingChanges[id][field];
  const origValue = existing !== undefined ? existing.orig : row[field];
  row[field] = parsed;
  const origStr = String(origValue ?? '');
  const curStr = String(parsed ?? '');
  if (origStr === curStr) {
    delete auditPendingChanges[id][field];
    if (Object.keys(auditPendingChanges[id]).length === 0) delete auditPendingChanges[id];
  } else {
    auditPendingChanges[id][field] = { orig: origValue, cur: parsed };
  }
  const rowEl = document.getElementById('audit-row-' + id);
  if (rowEl) rowEl.outerHTML = buildAuditRows([row]);
}

async function auditSaveRow(id) {
  const row = auditData.find(r => r.id === id);
  if (!row) return;
  const pending = auditPendingChanges[id];
  if (!pending || !Object.keys(pending).length) return;
  const btn = document.querySelector('[data-save-row="'+id+'"]');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const updateData = { updated_at: new Date().toISOString() };
    Object.entries(pending).forEach(([f, {cur}]) => { updateData[f] = cur; });
    await sbUpdate("audit_idq", "id=eq."+id, updateData);
    const hasScoreChange = Object.keys(pending).some(f => AUDIT_SCORE_FIELDS.includes(f));
    if (hasScoreChange) {
      const calc = AUDIT_SCORE_FORMULA(row);
      await sbInsert("audit_idq_history", {
        audit_idq_id: id, marketplace: MARKETPLACE, sku: row.sku,
        score_idq: calc.score, niveau: AUDIT_NIVEAU(calc.score),
        semaine: row.semaine || null, recorded_at: new Date().toISOString()
      });
    }
    delete auditPendingChanges[id];
    const rowEl = document.getElementById('audit-row-' + id);
    if (rowEl) rowEl.outerHTML = buildAuditRows([row]);
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '💾'; }
    console.error("Erreur sauvegarde ligne audit:", e.message);
  }
}

async function auditSaveAllPending() {
  const ids = Object.keys(auditPendingChanges);
  for (const id of ids) await auditSaveRow(Number(id));
}

function isAuditTabActive() {
  if (isMinimalMp()) return STATE.tab === 2;
  if (MARKETPLACE === 'laredoute') return STATE.tab === 4;
  if (isLightMp()) return STATE.tab === 5;
  return STATE.tab === 7;
}

function showAuditUnsavedModal(onSave, onDiscard) {
  const entries = Object.entries(auditPendingChanges);
  const tableRows = entries.map(([id, changes]) => {
    const row = auditData.find(r => String(r.id) === id);
    const sku = row ? (row.sku || id) : id;
    const nom = row ? (row.nom_produit || '') : '';
    const diffs = Object.entries(changes).map(([f, {orig, cur}]) => {
      const label = AUDIT_FIELD_LABELS[f] || f;
      const o = orig === null || orig === undefined ? 'N/A' : orig;
      const c = cur  === null || cur  === undefined ? 'N/A' : cur;
      return '<span style="background:var(--amBg);color:var(--am);padding:1px 6px;border-radius:4px;font-size:10px;white-space:nowrap">'+esc(label)+' : '+o+' → <b>'+c+'</b></span>';
    }).join(' ');
    return '<tr style="border-bottom:1px solid var(--borderL)">'
      + '<td style="padding:6px 10px;font-weight:600;white-space:nowrap;font-size:12px">'+esc(sku)+'</td>'
      + '<td style="padding:6px 10px;color:var(--txS);font-size:11px;max-width:200px">'+esc(nom.slice(0,40))+'</td>'
      + '<td style="padding:6px 10px;font-size:11px">'+diffs+'</td>'
      + '</tr>';
  }).join('');

  const html = '<div style="font-size:13px;color:var(--tx);margin-bottom:14px">⚠️ <b>'+entries.length+' produit'+(entries.length>1?'s':'')+' avec des notes non enregistrées</b></div>'
    + '<div style="overflow-x:auto;max-height:300px;overflow-y:auto;margin-bottom:16px"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    + '<thead><tr style="background:var(--bg)"><th style="padding:6px 10px;text-align:left;font-size:11px;color:var(--txS)">SKU</th><th style="padding:6px 10px;text-align:left;font-size:11px;color:var(--txS)">Produit</th><th style="padding:6px 10px;text-align:left;font-size:11px;color:var(--txS)">Modifications</th></tr></thead>'
    + '<tbody>'+tableRows+'</tbody></table></div>'
    + '<div id="audit-unsaved-status" style="font-size:12px;color:var(--gn);min-height:18px;margin-bottom:10px;text-align:center"></div>'
    + '<div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap">'
    + '<button onclick="auditUnsavedDiscard()" style="padding:8px 18px;border:.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--txS)">Ignorer les modifications</button>'
    + '<button onclick="auditUnsavedSaveAll()" style="padding:8px 18px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--gn);color:#fff">✓ Tout enregistrer</button>'
    + '</div>';

  openModal("Notes non enregistrées", html);
  window._auditUnsavedOnSave = onSave;
  window._auditUnsavedOnDiscard = onDiscard;
}

async function auditUnsavedSaveAll() {
  const statusEl = document.getElementById('audit-unsaved-status');
  const btns = document.querySelectorAll('.modal button');
  btns.forEach(b => b.disabled = true);
  if (statusEl) statusEl.textContent = 'Enregistrement en cours…';
  await auditSaveAllPending();
  if (statusEl) statusEl.textContent = '✓ Enregistré !';
  await new Promise(r => setTimeout(r, 800));
  closeModal();
  if (window._auditUnsavedOnSave) window._auditUnsavedOnSave();
}

function auditUnsavedDiscard() {
  auditPendingChanges = {};
  closeModal();
  if (window._auditUnsavedOnDiscard) window._auditUnsavedOnDiscard();
}

async function auditSaveCell(id, field, value) {
  const key = id + "_" + field;
  if (auditSaving[key]) return;
  auditSaving[key] = true;
  try {
    const updateData = { [field]: value === "" ? null : value, updated_at: new Date().toISOString() };
    await sbUpdate("audit_idq", "id=eq."+id, updateData);
    // Mettre à jour auditData local
    const row = auditData.find(r=>r.id===id);
    if (row) {
      row[field] = value === "" ? null : value;
      // Si c'est un champ de score, mettre à jour l'historique
      const scoreFields = ["titre_longueur","titre_marque","titre_collection","titre_couleur","titre_matiere","titre_fonctions","desc_bullets_nb","desc_bullets_pertinence","desc_caract_tech","desc_dimensions","desc_colis","desc_textes_mkt","visuels_fond_blanc","visuels_dimensions","visuels_lifestyle","visuels_zoom_matiere","visuels_fonction","visuels_qualite_carrousel","gdv_couleur","gdv_autre","aplus_fiche","aplus_video"];
      if (scoreFields.includes(field)) {
        const calc = AUDIT_SCORE_FORMULA(row);
        const niveau = AUDIT_NIVEAU(calc.score);
        // Mettre à jour l'affichage du score dans la ligne
        const rowEl = document.getElementById("audit-row-" + id);
        if (rowEl) {
          // Re-render juste la ligne
          const newRow = buildAuditRows([row]);
          rowEl.outerHTML = newRow;
        }
      }
    }
  } catch(e) {
    console.error("Erreur sauvegarde audit:", e.message);
  } finally {
    delete auditSaving[key];
  }
}

async function showAuditHistory(id, sku) {
  try {
    const history = await sb("audit_idq_history", "audit_idq_id=eq."+id+"&select=*&order=recorded_at.desc&limit=20");
    const row = auditData.find(r=>r.id===id);
    const currentScore = row ? AUDIT_SCORE_FORMULA(row).score : null;
    const currentNiveau = row ? AUDIT_NIVEAU(currentScore) : "";
    if (!history.length && !currentScore) {
      openModal("Historique — " + sku, '<div style="padding:20px;text-align:center;color:var(--txT)">Aucun historique disponible.</div>');
      return;
    }
    const fmtDate = d => new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});

    const currentRow = currentScore
      ? '<tr style="background:var(--acBg);border-bottom:1px solid var(--borderL)">'
        + '<td style="padding:8px 12px;font-weight:600">Actuel</td>'
        + '<td style="padding:8px 12px;text-align:center;font-size:18px;font-weight:800;color:'+AUDIT_NIVEAU_COLOR(currentNiveau)+'">'+currentScore+'</td>'
        + '<td style="padding:8px 12px;text-align:center"><span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:'+AUDIT_NIVEAU_BG(currentNiveau)+';color:'+AUDIT_NIVEAU_COLOR(currentNiveau)+'">'+currentNiveau+'</span></td>'
        + '<td style="padding:8px 12px;text-align:center;color:var(--txT)">'+(row && row.semaine ? row.semaine : "—")+'</td>'
        + '</tr>'
      : "";

    const histRows = history.map(function(h, i) {
      const n = AUDIT_NIVEAU(h.score_idq);
      const prev = history[i+1];
      const delta = prev ? h.score_idq - prev.score_idq : null;
      const deltaHtml = delta !== null
        ? '<span style="font-size:10px;font-weight:600;color:'+(delta>0?"var(--gn)":delta<0?"var(--rd)":"var(--txT)")+'">'+( delta>0?"+":"")+delta+'</span>'
        : "";
      return '<tr style="border-bottom:1px solid var(--borderL)">'
        + '<td style="padding:7px 12px;font-size:11px;color:var(--txS)">'+fmtDate(h.recorded_at)+'</td>'
        + '<td style="padding:7px 12px;text-align:center;font-size:16px;font-weight:700;color:'+AUDIT_NIVEAU_COLOR(n)+'">'+(h.score_idq||"—")+deltaHtml+'</td>'
        + '<td style="padding:7px 12px;text-align:center"><span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:'+AUDIT_NIVEAU_BG(n)+';color:'+AUDIT_NIVEAU_COLOR(n)+'">'+n+'</span></td>'
        + '<td style="padding:7px 12px;text-align:center;color:var(--txS)">'+(h.semaine||"—")+'</td>'
        + '</tr>';
    }).join("");

    const html = '<div style="font-size:12px;color:var(--txS);margin-bottom:10px">'+history.length+' entrée'+(history.length>1?"s":"")+" dans l'historique</div>"
      + '<div style="overflow-x:auto">'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px">'
      + '<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">'
      + '<th style="padding:7px 12px;text-align:left;color:var(--txS)">Date</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Score IDQ</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Niveau</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Semaine</th>'
      + '</tr></thead>'
      + '<tbody>'+currentRow+histRows+'</tbody>'
      + '</table></div>'
      + '<button onclick="saveAuditSnapshot('+id+',\''+esc(sku)+'\')" style="margin-top:12px;padding:8px 16px;background:var(--ac);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">+ Enregistrer le score actuel dans l\'historique</button>';

    openModal("Historique IDQ — " + sku, html);
  } catch(e) {
    openModal("Historique — " + sku, '<div style="color:var(--rd);padding:20px">'+e.message+'</div>');
  }
}

async function saveAuditSnapshot(id, sku) {
  const row = auditData.find(r=>r.id===id);
  if (!row) return;
  const calc = AUDIT_SCORE_FORMULA(row);
  const niveau = AUDIT_NIVEAU(calc.score);
  try {
    await sbInsert("audit_idq_history", {
      audit_idq_id: id,
      marketplace: MARKETPLACE,
      sku: sku,
      score_idq: calc.score,
      niveau: niveau,
      semaine: row.semaine || null,
      recorded_at: new Date().toISOString()
    });
    closeModal();
    showAuditHistory(id, sku);
  } catch(e) {
    alert("Erreur : " + e.message);
  }
}

async function showAuditGroupHistory() {
  // Reconstruire la liste filtrée courante
  const skuToCanal = {};
  (STATE.products||[]).forEach(p=>{ if(p.sku) skuToCanal[p.sku] = p.canal_attribue||""; });
  let list = auditData;
  if (auditFilters.type !== "all") list = list.filter(r=>r.type_ref===auditFilters.type);
  if (auditFilters.categorie !== "all") list = list.filter(r=>r.categorie===auditFilters.categorie);
  if (auditFilters.niveau !== "all") list = list.filter(r=>AUDIT_NIVEAU(AUDIT_SCORE_FORMULA(r).score)===auditFilters.niveau);
  if (auditFilters.canal !== "all") list = list.filter(r=>(skuToCanal[r.sku]||"")===auditFilters.canal);
  if (auditFilters.search) {
    const s = auditFilters.search.toLowerCase();
    list = list.filter(r=>(r.sku||"").toLowerCase().includes(s)||(r.nom_produit||"").toLowerCase().includes(s));
  }
  if (!list.length) { openModal("Historique sous-groupe", '<div style="padding:20px;text-align:center;color:var(--txT)">Aucune référence dans le sous-groupe filtré.</div>'); return; }

  const ids = list.map(r=>r.id);
  const filterDesc = [
    auditFilters.type!=="all"?"Type: "+auditFilters.type:"",
    auditFilters.categorie!=="all"?"Catég: "+auditFilters.categorie:"",
    auditFilters.canal!=="all"?"Canal: "+auditFilters.canal:"",
    auditFilters.niveau!=="all"?auditFilters.niveau:"",
    auditFilters.search?'"'+auditFilters.search+'"':"",
  ].filter(Boolean).join(" · ") || "Toutes références";

  openModal("Historique sous-groupe — "+list.length+" réf.", '<div style="padding:20px;text-align:center;color:var(--txT)">Chargement...</div>');

  try {
    const niveaux = ["🔴 Critique","🟡 À optimiser","🟢 Conforme","⭐ Excellence"];
    const history = await sb("audit_idq_history",
      "marketplace=eq."+MARKETPLACE+"&audit_idq_id=in.("+ids.join(",")+")&select=audit_idq_id,score_idq,semaine,recorded_at&order=recorded_at.desc&limit=2000"
    );

    // Inclure le snapshot courant comme "Actuel"
    const currentEntries = list.map(r=>({
      audit_idq_id: r.id,
      score_idq: AUDIT_SCORE_FORMULA(r).score,
      semaine: r.semaine || null,
      recorded_at: "_current"
    }));

    // Grouper par semaine (ou par date tronquée à la semaine)
    const grouped = {};
    const addEntries = (entries) => {
      entries.forEach(h => {
        if (!h.score_idq) return;
        let key = h.semaine;
        if (!key && h.recorded_at && h.recorded_at !== "_current") {
          const d = new Date(h.recorded_at);
          key = d.toISOString().slice(0,10);
        }
        if (!key) key = "_actuel";
        if (!grouped[key]) grouped[key] = { semaine: key, scores: [], ids: new Set() };
        if (!grouped[key].ids.has(h.audit_idq_id)) {
          grouped[key].scores.push(h.score_idq);
          grouped[key].ids.add(h.audit_idq_id);
        }
      });
    };
    addEntries(history);
    // Ajouter l'état actuel dans un groupe séparé
    const currentKey = "_actuel";
    grouped[currentKey] = { semaine: "Actuel", scores: [], ids: new Set() };
    currentEntries.forEach(h => {
      if (h.score_idq && !grouped[currentKey].ids.has(h.audit_idq_id)) {
        grouped[currentKey].scores.push(h.score_idq);
        grouped[currentKey].ids.add(h.audit_idq_id);
      }
    });

    const sortedKeys = Object.keys(grouped).filter(k=>k!==currentKey).sort().reverse();
    const allKeys = [currentKey, ...sortedKeys];

    const fmtDate = d => {
      if (!d || d === "_actuel") return "Actuel";
      if (/^S\d/.test(d)) return d;
      try { return new Date(d+"T12:00:00Z").toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"}); } catch(e) { return d; }
    };

    const rows = allKeys.map((k, ki) => {
      const g = grouped[k];
      if (!g.scores.length) return "";
      const avg = Math.round(g.scores.reduce((a,b)=>a+b,0)/g.scores.length);
      const n = AUDIT_NIVEAU(avg);
      const nCritique = g.scores.filter(s=>AUDIT_NIVEAU(s)==="🔴 Critique").length;
      const nOptim = g.scores.filter(s=>AUDIT_NIVEAU(s)==="🟡 À optimiser").length;
      const nConforme = g.scores.filter(s=>AUDIT_NIVEAU(s)==="🟢 Conforme").length;
      const nExcellence = g.scores.filter(s=>AUDIT_NIVEAU(s)==="⭐ Excellence").length;
      const prevKey = allKeys[ki+1];
      const prevAvg = prevKey && grouped[prevKey]?.scores.length ? Math.round(grouped[prevKey].scores.reduce((a,b)=>a+b,0)/grouped[prevKey].scores.length) : null;
      const delta = prevAvg !== null ? avg - prevAvg : null;
      const deltaHtml = delta !== null
        ? ' <span style="font-size:10px;font-weight:600;color:'+(delta>0?"var(--gn)":delta<0?"var(--rd)":"var(--txT)")+'">('+(delta>0?"+":"")+delta+')</span>'
        : "";
      const isActuel = k === currentKey;
      const bg = isActuel ? "background:var(--acBg)" : (ki%2===1?"background:var(--bg)":"");
      return '<tr style="'+bg+';border-bottom:1px solid var(--borderL)">'
        + '<td style="padding:7px 12px;font-size:11px;color:var(--txS);white-space:nowrap;font-weight:'+(isActuel?"700":"400")+'">' + fmtDate(g.semaine) + '</td>'
        + '<td style="padding:7px 12px;text-align:center;font-weight:600">' + g.scores.length + '</td>'
        + '<td style="padding:7px 12px;text-align:center;font-size:15px;font-weight:800;color:'+AUDIT_NIVEAU_COLOR(n)+'">' + avg + deltaHtml + '</td>'
        + '<td style="padding:7px 12px;text-align:center"><span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:'+AUDIT_NIVEAU_BG(n)+';color:'+AUDIT_NIVEAU_COLOR(n)+'">'+n+'</span></td>'
        + '<td style="padding:7px 12px;text-align:center;color:var(--rd);font-weight:600">' + (nCritique||"—") + '</td>'
        + '<td style="padding:7px 12px;text-align:center;color:var(--am);font-weight:600">' + (nOptim||"—") + '</td>'
        + '<td style="padding:7px 12px;text-align:center;color:var(--gn);font-weight:600">' + (nConforme||"—") + '</td>'
        + '<td style="padding:7px 12px;text-align:center;color:var(--pu);font-weight:600">' + (nExcellence||"—") + '</td>'
        + '</tr>';
    }).join("");

    const html = '<div style="font-size:11px;color:var(--txS);margin-bottom:10px">Filtres actifs : <b>'+filterDesc+'</b></div>'
      + '<div style="overflow-x:auto">'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px">'
      + '<thead><tr style="background:var(--bg);border-bottom:2px solid var(--border)">'
      + '<th style="padding:7px 12px;text-align:left;color:var(--txS)">Semaine</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Nb réf.</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Score IDQ moy.</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--txS)">Niveau</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--rd)">🔴 Critiques</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--am)">🟡 À optim.</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--gn)">🟢 Conformes</th>'
      + '<th style="padding:7px 12px;text-align:center;color:var(--pu)">⭐ Excellence</th>'
      + '</tr></thead>'
      + '<tbody>' + (rows || '<tr><td colspan="8" style="padding:20px;text-align:center;color:var(--txT)">Aucun historique disponible pour ce sous-groupe.<br><small>Utilisez le bouton 📈 sur chaque ligne pour enregistrer des snapshots.</small></td></tr>') + '</tbody>'
      + '</table></div>';

    openModal("Historique sous-groupe — "+filterDesc, html);
  } catch(e) {
    openModal("Historique sous-groupe", '<div style="color:var(--rd);padding:20px">'+e.message+'</div>');
  }
}

// Upsert pour une marketplace donnée (utilisé par import simple et multi)
async function _auditUpsertForMp(mp, mpRows, semaine, statusEl, prefix) {
  const existing = await sb("audit_idq", `marketplace=eq.${mp}&select=id,sku,score_idq,niveau,semaine`).catch(()=>[]);
  // Snapshot historique avant écrasement
  const histRows = existing.filter(e=>e.score_idq).map(e=>({
    audit_idq_id: e.id, marketplace: mp, sku: e.sku,
    score_idq: e.score_idq, niveau: e.niveau, semaine: e.semaine,
    recorded_at: new Date().toISOString()
  }));
  if (histRows.length) {
    await fetch(`${SB_URL}/rest/v1/audit_idq_history`, {
      method:"POST", headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=minimal"},
      body:JSON.stringify(histRows)
    });
  }
  let n = 0;
  for (const row of mpRows) {
    // Normaliser marketplace + calculer score_idq pour stockage
    const calc = AUDIT_SCORE_FORMULA(row);
    const cleanRow = { ...row, marketplace: mp, semaine,
      score_idq: calc.score || null,
      niveau: AUDIT_NIVEAU(calc.score) || null,
      updated_at: new Date().toISOString() };
    const existingRow = existing.find(e=>e.sku===row.sku);
    if (existingRow) {
      await sbUpdate("audit_idq", `id=eq.${existingRow.id}`, cleanRow);
    } else {
      await sbInsert("audit_idq", cleanRow);
    }
    n++;
    if (statusEl && n % 10 === 0) statusEl.innerHTML = `<span style="color:var(--txS)">${prefix}${n}/${mpRows.length} lignes…</span>`;
  }
  return n;
}

async function confirmAuditImport() {
  const statusEl = document.getElementById("audit-import-status");
  const pwd = document.getElementById("audit-pwd")?.value;
  const file = document.getElementById("audit-file")?.files[0];
  const semaine = document.getElementById("audit-semaine")?.value?.trim();
  const allMp = document.getElementById("audit-all-mp")?.checked;

  if (pwd !== ADMIN_PASSWORD) { statusEl.innerHTML='<span style="color:var(--rd)">❌ Mot de passe incorrect.</span>'; return; }
  if (!file || !semaine) { statusEl.innerHTML='<span style="color:var(--rd)">Fichier et semaine obligatoires.</span>'; return; }

  statusEl.innerHTML = '<span style="color:var(--txS)">Lecture du fichier…</span>';

  try {
    const rows = await parseAuditXLS(file, semaine);

    if (allMp) {
      // ── Mode toutes marketplaces ──────────────────────────────────
      const byMp = {};
      rows.forEach(r => {
        const mp = normalizeAuditMp(r.marketplace);
        if (!mp) return;
        if (!byMp[mp]) byMp[mp] = [];
        byMp[mp].push(r);
      });
      const mps = Object.keys(byMp);
      if (!mps.length) { statusEl.innerHTML='<span style="color:var(--am)">⚠ Aucune marketplace reconnue dans le fichier.</span>'; return; }
      let total = 0;
      for (const mp of mps) {
        statusEl.innerHTML = `<span style="color:var(--txS)">Import ${mp} (${byMp[mp].length} lignes)…</span>`;
        total += await _auditUpsertForMp(mp, byMp[mp], semaine, statusEl, `${mp} : `);
      }
      statusEl.innerHTML = `<span style="color:var(--gn)">✓ ${total} lignes importées sur ${mps.length} marketplaces (${mps.join(", ")}).</span>`;
    } else {
      // ── Mode marketplace courante seulement ───────────────────────
      const mpRows = rows.filter(r => normalizeAuditMp(r.marketplace) === MARKETPLACE);
      if (!mpRows.length) { statusEl.innerHTML=`<span style="color:var(--am)">⚠ Aucune ligne pour ${MARKETPLACE} dans ce fichier.</span>`; return; }
      statusEl.innerHTML = `<span style="color:var(--txS)">Import de ${mpRows.length} lignes…</span>`;
      const n = await _auditUpsertForMp(MARKETPLACE, mpRows, semaine, statusEl, "");
      statusEl.innerHTML = `<span style="color:var(--gn)">✓ ${n} lignes importées pour ${MARKETPLACE}.</span>`;
    }

    setTimeout(()=>{ closeModal(); renderAudit(); }, 1200);
  } catch(e) {
    statusEl.innerHTML = `<span style="color:var(--rd)">Erreur : ${e.message}</span>`;
  }
}

function normalizeAuditMp(mp) {
  if (!mp) return null;
  const m = mp.toLowerCase().trim();
  if (m.includes("cdiscount")) return "cdiscount";
  if (m.includes("maison")) return "maisonsdumonde";
  if (m.includes("but")) return "but";
  if (m.includes("redoute")) return "laredoute";
  if (m.includes("leroy")) return "leroymerlin";
  if (m.includes("amazon")) return "amazon";
  if (m.includes("conforama")) return "conforama";
  if (m.includes("manomano")) return "manomano";
  return m;
}

async function parseAuditXLS(file, semaine) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type:"array" });
        const ws = wb.Sheets["Top et Nouveautés"] || wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

        const result = [];
        // Les données commencent à la ligne 5 (index 4)
        for (let i = 4; i < rows.length; i++) {
          const r = rows[i];
          if (!r || !r[0] || !r[2]) continue; // SKU et Marketplace obligatoires
          // Ignorer les lignes récapitulatives/séparateurs (marketplace non reconnue)
          if (!normalizeAuditMp(String(r[2]).trim())) continue;
          const na = v => (v === "N/A" || v === null || v === undefined) ? null : (isNaN(parseFloat(v)) ? null : parseFloat(v));
          const str = v => v ? String(v).trim() : null;
          result.push({
            marketplace: str(r[2]),
            sku: str(r[0]),
            nom_produit: str(r[1]),
            lien_mkp: str(r[3]),
            categorie: str(r[4]),
            type_ref: str(r[5]),
            titre_longueur: na(r[6]),
            titre_marque: na(r[7]),
            titre_collection: na(r[8]),
            titre_couleur: na(r[9]),
            titre_matiere: na(r[10]),
            titre_fonctions: na(r[11]),
            desc_bullets_nb: na(r[13]),
            desc_bullets_pertinence: na(r[14]),
            desc_caract_tech: na(r[15]),
            desc_dimensions: na(r[16]),
            desc_colis: na(r[17]),
            desc_textes_mkt: na(r[18]),
            visuels_fond_blanc: na(r[20]),
            visuels_dimensions: na(r[21]),
            visuels_lifestyle: na(r[22]),
            visuels_zoom_matiere: na(r[23]),
            visuels_fonction: na(r[24]),
            visuels_qualite_carrousel: na(r[25]),
            gdv_couleur: na(r[27]),
            gdv_autre: na(r[28]),
            aplus_fiche: na(r[30]),
            aplus_video: na(r[31]),
            plan_action: str(r[35]),
            commentaire_1: str(r[40]),
            commentaire_2: str(r[41]),
            commentaire_3: str(r[42]),
            commentaire_4: str(r[43]),
            commentaire_5: str(r[38]),
            commentaire_6: str(r[39]),
            semaine: semaine,
          });
        }
        resolve(result);
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function auditHandleSelect(id, field, value, selectEl) {
  const td = selectEl.closest('td');
  if (value === 'Autre') {
    let inp = td.querySelector('input');
    if (!inp) {
      inp = document.createElement('input');
      inp.style.cssText = 'width:100%;margin-top:2px;padding:2px 4px;border:.5px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit';
      inp.addEventListener('blur', () => auditSaveCell(id, field, inp.value));
      inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });
      td.appendChild(inp);
    }
    inp.focus();
  } else {
    const inp = td.querySelector('input');
    if (inp) inp.remove();
    auditSaveCell(id, field, value);
  }
}


function exportAuditCSV() {
  const headers = ["SKU","Produit","Marketplace","Lien","Catégorie","Type","Titre Long.","Titre Marque","Titre Collec.","Titre Couleur","Titre Matière","Titre Fonct.","Total Titre","Bullets nb","Pertinence","Caract. tech","Dims","Colis","Textes MKT","Total Desc","Fond blanc","Dims vis.","Lifestyle","Zoom mat.","Fonction","Carrousel","Total Visuels","GDV Couleur","GDV Autre","Total GDV","Fiche A+","Vidéo","Total A+","Score IDQ","Niveau","Plan d'action","Commentaire Titre","Commentaire Desc","Commentaire Visuels","Commentaire GDV","Commentaire A+","Commentaire Divers","Semaine"];
  const rows = auditData.map(r => {
    const calc = AUDIT_SCORE_FORMULA(r);
    const niveau = AUDIT_NIVEAU(calc.score);
    const pa = calc.score >= 90 ? "OK — Surveiller" : calc.score >= 75 ? "Ajustements mineurs" : calc.score >= 50 ? "Optimisation contenu + visuels" : "Refonte complète urgente";
    return [r.sku,r.nom_produit,r.marketplace,r.lien_mkp,r.categorie,r.type_ref,r.titre_longueur,r.titre_marque,r.titre_collection,r.titre_couleur,r.titre_matiere,r.titre_fonctions,calc.titreTotal,r.desc_bullets_nb,r.desc_bullets_pertinence,r.desc_caract_tech,r.desc_dimensions,r.desc_colis,r.desc_textes_mkt,calc.descTotal,r.visuels_fond_blanc,r.visuels_dimensions,r.visuels_lifestyle,r.visuels_zoom_matiere,r.visuels_fonction,r.visuels_qualite_carrousel,calc.visTotal,r.gdv_couleur,r.gdv_autre,calc.gdvTotal,r.aplus_fiche,r.aplus_video,calc.aplusTotal,calc.score,niveau,pa,r.commentaire_5,r.commentaire_6,r.commentaire_1,r.commentaire_2,r.commentaire_3,r.commentaire_4,r.semaine];
  });
  const csvCell = v => { const s = String(v??''); return s.includes(';')||s.includes('"')||s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s; };
  const csv = [headers,...rows].map(row=>row.map(csvCell).join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`audit_idq_${MARKETPLACE}_${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

let opeData = [];
const OPE_COLORS = ["#2c5ea0","#e8963a","#2e9e6b","#c0392b","#8e44ad","#16a085","#d35400","#e74c3c","#27ae60","#2980b9"];

function opeColor(id) {
  return OPE_COLORS[id % OPE_COLORS.length];
}

function opeIsActive(op) {
  const now = new Date();
  const d = new Date(op.date_debut);
  const f = new Date(op.date_fin);
  return now >= d && now <= f;
}

async function renderOpeCommerciales() {
  const el = document.getElementById("content");
  el.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>Chargement des opérations...</div></div>';
  try {
    opeData = await sb("commercial_operations", "marketplace=eq."+MARKETPLACE+"&select=*&order=date_debut.desc");
  } catch(e) { opeData = []; }
  try {
    const opProds = await sb("operation_products", "marketplace=eq."+MARKETPLACE+"&select=operation_id,taux_commission");
    const countMap = {}, commMap = {};
    opProds.forEach(p => {
      const id = p.operation_id;
      if (!countMap[id]) { countMap[id] = 0; commMap[id] = []; }
      countMap[id]++;
      if (p.taux_commission != null) commMap[id].push(p.taux_commission);
    });
    opeData.forEach(op => {
      op._prodCount = countMap[op.id] || 0;
      const comms = commMap[op.id] || [];
      op._commAvg = comms.length ? (MARKETPLACE === 'manomano'
        ? Math.round(comms.reduce((s,v) => s+v, 0) / comms.length)
        : Math.round(comms.reduce((s,v) => s+v, 0) / comms.length * 1000) / 10) : null;
    });
  } catch(e) {}
  el.innerHTML = buildOpeHTML();
}

function buildOpeHTML() {
  const now = new Date();
  const months = [];
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleDateString("fr-FR", {month:"long", year:"numeric"}) });
  }

  const active = opeData.filter(op => opeIsActive(op));
  const expired = opeData.filter(op => new Date(op.date_fin) < now);
  const future = opeData.filter(op => new Date(op.date_debut) > now);

  // KPIs
  const kpis = '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">'
    + '<div class="metric"><div class="metric-label">Opérations actives</div><div class="metric-value" style="color:var(--gn)">'+active.length+'</div></div>'
    + '<div class="metric"><div class="metric-label">À venir</div><div class="metric-value" style="color:var(--ac)">'+future.length+'</div></div>'
    + '<div class="metric"><div class="metric-label">Expirées</div><div class="metric-value" style="color:var(--txT)">'+expired.length+'</div></div>'
    + '<div class="metric"><div class="metric-label">Total produits actifs</div><div class="metric-value" style="color:var(--am)">'
    + active.reduce((s,op) => s + (op._prodCount||0), 0)
    + '</div></div>'
    + '</div>';

  // Timeline
  const COL_W = 180;
  const LEFT_W = 60;
  const ROW_H = 60;
  const HEADER_H = 72;
  const BAR_H = 34;

  // Filtrer les opérations visibles sur la timeline (actives + futures + expirées du mois courant)
  const timelineOps = opeData.filter(op => {
    const fin = new Date(op.date_fin);
    const start = new Date(months[0].year, months[0].month, 1);
    const end = new Date(months[5].year, months[5].month + 1, 0);
    return fin >= start && new Date(op.date_debut) <= end;
  });

  const timelineH = Math.max(timelineOps.length * ROW_H + HEADER_H + 20, HEADER_H + 60);
  const totalW = LEFT_W + COL_W * 6;

  // SVG timeline
  let svg = '<svg viewBox="0 0 '+totalW+' '+timelineH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;font-family:DM Sans,sans-serif">';

  // Fond header
  svg += '<rect x="0" y="0" width="'+totalW+'" height="'+HEADER_H+'" fill="#f0eee9" rx="0"/>';

  // Colonne gauche (HIST.)
  svg += '<rect x="0" y="0" width="'+LEFT_W+'" height="'+timelineH+'" fill="#fafaf8"/>';
  svg += '<text x="'+(LEFT_W/2)+'" y="22" text-anchor="middle" font-size="10" fill="#6b6a65" font-weight="600">HIST.</text>';
  svg += '<text x="'+(LEFT_W/2)+'" y="56" text-anchor="middle" font-size="20" fill="#2c5ea0" font-weight="700" style="cursor:pointer" onclick="openOpeHistory()">+</text>';

  // Colonnes mois
  months.forEach(function(m, mi) {
    const x = LEFT_W + mi * COL_W;
    const isCurrentMonth = (m.year === now.getFullYear() && m.month === now.getMonth());
    const accentColor = isCurrentMonth ? "#2c5ea0" : "#6b6a65";
    svg += '<rect x="'+x+'" y="0" width="'+COL_W+'" height="'+HEADER_H+'" fill="'+(isCurrentMonth?"#e8f0fa":"#f0eee9")+'"/>';
    svg += '<text x="'+(x+COL_W/2)+'" y="22" text-anchor="middle" font-size="12" fill="'+(isCurrentMonth?"#2c5ea0":"#1a1a18")+'" font-weight="700">'+m.label.charAt(0).toUpperCase()+m.label.slice(1)+'</text>';
    // Bouton + entièrement dans le header (pas de dépassement sur les barres)
    svg += '<rect x="'+(x+COL_W/2-14)+'" y="36" width="28" height="22" rx="6" fill="'+accentColor+'" opacity="0.12" style="cursor:pointer" onclick="openOpeCreate(\''+m.year+'-'+String(m.month+1).padStart(2,'0')+'\')"/>';
    svg += '<text x="'+(x+COL_W/2)+'" y="52" text-anchor="middle" font-size="15" fill="'+accentColor+'" font-weight="700" style="cursor:pointer" onclick="openOpeCreate(\''+m.year+'-'+String(m.month+1).padStart(2,'0')+'\')">＋</text>';
    // Ligne verticale
    svg += '<line x1="'+x+'" y1="0" x2="'+x+'" y2="'+timelineH+'" stroke="#e8e6e1" stroke-width="1"/>';
  });

  // Ligne horizontale header
  svg += '<line x1="0" y1="'+HEADER_H+'" x2="'+totalW+'" y2="'+HEADER_H+'" stroke="#e8e6e1" stroke-width="1.5"/>';

  // Barre "aujourd'hui"
  const todayX = LEFT_W + (now.getDate() / new Date(now.getFullYear(), now.getMonth()+1, 0).getDate()) * COL_W;
  svg += '<line x1="'+todayX+'" y1="'+HEADER_H+'" x2="'+todayX+'" y2="'+timelineH+'" stroke="#e8963a" stroke-width="1.5" stroke-dasharray="4,3"/>';
  svg += '<circle cx="'+todayX+'" cy="'+(HEADER_H+6)+'" r="4" fill="#e8963a"/>';

  // Opérations
  const timelineStart = new Date(months[0].year, months[0].month, 1);
  const timelineEnd = new Date(months[5].year, months[5].month + 1, 0);
  const totalDays = (timelineEnd - timelineStart) / 86400000;

  timelineOps.forEach(function(op, ri) {
    const color = opeColor(op.id);
    const isAct = opeIsActive(op);
    const debut = new Date(Math.max(new Date(op.date_debut), timelineStart));
    const fin = new Date(Math.min(new Date(op.date_fin), timelineEnd));
    const x1 = LEFT_W + ((debut - timelineStart) / 86400000 / totalDays) * (COL_W * 6);
    const x2 = LEFT_W + ((fin - timelineStart + 86400000) / 86400000 / totalDays) * (COL_W * 6);
    const w = Math.max(x2 - x1, 30);
    const cy = HEADER_H + ROW_H / 2 + ri * ROW_H;

    svg += '<rect x="'+x1.toFixed(1)+'" y="'+(cy - BAR_H/2).toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+BAR_H+'" rx="6" fill="'+color+'" opacity="'+(isAct?1:0.5)+'" style="cursor:pointer" onclick="openOpeDetail('+op.id+')"/>';
    // Nom tronqué (ligne haute de la barre)
    const maxChars = Math.floor(w / 6.5);
    const nom = op.nom.length > maxChars ? op.nom.slice(0, Math.max(1, maxChars-1))+"…" : op.nom;
    svg += '<text x="'+(x1+8).toFixed(1)+'" y="'+(cy-4).toFixed(1)+'" font-size="11" fill="#fff" font-weight="600">'+esc(nom)+'</text>';
    // Sous-ligne : statut · nb produits · commission moy. (ligne basse de la barre)
    if (w > 40) {
      const statusLabel = isAct ? "● Actif" : (new Date(op.date_debut) > now ? "○ A venir" : "○ Expire");
      const subParts = [statusLabel];
      if (op._prodCount) subParts.push(op._prodCount+" prod.");
      if (op._commAvg != null) subParts.push(op._commAvg+(MARKETPLACE==='manomano'?' €':'%'));
      svg += '<text x="'+(x1+8).toFixed(1)+'" y="'+(cy+11).toFixed(1)+'" font-size="9" fill="#fff" opacity="0.85">'+subParts.join(" · ")+'</text>';
    }
  });

  if (!timelineOps.length) {
    svg += '<text x="'+(totalW/2)+'" y="'+(HEADER_H+50)+'" text-anchor="middle" font-size="12" fill="#9c9a92">Aucune opération sur cette période — cliquez + pour créer</text>';
  }

  svg += '</svg>';

  // Bouton import + créer
  const actions = '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    + '<button onclick="openOpeCreate(null)" style="padding:7px 16px;border:.5px solid var(--ac);border-radius:8px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Nouvelle opération</button>'
    + '</div>';

  return kpis + actions
    + '<div class="card" style="padding:0;overflow:hidden">'
    + '<div style="overflow-x:auto">'
    + svg
    + '</div></div>'
    + (opeData.length ? renderOpeCards() : "");
}

function renderOpeCards() {
  const now = new Date();
  const active = opeData.filter(op => opeIsActive(op));
  const future = opeData.filter(op => new Date(op.date_debut) > now);
  if (!active.length && !future.length) return "";

  function opeCard(op) {
    const color = opeColor(op.id);
    const isAct = opeIsActive(op);
    const fmtD = d => new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
    return '<div style="background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 16px;min-width:200px;flex:1;cursor:pointer;border-left:4px solid '+color+'" onclick="openOpeDetail('+op.id+')">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      + '<div style="font-size:13px;font-weight:700;color:var(--tx)">'+esc(op.nom)+'</div>'
      + '<span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:'+(isAct?"var(--gnBg)":"var(--acBg)")+';color:'+(isAct?"var(--gn)":"var(--ac)")+'">'+( isAct?"● Actif":"⏳ À venir")+'</span>'
      + '</div>'
      + '<div style="font-size:11px;color:var(--txS);margin-bottom:8px">'+fmtD(op.date_debut)+' → '+fmtD(op.date_fin)+'</div>'
      + (op.type_ope ? '<div style="font-size:10px;color:var(--txT);margin-bottom:6px">'+esc(op.type_ope)+'</div>' : "")
      + '<div style="font-size:11px;color:var(--txS)">'+(op._prodCount||0)+' produit'+(op._prodCount>1?"s":"")+(op._commAvg!=null?' · '+(MARKETPLACE==='manomano'?'Co-fin.':'Comm.')+' moy. <strong>'+op._commAvg+(MARKETPLACE==='manomano'?' €':'%')+'</strong>':'')+'</div>'
      + '</div>';
  }

  let html = "";
  if (active.length) {
    html += '<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">🟢 Opérations actives</div>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap">'+active.map(opeCard).join("")+'</div></div>';
  }
  if (future.length) {
    html += '<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">⏳ À venir</div>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap">'+future.map(opeCard).join("")+'</div></div>';
  }
  return html;
}

async function openOpeDetail(id) {
  const op = opeData.find(o => o.id === id);
  if (!op) return;
  const color = opeColor(op.id);
  const isAct = opeIsActive(op);
  const fmtD = d => new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});

  let prods = [];
  try {
    prods = await sb("operation_products", "operation_id=eq."+id+"&select=*&order=ref.asc");
  } catch(e) {}

  // Ventes Prestashop — filtrées par marketplace (onglet courant) + période de l'opé
  // Logique RECHERCHEV : pour chaque réf de l'opé, on cumule qty + CA HT
  // sur les données disponibles dans la plage. Données partielles OK.
  const salesByRef = {};
  try {
    const opSales = await sb("ps_sales_daily",
      "marketplace=eq."+MARKETPLACE+"&sale_date=gte."+op.date_debut+"&sale_date=lte."+op.date_fin+"&select=product_ref,quantity,revenue_ht,shipping_ht").catch(()=>[]);
    opSales.forEach(s => {
      if (!salesByRef[s.product_ref]) salesByRef[s.product_ref] = { qty: 0, ca_ht: 0 };
      salesByRef[s.product_ref].qty   += (s.quantity   || 0);
      // CA produit seul (utilisé pour le tri et l'affichage par référence)
      salesByRef[s.product_ref].ca_ht += (s.revenue_ht || 0);
      // Frais de livraison séparés (premier produit de chaque commande uniquement)
      salesByRef[s.product_ref].ca_ht += (s.shipping_ht|| 0);
    });
  } catch(e) {}

  const hasSalesData = prods.some(p => salesByRef[p.ref]?.qty > 0);
  const totalVentes = prods.reduce((s,p) => s + (salesByRef[p.ref]?.qty  || 0), 0);
  const totalCaHt   = prods.reduce((s,p) => s + (salesByRef[p.ref]?.ca_ht|| 0), 0);


  const isMM = MARKETPLACE === 'manomano';
  const avgComm = prods.length ? (isMM
    ? Math.round(prods.reduce((s,p)=>s+(p.taux_commission||0),0)/prods.length)
    : (prods.reduce((s,p)=>s+(p.taux_commission||0),0)/prods.length*100).toFixed(1)) : "—";

  function buildOpeProdsTable(onlyWithSales) {
    const filtered = onlyWithSales ? prods.filter(p => salesByRef[p.ref]?.qty > 0) : prods;
    if (!filtered.length) return '<tr><td colspan="6" style="padding:14px;text-align:center;color:var(--txT);font-size:12px">Aucun produit avec ventes sur cette période.</td></tr>';
    let sorted = [...filtered];
    if (window._opeSortCol === "qty") {
      sorted.sort((a,b) => { const d=(salesByRef[b.ref]?.qty||0)-(salesByRef[a.ref]?.qty||0); return window._opeSortDir==="asc"?-d:d; });
    } else if (window._opeSortCol === "ca_ht") {
      sorted.sort((a,b) => { const d=(salesByRef[b.ref]?.ca_ht||0)-(salesByRef[a.ref]?.ca_ht||0); return window._opeSortDir==="asc"?-d:d; });
    }
    return sorted.map(function(p,i) {
      const ps = salesByRef[p.ref] || { qty: 0, ca_ht: 0 };
      return '<tr style="'+(i%2?"background:var(--bg)":"")+';border-bottom:1px solid var(--borderL)">'
        + '<td style="padding:6px 10px;font-weight:600;white-space:nowrap">'+esc(p.ref)+'</td>'
        + '<td style="padding:6px 10px;color:var(--txS)">'+esc(p.nom_produit||"—")+'</td>'
        + '<td style="padding:6px 10px;text-align:right">'+(p.prix!=null?p.prix+"€":"—")+'</td>'
        + '<td style="padding:6px 10px;text-align:right">'+(p.taux_commission!=null?(isMM?p.taux_commission+' €':Math.round(p.taux_commission*100)+"%"):"—")+'</td>'
        + '<td style="padding:6px 10px;text-align:right;font-weight:600">'+(ps.qty>0?ps.qty:'<span style="color:var(--txT)">—</span>')+'</td>'
        + '<td style="padding:6px 10px;text-align:right;color:var(--gn);font-weight:600">'+(ps.ca_ht>0?Math.round(ps.ca_ht).toLocaleString("fr-FR")+" €":'<span style="color:var(--txT)">—</span>')+'</td>'
        + '</tr>';
    }).join("");
  }

  window._opeDetailSalesFilter = false;
  window._opeSortCol = null;
  window._opeSortDir = "desc";
  window._opeRefreshTable = function(checked) {
    window._opeDetailSalesFilter = checked;
    document.getElementById("ope-detail-tbody").innerHTML = buildOpeProdsTable(checked);
  };

  const html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    + '<div style="width:12px;height:12px;border-radius:50%;background:'+color+'"></div>'
    + '<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:'+(isAct?"var(--gnBg)":"var(--rdBg)")+';color:'+(isAct?"var(--gn)":"var(--rd)")+'">'+( isAct?"● Actif":"○ Expiré")+'</span>'
    + (op.type_ope ? '<span style="font-size:11px;color:var(--txS)">'+esc(op.type_ope)+'</span>' : "")
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px">'
    + '<div style="background:var(--bg);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Début</div><div style="font-size:13px;font-weight:600">'+fmtD(op.date_debut)+'</div></div>'
    + '<div style="background:var(--bg);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Fin</div><div style="font-size:13px;font-weight:600">'+fmtD(op.date_fin)+'</div></div>'
    + '<div style="background:var(--bg);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">'+(isMM?'Co-Financement moy.':'Commission moy.')+'</div><div style="font-size:13px;font-weight:600">'+avgComm+(isMM?' €':'%')+'</div></div>'
    + '<div style="background:'+(totalVentes>0?"var(--gnBg)":"var(--bg)")+';border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Ventes période</div><div style="font-size:13px;font-weight:700;color:'+(totalVentes>0?"var(--gn)":"var(--txS)")+'">'+totalVentes+'</div><div style="font-size:11px;color:var(--txS)">'+(totalCaHt>0?Math.round(totalCaHt).toLocaleString("fr-FR")+" € HT":"—")+'</div></div>'
    + '</div>'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
    + '<div style="font-size:12px;font-weight:600;color:var(--txS);text-transform:uppercase">'+prods.length+' produit'+(prods.length>1?"s":"")+'</div>'
