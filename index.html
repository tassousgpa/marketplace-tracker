<style>
:root{--bg:#fafaf8;--card:#fff;--border:#e8e6e1;--borderL:#f0eee9;--tx:#1a1a18;--txS:#6b6a65;--txT:#9c9a92;--ac:#2c5ea0;--acBg:#e8f0fa;--gn:#1a7a4c;--gnBg:#e6f5ee;--rd:#b5312c;--rdBg:#fce8e8;--am:#8a6d1b;--amBg:#faf0d4;--pu:#5b47b0;--puBg:#eeecfe}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.header{padding:20px 28px 0;border-bottom:1px solid var(--border);background:var(--card)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.title{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.subtitle{font-size:12px;color:var(--txS);margin-top:2px}
.mp-btns{display:flex;gap:6px;align-items:center}
.mp-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--border);background:transparent;color:var(--txS);font-family:inherit;position:relative}
.mp-btn.active{border-color:var(--ac);background:var(--acBg);color:var(--ac)}
/* Scraping badge */
.scraping-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.scraping-badge.live{background:#fef9ec;color:#a35f00;border:.5px solid #e9c97a}
.scraping-badge.live .dot{width:6px;height:6px;border-radius:50%;background:#e8a200;animation:pulse 1.2s infinite}
.scraping-badge.ok{background:var(--gnBg);color:var(--gn);border:.5px solid #9fd4b8}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.mp-indicator-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;padding:0 2px}
.mp-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txS)}
.mp-indicator-name{font-weight:600}
.tabs{display:flex;gap:0}
.tab{padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--txS);border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.content{padding:20px 28px}
.metrics{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.metric{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:120px}
.metric-label{font-size:11px;color:var(--txS);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:26px;font-weight:600;line-height:1.1}
.metric-sub{font-size:11px;color:var(--txT);margin-top:3px}
.card{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:500;white-space:nowrap}
.pill-green{background:var(--gnBg);color:var(--gn)}.pill-red{background:var(--rdBg);color:var(--rd)}
.pill-accent{background:var(--acBg);color:var(--ac)}.pill-amber{background:var(--amBg);color:var(--am)}
.pill-purple{background:var(--puBg);color:var(--pu)}.pill-default{background:var(--borderL);color:var(--txS)}
.bar-row{margin-bottom:7px}
.bar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.bar-label{font-size:13px;color:var(--tx);font-weight:500}
.bar-sub{font-size:12px;color:var(--txS)}
.bar-track{height:5px;background:var(--borderL);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.kpi-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--borderL)}
.kpi-label{font-size:13px;color:var(--txS)}
.kpi-value{font-size:14px;font-weight:600}
.btn-see{background:var(--acBg);color:var(--ac);border:none;border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;font-weight:500;font-family:inherit;margin-left:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;text-align:left}
td{padding:8px 10px}
tr.stripe{background:var(--bg)}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{padding:7px 12px;border:.5px solid var(--border);border-radius:8px;font-size:12px;background:var(--card);font-family:inherit}
.filters input{flex:1;min-width:180px}
.btn-add{padding:7px 14px;border:.5px solid var(--ac);border-radius:8px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit}
.link{color:var(--ac);text-decoration:none;font-size:11px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:12px;padding:20px 24px;max-width:900px;width:100%;max-height:90vh;overflow:auto;border:.5px solid var(--border)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txS);line-height:1}
.product-row{padding:8px 0;border-bottom:1px solid var(--borderL);font-size:12px}
.product-row-name{font-weight:500;font-size:13px;margin-bottom:2px}
.product-row-refs{display:flex;gap:12px;color:var(--txS);flex-wrap:wrap;align-items:center}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-card{padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;border:.5px solid var(--border)}

.cat-card.selected{border-color:var(--ac);background:var(--acBg)}
.cat-card-header{display:flex;justify-content:space-between;align-items:center}
.cat-card-name{font-size:13px;font-weight:500}
.cat-card-count{font-size:18px;font-weight:700;color:var(--ac)}

.vendor-row{cursor:pointer;padding:7px 0;border-bottom:1px solid var(--borderL)}
.vendor-rank{font-size:11px;font-weight:600;color:var(--txT);width:18px;display:inline-block}
.toggle-group{display:flex;gap:0;border:.5px solid var(--border);border-radius:8px;overflow:hidden}
.toggle-btn{padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--txS);font-family:inherit}
.toggle-btn.active{background:var(--acBg);color:var(--ac)}
.anomaly-section{margin-bottom:16px}
.anomaly-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.loading{text-align:center;padding:60px 20px;color:var(--txS)}
.loading-spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--borderL);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sparkline chart for Conforama */

.sparkline-title{font-size:12px;font-weight:600;color:var(--txS);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.sparkline-svg{display:block;width:100%;height:80px}
.sparkline-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--txT);margin-top:2px}
/* Nouvelle navigation marketplace */
.header-left{flex:0 0 auto}
.header-center{flex:1;text-align:center}
.header-right{flex:0 0 auto;position:relative}
.title-small{font-size:13px;font-weight:600;color:var(--txS);letter-spacing:-0.01em}
.mp-active-name{font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--tx)}
.mp-active-date{font-size:11px;color:var(--txS);margin-top:2px}
.btn-changer{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:.5px solid var(--border);background:var(--card);color:var(--tx);font-family:inherit;transition:all .15s}
.btn-changer:hover{border-color:var(--ac);color:var(--ac);background:var(--acBg)}
.mp-panel{position:absolute;right:0;top:calc(100% + 6px);background:var(--card);border:.5px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.10);min-width:270px;z-index:200;overflow:hidden}
.mp-panel-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;transition:background .1s;border-bottom:.5px solid var(--borderL)}
.mp-panel-item:last-child{border-bottom:none}
.mp-panel-item:hover{background:var(--bg)}
.mp-panel-item-active{background:var(--acBg)}
.mp-panel-name{font-size:13px;font-weight:500;color:var(--tx)}
.mp-panel-item-active .mp-panel-name{color:var(--ac);font-weight:600}
.mp-panel-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.mp-panel-badge-live{background:#fef9ec;color:#a35f00;border:.5px solid #e9c97a}
.mp-panel-badge-ok{background:var(--gnBg);color:var(--gn);border:.5px solid #9fd4b8}
.mp-panel-badge-none{background:var(--borderL);color:var(--txT);border:.5px solid var(--border)}

<script>
const MAINTENANCE_MODE = false; // ← changer en false pour passer LIVE
const ADMIN_CODE = "tassousgpa!";
const ACCESS_CODE = "MKP2026!";
const SB_URL = "https://pmxsthzdxubqbemdgtbr.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBteHN0aHpkeHVicWJlbWRndGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDk4NDQsImV4cCI6MjA5MDAyNTg0NH0.GpfAw91eJ8D7RIeZLFIejCt9DTwGpXvOGcxYlhZS78I";
let MARKETPLACE = "cdiscount";

// Marketplaces disponibles
const MARKETPLACES = [
  { id: "cdiscount", label: "Cdiscount" },
  { id: "amazon", label: "Amazon" },
  { id: "maisonsdumonde", label: "Maisons du Monde" },
  { id: "conforama", label: "Conforama" },
  { id: "leroymerlin", label: "Leroy Merlin" },
  { id: "laredoute", label: "La Redoute" },
  { id: "but", label: "BUT" },
  { id: "manomano", label: "ManoMano" },
];

// Couleurs identitaires par marketplace
const MP_COLORS = {
  cdiscount:      { border: "#00126b", bg: "#eef0f8", text: "#00126b", btn: "#00126b" },
  amazon:         { border: "#ff9900", bg: "#fffbf0", text: "#b85c00", btn: "#cc7700" },
  maisonsdumonde: { border: "#1a1a18", bg: "#f5f5f5", text: "#1a1a18", btn: "#1a1a18" },
  conforama:      { border: "#e20014", bg: "#fff0f0", text: "#b50010", btn: "#c00010" },
  but:            { border: "#e20014", bg: "#fff0f0", text: "#b50010", btn: "#c00010" },
  laredoute:      { border: "#8b1dc1", bg: "#f8f0fc", text: "#6b0fa0", btn: "#7b14b0" },
  leroymerlin:    { border: "#67bb33", bg: "#f1fbea", text: "#3a8a1a", btn: "#4a9a22" },
  manomano:       { border: "#f5580a", bg: "#fff5f0", text: "#c0400a", btn: "#d44c0a" },
};

function applyMpTheme(mp) {
  var c = MP_COLORS[mp] || { border: "var(--ac)", bg: "var(--card)", text: "var(--ac)", btn: "var(--ac)" };
  var header = document.querySelector(".header");
  if (header) { header.style.borderTop = "4px solid " + c.border; header.style.background = c.bg; }
  var nameEl = document.getElementById("mp-active-name");
  if (nameEl) nameEl.style.color = c.text;
  var btnEl = document.getElementById("btn-changer");
  if (btnEl) { btnEl.style.borderColor = c.btn; btnEl.style.color = c.btn; }
}

 // Marketplaces sans onglet Positions ni Concurrents
 const NO_POSITIONS_MP = new Set(["manomano","leroymerlin"]);
 const NO_COMPETITORS_MP = new Set(["manomano","leroymerlin"]);

// Cache des derniers timestamps de scraping par marketplace (pour l'indicateur)
const MP_LAST_SCRAPING = {};

async function sb(table, params="") {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      "Range-Unit": "items",
      "Range": "0-9999"   // Force Supabase à renvoyer jusqu'à 10000 lignes (défaut = 1000)
    }
  });
  if (!r.ok) throw new Error(`Supabase error: ${r.status}`);
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, { method:"POST", headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=representation"}, body:JSON.stringify(data) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Insert error ${r.status}: ${t}`); }
  return r.json();
}
async function sbUpdate(table, filter, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, { method:"PATCH", headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=representation"}, body:JSON.stringify(data) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Update error ${r.status}: ${t}`); }
  return r.json();
}
async function sbDelete(table, filter) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, { method:"DELETE", headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`} });
  if (!r.ok) throw new Error(`Delete error: ${r.status}`);
}

// =============================================
// INDICATEURS DE SCRAPING — toutes marketplaces
// =============================================
async function loadScrapingIndicators() {
  try {
    // On récupère le snapshot le plus récent par marketplace (table product_snapshots)
    const rows = await sb("product_snapshots", `select=marketplace,date&order=date.desc&limit=500`);
    const latestByMp = {};
    rows.forEach(r => {
      if (r.marketplace && r.date) {
        if (!latestByMp[r.marketplace] || r.date > latestByMp[r.marketplace]) {
          latestByMp[r.marketplace] = r.date;
        }
      }
    });

    // Fallback: seller_stats pour marketplaces sans snapshots
    const statsRows = await sb("seller_stats", `select=marketplace,date&order=date.desc&limit=200`);
    statsRows.forEach(r => {
      if (r.marketplace && r.date) {
        if (!latestByMp[r.marketplace] || r.date > latestByMp[r.marketplace]) {
          latestByMp[r.marketplace] = r.date;
        }
      }
    });

    Object.assign(MP_LAST_SCRAPING, latestByMp);
    renderScrapingIndicators();
  } catch(e) {
    console.warn("Indicateurs scraping:", e.message);
  }
}

function renderScrapingIndicators() {
  const now = Date.now();
  const container = document.getElementById("mp-indicator-row");
  if (!container) return;

  const html = MARKETPLACES.map(mp => {
    const lastDate = MP_LAST_SCRAPING[mp.id];
    if (!lastDate) return `<div class="mp-indicator"><span class="mp-indicator-name">${mp.label}</span><span class="scraping-badge" style="background:var(--borderL);color:var(--txT);border:.5px solid var(--border)">Aucune donnée</span></div>`;

    const lastMs = new Date(lastDate).getTime();
    const diffSec = Math.round((now - lastMs) / 1000);
    const isLive = diffSec < 90;

    let badge;
    if (isLive) {
      badge = `<span class="scraping-badge live"><span class="dot"></span>Scraping en cours</span>`;
    } else {
      const label = formatRelativeDate(lastDate);
      badge = `<span class="scraping-badge ok">✓ ${label}</span>`;
    }
    return `<div class="mp-indicator"><span class="mp-indicator-name">${mp.label}</span>${badge}</div>`;
  }).join("");

  container.innerHTML = html;
}

function formatRelativeDate(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.round(diffMs / 60000);
  const diffH = Math.round(diffMs / 3600000);
  const diffD = Math.round(diffMs / 86400000);
  if (diffMin < 2) return "à l'instant";
  if (diffMin < 60) return `il y a ${diffMin} min`;
  if (diffH < 24) return `il y a ${diffH}h`;
  if (diffD === 1) return "hier";
  if (diffD < 7) return `il y a ${diffD}j`;
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
}

 // Rafraîchir les indicateurs toutes les 20s (pour détecter un scraping en cours)
 setInterval(() => {
   loadScrapingIndicators();
   // also refresh the mp panel badges if visible
   try { renderMpPanel(); } catch(e) {}
 }, 60000);

 // Marketplace selector panel helpers
 function toggleMpPanel() {
   var panel = document.getElementById('mp-panel');
   if (!panel) return;
   panel.classList.toggle('hidden');
   // render content each time to keep badges fresh
   try { renderMpPanel(); } catch(e) {}
 }
 function closeMpPanel() {
   var panel = document.getElementById('mp-panel');
   if (!panel) return;
   panel.classList.add('hidden');
 }
 function renderMpPanel() {
   var panel = document.getElementById('mp-panel');
   if (!panel) return;
   var html = '';
   for (var i = 0; i < MARKETPLACES.length; i++) {
     var mp = MARKETPLACES[i];
     var label = mp.label || mp.id;
     var lastDate = MP_LAST_SCRAPING[mp.id];
     var badge = '<span class="mp-panel-badge mp-panel-badge-none">Aucune donnée</span>';
     if (lastDate) {
       var lastMs = new Date(lastDate).getTime();
       var diffSec = Math.round((Date.now() - lastMs) / 1000);
       if (diffSec < 90) {
         badge = '<span class="mp-panel-badge mp-panel-badge-live"><span class="dot"></span>Scraping en cours</span>';
       } else {
         badge = '<span class="mp-panel-badge mp-panel-badge-ok">✓ ' + formatRelativeDate(lastDate) + '</span>';
       }
     }
     var isActive = mp.id === MARKETPLACE;
     html += '<div class="mp-panel-item' + (isActive ? ' mp-panel-item-active' : '') + '" onclick="switchMarketplace(\'' + mp.id + '\')">'
           + '<div class="mp-panel-name">' + label + '</div>'
           + '<div>' + badge + '</div>'
           + '</div>';
   }
   panel.innerHTML = html;
 }
 // Close panel on outside click
 document.addEventListener('click', function(e) {
   var panel = document.getElementById('mp-panel');
   var btn = document.getElementById('btn-changer');
   if (!panel) return;
   if (panel.classList.contains('hidden')) return;
   if (panel.contains(e.target) || (btn && btn.contains(e.target))) return;
   panel.classList.add('hidden');
 });

let STATE = { products:[], snapshots:[], positions:[], dates:[], sellerStats:[], tab:0 };

// =============================================
// normalizeKeyword — globale (utilisée dans loadData ET renderPositions)
// =============================================
const URL_LABEL_MAP_GLOBAL = {
  "canape-salon-sejour/canape/tous-les-canapes":       "Tous les canapés",
  "canape-salon-sejour/canape/canape-convertible":     "Canapé convertible",
  "canape-salon-sejour/banquette/banquette-clic-clac": "Banquette clic-clac",
  "canape-salon-sejour/sejour/table":                  "Tables de séjour",
  "canape-salon-sejour/salon/meuble-tv":               "Meuble TV",
  "mobilier-de-jardin/salon-de-jardin":                "Salon de jardin",
  "chambre-adulte/lit-adulte":                         "Lit coffre",
};
function normalizeKeyword(kw) {
  if (!kw) return kw;
  try {
    if (kw.startsWith("http") || kw.startsWith("//")) {
      const urlStr = kw.startsWith("//") ? "https:" + kw : kw;
      const url = new URL(urlStr);
      const fromSearch = url.searchParams.get("fromSearch");
      if (fromSearch) return decodeURIComponent(fromSearch).trim();
      const fullPath = url.hostname + url.pathname;
      for (const [key, label] of Object.entries(URL_LABEL_MAP_GLOBAL)) {
        if (fullPath.includes(key)) return label;
      }
      const segments = url.pathname.split("/").filter(s => s && !/^c$/.test(s) && !/^\d+/.test(s));
      const last = segments[segments.length - 1] || "";
      return decodeURIComponent(last.replace(/-/g, " ")).trim() || kw;
    }
  } catch(e) {}
  return kw;
}

const TAB_NAMES = ["Synthèse","Produits","Historique","Positions","Concurrents","Anomalies","Alertes","Audit","Opé. Commerciales","Gestion"];
const TAB_NAMES_LIGHT = ["Synthèse","Produits","Historique","Anomalies","Alertes","Audit","Opé. Commerciales","Gestion"];
const TAB_NAMES_LIGHT_SEA = ["Synthèse","Produits","Historique","Anomalies","Alertes","Audit","Opé. Commerciales","Gestion","SEA"];
const TAB_NAMES_MINIMAL = ["Synthèse","Alertes","Audit","Opé. Commerciales","Gestion"];
const TAB_NAMES_MINIMAL_SEA = ["Synthèse","Alertes","Audit","Opé. Commerciales","Gestion","SEA"];
const LAREDOUTE_TABS = ["Synthèse","Positions","Concurrents","Alertes","Audit","Opé. Commerciales","Gestion"];
const MINIMAL_MP = new Set(["leroymerlin"]);
const SEA_MP = new Set(["cdiscount","but","maisonsdumonde","conforama","manomano"]);
const TAB_NAMES_SEA = ["Synthèse","Produits","Historique","Positions","Concurrents","Anomalies","Alertes","Audit","Opé. Commerciales","Gestion","SEA"];

function isLightMp() { return NO_POSITIONS_MP.has(MARKETPLACE); }
function isMinimalMp() { return MINIMAL_MP.has(MARKETPLACE); }

// Retire les query params d'un identifiant/URL (ex: ?offer=123)
function stripUrlParams(s) {
  if (!s) return s;
  var q = s.indexOf('?');
  if (q > -1) s = s.slice(0, q);
  var h = s.indexOf('#');
  if (h > -1) s = s.slice(0, h);
  return s;
}
function getTabNames() {
  if (isMinimalMp()) return SEA_MP.has(MARKETPLACE) ? TAB_NAMES_MINIMAL_SEA : TAB_NAMES_MINIMAL;
  if (MARKETPLACE === "laredoute") return LAREDOUTE_TABS;
  if (isLightMp()) return SEA_MP.has(MARKETPLACE) ? TAB_NAMES_LIGHT_SEA : TAB_NAMES_LIGHT;
  if (SEA_MP.has(MARKETPLACE)) return TAB_NAMES_SEA;
  return TAB_NAMES;
}

function switchMarketplace(mp, btn) {
  MARKETPLACE = mp;
  // cleanup old "mp-btn" active state if present
  try {
    document.querySelectorAll('.mp-btn').forEach(function(b){ b.classList.remove('active'); });
  } catch(e){}
  // Add active styling to the clicked element when available
  if (btn && btn.classList) {
    try { btn.classList.add('active'); } catch(e){}
  }
  // Update center display + theme color
  var mpLabel = (MARKETPLACES.find(function(x){ return x.id === MARKETPLACE; }) || {label: MARKETPLACE}).label;
  var nameEl = document.getElementById('mp-active-name');
  if (nameEl) nameEl.textContent = mpLabel;
  try { applyMpTheme(MARKETPLACE); } catch(e){}
  // Close selector panel if open
  try { closeMpPanel(); } catch(e){}
  STATE.tab = 0;
  loadData();
}

async function loadData() {
  try {
    // Pour les positions : on récupère d'abord la date du dernier scraping (1 ligne),
    // puis on fetche TOUTES les positions de ce jour-là pour garantir les 18 keywords.
    // Évite le problème de la limite 5000 qui tronquerait les premiers keywords.
    // La table positions ne contient que le dernier run (purge côté scraper avant chaque session)
    // → select * sans filtre ni limite, requête simple et fiable
    const [products, allProducts, snapshots, positions, sellerStats, revenueEntries, trackedSellers, revenueImports, productSalesWeekly, monthlyHistory, activeOps, activeOpProducts, seaCampaigns, seaProductStats, supplyStats, psSalesDaily, seaActiveProducts, seaActiveAllMp] = await Promise.all([
      sb("products", `marketplace=eq.${MARKETPLACE}&active=eq.true&select=*&order=product_id`),
      sb("products", `marketplace=eq.${MARKETPLACE}&select=*&order=product_id`),
      sb("product_snapshots", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=10000`),
      sb("positions", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=5000`),
      sb("seller_stats", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=2000`),
      sb("revenue_entries", `marketplace=eq.${MARKETPLACE}&select=*&order=week_start_date.asc`).catch(()=>[]),
      sb("tracked_sellers", `marketplace=eq.${MARKETPLACE}&active=eq.true&select=*&order=id.asc`).catch(()=>[]),
      sb("revenue_imports", `marketplace=eq.${MARKETPLACE}&select=*&order=period_start.asc`).catch(()=>[]),
      sb("product_sales_weekly", `marketplace=eq.${MARKETPLACE}&select=*&order=week_label.desc`).catch(()=>[]),
      sb("revenue_monthly_history", `marketplace=eq.${MARKETPLACE}&select=year,month,revenue&order=year.asc,month.asc`).catch(()=>[]),
      sb("commercial_operations", "marketplace=eq."+MARKETPLACE+"&select=*").catch(()=>[]),
      sb("operation_products", "marketplace=eq."+MARKETPLACE+"&select=ref,operation_id,prix").catch(()=>[]),
      sb("sea_campaigns_general", "marketplace=eq."+MARKETPLACE+"&select=*&order=date_debut.desc").catch(()=>[]),
      sb("sea_product_stats", "marketplace=eq."+MARKETPLACE+"&select=ref,period_start,period_end,period_label,period_type,budget,impressions,clics,conversions&order=period_start.desc").catch(()=>[]),
      sb("product_supply_stats", `select=product_ref,warehouse_stock,in_transit_stock,unshipped_orders,import_date&order=import_date.desc&limit=10000`).catch(()=>[]),
      (()=>{ const d=`${new Date().getFullYear()}-01-01`; return sb("ps_sales_daily",`marketplace=eq.${MARKETPLACE}&sale_date=gte.${d}&select=product_ref,sale_date,quantity,revenue_ht,shipping_ht&order=sale_date.desc&limit=10000`).catch(()=>[]); })(),
      sb("sea_active_products", `marketplace=eq.${MARKETPLACE}&select=sku,period_start,period_end`).catch(()=>[]),
      sb("sea_active_products", `select=marketplace,sku,period_start,period_end`).catch(()=>[]),
    ]);

    // Mettre à jour le cache de scraping avec les données fraîchement chargées
    if (snapshots.length > 0) {
      const latest = snapshots.reduce((a, b) => a.date > b.date ? a : b);
      if (!MP_LAST_SCRAPING[MARKETPLACE] || latest.date > MP_LAST_SCRAPING[MARKETPLACE]) {
        MP_LAST_SCRAPING[MARKETPLACE] = latest.date;
        renderScrapingIndicators();
      }
    }

    const prodByScraper = {};
    // Extrait la référence MXXXXXXXX d'une URL MdM (ex : ...diane-M26041258.htm?offer=…)
    function extractMdmRef(url) {
      var m = String(url||"").match(/-(M\d+)\.htm/i);
      return m ? m[1].toLowerCase() : null;
    }
    products.forEach(p => {
      if (p.product_id_scraper) {
        var k = p.product_id_scraper.toLowerCase();
        prodByScraper[k] = p;
        var kc = stripUrlParams(k);
        if (kc !== k) prodByScraper[kc] = p;
        var mr = extractMdmRef(kc || k); if (mr && !prodByScraper[mr]) prodByScraper[mr] = p;
      }
      // Indexer aussi par URL produit (stripped) — couvre les MPs où product_id = URL complète
      if (p.url) {
        var ku = stripUrlParams(p.url.toLowerCase());
        if (!prodByScraper[ku]) prodByScraper[ku] = p;
        var mru = extractMdmRef(ku); if (mru && !prodByScraper[mru]) prodByScraper[mru] = p;
      }
    });
    function lookupByScraper(pid) {
      if (!pid) return null;
      var k = (pid||"").toLowerCase();
      var r = prodByScraper[k] || prodByScraper[stripUrlParams(k)];
      if (r) return r;
      var mRef = extractMdmRef(k); // fallback M-ref pour MdM
      return mRef ? (prodByScraper[mRef] || null) : null;
    }
    snapshots.forEach(s => { s._product = lookupByScraper(s.product_id); });

    // sessionKey à l'heure : pour les positions (dernière session < 1h)
    function sessionKey(ts) { return new Date(ts).toISOString().slice(0, 13); }
    // dayKey au jour : plusieurs scrapes le même jour = 1 seule colonne dans l'historique
    function dayKey(ts) { return new Date(ts).toISOString().slice(0, 10); }

    const daySet = new Set();
    snapshots.forEach(s => { if (s.date) daySet.add(dayKey(s.date)); });
    const dates = [...daySet].sort(); // ex: ["2026-03-28", "2026-03-30"]

    const history = {};
    snapshots.forEach(s => {
      const key = (s.product_id||"").toLowerCase();
      if (!history[key]) history[key] = {};
      const dk = dayKey(s.date);
      // On garde le snapshot le plus récent du jour (id le plus grand)
      if (dk && (!history[key][dk] || s.id > history[key][dk].id)) history[key][dk] = s;
    });

    const latestDate = dates[dates.length-1] || "";
    const prevDate = dates.length >= 2 ? dates[dates.length-2] : "";

    products.forEach(p => {
      const key = (p.product_id_scraper||"").toLowerCase();
      const h = history[key] || {};
      const latest = h[latestDate], prev = h[prevDate];
      p._latest = latest || null; p._history = h;
      p._price = latest?.price ?? null; p._available = latest?.available ?? null;
      p._rating = latest?.rating ?? null; p._delivery = latest?.delivery_days ?? null;
      p._tags = [];
      if (latest && prev) {
        if (latest.price!=null && prev.price!=null && prev.price>0) { const pct=(latest.price-prev.price)/prev.price; if(pct>.10) p._tags.push("prix_up"); else if(pct<-.15) p._tags.push("prix_down"); }
        if (latest.delivery_days!=null && prev.delivery_days!=null) { const d=latest.delivery_days-prev.delivery_days; if(d>5) p._tags.push("delai_up"); else if(d<-5) p._tags.push("delai_down"); }
        if (latest.rating!=null && prev.rating!=null) { const d=latest.rating-prev.rating; if(d>=.2) p._tags.push("note_up"); else if(d<=-.2) p._tags.push("note_down"); }
      }
    });

    // Grouper les positions par JOUR (pas par heure) pour ne pas rater des recherches
    // qui auraient été scrapées à des heures différentes dans la même journée.
    // On prend toutes les positions du jour le plus récent.
    const posDaySet = new Set();
    positions.forEach(p => { if (p.date) posDaySet.add(dayKey(p.date)); });
    const posDaysSorted = [...posDaySet].sort();
    const latestPosDay = posDaysSorted[posDaysSorted.length-1] || "";
    // On déduplique par (keyword, product_id) : si le même produit a été scrappé
    // deux fois le même jour sur le même keyword, on ne garde que la ligne la plus récente.
    const posSeenKey = new Set();
    const latestPositions = [];
    positions
      .filter(p => p.date && dayKey(p.date) === latestPosDay)
      .sort((a, b) => new Date(b.date) - new Date(a.date)) // plus récent en premier
      .forEach(p => {
        const dedupeKey = (p.keyword||"") + "||" + (p.product_id||"") + "||" + (p.seller||"") + "||" + (p.url||"");
        if (!posSeenKey.has(dedupeKey)) {
          posSeenKey.add(dedupeKey);
          latestPositions.push(p);
        }
      });
    const latestPosSession = latestPosDay; // utilisé pour la synchro snapshotDay

    // Normalise le keyword : extrait le terme de recherche depuis les URLs Conforama
    // ex: "https://www.conforama.fr/recherche-conforama/canap%C3%A9%20panoramique?fromSearch=canap%C3%A9%20panoramique"
    // → "canapé panoramique"
    const keywordData = {};
    latestPositions.forEach(p => {
      const kw = normalizeKeyword(p.keyword);
      if (!keywordData[kw]) keywordData[kw] = [];
      const prod = lookupByScraper(p.product_id);
      keywordData[kw].push({...p, keyword: kw, _product:prod});
    });

    // leaderCounts : comptage brut par (keyword normalisé, seller) pour "Leader par catégorie"
    // Construit depuis toutes les positions du jour AVANT dédup, avec keyword normalisé
    const leaderCounts = {};
    positions
      .filter(p => p.date && dayKey(p.date) === latestPosDay)
      .forEach(p => {
        const kw = normalizeKeyword(p.keyword);
        if (!leaderCounts[kw]) leaderCounts[kw] = {};
        leaderCounts[kw][p.seller] = (leaderCounts[kw][p.seller] || 0) + 1;
      });

    // vendorsSorted est maintenant construit depuis seller_stats (p1_count)
    // plus depuis positions — voir buildSellerStatsMap() dans renderConcurrents
    const vendorsSorted = []; // placeholder, remplacé au render

    // ─── Matching BestMobilier ───────────────────────────────────────
    // On utilise seller === "BestMobilier" comme critère primaire,
    // plus fiable que le matching product_id_scraper qui peut être vide.
    // On construit aussi un index product_id → produit suivi (pour les liens).
    const bmScraperIds = new Set();
    products.forEach(p => {
      if (p.product_id_scraper) {
        var k = p.product_id_scraper.toLowerCase();
        bmScraperIds.add(k);
        var ks = stripUrlParams(k);
        bmScraperIds.add(ks);
        var mr = extractMdmRef(ks || k); if (mr) bmScraperIds.add(mr);
      }
      // Indexer aussi par URL (stripped) pour MdM et tout MP à URL dans product_id
      if (p.url) {
        var ku = stripUrlParams(p.url.toLowerCase());
        bmScraperIds.add(ku);
        var mru = extractMdmRef(ku); if (mru) bmScraperIds.add(mru);
      }
    });
    const trackedByScraperId = {};
    products.forEach(p => {
      if (p.product_id_scraper) {
        var k = p.product_id_scraper.toLowerCase();
        trackedByScraperId[k] = p;
        var kc = stripUrlParams(k);
        if (kc !== k) trackedByScraperId[kc] = p;
        var mr = extractMdmRef(kc || k); if (mr && !trackedByScraperId[mr]) trackedByScraperId[mr] = p;
      }
      // Indexer aussi par URL (stripped)
      if (p.url) {
        var ku = stripUrlParams(p.url.toLowerCase());
        if (!trackedByScraperId[ku]) trackedByScraperId[ku] = p;
        var mru = extractMdmRef(ku); if (mru && !trackedByScraperId[mru]) trackedByScraperId[mru] = p;
      }
    });
    function lookupTracked(pid) {
      if (!pid) return null;
      var k = (pid||"").toLowerCase();
      var r = trackedByScraperId[k] || trackedByScraperId[stripUrlParams(k)];
      if (r) return r;
      var mr = extractMdmRef(k); return mr ? (trackedByScraperId[mr] || null) : null;
    }

    // Un product est BM si : seller === "BestMobilier" OU son product_id matche un product_id_scraper suivi
    // Noms de vendeurs reconnus comme appartenant au groupe
    const BM_SELLER_NAMES = new Set(["BestMobilier", "Best Mobilier", "Lisa Design"]);
    const BM_SELLER_NAMES_LOWER = new Set(["bestmobilier", "best mobilier", "lisa design"]);
    function isBMPosition(p) {
      if (BM_SELLER_NAMES.has(p.seller)) return true;
      if (p.seller && BM_SELLER_NAMES_LOWER.has(p.seller.toLowerCase())) return true;
      const useScraperId = (MARKETPLACE === "cdiscount" || MARKETPLACE === "amazon" || MARKETPLACE === "laredoute" || MARKETPLACE === "maisonsdumonde");
      if (!useScraperId) return false;
      const pid = (p.product_id||"").toLowerCase();
      if (bmScraperIds.has(pid) || bmScraperIds.has(stripUrlParams(pid))) return true;
      var mRef = extractMdmRef(pid);
      if (mRef && bmScraperIds.has(mRef)) return true;
      // Fallback via positions.url (produits sponsorisés MdM : product_id ≠ url)
      var purl = (p.url||"").toLowerCase();
      if (purl) {
        if (bmScraperIds.has(purl) || bmScraperIds.has(stripUrlParams(purl))) return true;
        var mRefUrl = extractMdmRef(purl);
        if (mRefUrl && bmScraperIds.has(mRefUrl)) return true;
      }
      return false;
    }

    // bmByKeyword : nombre de produits BM en page 1 par keyword
    // On initialise TOUS les keywords présents dans les positions du jour (avant et après dédup)
    // pour garantir que les 18 catégories apparaissent même si BM = 0
    const allKeywordsToday = new Set(positions.map(p => normalizeKeyword(p.keyword)));
    const bmByKeyword = {};
    allKeywordsToday.forEach(kw => { bmByKeyword[kw] = 0; }); // initialise à 0
    Object.entries(keywordData).forEach(([kw, items]) => {
      bmByKeyword[kw] = items.filter(i => isBMPosition(i)).length;
    });

    // productsInPage1 : set des product_ids BM présents en page 1
    const productsInPage1 = new Set();
    // page1Keywords : product_id → liste des keywords où il est en page 1
    const page1Keywords = {};
    latestPositions.forEach(p => {
      if (isBMPosition(p)) {
        const trackedProd = lookupTracked(p.product_id);
        if (trackedProd) {
          productsInPage1.add((trackedProd.product_id_scraper||"").toLowerCase());
          const kw = normalizeKeyword(p.keyword);
          const scraperPid = (trackedProd.product_id_scraper||"").toLowerCase();
          if (!page1Keywords[scraperPid]) page1Keywords[scraperPid] = new Set();
          page1Keywords[scraperPid].add(kw);
        }
      }
    });

    // =============================================
    // CONFORAMA: calcul incrémental des ventes
    // seller_sales = total cumulé depuis début, on calcule xn - x0 par session
    // =============================================
    // confoSellerHistory sert aussi pour MdM (même logique : ventes cumulées totales)
    const confoSellerHistory = {}; // { sellerName: [{date, sales}] trié par date ASC }
    if (MARKETPLACE === "conforama" || MARKETPLACE === "maisonsdumonde") {
      const allStats = await sb("seller_stats", `marketplace=eq.${MARKETPLACE}&select=*&order=date.asc&limit=5000`);
      allStats.forEach(s => {
        if (!s.seller || s.seller_sales == null) return;
        if (!confoSellerHistory[s.seller]) confoSellerHistory[s.seller] = [];
        confoSellerHistory[s.seller].push({ date: s.date, sales: s.seller_sales, rating: s.seller_rating, ratingsCount: s.seller_ratings_count, sourceUrl: s.source_url });
      });
    }

    // AMAZON: on utilise seller_ratings_count comme proxy des ventes
    // On calcule delta avis 12m = dernière valeur - valeur la plus ancienne dans les 12 derniers mois
    const amazonReviewsProxy = {};
    if (MARKETPLACE === "amazon") {
      sellerStats.forEach(s => {
        if (!s.seller) return;
        if (!amazonReviewsProxy[s.seller]) amazonReviewsProxy[s.seller] = { latest: null, oldest12m: null };
        const entry = { date: s.date, count: s.seller_ratings_count, rating: s.seller_rating, sourceUrl: s.source_url };
        const d = amazonReviewsProxy[s.seller];
        if (!d.latest || s.date > d.latest.date) d.latest = entry;
        // "oldest in 12m" = la plus ancienne entrée dans les 12 derniers mois
        const cutoff = new Date();
        cutoff.setFullYear(cutoff.getFullYear() - 1);
        if (new Date(s.date) >= cutoff) {
          if (!d.oldest12m || s.date < d.oldest12m.date) d.oldest12m = entry;
        }
      });
    }

    // Vérification synchronisation : les positions doivent être du même jour que les snapshots produits.
    // On compare uniquement la date (YYYY-MM-DD), pas l'heure.
    const snapshotDay = latestDate ? latestDate.slice(0, 10) : null;
    const posDay = latestPosSession ? latestPosSession.slice(0, 10) : null;
    console.log("DEBUG positions:", MARKETPLACE, "snapshotDay=", snapshotDay, "posDay=", posDay, "latestDate=", latestDate, "latestPosDay=", latestPosDay);
    const positionsOutdated = !posDay || (snapshotDay && posDay < snapshotDay);

    // Index supply stats : dernière entrée par product_ref (données communes à toutes les marketplaces)
    const supplyByRef = {};
    (supplyStats||[]).forEach(s => {
      if (!supplyByRef[s.product_ref] || s.import_date > supplyByRef[s.product_ref].import_date) {
        supplyByRef[s.product_ref] = s;
      }
    });

    const alertData = computeAlertData(activeOps||[], activeOpProducts||[], psSalesDaily||[], products||[], seaActiveAllMp||[]);
    STATE = { products, allProducts, snapshots, positions:latestPositions, dates, latestDate, prevDate, history, keywordData, leaderCounts, bmByKeyword, productsInPage1, page1Keywords, prodByScraper, trackedByScraperId, bmScraperIds, latestPosDate: latestPosSession, positionsOutdated, snapshotDay, posDay, sellerStats, confoSellerHistory, amazonReviewsProxy, revenueEntries: revenueEntries||[], trackedSellers: trackedSellers||[], revenueImports: revenueImports||[], monthlyHistory: monthlyHistory||[], activeOps: activeOps||[], activeOpProducts: activeOpProducts||[], productSalesWeekly: productSalesWeekly||[], seaCampaigns: seaCampaigns||[], seaProductStats: seaProductStats||[], supplyByRef, psSalesDaily: psSalesDaily||[], seaActiveProducts: seaActiveProducts||[], seaActiveAllMp: seaActiveAllMp||[], alertData, _alertsJustLoaded: alertData.seaMultiMp.length > 0, tab:STATE.tab||0 };

    const sessionDisplay = latestDate ? new Date(latestDate + "T12:00:00Z").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}) : "N/A";
    document.getElementById("header-subtitle").textContent = `${products.length} produits · Relevé du ${sessionDisplay}`;
    renderTabs(); renderContent();
  } catch(e) {
    document.getElementById("content").innerHTML = `<div class="loading" style="color:var(--rd)"><div style="font-size:16px;font-weight:600;margin-bottom:8px">Erreur de chargement</div><div style="font-size:13px">${e.message}</div></div>`;
    console.error(e);
  }
}

function renderTabs() {
  const names = getTabNames();
  const alertIdx = names.indexOf("Alertes");
  const alertN = (STATE.alertData ? STATE.alertData.seaMultiMp.length : 0) + (STATE._priceAlertCount || 0);
  document.getElementById("tabs").innerHTML = names.map((t,i) => {
    const isAlert = i === alertIdx;
    const label = isAlert && alertN > 0 ? `Alertes (${alertN})` : t;
    const alertClass = isAlert && alertN > 0 ? ' tab-alert' : '';
    const blinkClass = isAlert && alertN > 0 && STATE._alertsJustLoaded ? ' tab-alert-blink' : '';
    return `<button class="tab${i===STATE.tab?' active':''}${alertClass}${blinkClass}" onclick="switchTab(${i})">${label}</button>`;
  }).join("");
  if (STATE._alertsJustLoaded) {
    STATE._alertsJustLoaded = false;
    setTimeout(() => {
      document.querySelectorAll('.tab-alert-blink').forEach(t => t.classList.remove('tab-alert-blink'));
    }, 8000);
  }
}

// Appelé après chargement async des alertes prix pour mettre à jour le badge sans re-rendre toute la barre
function updateAlertTabBadge(priceAlertCount) {
  STATE._priceAlertCount = priceAlertCount;
  const names = getTabNames();
  const alertIdx = names.indexOf("Alertes");
  if (alertIdx === -1) return;
  const alertN = (STATE.alertData ? STATE.alertData.seaMultiMp.length : 0) + priceAlertCount;
  const btn = document.querySelectorAll('#tabs .tab')[alertIdx];
  if (!btn) return;
  btn.textContent = alertN > 0 ? `Alertes (${alertN})` : 'Alertes';
  btn.classList.toggle('tab-alert', alertN > 0);
  if (alertN > 0 && !btn.classList.contains('tab-alert-blink')) {
    btn.classList.add('tab-alert-blink');
    setTimeout(() => btn.classList.remove('tab-alert-blink'), 8000);
  }

// Pastilles tendance vs historique — fmtFn optionnel pour formater les valeurs dans le tooltip
// curLabel/histLabel optionnels dans chaque entrée histVals — ex: { year:2023, val:12, curLabel:"S22 2026", histLabel:"S22 2023" }
function trendDots(val2026, histVals) {
  const dots = histVals.map(({year, val, curLabel, histLabel}) => {
    const tipBase = (curLabel && histLabel) ? curLabel+' vs '+histLabel : 'vs '+year;
    if (val == null || val === 0 || val2026 == null) {
      return '<span title="'+tipBase+' : Données insuffisantes" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--border);border:.5px solid var(--txT);margin:0 1px;cursor:default;flex-shrink:0"></span>';
    }
    const pct = (val2026 - val) / val * 100;
    const bg = pct > 10 ? 'var(--gn)' : pct < -10 ? 'var(--rd)' : 'var(--txT)';
    const sign = pct >= 0 ? '+' : '';
    const tip = tipBase+' : '+sign+Math.round(pct)+'%';
    return '<span title="'+tip+'" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+bg+';margin:0 1px;cursor:default;flex-shrink:0"></span>';
  }).join('');
  return '<div style="display:flex;align-items:center;justify-content:center;gap:1px">'+dots+'</div>';
}

// Helper : ref → nom du deal actif (ou null)
function getActiveDeal(sku) {
  if (!sku || !STATE.activeOps || !STATE.activeOpProducts) return null;
  const now = new Date();
  const activeOpIds = new Set(
    STATE.activeOps
      .filter(op => new Date(op.date_debut) <= now && new Date(op.date_fin) >= now)
      .map(op => op.id)
  );
  const match = STATE.activeOpProducts.find(p =>
    p.ref === sku && activeOpIds.has(p.operation_id)
  );
  if (!match) return null;
  const op = STATE.activeOps.find(o => o.id === match.operation_id);
  return op ? op.nom : null;
}

// Helper : ref → nom du deal actif pendant la semaine identifiée par weekLabel (ex: "S19 2026")
function getActiveDealForWeek(sku, weekLabel) {
  if (!sku || !weekLabel || !STATE.activeOps || !STATE.activeOpProducts) return null;
  const weekRow = (STATE.productSalesWeekly || []).find(r => r.week_label === weekLabel && r.period_start);
  if (!weekRow) return null;
  const weekStart = new Date(weekRow.period_start);
  const weekEnd = new Date(weekRow.period_start);
  weekEnd.setDate(weekEnd.getDate() + 6);
  const activeOpIds = new Set(
    STATE.activeOps
      .filter(op => new Date(op.date_debut) <= weekEnd && new Date(op.date_fin) >= weekStart)
      .map(op => op.id)
  );
  const match = STATE.activeOpProducts.find(p =>
    p.ref === sku && activeOpIds.has(p.operation_id)
  );
  if (!match) return null;
  const op = STATE.activeOps.find(o => o.id === match.operation_id);
  return op ? op.nom : null;
}

function computeAlertData(activeOps, activeOpProducts, psSalesDaily, products, seaActiveAllMp) {
  const today = new Date().toISOString().slice(0,10);

  // Index produits par SKU pour lookups rapides
  const prodBySku = {};
  products.forEach(function(p) { if (p.sku) prodBySku[p.sku] = p; });

  // --- Alertes prix : calculées en async dans renderAlertes() ---
  // (nécessite revenue_ttc par commande individuelle dans la plage de l'opé)

  // --- Alertes 2 : doublons SEA multi-marketplace ---
  const seaMultiMp = [];
  // Grouper sea_active_products actifs par SKU → liste des marketplaces
  const skuMps = {};
  (seaActiveAllMp||[]).forEach(function(r) {
    if (r.period_start <= today && r.period_end >= today) {
      if (!skuMps[r.sku]) skuMps[r.sku] = [];
      if (!skuMps[r.sku].includes(r.marketplace)) skuMps[r.sku].push(r.marketplace);
    }
  });
  Object.keys(skuMps).forEach(function(sku) {
    const mps = skuMps[sku];
    if (mps.length > 1) {
      const prod = prodBySku[sku];
      seaMultiMp.push({
        sku: sku,
        name: prod ? prod.name : sku,
        marketplaces: mps
      });
    }
  });

  return { seaMultiMp };
}

async function openAnalyseSemaine() {
  // ── Semaine de référence ──────────────────────────────────────────
  const d7 = new Date(); d7.setUTCDate(d7.getUTCDate()-7);
  const refWkInfo   = isoWeekLabel(d7.toISOString().slice(0,10));
  const refWkLabel  = refWkInfo?.label || "";
  const refWkParsed = refWkLabel ? parseWeekLabel(refWkLabel) : null;
  const refWkNum    = refWkParsed?.week || 0;
  const refWkYear   = refWkParsed?.year || new Date().getUTCFullYear();
  const reportTitle = `Suivi MKP – S${refWkNum}`;
  const d7start = isoWeekStartFromNum(refWkYear, refWkNum) || "";
  const fmtDate = (str, addDays=0) => {
    if (!str) return "";
    const d = new Date(str+"T12:00:00Z"); d.setUTCDate(d.getUTCDate()+addDays);
    return d.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:addDays===6?"numeric":undefined});
  };

  openModal(reportTitle,`<div style="padding:40px;text-align:center;color:var(--txS)">
    <div class="loading-spinner"></div><div style="margin-top:12px;font-size:13px">Génération du rapport… (données cross-marketplace)</div></div>`);

  // ── CA cross-marketplaces ────────────────────────────────────────
  let allImports=[];
  try{ allImports=await sb("revenue_imports","year_type=eq.N&select=marketplace,period_label,revenue,period_start,period_end&order=period_start.desc&limit=1000"); }catch(e){}
  const caMap={};
  allImports.forEach(r=>{const days=(new Date(r.period_end)-new Date(r.period_start))/86400000+1;if(days>14)return;const k=r.marketplace+"|"+r.period_label;caMap[k]=(caMap[k]||0)+(r.revenue||0);});
  const getCA=(mp,lbl)=>caMap[mp+"|"+lbl]||0;
  const wkLbl=(w,y)=>`S${w} ${y}`;
  const prevW=(w,y)=>w>1?[w-1,y]:[52,y-1];
  function trendScore(mpId){
    const [w,y]=[refWkNum,refWkYear],[w1,y1]=prevW(w,y),[w2,y2]=prevW(w1,y1);
    const last3=getCA(mpId,wkLbl(w,y))+getCA(mpId,wkLbl(w1,y1))+getCA(mpId,wkLbl(w2,y2));
    const [w3,y3]=prevW(w2,y2),[w4,y4]=prevW(w3,y3),[w5,y5]=prevW(w4,y4);
    const prev3=getCA(mpId,wkLbl(w3,y3))+getCA(mpId,wkLbl(w4,y4))+getCA(mpId,wkLbl(w5,y5));
    const caN1=getCA(mpId,wkLbl(w,y-1));
    const tA=prev3>0?(last3-prev3)/prev3:null,tB=caN1>0?(getCA(mpId,wkLbl(w,y))-caN1)/caN1:null;
    if(tA===null&&tB===null)return null;
    return (tA??0)*0.6+(tB??0)*0.4;
  }
  function dotHtml(score){const col=score===null?'#d4d2cc':score>0.05?'#1a7a4c':score<-0.05?'#b5312c':'#9c9a92';const tip=score===null?'Données insuffisantes':(score>=0?'+':'')+Math.round(score*100)+'%';return`<span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${col};vertical-align:middle" title="${tip}"></span>`;}
  const fmtK=v=>{if(!v)return"—";if(v>=1e6)return(v/1e6).toFixed(2).replace(".",",")+"M€";if(v>=1e3)return(v/1e3).toFixed(1).replace(".",",")+"k€";return Math.round(v)+"€";};
  const mpRanking=MARKETPLACES.map(mp=>({...mp,ca:getCA(mp.id,refWkLabel),score:trendScore(mp.id)})).filter(mp=>mp.ca>0).sort((a,b)=>b.ca-a.ca);

  // ── Fetch cross-MP ───────────────────────────────────────────────
  const ssFilter=(()=>{const d=new Date();d.setUTCDate(d.getUTCDate()-180);return d.toISOString().slice(0,10);})();
  // Ventes S22 = ps_sales_daily (source Prestashop, données en temps réel)
  const d7end=d7start?(()=>{const d=new Date(d7start+"T12:00:00Z");d.setUTCDate(d.getUTCDate()+6);return d.toISOString().slice(0,10);})():"";
  let allPos=[], allSStats=[], psSalesRaw=[];
  try{
    [allPos, allSStats, psSalesRaw] = await Promise.all([
      sb("positions","select=marketplace,keyword,seller,product_id,date&order=date.desc&limit=10000"),
      sb("seller_stats",`date=gte.${ssFilter}&select=marketplace,seller,date,seller_sales,seller_ratings_count&order=date.desc&limit=8000`),
      d7start?sb("ps_sales_daily",`sale_date=gte.${d7start}&sale_date=lte.${d7end}&select=marketplace,product_ref,product_name,quantity`):Promise.resolve([]),
    ]);
  }catch(e){ console.warn("Cross-MP fetch:",e); }

  // Agréger ps_sales_daily par (marketplace, product_ref) → top 3 par MP
  const psSalesAgg={};
  psSalesRaw.forEach(s=>{
    const mp=s.marketplace, ref=s.product_ref||"";
    if(!psSalesAgg[mp])psSalesAgg[mp]={};
    if(!psSalesAgg[mp][ref])psSalesAgg[mp][ref]={qty:0,name:s.product_name||""};
    psSalesAgg[mp][ref].qty+=(s.quantity||0);
    if(s.product_name&&!psSalesAgg[mp][ref].name)psSalesAgg[mp][ref].name=s.product_name;
  });

  // ── Traitement positions cross-MP ────────────────────────────────
  const BM_LC=new Set(["bestmobilier","best mobilier","lisa design"]);
  const isBm=s=>BM_LC.has((s||"").toLowerCase().trim());
  // Dernière date (jour) par MP — comparaison sur YYYY-MM-DD pour éviter les écarts de millisecondes
  const mpLatest={};
  allPos.forEach(p=>{const d=p.date.slice(0,10);if(!mpLatest[p.marketplace]||d>mpLatest[p.marketplace])mpLatest[p.marketplace]=d;});
  const latestPos=allPos.filter(p=>p.date.slice(0,10)===mpLatest[p.marketplace]);
  // Index KW par MP
  const mpKwData={}, mpBmKw={};
  latestPos.forEach(p=>{
    const mp=p.marketplace, kw=normalizeKeyword(p.keyword);
    if(!mpKwData[mp])mpKwData[mp]={};
    if(!mpKwData[mp][kw])mpKwData[mp][kw]=[];
    mpKwData[mp][kw].push(p);
    if(!mpBmKw[mp])mpBmKw[mp]={};
    if(!mpBmKw[mp][kw])mpBmKw[mp][kw]=0;
    if(isBm(p.seller))mpBmKw[mp][kw]++;
  });
  // Top réf BM pour une MP (la plus fréquente sur ses mots-clés)
  function topBmRef(mpId){
    const rc={};
    Object.entries(mpBmKw[mpId]||{}).filter(([,n])=>n>0).forEach(([kw])=>{
      (mpKwData[mpId]?.[kw]||[]).filter(i=>isBm(i.seller)).forEach(i=>{const pid=(i.product_id||"").slice(0,20);if(pid)rc[pid]=(rc[pid]||0)+1;});
    });
    const s=Object.entries(rc).sort((a,b)=>b[1]-a[1]);
    return s.length?s[0][0]:"—";
  }

  // ── Exclusion vendeurs (mkp + marques La Redoute) ────────────────
  const EXCL_EXACT=new Set(["but","amazon","cdiscount","conforama","manomano","mano mano","leroymerlin"]);
  const EXCL_PART=["maisons du monde","maisonsdumonde","maison du monde","leroy merlin","leroy-merlin","la redoute","laredoute","redoute interieur","redoute intérieur","am.pm","ampm","a.m.p.m"];
  function isExcl(name,mpId){
    if(!name)return true;const nm=name.toLowerCase().trim();

    if(EXCL_PART.some(ex=>nm.includes(ex)))return true;

  // ── Deals actifs pendant la semaine ──────────────────────────────

  const activeOpIdsInWk=new Set((STATE.activeOps||[]).filter(op=>refWkStart&&refWkEnd&&new Date(op.date_debut)<=refWkEnd&&new Date(op.date_fin)>=refWkStart).map(op=>op.id));

      .map(([ref,d])=>({ref,qty:d.qty,name:d.name||nameMapLocal[ref]||""}))
      .sort((a,b)=>b.qty-a.qty).slice(0,3);

  // ── Domination page 1 cross-MP (seuil 30%) ──────────────────────

  MARKETPLACES.forEach(({id:mpId,label:mpLbl})=>{

  const dominators=Object.values(domMap).sort((a,b)=>b.pct-a.pct);

  // ── Co-présence cross-MP ─────────────────────────────────────────
  const coMap={};
  MARKETPLACES.forEach(({id:mpId,label:mpLbl})=>{

  // ── Montée en puissance cross-MP (3+ sessions) ──────────────────
  const mpSH={};
  allSStats.forEach(s=>{
    const k=(s.marketplace||"")+"|"+(s.seller||"");

  });
  const trending=Object.values(trendMap).sort((a,b)=>b.mps.size-a.mps.size);

  // ── HTML helpers ─────────────────────────────────────────────────
  const TH="padding:7px 10px;text-align:left;color:#6b6a65;font-weight:600;font-size:11px;border-bottom:1px solid #e8e6e1;background:#fafaf8;";

async function exportAnalysePNG(title) {
  const el = document.getElementById("analyse-report-content");
  if (!el) { alert("Rapport introuvable."); return; }
  const btn = document.getElementById("analyse-export-btn");
  if (btn) { btn.textContent = "Génération…"; btn.disabled = true; }
  try {
    if (typeof html2canvas === "undefined") { alert("html2canvas non chargé. Vérifiez la connexion."); return; }
    const canvas = await html2canvas(el, { scale:2, backgroundColor:"#ffffff", useCORS:true, logging:false });
    const link = document.createElement("a");
    link.download = (title||"Suivi-MKP").replace(/[^a-zA-Z0-9\-_]/g,"-")+"-"+MARKETPLACE+".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  } catch(e) { alert("Erreur export : "+e.message); }
  finally { if (btn) { btn.textContent = "⬇ Export PNG"; btn.disabled = false; } }
}

function renderSynthese() {
  const P=STATE.products;
  const avail=P.filter(p=>p._available===true).length;
  const unavail=P.filter(p=>p._available===false).length;
  const noData=P.filter(p=>p._available==null).length;
  // Taux dispo = dispo confirmés / total produits suivis (dénominateur = P.length)
  const tauxDispo=P.length>0?Math.round(avail/P.length*100):0;
  const tauxIndisp=P.length>0?Math.round(unavail/P.length*100):0;
  // Produits sans lien valide : pas d'URL ou URL ne commence pas par http
  const sansLien=P.filter(p=>!p.url||!p.url.startsWith("http")).length;
  // Produits avec URL mais price null et pas indispo → données manquantes
  const sansDonnees=P.filter(p=>p.url&&p.url.startsWith("http")&&p._available==null).length;

  const page1 = STATE.products.reduce((sum, p) => {
    const pid = (p.product_id_scraper || "").toLowerCase();
    const kws = STATE.page1Keywords?.[pid];
    return sum + (kws ? kws.size : 0);
  }, 0);
  const prices=P.filter(p=>p._price!=null).map(p=>p._price);
  const ratings=P.filter(p=>p._rating!=null).map(p=>p._rating);
  const deliveries=P.filter(p=>p._delivery!=null).map(p=>p._delivery);
  const avgPrice=prices.length?Math.round(prices.reduce((a,b)=>a+b,0)/prices.length):"—";
  const avgRating=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):"—";
  const avgDelivery=deliveries.length?Math.round(deliveries.reduce((a,b)=>a+b,0)/deliveries.length):"—";
  const du=P.filter(p=>p._tags.includes("delai_up")),dd=P.filter(p=>p._tags.includes("delai_down")),pu=P.filter(p=>p._tags.includes("prix_up"));
  const totalWithPrev=P.filter(p=>p._latest&&STATE.prevDate&&p._history[STATE.prevDate]).length;
  const pctDU=totalWithPrev>0?Math.round(du.length/totalWithPrev*100):0;
  const pctPU=totalWithPrev>0?Math.round(pu.length/totalWithPrev*100):0;
  const pctDD=totalWithPrev>0?Math.round(dd.length/totalWithPrev*100):0;

  const adminBtn = _adminUnlocked

  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${adminBtn}</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Produits suivis</div><div class="metric-value">${P.length}</div><div class="metric-sub">${avail} dispo · ${unavail} indispo · ${noData} sans données</div></div>
      <div class="metric"><div class="metric-label">Taux dispo</div><div class="metric-value" style="color:${tauxDispo>=80?"var(--gn)":tauxDispo>=60?"var(--am)":"var(--rd)"}">${tauxDispo}%</div><div class="metric-sub">${avail}/${P.length} confirmés dispos</div></div>
      <div class="metric"><div class="metric-label">Indisponibles</div><div class="metric-value" style="color:var(--rd)">${unavail}</div><div class="metric-sub">${tauxIndisp}% du catalogue · ${sansLien} sans lien</div></div>

      {l:"Prix moyen",v:avgPrice+"€"},{l:"Délai moyen",v:avgDelivery+" jours"},{l:"Note moyenne",v:avgRating+" / 5"},

      {l:"Produits avec un problème de liens",v:noData+" produits",color:noData>0?"var(--am)":"",sub:sansDonnees+" avec lien mais pas de données scraping"},

// Calcul du label semaine ISO (S22 2026) et du lundi de début à partir d'une date
function isoWeekLabel(dateStr) {
  if (!dateStr) return null;
  const d = new Date(String(dateStr).slice(0,10)+"T12:00:00Z");
  if (isNaN(d)) return null;
  const dow = d.getUTCDay()||7;
  const mon = new Date(d); mon.setUTCDate(d.getUTCDate()-(dow-1));
  const thu = new Date(mon); thu.setUTCDate(mon.getUTCDate()+3);
  const yr  = thu.getUTCFullYear();
  const jan4 = new Date(Date.UTC(yr,0,4));
  const j4d  = jan4.getUTCDay()||7;
  const w1mon = new Date(jan4); w1mon.setUTCDate(jan4.getUTCDate()-(j4d-1));
  const wk = Math.round((mon-w1mon)/(7*86400000))+1;
  return { label:`S${wk} ${yr}`, start:mon.toISOString().slice(0,10) };
}
// Inverse : date du lundi d'une semaine ISO à partir de son numéro et de l'année
function isoWeekStartFromNum(year, week) {
  const jan4 = new Date(Date.UTC(year,0,4));
  const j4d = jan4.getUTCDay()||7;
  const w1mon = new Date(jan4); w1mon.setUTCDate(jan4.getUTCDate()-(j4d-1));
  const start = new Date(w1mon); start.setUTCDate(w1mon.getUTCDate()+(week-1)*7);
  return start.toISOString().slice(0,10);
}
// Parse "S22 2026" → { week:22, year:2026 } ou null
function parseWeekLabel(label) {
  const m = String(label||"").match(/S(\d+)\s+(\d{4})/);
  if (!m) return null;
  return { week:parseInt(m[1]), year:parseInt(m[2]) };
}

function renderProductSalesBlocks() {
  const allSales = STATE.productSalesWeekly || [];

  // ── Index ps_sales_daily ─────────────────────────────────────────
  const psDailyIdx = {};
  const psRefNames = {}; // ref → nom produit (PS product_name en priorité, STATE.allProducts en fallback)
  (STATE.psSalesDaily || []).forEach(s => {
    const k = (s.product_ref||"")+"|"+String(s.sale_date||"").slice(0,10);
    psDailyIdx[k] = (psDailyIdx[k]||0) + (s.quantity||0);
    if (s.product_ref && s.product_name && !psRefNames[s.product_ref]) psRefNames[s.product_ref] = s.product_name;
  });
  (STATE.allProducts||STATE.products||[]).forEach(p => {
    if (p.sku && p.name && !psRefNames[p.sku]) psRefNames[p.sku] = p.name;
  });
  const DAY_FR = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const today = new Date().toISOString().slice(0,10);

  // Calcul des 7 dates lun-dim à partir d'une date de début
  function datesFrom(start) {
    const s = new Date(start+"T12:00:00Z");
    return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setUTCDate(d.getUTCDate()+i);return d.toISOString().slice(0,10);});
  }
  function getWeekDates(weekLabel) {
    const wr = allSales.find(r=>r.week_label===weekLabel&&r.period_start);
    return wr ? datesFrom(wr.period_start) : null;
  }
  // Une semaine est terminée si son dimanche est <= aujourd'hui (dimanche inclus après sync du soir)
  function isComplete(weekLabel) {
    const wr = allSales.find(r=>r.week_label===weekLabel&&r.period_start);
    if (!wr) return true;
    const sun = new Date(wr.period_start+"T12:00:00Z"); sun.setUTCDate(sun.getUTCDate()+6);
    return sun.toISOString().slice(0,10) <= today;
  }
  // Lundi de la semaine courante en UTC (évite le décalage getDay local vs toISOString UTC)
  function curWeekStart() {
    const d = new Date();
    const dow = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() - (dow - 1));
    return d.toISOString().slice(0,10);
  }

  const weeks = [...new Set(allSales.map(r=>r.week_label))].sort((a,b)=>b.localeCompare(a));
  const completedWeeks = weeks.filter(isComplete);

  // ── Semaines PS (depuis ps_sales_daily) sans données Odoo ────────
  // Permet d'afficher les classements même sans import Odoo hebdo
  const psWeekMap = {}; // label → { start, refs:{ ref→{qty,ca_ht} } }
  (STATE.psSalesDaily||[]).forEach(s => {
    if (!s.sale_date||!s.product_ref) return;
    const wk = isoWeekLabel(String(s.sale_date).slice(0,10));
    if (!wk) return;
    if (!psWeekMap[wk.label]) psWeekMap[wk.label] = { start:wk.start, refs:{} };
    const r = psWeekMap[wk.label].refs;
    if (!r[s.product_ref]) r[s.product_ref] = {qty:0,ca_ht:0};
    r[s.product_ref].qty    += (s.quantity||0);
    r[s.product_ref].ca_ht += (s.revenue_ht||0);
  });
  // Semaines PS terminées non couvertes par Odoo (dimanche inclus)
  const psOnlyWeeks = Object.keys(psWeekMap)
    .filter(lbl => {
      if (completedWeeks.includes(lbl)) return false; // déjà dans Odoo
      const sun = new Date(psWeekMap[lbl].start+"T12:00:00Z");
      sun.setUTCDate(sun.getUTCDate()+6);
      return sun.toISOString().slice(0,10) <= today;
    })
    .sort((a,b)=>b.localeCompare(a));

  // ── Semaine en cours — données PS temps réel ─────────────────────
  const curDates = datesFrom(curWeekStart());
  const curRefMap = {};
  (STATE.psSalesDaily||[]).forEach(s => {
    const d = String(s.sale_date||"").slice(0,10);
    const idx = curDates.indexOf(d); if (idx<0) return;
    const ref = s.product_ref||"";
    if (!curRefMap[ref]) curRefMap[ref] = {days:Array(7).fill(0),total:0};
    curRefMap[ref].days[idx] += (s.quantity||0);
    curRefMap[ref].total += (s.quantity||0);
  });
  const curTop10 = Object.entries(curRefMap).sort((a,b)=>b[1].total-a[1].total).slice(0,10);

  function renderCurrentWeekLive() {
    if (!curTop10.length) return "";
    const dayHeaders = curDates.map((d,i)=>{

      +"<span style='padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:#fef9ec;color:#a35f00;border:.5px solid #e9c97a'>● Live</span>"
      +"</div>"
      +"<div style='overflow-x:auto'><table style='width:auto;border-collapse:collapse;font-size:12px'>"
      +"<thead><tr style='border-bottom:1px solid var(--border)'>"
      +"<th style='padding:5px 10px;text-align:left;font-weight:600;color:var(--txS);width:90px'>Réf</th>"
      +"<th style='padding:5px 8px;text-align:left;color:var(--txS)'>Produit</th>"
      +dayHeaders
      +"<th style='padding:5px 10px;text-align:right;font-weight:700;color:var(--ac);border-left:1px solid var(--borderL);width:50px'>Total</th>"
      +"</tr></thead><tbody>"+rows+"</tbody></table></div>"
      +"</div>";
  }

  // ── Semaine terminée — tableau double (gauche: classement Odoo, droite: détail PS) ──
  function renderCompletedBlock(weekLabel) {
    const wSales = allSales.filter(r=>r.week_label===weekLabel);
    const top10 = [...wSales].sort((a,b)=>b.qty-a.qty).slice(0,10);
    if (!top10.length) return "<div style='color:var(--txT);font-size:12px;padding:8px'>Aucune donnée Odoo</div>";
    const wDates = getWeekDates(weekLabel);

    // Gauche : classement Odoo
    const showSea = SEA_MP.has(MARKETPLACE);
    const leftRows = top10.map((r,i)=>{
      const basket=(r.ca_ht&&r.qty)?Math.round(r.ca_ht/r.qty*1.2)+"€":"—";
      const bg=i%2?"background:var(--bg)":"";
      const deal=getActiveDealForWeek(r.ref,weekLabel)
        ?'<span style="padding:2px 6px;border-radius:99px;font-size:10px;font-weight:600;background:#fff3e0;color:#e65100">Deal</span>'
        :'<span style="font-size:10px;color:var(--txT)">—</span>';
      const seaDate = wDates ? wDates[0] : null;
      const sea=showSea?(getSeaActive(r.ref, seaDate)
        ?'<span style="padding:2px 6px;border-radius:99px;font-size:10px;font-weight:600;background:#fff3e0;color:#e65100">⚡ SEA</span>'
        :'<span style="font-size:10px;color:var(--txT)">—</span>'):"";
      return "<tr style='"+bg+";border-bottom:1px solid var(--borderL)'>"
        +"<td style='padding:5px 8px;font-size:11px;color:var(--txT);width:22px;text-align:right'>"+(i+1)+"</td>"
        +"<td style='padding:5px 8px;font-weight:600;white-space:nowrap'>"+esc(r.ref)+"</td>"
        +"<td style='padding:5px 8px;color:var(--txS);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px' title='"+esc(r.name)+"'>"+esc((r.name||"").slice(0,28))+"</td>"

        +"</tr>";
    }).join("");
    const leftTable = "<table style='width:100%;border-collapse:collapse;font-size:12px'>"
      +"<thead><tr style='border-bottom:1px solid var(--border)'>"
      +"<th style='padding:5px 8px;color:var(--txT);width:22px'>#</th>"
      +"<th style='padding:5px 8px;text-align:left;color:var(--txS)'>Réf</th>"

    // Droite : détail journalier PS pour le même top 10

          +"<td style='padding:5px 10px;text-align:right;font-weight:700;color:"+(tot>0?"var(--ac)":"var(--txT)")+";border-left:1px solid var(--borderL);width:50px'>"+(tot>0?tot:"—")+"</td>"
          +"</tr>";

      rightTable = "<table style='width:100%;border-collapse:collapse;font-size:12px'>"
        +"<thead><tr style='border-bottom:1px solid var(--border)'>"
        +"<th style='padding:5px 8px;text-align:left;color:var(--txS)'>Réf</th>"
        +DAY_FR.map(l=>"<th style='padding:5px 7px;text-align:right;color:var(--txS);width:38px'>"+l+"</th>").join("")
        +"<th style='padding:5px 10px;text-align:right;font-weight:700;color:var(--ac);border-left:1px solid var(--borderL);width:50px'>Total</th>"

    return "<div style='display:grid;grid-template-columns:1fr 1fr;gap:16px'>"
      +"<div><div style='font-size:10px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px'>🏆 Classement Odoo</div>"+leftTable+"</div>"
      +"<div><div style='font-size:10px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px'>📅 Détail par jour (Prestashop)</div>"+rightTable+"</div>"
      +"</div>";

  // ── Semaine terminée — source PS uniquement (pas de données Odoo) ─
  function renderPsOnlyBlock(weekLabel) {
    const wk = psWeekMap[weekLabel];
    if (!wk) return "";
    const wDates = datesFrom(wk.start);
    const top10 = Object.entries(wk.refs)
      .sort((a,b)=>b[1].qty-a[1].qty).slice(0,10)
      .map(([ref,v])=>({ref,qty:v.qty,ca_ht:v.ca_ht}));
    if (!top10.length) return "";
    // Deals actifs pendant cette semaine PS (wk.start = lundi de la semaine)
    const psWkStart = new Date(wk.start+"T12:00:00Z");
    const psWkEnd   = new Date(wk.start+"T12:00:00Z"); psWkEnd.setUTCDate(psWkEnd.getUTCDate()+6);
    const psActiveOpIds = new Set((STATE.activeOps||[])
      .filter(op=>new Date(op.date_debut)<=psWkEnd&&new Date(op.date_fin)>=psWkStart)
      .map(op=>op.id));
    function getPsDeal(sku) {
      if (!sku||!STATE.activeOpProducts) return null;
      const match=(STATE.activeOpProducts||[]).find(p=>p.ref===sku&&psActiveOpIds.has(p.operation_id));
      if (!match) return null;
      const op=(STATE.activeOps||[]).find(o=>o.id===match.operation_id);
      return op?op.nom:null;
    }
    // Gauche : classement PS
    const showSeaPs = SEA_MP.has(MARKETPLACE);
    const leftRows = top10.map((r,i)=>{
      const basket = (r.ca_ht&&r.qty)?Math.round(r.ca_ht/r.qty*1.2)+"€":"—";
      const bg = i%2?"background:var(--bg)":"";
      const name = psRefNames[r.ref]||"";
      const deal = getPsDeal(r.ref)
        ?'<span style="padding:2px 6px;border-radius:99px;font-size:10px;font-weight:600;background:#fff3e0;color:#e65100">Deal</span>'
        :'<span style="font-size:10px;color:var(--txT)">—</span>';
      const sea = showSeaPs?(getSeaActive(r.ref, wDates[0])
        ?'<span style="padding:2px 6px;border-radius:99px;font-size:10px;font-weight:600;background:#fff3e0;color:#e65100">⚡ SEA</span>'
        :'<span style="font-size:10px;color:var(--txT)">—</span>'):"";
      return "<tr style='"+bg+";border-bottom:1px solid var(--borderL)'>"
        +"<td style='padding:5px 8px;font-size:11px;color:var(--txT);width:22px;text-align:right'>"+(i+1)+"</td>"
        +"<td style='padding:5px 8px;font-weight:600;white-space:nowrap'>"+esc(r.ref)+"</td>"
        +"<td style='padding:5px 8px;color:var(--txS);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px' title='"+esc(name)+"'>"+esc(name.slice(0,28))+"</td>"
        +"<td style='padding:5px 8px;text-align:right;font-weight:700'>"+r.qty+"</td>"
        +"<td style='padding:5px 8px;text-align:right;color:var(--txS)'>"+basket+"</td>"
        +"<td style='padding:5px 8px;text-align:center'>"+deal+"</td>"
        +(showSeaPs?"<td style='padding:5px 8px;text-align:center'>"+sea+"</td>":"")
        +"</tr>";
    }).join("");
    const leftTable = "<table style='width:100%;border-collapse:collapse;font-size:12px'>"
      +"<thead><tr style='border-bottom:1px solid var(--border)'>"
      +"<th style='padding:5px 8px;color:var(--txT);width:22px'>#</th>"
      +"<th style='padding:5px 8px;text-align:left;color:var(--txS)'>Réf</th>"
      +"<th style='padding:5px 8px;text-align:left;color:var(--txS)'>Produit</th>"
      +"<th style='padding:5px 8px;text-align:right;color:var(--txS)'>Ventes</th>"
      +"<th style='padding:5px 8px;text-align:right;color:var(--txS)'>PM TTC</th>"
      +"<th style='padding:5px 8px;text-align:center;color:var(--txS)'>Opé.</th>"
      +(showSeaPs?"<th style='padding:5px 8px;text-align:center;color:var(--txS)'>SEA</th>":"")
      +"</tr></thead><tbody>"+leftRows+"</tbody></table>";
    // Droite : détail journalier
    const rightRows = top10.map((r,i)=>{
      let tot=0;
      const days=wDates.map(d=>{const v=psDailyIdx[r.ref+"|"+d]||0;tot+=v;return v;});
      const bg=i%2?"background:var(--bg)":"";
      return "<tr style='"+bg+";border-bottom:1px solid var(--borderL)'>"
        +"<td style='padding:5px 8px;font-weight:600'>"+esc(r.ref)+"</td>"
        +days.map(v=>"<td style='padding:5px 7px;text-align:right;font-weight:"+(v>0?"600":"400")+";color:"+(v>0?"var(--tx)":"var(--txT)")+";width:38px'>"+(v>0?v:"—")+"</td>").join("")
        +"<td style='padding:5px 10px;text-align:right;font-weight:700;color:"+(tot>0?"var(--ac)":"var(--txT)")+";border-left:1px solid var(--borderL);width:50px'>"+(tot>0?tot:"—")+"</td>"
        +"</tr>";
    }).join("");
    const rightTable = "<table style='width:100%;border-collapse:collapse;font-size:12px'>"
      +"<thead><tr style='border-bottom:1px solid var(--border)'>"
      +"<th style='padding:5px 8px;text-align:left;color:var(--txS)'>Réf</th>"
      +DAY_FR.map(l=>"<th style='padding:5px 7px;text-align:right;color:var(--txS);width:38px'>"+l+"</th>").join("")
      +"<th style='padding:5px 10px;text-align:right;font-weight:700;color:var(--ac);border-left:1px solid var(--borderL);width:50px'>Total</th>"
      +"</tr></thead><tbody>"+rightRows+"</tbody></table>";
    return "<div style='display:grid;grid-template-columns:1fr 1fr;gap:16px'>"
      +"<div><div style='font-size:10px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px'>🏆 Classement Prestashop</div>"+leftTable+"</div>"
      +"<div><div style='font-size:10px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px'>📅 Détail par jour</div>"+rightTable+"</div>"
      +"</div>";
  }

  // ── Assemblage ───────────────────────────────────────────────────
  if (!allSales.length && !curTop10.length && !psOnlyWeeks.length) {
    return '<div style="margin-top:20px"><div style="font-size:13px;font-weight:700;margin-bottom:12px">📦 Ventes produits par semaine</div><div class="card" style="padding:24px;text-align:center;color:var(--txT);font-size:12px">Aucune donnée produit. Importez un fichier Odoo via <b>Import Semaine</b>.</div></div>';
  }

  let out = "<div style='margin-top:20px'><div style='font-size:13px;font-weight:700;margin-bottom:12px'>📦 Ventes produits par semaine</div>";

  // Semaine en cours (live PS) — masquée si la semaine est déjà affichée comme terminée
  const curWkLabel = isoWeekLabel(today)?.label;
  const curWkIsHandled = curWkLabel && (completedWeeks.includes(curWkLabel) || psOnlyWeeks.includes(curWkLabel));
  if (!curWkIsHandled) out += renderCurrentWeekLive();

  // Semaines terminées — fusion Odoo + PS triée par label décroissant
  const allCompleted = [
    ...completedWeeks.map(w => ({ label: w, src: "odoo" })),
    ...psOnlyWeeks.map(w => ({ label: w, src: "ps" })),
  ].sort((a, b) => b.label.localeCompare(a.label));

  if (allCompleted.length) {
    const [first, ...rest] = allCompleted;
    const badgePs = "<span style='font-size:10px;color:var(--txS);padding:2px 7px;border-radius:99px;border:.5px solid var(--border)'>Source Prestashop</span>";
    function blockHeader(w) {
      return "<div style='display:flex;align-items:center;gap:8px;margin-bottom:12px'>"

        +(w.src==="ps" ? badgePs : "")
