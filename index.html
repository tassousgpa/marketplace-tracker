<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafaf8;--card:#fff;--border:#e8e6e1;--borderL:#f0eee9;--tx:#1a1a18;--txS:#6b6a65;--txT:#9c9a92;--ac:#2c5ea0;--acBg:#e8f0fa;--gn:#1a7a4c;--gnBg:#e6f5ee;--rd:#b5312c;--rdBg:#fce8e8;--am:#8a6d1b;--amBg:#faf0d4;--pu:#5b47b0;--puBg:#eeecfe}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.header{padding:20px 28px 0;border-bottom:1px solid var(--border);background:var(--card)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.title{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.subtitle{font-size:12px;color:var(--txS);margin-top:2px}
.mp-btns{display:flex;gap:6px;align-items:center}
.mp-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--border);background:transparent;color:var(--txS);font-family:inherit;position:relative}
.mp-btn.active{border-color:var(--ac);background:var(--acBg);color:var(--ac)}
/* Scraping badge */
.scraping-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.scraping-badge.live{background:#fef9ec;color:#a35f00;border:.5px solid #e9c97a}
.scraping-badge.live .dot{width:6px;height:6px;border-radius:50%;background:#e8a200;animation:pulse 1.2s infinite}
.scraping-badge.ok{background:var(--gnBg);color:var(--gn);border:.5px solid #9fd4b8}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.mp-indicator-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;padding:0 2px}
.mp-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txS)}
.mp-indicator-name{font-weight:600}
.tabs{display:flex;gap:0}
.tab{padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--txS);border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.content{padding:20px 28px}
.metrics{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.metric{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:120px}
.metric-label{font-size:11px;color:var(--txS);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:26px;font-weight:600;line-height:1.1}
.metric-sub{font-size:11px;color:var(--txT);margin-top:3px}
.card{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:500;white-space:nowrap}
.pill-green{background:var(--gnBg);color:var(--gn)}.pill-red{background:var(--rdBg);color:var(--rd)}
.pill-accent{background:var(--acBg);color:var(--ac)}.pill-amber{background:var(--amBg);color:var(--am)}
.pill-purple{background:var(--puBg);color:var(--pu)}.pill-default{background:var(--borderL);color:var(--txS)}
.bar-row{margin-bottom:7px}
.bar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.bar-label{font-size:13px;color:var(--tx);font-weight:500}
.bar-sub{font-size:12px;color:var(--txS)}
.bar-track{height:5px;background:var(--borderL);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.kpi-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--borderL)}
.kpi-label{font-size:13px;color:var(--txS)}
.kpi-value{font-size:14px;font-weight:600}
.btn-see{background:var(--acBg);color:var(--ac);border:none;border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;font-weight:500;font-family:inherit;margin-left:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;text-align:left}
td{padding:8px 10px}
tr.stripe{background:var(--bg)}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{padding:7px 12px;border:.5px solid var(--border);border-radius:8px;font-size:12px;background:var(--card);font-family:inherit}
.filters input{flex:1;min-width:180px}
.btn-add{padding:7px 14px;border:.5px solid var(--ac);border-radius:8px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit}
.link{color:var(--ac);text-decoration:none;font-size:11px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:12px;padding:20px 24px;max-width:700px;width:100%;max-height:80vh;overflow:auto;border:.5px solid var(--border)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txS);line-height:1}
.product-row{padding:8px 0;border-bottom:1px solid var(--borderL);font-size:12px}
.product-row-name{font-weight:500;font-size:13px;margin-bottom:2px}
.product-row-refs{display:flex;gap:12px;color:var(--txS);flex-wrap:wrap;align-items:center}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-card{padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;border:.5px solid var(--border)}
.cat-card:hover{border-color:var(--ac)}
.cat-card.selected{border-color:var(--ac);background:var(--acBg)}
.cat-card-header{display:flex;justify-content:space-between;align-items:center}
.cat-card-name{font-size:13px;font-weight:500}
.cat-card-count{font-size:18px;font-weight:700;color:var(--ac)}
.cat-card-zero .cat-card-name{color:var(--txT)}.cat-card-zero .cat-card-count{color:var(--txT)}
.vendor-row{cursor:pointer;padding:7px 0;border-bottom:1px solid var(--borderL)}
.vendor-rank{font-size:11px;font-weight:600;color:var(--txT);width:18px;display:inline-block}
.toggle-group{display:flex;gap:0;border:.5px solid var(--border);border-radius:8px;overflow:hidden}
.toggle-btn{padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--txS);font-family:inherit}
.toggle-btn.active{background:var(--acBg);color:var(--ac)}
.anomaly-section{margin-bottom:16px}
.anomaly-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.loading{text-align:center;padding:60px 20px;color:var(--txS)}
.loading-spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--borderL);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
.scroll-table{overflow-x:auto}
/* Sparkline chart for Conforama */
.sparkline-wrap{margin-top:14px}
.sparkline-title{font-size:12px;font-weight:600;color:var(--txS);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.sparkline-svg{display:block;width:100%;height:80px}
.sparkline-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--txT);margin-top:2px}

<div class="header">
  <div class="header-top">

      <div class="title">Marketplace tracker</div>
      <div class="subtitle" id="header-subtitle">Chargement...</div>
    </div>

<script>
const MAINTENANCE_MODE = true; // ← changer en false pour passer LIVE
const ADMIN_CODE = "tassousgpa!";
const ACCESS_CODE = "MKP2026!";
const SB_URL = "https://pmxsthzdxubqbemdgtbr.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBteHN0aHpkeHVicWJlbWRndGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDk4NDQsImV4cCI6MjA5MDAyNTg0NH0.GpfAw91eJ8D7RIeZLFIejCt9DTwGpXvOGcxYlhZS78I";
let MARKETPLACE = "cdiscount";

// Marketplaces disponibles
const MARKETPLACES = [
  { id: "cdiscount", label: "Cdiscount" },
  { id: "amazon", label: "Amazon" },
  { id: "maisonsdumonde", label: "Maisons du Monde" },
  { id: "conforama", label: "Conforama" },
  { id: "laredoute", label: "La Redoute" },
  { id: "but", label: "BUT" },
  { id: "manomano", label: "ManoMano" },
];

// Marketplaces sans onglet Positions ni Concurrents
const NO_POSITIONS_MP = new Set(["manomano"]);
const NO_COMPETITORS_MP = new Set(["manomano"]);

// Cache des derniers timestamps de scraping par marketplace (pour l'indicateur)
const MP_LAST_SCRAPING = {};

async function sb(table, params="") {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      "Range-Unit": "items",
      "Range": "0-9999"   // Force Supabase à renvoyer jusqu'à 10000 lignes (défaut = 1000)
    }
  });
  if (!r.ok) throw new Error(`Supabase error: ${r.status}`);
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, { method:"POST", headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=representation"}, body:JSON.stringify(data) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Insert error ${r.status}: ${t}`); }
  return r.json();
}
async function sbUpdate(table, filter, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, { method:"PATCH", headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=representation"}, body:JSON.stringify(data) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Update error ${r.status}: ${t}`); }
  return r.json();
}
async function sbDelete(table, filter) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, { method:"DELETE", headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`} });
  if (!r.ok) throw new Error(`Delete error: ${r.status}`);
}

// =============================================
// INDICATEURS DE SCRAPING — toutes marketplaces
// =============================================
async function loadScrapingIndicators() {
  try {
    // On récupère le snapshot le plus récent par marketplace (table product_snapshots)
    const rows = await sb("product_snapshots", `select=marketplace,date&order=date.desc&limit=500`);
    const latestByMp = {};
    rows.forEach(r => {
      if (r.marketplace && r.date) {
        if (!latestByMp[r.marketplace] || r.date > latestByMp[r.marketplace]) {
          latestByMp[r.marketplace] = r.date;
        }
      }
    });

    // Fallback: seller_stats pour marketplaces sans snapshots
    const statsRows = await sb("seller_stats", `select=marketplace,date&order=date.desc&limit=200`);
    statsRows.forEach(r => {
      if (r.marketplace && r.date) {
        if (!latestByMp[r.marketplace] || r.date > latestByMp[r.marketplace]) {
          latestByMp[r.marketplace] = r.date;
        }
      }
    });

    Object.assign(MP_LAST_SCRAPING, latestByMp);
    renderScrapingIndicators();
  } catch(e) {
    console.warn("Indicateurs scraping:", e.message);
  }
}

function renderScrapingIndicators() {
  const now = Date.now();
  const container = document.getElementById("mp-indicator-row");
  if (!container) return;

  const html = MARKETPLACES.map(mp => {
    const lastDate = MP_LAST_SCRAPING[mp.id];
    if (!lastDate) return `<div class="mp-indicator"><span class="mp-indicator-name">${mp.label}</span><span class="scraping-badge" style="background:var(--borderL);color:var(--txT);border:.5px solid var(--border)">Aucune donnée</span></div>`;

    const lastMs = new Date(lastDate).getTime();
    const diffSec = Math.round((now - lastMs) / 1000);
    const isLive = diffSec < 90;

    let badge;
    if (isLive) {
      badge = `<span class="scraping-badge live"><span class="dot"></span>Scraping en cours</span>`;
    } else {
      const label = formatRelativeDate(lastDate);
      badge = `<span class="scraping-badge ok">✓ ${label}</span>`;
    }
    return `<div class="mp-indicator"><span class="mp-indicator-name">${mp.label}</span>${badge}</div>`;
  }).join("");

  container.innerHTML = html;
}

function formatRelativeDate(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.round(diffMs / 60000);
  const diffH = Math.round(diffMs / 3600000);
  const diffD = Math.round(diffMs / 86400000);
  if (diffMin < 2) return "à l'instant";
  if (diffMin < 60) return `il y a ${diffMin} min`;
  if (diffH < 24) return `il y a ${diffH}h`;
  if (diffD === 1) return "hier";
  if (diffD < 7) return `il y a ${diffD}j`;
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
}

// Rafraîchir les indicateurs toutes les 20s (pour détecter un scraping en cours)
setInterval(() => {
  loadScrapingIndicators();
}, 60000);

let STATE = { products:[], snapshots:[], positions:[], dates:[], sellerStats:[], tab:0 };

// =============================================
// normalizeKeyword — globale (utilisée dans loadData ET renderPositions)
// =============================================
const URL_LABEL_MAP_GLOBAL = {
  "canape-salon-sejour/canape/tous-les-canapes":       "Tous les canapés",
  "canape-salon-sejour/canape/canape-convertible":     "Canapé convertible",
  "canape-salon-sejour/banquette/banquette-clic-clac": "Banquette clic-clac",
  "canape-salon-sejour/sejour/table":                  "Tables de séjour",
  "canape-salon-sejour/salon/meuble-tv":               "Meuble TV",
  "mobilier-de-jardin/salon-de-jardin":                "Salon de jardin",
  "chambre-adulte/lit-adulte":                         "Lit coffre",
};
function normalizeKeyword(kw) {
  if (!kw) return kw;
  try {
    if (kw.startsWith("http") || kw.startsWith("//")) {
      const urlStr = kw.startsWith("//") ? "https:" + kw : kw;
      const url = new URL(urlStr);
      const fromSearch = url.searchParams.get("fromSearch");
      if (fromSearch) return decodeURIComponent(fromSearch).trim();
      const fullPath = url.hostname + url.pathname;
      for (const [key, label] of Object.entries(URL_LABEL_MAP_GLOBAL)) {
        if (fullPath.includes(key)) return label;
      }
      const segments = url.pathname.split("/").filter(s => s && !/^c$/.test(s) && !/^\d+/.test(s));
      const last = segments[segments.length - 1] || "";
      return decodeURIComponent(last.replace(/-/g, " ")).trim() || kw;
    }
  } catch(e) {}
  return kw;
}

const TAB_NAMES = ["Synthèse","Produits","Historique","Positions","Concurrents","Anomalies","Audit","Gestion"];
const TAB_NAMES_LIGHT = ["Synthèse","Produits","Historique","Anomalies","Audit","Gestion"];

function isLightMp() { return NO_POSITIONS_MP.has(MARKETPLACE); }
function getTabNames() { return isLightMp() ? TAB_NAMES_LIGHT : TAB_NAMES; }

function switchMarketplace(mp, btn) {
  MARKETPLACE = mp;
  document.querySelectorAll('.mp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  STATE.tab = 0;
  loadData();
}

async function loadData() {
  try {
    // Pour les positions : on récupère d'abord la date du dernier scraping (1 ligne),
    // puis on fetche TOUTES les positions de ce jour-là pour garantir les 18 keywords.
    // Évite le problème de la limite 5000 qui tronquerait les premiers keywords.
    // La table positions ne contient que le dernier run (purge côté scraper avant chaque session)
    // → select * sans filtre ni limite, requête simple et fiable
    const [products, allProducts, snapshots, positions, sellerStats, revenueEntries, trackedSellers, revenueImports, productSalesWeekly, monthlyHistory] = await Promise.all([
      sb("products", `marketplace=eq.${MARKETPLACE}&active=eq.true&select=*&order=product_id`),
      sb("products", `marketplace=eq.${MARKETPLACE}&select=*&order=product_id`),
      sb("product_snapshots", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=10000`),
      sb("positions", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=5000`),
      sb("seller_stats", `marketplace=eq.${MARKETPLACE}&select=*&order=date.desc&limit=2000`),
      sb("revenue_entries", `marketplace=eq.${MARKETPLACE}&select=*&order=week_start_date.asc`).catch(()=>[]),
      sb("tracked_sellers", `marketplace=eq.${MARKETPLACE}&active=eq.true&select=*&order=id.asc`).catch(()=>[]),
      sb("revenue_imports", `marketplace=eq.${MARKETPLACE}&select=*&order=period_start.asc`).catch(()=>[]),
      sb("revenue_monthly_history", `marketplace=eq.${MARKETPLACE}&select=year,month,revenue&order=year.asc,month.asc`).catch(()=>[]),
      sb("product_sales_weekly", `marketplace=eq.${MARKETPLACE}&select=*&order=week_label.desc`).catch(()=>[]),
    ]);

    // Mettre à jour le cache de scraping avec les données fraîchement chargées
    if (snapshots.length > 0) {
      const latest = snapshots.reduce((a, b) => a.date > b.date ? a : b);
      if (!MP_LAST_SCRAPING[MARKETPLACE] || latest.date > MP_LAST_SCRAPING[MARKETPLACE]) {
        MP_LAST_SCRAPING[MARKETPLACE] = latest.date;
        renderScrapingIndicators();
      }
    }

    const prodByScraper = {};
    products.forEach(p => { if (p.product_id_scraper) prodByScraper[p.product_id_scraper.toLowerCase()] = p; });
    snapshots.forEach(s => { s._product = prodByScraper[(s.product_id||"").toLowerCase()] || null; });

    // sessionKey à l'heure : pour les positions (dernière session < 1h)
    function sessionKey(ts) { return new Date(ts).toISOString().slice(0, 13); }
    // dayKey au jour : plusieurs scrapes le même jour = 1 seule colonne dans l'historique
    function dayKey(ts) { return new Date(ts).toISOString().slice(0, 10); }

    const daySet = new Set();
    snapshots.forEach(s => { if (s.date) daySet.add(dayKey(s.date)); });
    const dates = [...daySet].sort(); // ex: ["2026-03-28", "2026-03-30"]

    const history = {};
    snapshots.forEach(s => {
      const key = (s.product_id||"").toLowerCase();
      if (!history[key]) history[key] = {};
      const dk = dayKey(s.date);
      // On garde le snapshot le plus récent du jour (id le plus grand)
      if (dk && (!history[key][dk] || s.id > history[key][dk].id)) history[key][dk] = s;
    });

    const latestDate = dates[dates.length-1] || "";
    const prevDate = dates.length >= 2 ? dates[dates.length-2] : "";

    products.forEach(p => {
      const key = (p.product_id_scraper||"").toLowerCase();
      const h = history[key] || {};
      const latest = h[latestDate], prev = h[prevDate];
      p._latest = latest || null; p._history = h;
      p._price = latest?.price ?? null; p._available = latest?.available ?? null;
      p._rating = latest?.rating ?? null; p._delivery = latest?.delivery_days ?? null;
      p._tags = [];
      if (latest && prev) {
        if (latest.price!=null && prev.price!=null && prev.price>0) { const pct=(latest.price-prev.price)/prev.price; if(pct>.10) p._tags.push("prix_up"); else if(pct<-.15) p._tags.push("prix_down"); }
        if (latest.delivery_days!=null && prev.delivery_days!=null) { const d=latest.delivery_days-prev.delivery_days; if(d>5) p._tags.push("delai_up"); else if(d<-5) p._tags.push("delai_down"); }
        if (latest.rating!=null && prev.rating!=null) { const d=latest.rating-prev.rating; if(d>=.2) p._tags.push("note_up"); else if(d<=-.2) p._tags.push("note_down"); }
      }
    });

    // Grouper les positions par JOUR (pas par heure) pour ne pas rater des recherches
    // qui auraient été scrapées à des heures différentes dans la même journée.
    // On prend toutes les positions du jour le plus récent.
    const posDaySet = new Set();
    positions.forEach(p => { if (p.date) posDaySet.add(dayKey(p.date)); });
    const posDaysSorted = [...posDaySet].sort();
    const latestPosDay = posDaysSorted[posDaysSorted.length-1] || "";
    // On déduplique par (keyword, product_id) : si le même produit a été scrappé
    // deux fois le même jour sur le même keyword, on ne garde que la ligne la plus récente.
    const posSeenKey = new Set();
    const latestPositions = [];
    positions
      .filter(p => p.date && dayKey(p.date) === latestPosDay)
      .sort((a, b) => new Date(b.date) - new Date(a.date)) // plus récent en premier
      .forEach(p => {
        const dedupeKey = (p.keyword||"") + "||" + (p.product_id||"") + "||" + (p.seller||"");
        if (!posSeenKey.has(dedupeKey)) {
          posSeenKey.add(dedupeKey);
          latestPositions.push(p);
        }
      });
    const latestPosSession = latestPosDay; // utilisé pour la synchro snapshotDay

    // Normalise le keyword : extrait le terme de recherche depuis les URLs Conforama
    // ex: "https://www.conforama.fr/recherche-conforama/canap%C3%A9%20panoramique?fromSearch=canap%C3%A9%20panoramique"
    // → "canapé panoramique"
    const keywordData = {};
    latestPositions.forEach(p => {
      const kw = normalizeKeyword(p.keyword);
      if (!keywordData[kw]) keywordData[kw] = [];
      const prod = prodByScraper[(p.product_id||"").toLowerCase()];
      keywordData[kw].push({...p, keyword: kw, _product:prod});
    });

    // leaderCounts : comptage brut par (keyword normalisé, seller) pour "Leader par catégorie"
    // Construit depuis toutes les positions du jour AVANT dédup, avec keyword normalisé
    const leaderCounts = {};
    positions
      .filter(p => p.date && dayKey(p.date) === latestPosDay)
      .forEach(p => {
        const kw = normalizeKeyword(p.keyword);
        if (!leaderCounts[kw]) leaderCounts[kw] = {};
        leaderCounts[kw][p.seller] = (leaderCounts[kw][p.seller] || 0) + 1;
      });

    // vendorsSorted est maintenant construit depuis seller_stats (p1_count)
    // plus depuis positions — voir buildSellerStatsMap() dans renderConcurrents
    const vendorsSorted = []; // placeholder, remplacé au render

    // ─── Matching BestMobilier ───────────────────────────────────────
    // On utilise seller === "BestMobilier" comme critère primaire,
    // plus fiable que le matching product_id_scraper qui peut être vide.
    // On construit aussi un index product_id → produit suivi (pour les liens).
    const bmScraperIds = new Set(products.map(p=>(p.product_id_scraper||"").toLowerCase()).filter(Boolean));
    const trackedByScraperId = {}; // product_id_scraper → product row
    products.forEach(p => { if (p.product_id_scraper) trackedByScraperId[p.product_id_scraper.toLowerCase()] = p; });

    // Un product est BM si : seller === "BestMobilier" OU son product_id matche un product_id_scraper suivi
    // Noms de vendeurs reconnus comme appartenant au groupe
    const BM_SELLER_NAMES = new Set(["BestMobilier", "Best Mobilier", "Lisa Design"]);
    function isBMPosition(p) {
      const useScraperId = (MARKETPLACE === "cdiscount" || MARKETPLACE === "amazon" || MARKETPLACE === "laredoute" || MARKETPLACE === "maisonsdumonde");
      return BM_SELLER_NAMES.has(p.seller) || (useScraperId && bmScraperIds.has((p.product_id||"").toLowerCase()));
    }

    // bmByKeyword : nombre de produits BM en page 1 par keyword
    // On initialise TOUS les keywords présents dans les positions du jour (avant et après dédup)
    // pour garantir que les 18 catégories apparaissent même si BM = 0
    const allKeywordsToday = new Set(positions.map(p => normalizeKeyword(p.keyword)));
    const bmByKeyword = {};
    allKeywordsToday.forEach(kw => { bmByKeyword[kw] = 0; }); // initialise à 0
    Object.entries(keywordData).forEach(([kw, items]) => {
      bmByKeyword[kw] = items.filter(i => isBMPosition(i)).length;
    });

    // productsInPage1 : set des product_ids BM présents en page 1
    const productsInPage1 = new Set();
    // page1Keywords : product_id → liste des keywords où il est en page 1
    const page1Keywords = {};
    latestPositions.forEach(p => {
  if (isBMPosition(p)) {
    const pid = (p.product_id||"").toLowerCase();
    const trackedProdForSet = trackedByScraperId[pid];
    if (trackedProdForSet) productsInPage1.add((trackedProdForSet.product_id_scraper||"").toLowerCase());
    const kw = normalizeKeyword(p.keyword);
    const trackedProd = trackedByScraperId[pid];
    if (!trackedProd) return;
    const scraperPid = (trackedProd.product_id_scraper||"").toLowerCase();
    if (!page1Keywords[scraperPid]) page1Keywords[scraperPid] = new Set();
    page1Keywords[scraperPid].add(kw);
  }
});

    // =============================================
    // CONFORAMA: calcul incrémental des ventes
    // seller_sales = total cumulé depuis début, on calcule xn - x0 par session
    // =============================================
    // confoSellerHistory sert aussi pour MdM (même logique : ventes cumulées totales)
    const confoSellerHistory = {}; // { sellerName: [{date, sales}] trié par date ASC }
    if (MARKETPLACE === "conforama" || MARKETPLACE === "maisonsdumonde") {
      const allStats = await sb("seller_stats", `marketplace=eq.${MARKETPLACE}&select=*&order=date.asc&limit=5000`);
      allStats.forEach(s => {
        if (!s.seller || s.seller_sales == null) return;
        if (!confoSellerHistory[s.seller]) confoSellerHistory[s.seller] = [];
        confoSellerHistory[s.seller].push({ date: s.date, sales: s.seller_sales, rating: s.seller_rating, ratingsCount: s.seller_ratings_count, sourceUrl: s.source_url });
      });
    }

    // AMAZON: on utilise seller_ratings_count comme proxy des ventes
    // On calcule delta avis 12m = dernière valeur - valeur la plus ancienne dans les 12 derniers mois
    const amazonReviewsProxy = {};
    if (MARKETPLACE === "amazon") {
      sellerStats.forEach(s => {
        if (!s.seller) return;
        if (!amazonReviewsProxy[s.seller]) amazonReviewsProxy[s.seller] = { latest: null, oldest12m: null };
        const entry = { date: s.date, count: s.seller_ratings_count, rating: s.seller_rating, sourceUrl: s.source_url };
        const d = amazonReviewsProxy[s.seller];
        if (!d.latest || s.date > d.latest.date) d.latest = entry;
        // "oldest in 12m" = la plus ancienne entrée dans les 12 derniers mois
        const cutoff = new Date();
        cutoff.setFullYear(cutoff.getFullYear() - 1);
        if (new Date(s.date) >= cutoff) {
          if (!d.oldest12m || s.date < d.oldest12m.date) d.oldest12m = entry;
        }
      });
    }

    // Vérification synchronisation : les positions doivent être du même jour que les snapshots produits.
    // On compare uniquement la date (YYYY-MM-DD), pas l'heure.
    const snapshotDay = latestDate ? latestDate.slice(0, 10) : null;
    const posDay = latestPosSession ? latestPosSession.slice(0, 10) : null;
    console.log("DEBUG positions:", MARKETPLACE, "snapshotDay=", snapshotDay, "posDay=", posDay, "latestDate=", latestDate, "latestPosDay=", latestPosDay);
    const positionsOutdated = !posDay || (snapshotDay && posDay < snapshotDay);

    STATE = { products, allProducts, snapshots, positions:latestPositions, dates, latestDate, prevDate, history, keywordData, leaderCounts, bmByKeyword, productsInPage1, page1Keywords, prodByScraper, trackedByScraperId, bmScraperIds, latestPosDate: latestPosSession, positionsOutdated, snapshotDay, posDay, sellerStats, confoSellerHistory, amazonReviewsProxy, revenueEntries: revenueEntries||[], trackedSellers: trackedSellers||[], revenueImports: revenueImports||[], monthlyHistory: monthlyHistory||[], productSalesWeekly: productSalesWeekly||[], tab:STATE.tab||0 };

    const sessionDisplay = latestDate ? new Date(latestDate + "T12:00:00Z").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}) : "N/A";
    document.getElementById("header-subtitle").textContent = `${products.length} produits · Relevé du ${sessionDisplay}`;
    renderTabs(); renderContent();
  } catch(e) {
    document.getElementById("content").innerHTML = `<div class="loading" style="color:var(--rd)"><div style="font-size:16px;font-weight:600;margin-bottom:8px">Erreur de chargement</div><div style="font-size:13px">${e.message}</div></div>`;
    console.error(e);
  }
}

}

function pill(text,color="default"){return `<span class="pill pill-${color}">${text}</span>`}
function bar(label,value,max,color="var(--ac)",sub){const pct=max>0?Math.min(Math.round(value/max*100),100):0;return `<div class="bar-row"><div class="bar-header"><span class="bar-label">${label}</span><span class="bar-sub">${sub||value}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`}
function productRowHTML(p){return `<div class="product-row"><div class="product-row-name">${esc(p.name)}</div><div class="product-row-refs"><span>ID: ${esc(p.product_id)}</span><span>SKU: ${esc(p.sku)}</span><span>SKU MP: ${esc(p.sku_marketplace)}</span>${p.url?`<a href="${esc(p.url)}" target="_blank" class="link">Voir ↗</a>`:'<span style="color:var(--rd)">Pas d\'URL</span>'}</div></div>`}
function openModal(title,html){document.getElementById("modal-title").textContent=title;document.getElementById("modal-body").innerHTML=html;document.getElementById("modal-overlay").classList.remove("hidden")}
function closeModal(){document.getElementById("modal-overlay").classList.add("hidden")}
const tagLabel=t=>({prix_up:"Prix ↑",prix_down:"Prix ↓",delai_up:"Délai ↑",delai_down:"Délai ↓",note_up:"Note ↑",note_down:"Note ↓"}[t]||t);
const tagColor=t=>(t.includes("up")&&t!=="note_up")?"red":(t.includes("down")&&t!=="note_down")?"green":t==="note_up"?"green":"red";

function renderSynthese() {
  const P=STATE.products;
  const avail=P.filter(p=>p._available===true).length, unavail=P.filter(p=>p._available===false).length;
  // Nombre total d'apparitions page 1 des produits suivis (1 produit sur 2 keywords = 2)
  // = somme des pills "Page 1" dans l'onglet Produits
  const page1 = STATE.products.reduce((sum, p) => {
    const pid = (p.product_id_scraper || "").toLowerCase();
    const kws = STATE.page1Keywords?.[pid];
    return sum + (kws ? kws.size : 0);
  }, 0);
  const prices=P.filter(p=>p._price!=null).map(p=>p._price);
  const ratings=P.filter(p=>p._rating!=null).map(p=>p._rating);
  const deliveries=P.filter(p=>p._delivery!=null).map(p=>p._delivery);
  const avgPrice=prices.length?Math.round(prices.reduce((a,b)=>a+b,0)/prices.length):"—";
  const avgRating=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):"—";
  const avgDelivery=deliveries.length?Math.round(deliveries.reduce((a,b)=>a+b,0)/deliveries.length):"—";
  const du=P.filter(p=>p._tags.includes("delai_up")),dd=P.filter(p=>p._tags.includes("delai_down")),pu=P.filter(p=>p._tags.includes("prix_up"));
  const totalWithPrev=P.filter(p=>p._latest&&STATE.prevDate&&p._history[STATE.prevDate]).length;
  const pctDU=totalWithPrev>0?Math.round(du.length/totalWithPrev*100):0;
  const pctPU=totalWithPrev>0?Math.round(pu.length/totalWithPrev*100):0;
  const pctDD=totalWithPrev>0?Math.round(dd.length/totalWithPrev*100):0;

  return `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Produits suivis</div><div class="metric-value">${P.length}</div></div>
      <div class="metric"><div class="metric-label">En page 1</div><div class="metric-value" style="color:var(--ac)">${page1}</div><div class="metric-sub">${P.length>0?Math.round(page1/P.length*100):0}% du catalogue</div></div>
      <div class="metric"><div class="metric-label">Indisponibles</div><div class="metric-value" style="color:var(--rd)">${unavail}</div></div>
      <div class="metric"><div class="metric-label">Délai moyen</div><div class="metric-value" style="color:var(--am)">${avgDelivery}j</div></div>
      <div class="metric"><div class="metric-label">Note moyenne</div><div class="metric-value" style="color:var(--am)">${avgRating}</div></div>
    </div>

    <div class="card"><div class="card-title">Indicateurs clés</div><div class="grid-2">${[
      {l:"Prix moyen",v:avgPrice+"€"},{l:"Délai moyen",v:avgDelivery+" jours"},{l:"Note moyenne",v:avgRating+" / 5"},
      {l:"Taux dispo",v:(P.length>0?Math.round(avail/P.length*100):0)+"%"},{l:"Taux page 1",v:(P.length>0?Math.round(page1/P.length*100):0)+"%"},
      {l:"Prix en hausse (>10%)",v:`${pctPU}% (${pu.length})`,click:pu.length>0?"showVariation('prix_up')":null,color:pu.length>0?"var(--rd)":""},
      {l:"Délai en hausse (>5j)",v:`${pctDU}% (${du.length})`,click:du.length>0?"showVariation('delai_up')":null,color:du.length>0?"var(--rd)":""},
      {l:"Délai en baisse (>5j)",v:`${pctDD}% (${dd.length})`,click:dd.length>0?"showVariation('delai_down')":null,color:dd.length>0?"var(--gn)":""},
    ].map(k=>`<div class="kpi-row"><span class="kpi-label">${k.l}</span><div><span class="kpi-value" ${k.color?`style="color:${k.color}"`:''}>${k.v}</span>${k.click?`<button class="btn-see" onclick="${k.click}">voir</button>`:''}</div></div>`).join("")}</div></div>
    ${renderRevenueBlock()}
    ${renderProductSalesBlocks()}`;
}

function showVariation(tag) {
  const prods=STATE.products.filter(p=>p._tags.includes(tag));
  const titles={prix_up:"Prix en hausse >10%",prix_down:"Prix en baisse >15%",delai_up:"Délai en hausse >5j",delai_down:"Délai en baisse >5j",note_up:"Note en hausse",note_down:"Note en baisse"};
  openModal(titles[tag]||tag,prods.length>0?prods.map(p=>{const curr=p._history[STATE.latestDate],prev=p._history[STATE.prevDate];let delta="";if(tag.startsWith("prix")&&curr?.price!=null&&prev?.price!=null)delta=`${prev.price}€ → ${curr.price}€`;else if(tag.startsWith("delai")&&curr?.delivery_days!=null&&prev?.delivery_days!=null)delta=`${prev.delivery_days}j → ${curr.delivery_days}j`;else if(tag.startsWith("note")&&curr?.rating!=null&&prev?.rating!=null)delta=`${prev.rating} → ${curr.rating}`;return `<div class="product-row"><div class="product-row-name">${esc(p.name)}</div><div class="product-row-refs"><span>ID: ${esc(p.product_id)}</span><span style="color:${tag.includes('down')?'var(--gn)':'var(--rd)'};font-weight:500">${delta}</span>${p.url?`<a href="${esc(p.url)}" target="_blank" class="link">Voir ↗</a>`:''}</div></div>`;}).join(""):'<div style="padding:20px;text-align:center;color:var(--txT)">Aucun produit concerné</div>');
}

function renderProductSalesBlocks() {
  const allSales = STATE.productSalesWeekly || [];
  if (!allSales.length) return `
    <div style="margin-top:20px">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">📦 Ventes produits par semaine</div>
      <div class="card" style="padding:24px;text-align:center;color:var(--txT);font-size:12px">
        Aucune donnée produit. Importez un fichier Odoo via <b>Import Semaine</b>.
      </div>
    </div>`;

  const weeks = [...new Set(allSales.map(r => r.week_label))].sort((a,b) => b.localeCompare(a));
  if (!weeks.length) return "";
  const latestWeek = weeks[0];
  const prev3Week  = weeks[2] || null;
  const latestSales = allSales.filter(r => r.week_label === latestWeek);

  const top5Sales = [...latestSales].sort((a,b) => b.qty - a.qty).slice(0,5);
  let growthRows = [], declineRows = [];
  if (prev3Week) {
    const prev3Sales = allSales.filter(r => r.week_label === prev3Week);
    const prev3Map = {};
    prev3Sales.forEach(r => { prev3Map[r.ref] = r.qty; });
    const withDelta = latestSales.map(r => ({
      ...r, prev3: prev3Map[r.ref] || 0,
      delta: r.qty - (prev3Map[r.ref] || 0),
      deltaPct: prev3Map[r.ref] > 0 ? Math.round((r.qty - prev3Map[r.ref]) / prev3Map[r.ref] * 100) : null
    }));
    growthRows  = [...withDelta].filter(r => r.delta > 0).sort((a,b) => b.delta - a.delta).slice(0,5);
    declineRows = [...withDelta].filter(r => r.delta < 0).sort((a,b) => a.delta - b.delta).slice(0,5);
  }

  // Index sku → dernier prix scrapé (marketplace courante, normalisation casse)
  const scraperIdToSku = {};
  (STATE.products || []).forEach(p => {
    if (p.sku && p.product_id_scraper) scraperIdToSku[p.product_id_scraper.toLowerCase()] = p.sku;
  });
  const skuToPriceIndex = {};
  (STATE.snapshots || []).forEach(s => {
    if (!s.price) return;
    const sku = scraperIdToSku[(s.product_id || "").toLowerCase()];
    if (!sku) return;
    if (!skuToPriceIndex[sku] || s.date > (skuToPriceIndex[sku].date || "")) {
      skuToPriceIndex[sku] = { price: s.price, date: s.date };
    }
  });
  Object.keys(skuToPriceIndex).forEach(k => { skuToPriceIndex[k] = skuToPriceIndex[k].price; });

  function salesTable(rows, showDelta) {
    if (!rows.length) return "<div style='color:var(--txT);font-size:12px;padding:8px'>Aucune donnée</div>";
    return "<div style='overflow-x:auto'><table style='width:100%;min-width:400px;border-collapse:collapse;font-size:12px'>"
      + "<thead><tr style='border-bottom:1px solid var(--border)'>"
      + "<th style='padding:5px 8px;text-align:left;font-weight:600;color:var(--txS)'>Réf</th>"
      + "<th style='padding:5px 8px;text-align:left;font-weight:600;color:var(--txS)'>Produit</th>"
      + "<th style='padding:5px 8px;text-align:right;font-weight:600;color:var(--txS)'>Ventes</th>"
      + "<th style='padding:5px 8px;text-align:right;font-weight:600;color:var(--txS)'>PM TTC</th>"
      + "<th style='padding:5px 8px;text-align:right;font-weight:600;color:var(--txS)'>Prix affiché</th>"
      + (showDelta ? "<th style='padding:5px 8px;text-align:right;font-weight:600;color:var(--txS)'>vs S-2</th>" : "")
      + "</tr></thead><tbody>"
      + rows.map(function(r,i) {
          const lastPrice = skuToPriceIndex[r.ref] || null;
          const basket = (r.ca_ht && r.qty) ? Math.round(r.ca_ht / r.qty * 1.2) + "€" : "—";
          const priceCell = lastPrice ? Math.round(lastPrice) + "€" : "—";
          const deltaHtml = showDelta
            ? "<td style='padding:5px 8px;text-align:right;font-weight:600;color:"+(r.delta>0?"var(--gn)":"var(--rd)")+"'>"+(r.delta>0?"+":"")+r.delta+"</td>"
            : "";
          const bg = i%2 ? "background:var(--bg)" : "";
          return "<tr style='"+bg+";border-bottom:1px solid var(--borderL)'>"
            + "<td style='padding:5px 8px;font-weight:600;white-space:nowrap'>"+esc(r.ref)+"</td>"
            + "<td style='padding:5px 8px;color:var(--txS);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' title='"+esc(r.name)+"'>"+esc((r.name||"").slice(0,30))+"</td>"
            + "<td style='padding:5px 8px;text-align:right;font-weight:700'>"+r.qty+"</td>"
            + "<td style='padding:5px 8px;text-align:right;color:var(--txS)'>"+basket+"</td>"
            + "<td style='padding:5px 8px;text-align:right;color:var(--txS)'>"+priceCell+"</td>"
            + deltaHtml
            + "</tr>";
        }).join("")
      + "</tbody></table></div>";
  }

  const weekInfo = prev3Week
    ? `<span style='font-size:11px;color:var(--txT)'>Comparaison ${latestWeek} vs ${prev3Week}</span>`
    : `<span style='font-size:11px;color:var(--txT)'>Semaine ${latestWeek}</span>`;

  return `<div style='margin-top:20px'>
    <div style='font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:10px'>
      📦 Ventes produits — ${latestWeek} ${weekInfo}
    </div>
    <div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px'>
      <div class='card' style='padding:14px'>
        <div class='card-title' style='margin-bottom:10px'>🏆 Top 5 ventes ${latestWeek}</div>
        ${salesTable(top5Sales, false)}
      </div>
      <div class='card' style='padding:14px'>
        <div class='card-title' style='margin-bottom:10px'>📈 Top 5 croissance (vs S-2)</div>
        ${salesTable(growthRows, true)}
      </div>
      <div class='card' style='padding:14px'>
        <div class='card-title' style='margin-bottom:10px'>📉 Top 5 décroissance (vs S-2)</div>
        ${salesTable(declineRows, true)}
      </div>
    </div>
  </div>`;
}

function renderRevenueBlock() {
  const imports = (STATE.revenueImports || []);
  const entries = (STATE.revenueEntries || []).slice().sort((a,b) => a.week_start_date > b.week_start_date ? 1 : -1);
  const hasAnyData = imports.length > 0 || entries.length > 0;
  const now = new Date();
  // Intégrer l'historique mensuel dans monthRevs
  const monthlyHistory = STATE.monthlyHistory || [];
  const monthRevsHistory = {};
  monthlyHistory.forEach(h => {
    const key = h.year + "-" + String(h.month).padStart(2,"0");
    monthRevsHistory[key] = (monthRevsHistory[key]||0) + h.revenue;
  });

  const fmtCA = v => {
    if (v == null || isNaN(v) || v === 0) return "—";
    if (Math.abs(v) >= 1000000) return (v/1000000).toFixed(2).replace(".",",") + "M€";
    if (Math.abs(v) >= 1000) return (v/1000).toFixed(1).replace(".",",") + "k€";
    return Math.round(v) + "€";
  };
  const fmtPct = (n, n1) => {
    if (!n1 || n1 === 0) return "";
    const pct = Math.round((n - n1) / n1 * 100);
    const color = pct >= 0 ? "var(--gn)" : "var(--rd)";
    return `<span style="font-size:15px;font-weight:700;color:${color}">${pct>=0?"+":""}${pct}%</span>`;
  };
  const fmtMonthLabel = m => {
    const [y, mo] = m.split("-");
    const names = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    return names[parseInt(mo)-1] + " " + y;
  };

  const btnRow = `<div style="display:flex;gap:8px;flex-wrap:wrap">
    <button onclick="openRevenueModal()" style="padding:6px 14px;border:.5px solid var(--ac);border-radius:6px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Semaine manuelle</button>
    <button onclick="openImportXLSModal('ytd')" style="padding:6px 14px;border:.5px solid var(--pu);border-radius:6px;font-size:12px;background:var(--puBg);color:var(--pu);cursor:pointer;font-weight:600;font-family:inherit">⬆ Import YTD</button>
    <button onclick="openImportXLSModal('week')" style="padding:6px 14px;border:.5px solid var(--am);border-radius:6px;font-size:12px;background:var(--amBg);color:var(--am);cursor:pointer;font-weight:600;font-family:inherit">⬆ Import Semaine</button>
  </div>`;

  if (!hasAnyData) {
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div class="card-title" style="margin:0">Chiffre d'affaires</div>
        ${btnRow}
      </div>
      <div style="padding:30px;text-align:center;color:var(--txT);font-size:13px">Aucune donnée CA. Importez un fichier XLS ou saisissez une semaine manuellement.</div>
    </div>`;
  }

  // ── YTD ─────────────────────────────────────────────────────────────
  const ytdImports = imports.filter(i => (new Date(i.period_end) - new Date(i.period_start)) / 86400000 > 14);
  const ytdLabels = [...new Set(ytdImports.map(i => i.period_label))];
  const latestYtdLabel = ytdLabels.sort().pop();
  const ytdRevN  = ytdImports.filter(i => i.period_label === latestYtdLabel && i.year_type === "N").reduce((s,i) => s+(i.revenue||0), 0);
  const ytdRevN1 = ytdImports.filter(i => i.period_label === latestYtdLabel && i.year_type === "N-1").reduce((s,i) => s+(i.revenue||0), 0);

  // ── SEMAINES ────────────────────────────────────────────────────────
  const weekImportsN  = imports.filter(i => (new Date(i.period_end)-new Date(i.period_start))/86400000 <= 14 && i.year_type === "N").sort((a,b) => a.period_start>b.period_start?1:-1);
  const weekImportsN1 = imports.filter(i => (new Date(i.period_end)-new Date(i.period_start))/86400000 <= 14 && i.year_type === "N-1");

  const allWeeks = [
    ...weekImportsN.map(i => ({ label: i.period_label, rev: i.revenue, start: i.period_start, end: i.period_end, source: "import" })),
    ...entries.map(e => ({ label: e.week_label, rev: e.revenue, start: e.week_start_date, end: e.week_start_date, source: "manual" }))
  ].sort((a,b) => a.start>b.start?1:-1);

  // ── MOIS ─────────────────────────────────────────────────────────────
  const monthRevs = {}, monthRevsN1 = {};
  allWeeks.forEach(w => {
    const wStart = new Date(w.start), wEnd = w.end ? new Date(w.end) : new Date(w.start);
    const totalDays = Math.max(1, Math.round((wEnd-wStart)/86400000)+1);
    let d = new Date(wStart);
    while (d <= wEnd) {
      const m = d.toISOString().slice(0,7);
      monthRevs[m] = (monthRevs[m]||0) + w.rev/totalDays;
      d.setDate(d.getDate()+1);
    }
  });
  weekImportsN1.forEach(w => {
    const wStart = new Date(w.period_start), wEnd = new Date(w.period_end);
    const totalDays = Math.max(1, Math.round((wEnd-wStart)/86400000)+1);
    let d = new Date(wStart);
    while (d <= wEnd) {
      const m = d.toISOString().slice(0,7);
      monthRevsN1[m] = (monthRevsN1[m]||0) + w.revenue/totalDays;
      d.setDate(d.getDate()+1);
    }
  });
  Object.keys(monthRevs).forEach(m => monthRevs[m] = Math.round(monthRevs[m]));
  Object.keys(monthRevsN1).forEach(m => monthRevsN1[m] = Math.round(monthRevsN1[m]));

  const curMonth = now.toISOString().slice(0,7);
  const caMonthN  = monthRevs[curMonth] || 0;
  const curMonthN1key = `${now.getFullYear()-1}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const caMonthN1 = monthRevsN1[curMonthN1key] || 0;

  const lastWeek  = allWeeks[allWeeks.length-1];
  const lastRevN  = lastWeek?.rev || 0;
  const lastWeekN1 = lastWeek ? weekImportsN1.find(i => i.period_label === lastWeek.label) : null;
  const lastRevN1 = lastWeekN1?.revenue || 0;

  // ── KPI card helper ──────────────────────────────────────────────────
  const kpiCard = (title, n, n1, sublabel) => {
    const pct = (n && n1 && n1 > 0) ? Math.round((n-n1)/n1*100) : null;
    const pctColor = pct != null ? (pct >= 0 ? "var(--gn)" : "var(--rd)") : "";
    return `<div style="background:var(--bg);border-radius:10px;padding:14px 16px">
      <div style="font-size:11px;color:var(--txS);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">${title}</div>
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
        <div style="font-size:22px;font-weight:700;color:var(--ac)">${fmtCA(n)}</div>
        ${n1 > 0 ? `<div style="color:var(--borderL);font-size:18px;font-weight:300">|</div>
        <div style="font-size:16px;font-weight:600;color:var(--txS)">${fmtCA(n1)}</div>
        ${pct != null ? `<div style="font-size:15px;font-weight:700;color:${pctColor}">${pct>=0?"+":""}${pct}%</div>` : ""}` : ""}
      </div>
      <div style="font-size:11px;color:var(--txT);margin-top:5px;font-style:italic">${sublabel}</div>
    </div>`;
  };

  const weekSublabel = lastWeek ? lastWeek.label + (lastWeekN1 ? ` · N-1 : ${lastWeek.label}` : "") : "";
  const monthSublabel = fmtMonthLabel(curMonth) + (caMonthN1 > 0 ? ` · N-1 : ${fmtMonthLabel(curMonthN1key)}` : "");
  const ytdSublabel = latestYtdLabel || "YTD";

  // ── Tableau mois ─────────────────────────────────────────────────────
  // ── Tableau mois ─────────────────────────────────────────────────────
const MONTH_NAMES = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
const mergedMonthRevs = Object.assign({}, monthRevsHistory, monthRevs); // imports hebdo écrasent l'historique pour les mois récents
const allYears = [...new Set(Object.keys(mergedMonthRevs).map(m=>m.slice(0,4)))].sort();
const monthRows = MONTH_NAMES.map((mName, mi) => {
  const mNum = String(mi+1).padStart(2,"0");
  const cells = allYears.map(y => {
    const key = y+"-"+mNum;
    const rev = mergedMonthRevs[key];
    if (!rev) return '<td style="text-align:right;color:var(--txT)">—</td>';
    const n1key = (parseInt(y)-1)+"-"+mNum;
    const revN1 = monthRevsN1[n1key] || 0;
    const pct = revN1>0 ? Math.round((rev-revN1)/revN1*100) : null;
    const pctHtml = pct!=null ? '<span style="font-size:10px;color:'+(pct>=0?"var(--gn)":"var(--rd)")+'"> '+(pct>=0?"+":"")+pct+'%</span>' : "";
    return '<td style="text-align:right;font-weight:600">'+fmtCA(rev)+pctHtml+'</td>';
  }).join("");
  return '<tr class="'+(mi%2?"stripe":"")+'"><td style="font-weight:500;white-space:nowrap">'+mName+'</td>'+cells+'</tr>';
}).join("");

const totalRow = '<tr style="border-top:2px solid var(--border);font-weight:700"><td>Total</td>'
  + allYears.map(y => {
    const total = Object.entries(monthRevs).filter(([k])=>k.startsWith(y)).reduce((s,[,v])=>s+v,0);
    return '<td style="text-align:right">'+fmtCA(total)+'</td>';
  }).join("")
  + '</tr>';

  // ── Tableau semaines ─────────────────────────────────────────────────
  const weekRows = allWeeks.slice().reverse().map((w, i) => {
    const n1 = weekImportsN1.find(x => x.period_label === w.label);
    const n1Rev = n1?.revenue || null;
    const pct = (n1Rev && n1Rev > 0) ? Math.round((w.rev-n1Rev)/n1Rev*100) : null;
    const pctHtml = pct != null ? `<span style="font-weight:600;color:${pct>=0?"var(--gn)":"var(--rd)"}">${pct>=0?"+":""}${pct}%</span>` : "—";
    const deleteBtn = w.source === "manual"
      ? `<button onclick="deleteRevenue('${esc(w.label)}')" style="padding:2px 8px;border-radius:5px;border:.5px solid var(--rd);background:var(--rdBg);color:var(--rd);font-size:11px;cursor:pointer;font-family:inherit">Suppr.</button>`
      : `<button onclick="deleteImportWeek('${esc(w.label)}')" style="padding:2px 8px;border-radius:5px;border:.5px solid var(--rd);background:var(--rdBg);color:var(--rd);font-size:11px;cursor:pointer;font-family:inherit">Suppr.</button>`;
    return `<tr class="${i%2?"stripe":""}">
      <td style="font-weight:500">${esc(w.label)}</td>
      <td style="color:var(--txS)">${w.start||""}</td>
      <td style="text-align:right;font-weight:600">${fmtCA(w.rev)}</td>
      <td style="text-align:right;color:var(--txS)">${n1Rev!=null?fmtCA(n1Rev):"—"}</td>
      <td style="text-align:center">${pctHtml}</td>
      <td style="text-align:center">${deleteBtn}</td>
    </tr>`;
  }).join("");

  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Chiffre d'affaires</div>
      ${btnRow}
    </div>

    <!-- 3 KPIs -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      ${kpiCard("Dernière semaine", lastRevN, lastRevN1, lastWeek?.label || "—")}
      ${kpiCard("Mois en cours", caMonthN, caMonthN1, monthSublabel)}
      ${kpiCard("YTD", ytdRevN, ytdRevN1, ytdSublabel)}
    </div>

    ${monthRows ? '<div style="border-top:1px solid var(--borderL);padding-top:10px;margin-bottom:8px">'
  + '<details style="font-size:12px">'
  + '<summary style="cursor:pointer;color:var(--txS);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Détail par mois</summary>'
  + '<div class="scroll-table"><table style="min-width:400px;border-collapse:collapse">'
  + '<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">'
  + '<th>Mois</th>'
  + allYears.map(y=>'<th style="text-align:right">'+y+'</th>').join("")
  + '</tr></thead>'
  + '<tbody>'+monthRows+totalRow+'</tbody>'
  + '</table></div>'
  + '</details></div>' : ""}

    <!-- Toutes les semaines (déroulant) -->
    <div style="border-top:1px solid var(--borderL);padding-top:10px">
      <details style="font-size:12px">
        <summary style="cursor:pointer;color:var(--txS);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Toutes les semaines (${allWeeks.length})</summary>
        <div class="scroll-table"><table style="min-width:400px">
          <thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">
            <th>Semaine</th><th>Début</th><th style="text-align:right">CA N</th><th style="text-align:right">CA N-1</th><th style="text-align:center">Évol.</th><th style="text-align:center">Actions</th>
          </tr></thead>
          <tbody>${weekRows}</tbody>
        </table></div>
      </details>
    </div>
  </div>`;
}
function openRevenueModal() {
  // Générer un label semaine automatique
  const now = new Date();
  const yr = now.getFullYear();
  const start = new Date(yr, 0, 1);
  const weekNum = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  const defaultLabel = `S${weekNum}`;
  const defaultDate = now.toISOString().slice(0,10);

  openModal("Ajouter une semaine de CA", `
    <div style="display:grid;gap:12px">
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Label semaine *</label>
        <input id="rev-label" value="${defaultLabel}" placeholder="ex: S15" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Date de début de semaine *</label>
        <input id="rev-date" type="date" value="${defaultDate}" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">CA (€) *</label>
        <input id="rev-amount" type="number" placeholder="ex: 12500" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      </div>
      <button onclick="saveRevenue()" style="padding:10px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Enregistrer</button>
      <div id="rev-status" style="font-size:12px;text-align:center"></div>
    </div>`);
}

async function saveRevenue() {
  const label = document.getElementById("rev-label")?.value?.trim();
  const date  = document.getElementById("rev-date")?.value?.trim();
  const amt   = parseFloat(document.getElementById("rev-amount")?.value);
  const statusEl = document.getElementById("rev-status");
  if (!label || !date || isNaN(amt) || amt <= 0) { statusEl.innerHTML='<span style="color:var(--rd)">Tous les champs sont obligatoires.</span>'; return; }
  statusEl.innerHTML = '<span style="color:var(--txS)">Enregistrement...</span>';
  try {
    await sbInsert("revenue_entries", { marketplace: MARKETPLACE, week_label: label, week_start_date: date, revenue: amt });
    statusEl.innerHTML = '<span style="color:var(--gn)">✓ Semaine ajoutée !</span>';
    setTimeout(() => { closeModal(); loadData(); }, 800);
  } catch(e) { statusEl.innerHTML = `<span style="color:var(--rd)">Erreur : ${e.message}</span>`; }
}

async function deleteImportWeek(label) {
  if (!confirm(`Supprimer la semaine "${label}" ?`)) return;
  try {
    await sbDelete("revenue_imports", `marketplace=eq.${MARKETPLACE}&period_label=eq.${encodeURIComponent(label)}`);
    await loadData();
  } catch(e) { alert("Erreur : " + e.message); }
}

async function deleteRevenue(label) {
  if (!confirm(`Supprimer la semaine "${label}" ?`)) return;
  try {
    await sbDelete("revenue_entries", `marketplace=eq.${MARKETPLACE}&week_label=eq.${encodeURIComponent(label)}`);
    await loadData();
  } catch(e) { alert("Erreur : " + e.message); }
}

      <select onchange="prodFilters.tag=this.value;renderContent()"><option value="all">Toutes variations</option><option value="prix_up">Prix ↑</option><option value="prix_down">Prix ↓</option><option value="delai_up">Délai ↑</option><option value="delai_down">Délai ↓</option><option value="note_up">Note ↑</option><option value="note_down">Note ↓</option></select>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txS);cursor:pointer;white-space:nowrap"><input type="checkbox" ${filterOnlySales?"checked":""} onchange="filterOnlySales=this.checked;renderContent()" style="cursor:pointer"> Avec ventes uniquement</label>

        <td style="text-align:right;font-weight:500">${p._price!=null?Math.round(p._price)+'€':'—'}</td>

function exportCSV() {
  const sessions = STATE.dates.slice(-exportSessions);

    const dt = new Date(sess + "T12:00:00Z");
    return dt.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "2-digit" });
  };
  const sessionHeaders = sessions.flatMap(s => [`Dispo ${fmtSession(s)}`,`Prix ${fmtSession(s)}`,`Note ${fmtSession(s)}`,`Délai ${fmtSession(s)}`]);
  const headers = ["Produit", "ID produit", "SKU", "SKU Marketplace", "Lien", ...sessionHeaders];
  const rows = STATE.products.map(p => {
    const key = (p.product_id_scraper || "").toLowerCase();
    const h = STATE.history[key] || {};

      const snap = h[sess];
      return [snap?.available!=null?(snap.available?"Dispo":"Indispo"):"",snap?.price!=null?snap.price:"",snap?.rating!=null?snap.rating:"",snap?.delivery_days!=null?snap.delivery_days:""];

  const hasVar=(p,d,di)=>{if(di===0)return null;const prev=getVal(p,dates[di-1]),curr=getVal(p,d);if(prev==null||curr==null)return null;if(histMetric==="price"&&prev>0){const pct=(curr-prev)/prev;if(pct>.10)return"up";if(pct<-.15)return"down";}if(histMetric==="delivery"){const diff=curr-prev;if(diff>5)return"up";if(diff<-5)return"down";}if(histMetric==="rating"){const diff=curr-prev;if(diff>=.2)return"good";if(diff<=-.2)return"bad";}if(histMetric==="dispo"&&prev!==curr)return curr?"good":"bad";return null;};

// Conservé comme fallback si Supabase ne répond pas
const TRACKED_COMPETITORS_FALLBACK = {
  maisonsdumonde: ["BestMobilier","Premium Interiors","Usinestreet","Sweeek","Mobilier Déco","Homifab","Baita Home"],
