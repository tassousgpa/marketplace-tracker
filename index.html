  const urlMap={};P.forEach(p=>{if(p.url&&p.url.startsWith("http")){(urlMap[p.url]=urlMap[p.url]||[]).push(p);}});
  const dupeUrls=Object.entries(urlMap).filter(([,ps])=>ps.length>1);
  const brokenUrls=P.filter(p=>!p.url||!p.url.startsWith("http"));
  const total=notScraped.length+catPages.length+dupeUrls.length+brokenUrls.length;
  return `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Non scrapés</div><div class="metric-value" style="color:${notScraped.length>0?'var(--rd)':'var(--gn)'}">${notScraped.length}</div><div class="metric-sub">au ${STATE.latestDate}</div></div>

      <div class="metric"><div class="metric-label">URLs cassées</div><div class="metric-value" style="color:${brokenUrls.length>0?'var(--rd)':'var(--gn)'}">${brokenUrls.length}</div></div>
    </div>
    ${notScraped.length>0?`<div class="card anomaly-section"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="anomaly-dot" style="background:var(--rd)"></span><span style="font-size:14px;font-weight:600">Produits non scrapés le ${STATE.latestDate} (${notScraped.length})</span></div>${notScraped.map(p=>productRowHTML(p)).join("")}</div>`:''}
    ${catPages.length>0?`<div class="card anomaly-section"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="anomaly-dot" style="background:var(--am)"></span><span style="font-size:14px;font-weight:600">URLs pointant vers une page catégorie (${catPages.length})</span><span style="font-size:11px;color:var(--txS);margin-left:6px">— à corriger dans Gestion</span></div>${catPages.map(p=>productRowHTML(p)).join("")}</div>`:''}
    ${dupeUrls.length>0?`<div class="card anomaly-section"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="anomaly-dot" style="background:var(--am)"></span><span style="font-size:14px;font-weight:600">URLs en doublon (${dupeUrls.length})</span></div>${dupeUrls.map(([url,prods])=>`<div style="padding:10px 0;border-bottom:1px solid var(--borderL)"><div style="font-size:12px;color:var(--ac);margin-bottom:6px"><a href="${esc(url)}" target="_blank" class="link">${esc(url)} ↗</a></div><div style="display:flex;gap:8px;flex-wrap:wrap">${prods.map(p=>`<div style="background:var(--amBg);border-radius:8px;padding:6px 10px;font-size:11px"><span style="font-weight:600">${esc(p.product_id)}</span> · ${esc(p.sku)}</div>`).join("")}</div></div>`).join("")}</div>`:''}
    ${brokenUrls.length>0?`<div class="card anomaly-section"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="anomaly-dot" style="background:var(--rd)"></span><span style="font-size:14px;font-weight:600">URLs cassées (${brokenUrls.length})</span></div>${brokenUrls.map(p=>productRowHTML(p)).join("")}</div>`:''}
    ${total===0?'<div class="card" style="background:var(--gnBg);text-align:center;padding:30px"><div style="font-size:16px;font-weight:600;color:var(--gn)">Aucune anomalie détectée</div></div>':''}`;

            ${p.active!==false?`<button onclick="toggleActive(${p.id},false)" style="padding:3px 8px;border-radius:6px;border:.5px solid var(--am);background:var(--amBg);color:var(--am);font-size:11px;cursor:pointer;font-family:inherit;margin-right:4px">Désactiver</button>`:`<button onclick="toggleActive(${p.id},true)" style="padding:3px 8px;border-radius:6px;border:.5px solid var(--gn);background:var(--gnBg);color:var(--gn);font-size:11px;cursor:pointer;font-family:inherit;margin-right:4px">Activer</button>`}
            <button onclick="deleteProduct(${p.id},'${esc(p.name).slice(0,30)}')" style="padding:3px 8px;border-radius:6px;border:.5px solid var(--rd);background:var(--rdBg);color:var(--rd);font-size:11px;cursor:pointer;font-family:inherit">Suppr.</button>
          </td>
        </tr>`).join("")}</tbody>
      </table></div>
    </div>`;
}

async function addProduct() {
  const statusEl=document.getElementById("add-status");
  const id=document.getElementById("add-id").value.trim(),name=document.getElementById("add-name").value.trim(),url=document.getElementById("add-url").value.trim();
  const sku=document.getElementById("add-sku").value.trim(),ean=document.getElementById("add-ean").value.trim();
  const skuMp=document.getElementById("add-skump").value.trim(),type=document.getElementById("add-type").value;
  if(!id||!name||!url){statusEl.innerHTML='<span style="color:var(--rd)">ID produit, nom et URL obligatoires.</span>';return;}
  // Extract scraper id from URL if not filled manually
  let scraperId = skuMp;
  if (!scraperId) {
    const m = url.match(/-(BES[A-Z0-9]+|LIS[A-Z0-9]+|AAA[A-Z0-9]+)/);
    scraperId = m ? m[1] : "";
  }
  statusEl.innerHTML='<span style="color:var(--txS)">Ajout en cours...</span>';
  try {
    await sbInsert("products",{product_id:id,name,sku,ean:ean||null,product_id_scraper:scraperId||null,url,type,marketplace:MARKETPLACE,active:true});
    statusEl.innerHTML='<span style="color:var(--gn)">✓ Produit ajouté.</span>';
    ["add-id","add-name","add-url","add-sku","add-ean","add-skump"].forEach(id=>document.getElementById(id).value="");
    await loadData();
  } catch(e){statusEl.innerHTML=`<span style="color:var(--rd)">Erreur : ${e.message}</span>`;}
}

async function toggleActive(dbId,active){try{await sbUpdate("products",`id=eq.${dbId}`,{active});await loadData();}catch(e){alert("Erreur : "+e.message);}}
async function deleteProduct(dbId,name){if(!confirm(`Supprimer définitivement "${name}..." ?`))return;try{await sbDelete("products",`id=eq.${dbId}`);await loadData();}catch(e){alert("Erreur : "+e.message);}}

      <div>
        <label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Mot de passe admin *</label>
        <input id="imp-pwd" type="password" placeholder="••••••••" style="width:100%;padding:7px 10px;border:.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit">

// Parse un fichier XLS/XLSX et retourne { marketplace: total }
async function parseXLSFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

        // Agréger par marketplace
        const totals = {};
        Object.keys(MP_MATCHING).forEach(mp => totals[mp] = 0);

        rows.forEach(row => {
          if (!row || !row[0] || !row[1]) return;
          const label = String(row[0]).toLowerCase().replace(/\s/g, "");
          const val = parseFloat(String(row[1]).replace(",", "."));
          if (isNaN(val)) return;

          for (const [mp, keys] of Object.entries(MP_MATCHING)) {
            if (keys.some(k => label.includes(k))) {
              totals[mp] += val;
              break;
            }
          }
        });

        // Arrondir
        Object.keys(totals).forEach(k => totals[k] = Math.round(totals[k] * 100) / 100);
        resolve(totals);
      } catch(e) {
        reject(e);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

let _importData = null; // cache pour confirmImport

async function previewImport() {
  const statusEl = document.getElementById("imp-status");
  const previewEl = document.getElementById("imp-preview");
  statusEl.innerHTML = '<span style="color:var(--txS)">Lecture des fichiers…</span>';

  const fileN  = document.getElementById("imp-file-n")?.files[0];
  const fileN1 = document.getElementById("imp-file-n1")?.files[0];
  const start  = document.getElementById("imp-start")?.value;
  const end    = document.getElementById("imp-end")?.value;
  const label  = document.getElementById("imp-label")?.value?.trim();

  if (!fileN || !fileN1 || !start || !end || !label) {
    statusEl.innerHTML = '<span style="color:var(--rd)">Tous les champs sont obligatoires.</span>';
    return;
  }

  try {
    const [totalsN, totalsN1] = await Promise.all([parseXLSFile(fileN), parseXLSFile(fileN1)]);

    // Calculer dates N-1 (même période, -1 an)
    const startN1 = new Date(start); startN1.setFullYear(startN1.getFullYear() - 1);
    const endN1   = new Date(end);   endN1.setFullYear(endN1.getFullYear() - 1);
    const fmtDate = d => d.toLocaleDateString("fr-FR", {day:"2-digit",month:"2-digit",year:"numeric"});

    // Stocker pour confirmImport
    _importData = { totalsN, totalsN1, start, end, label,
      startN1: startN1.toISOString().slice(0,10),
      endN1:   endN1.toISOString().slice(0,10) };

    // Construire tableau de prévisualisation
    const fmtCA = v => v.toLocaleString("fr-FR", {minimumFractionDigits:0, maximumFractionDigits:0}) + " €";
    const rows = Object.keys(MP_MATCHING).map(mp => {
      const n  = totalsN[mp]  || 0;
      const n1 = totalsN1[mp] || 0;
      const evol = n1 > 0 ? Math.round((n - n1) / n1 * 100) : null;
      const evolHtml = evol != null
        ? `<span style="color:${evol>=0?'var(--gn)':'var(--rd)'};font-weight:600">${evol>=0?'+':''}${evol}%</span>`
        : '—';
      return `<tr style="border-bottom:1px solid var(--borderL)">
        <td style="padding:6px 10px;font-weight:500">${MP_LABELS[mp]}</td>
        <td style="padding:6px 10px;text-align:right;font-weight:600">${fmtCA(n)}</td>
        <td style="padding:6px 10px;text-align:right;color:var(--txS)">${fmtCA(n1)}</td>
        <td style="padding:6px 10px;text-align:center">${evolHtml}</td>
      </tr>`;
    }).join("");

    previewEl.style.display = "block";
    previewEl.innerHTML = `
      <div style="font-size:12px;color:var(--txS);margin-bottom:6px">
        Période N : <b>${fmtDate(new Date(start))} → ${fmtDate(new Date(end))}</b> &nbsp;|&nbsp;
        Période N-1 : <b>${fmtDate(startN1)} → ${fmtDate(endN1)}</b>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:var(--bg);border-bottom:1px solid var(--border)">
            <th style="padding:6px 10px;text-align:left">Marketplace</th>
            <th style="padding:6px 10px;text-align:right">N</th>
            <th style="padding:6px 10px;text-align:right">N-1</th>
            <th style="padding:6px 10px;text-align:center">Évol.</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

    statusEl.innerHTML = '<span style="color:var(--gn)">✓ Prévisualisation prête — vérifiez puis cliquez Importer.</span>';
  } catch(e) {
    statusEl.innerHTML = `<span style="color:var(--rd)">Erreur lecture fichier : ${e.message}</span>`;
  }
}

async function confirmImport() {
  const statusEl = document.getElementById("imp-status");
  const pwd = document.getElementById("imp-pwd")?.value;

  if (pwd !== ADMIN_PASSWORD) {
    statusEl.innerHTML = '<span style="color:var(--rd)">❌ Mot de passe incorrect.</span>';
    return;
  }

  if (!_importData) {
    statusEl.innerHTML = '<span style="color:var(--am)">⚠ Lancez d\u2019abord la prévisualisation.</span>';
    return;
  }

  statusEl.innerHTML = '<span style="color:var(--txS)">Insertion dans Supabase…</span>';

  const { totalsN, totalsN1, start, end, label, startN1, endN1 } = _importData;
  const rows = [];

  Object.keys(MP_MATCHING).forEach(mp => {
    if (totalsN[mp] > 0) rows.push({
      period_label: label, period_start: start, period_end: end,
      year_type: "N", marketplace: mp, revenue: totalsN[mp]
    });
    if (totalsN1[mp] > 0) rows.push({
      period_label: label, period_start: startN1, period_end: endN1,
      year_type: "N-1", marketplace: mp, revenue: totalsN1[mp]
    });
  });

  try {
    // Supprimer les entrées existantes pour ce label (éviter doublons si réimport)
    await sbDelete("revenue_imports", `period_label=eq.${encodeURIComponent(label)}`);

    // Insérer toutes les lignes
    const r = await fetch(`${SB_URL}/rest/v1/revenue_imports`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SB_KEY,
        Authorization: `Bearer ${SB_KEY}`,
        Prefer: "return=minimal"
      },
      body: JSON.stringify(rows)
    });
    if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t}`); }

    statusEl.innerHTML = `<span style="color:var(--gn)">✓ ${rows.length} lignes importées pour "${label}".</span>`;
    _importData = null;
    setTimeout(() => { closeModal(); loadData(); }, 1200);
  } catch(e) {
    statusEl.innerHTML = `<span style="color:var(--rd)">Erreur : ${e.message}</span>`;
  }
}
