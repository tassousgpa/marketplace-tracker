async function confirmOpeReimport(id) {
  var statusEl = document.getElementById('reimp-status');
  var pwd = document.getElementById('reimp-pwd')?.value;
  var file = document.getElementById('reimp-file')?.files[0];
  var mode = document.getElementById('reimp-mode')?.value || 'replace';
  if (btoa(pwd) !== _ADMIN_HASH) { statusEl.innerHTML = '<span style="color:var(--rd)">Mot de passe incorrect.</span>'; return; }
  if (!file) { statusEl.innerHTML = '<span style="color:var(--rd)">Sélectionnez un fichier.</span>'; return; }
  statusEl.innerHTML = 'Lecture du fichier…';
  try {
    const rows = await new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
          var ws = wb.Sheets[wb.SheetNames[0]];
          var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          var result = [];
          const isMM = MARKETPLACE === 'manomano';
          for (var i = 6; i < data.length; i++) {
            var r = data[i];
            var ref = String(r[0]||'').trim();
            if (!ref || ref.toLowerCase() === 'ref') continue;
            result.push({
              operation_id: id, marketplace: MARKETPLACE,
              ref: ref,
              nom_produit: String(r[1]||'').trim() || null,
              prix: parseFloat(String(r[2]||'').replace(',','.')) || null,
              taux_commission: isMM
                ? (parseInt(r[3])||null)
                : (parseFloat(String(r[3]||'').replace(',','.'))/100 || null)
            });
          }
          resolve(result);
        } catch(e) { reject(e); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });

    if (!rows.length) { statusEl.innerHTML = '<span style="color:var(--rd)">Aucune ligne trouvée (données attendues à partir de la ligne 7).</span>'; return; }

    if (mode === 'replace') {
      statusEl.innerHTML = 'Suppression des produits existants…';
      await fetch(SB_URL+'/rest/v1/operation_products?operation_id=eq.'+id+'&marketplace=eq.'+MARKETPLACE, {
        method: 'DELETE', headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY }
      });
    } else {
      // Append : récupérer les refs existantes
      var existing = await fetch(SB_URL+'/rest/v1/operation_products?operation_id=eq.'+id+'&marketplace=eq.'+MARKETPLACE+'&select=ref', {
        headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY }
      }).then(r=>r.json()).catch(()=>[]);
      var existingRefs = new Set((existing||[]).map(r=>r.ref));
      rows = rows.filter(r => !existingRefs.has(r.ref));
      if (!rows.length) { statusEl.innerHTML = '<span style="color:var(--gn)">Tous les produits sont déjà présents — rien à ajouter.</span>'; return; }
    }

    var BATCH = 200; var inserted = 0;
    for (var i = 0; i < rows.length; i += BATCH) {
      var batch = rows.slice(i, i + BATCH);
      var r = await fetch(SB_URL+'/rest/v1/operation_products', {
        method: 'POST',
        headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify(batch)
      });
      if (!r.ok) throw new Error('HTTP '+r.status+' — '+await r.text());
      inserted += batch.length;
    }
    statusEl.innerHTML = '<span style="color:var(--gn)">✓ '+inserted+' produits '+(mode==='replace'?'remplacés':'ajoutés')+'.</span>';
    setTimeout(function() { closeModal(); openOpeDetail(id); }, 1200);
  } catch(e) {
    statusEl.innerHTML = '<span style="color:var(--rd)">Erreur : '+esc(e.message)+'</span>';
  }
}

// ── Analyse Soldes jour par jour (édition 2026 vs 2025) ──────────
async function openSoldesAnalysis(id) {
  const op = opeData.find(o => o.id === id);
  if (!op) return;

  openModal('📊 Analyse Soldes — '+esc(op.nom), '<div style="padding:20px;text-align:center;color:var(--txS)">Chargement des éditions...</div>');

  // Charger les éditions de soldes
  let editions = [];
  try {
    editions = await sb('soldes_editions', 'select=edition,start_date,end_date&order=edition.asc').catch(()=>[]);
  } catch(e) {}

  const ed2026 = editions.find(e => e.edition === '2026');
  const ed2025 = editions.find(e => e.edition === '2025');

  if (!ed2026) {
    document.getElementById('modal-body').innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--txT);font-size:13px">Édition 2026 non configurée.<br>Exécutez le workflow GitHub Actions "Soldes Été Historique" pour initialiser les données.</div>';
    return;
  }

  // Charger les produits de l'opération
  let prods = [];
  try { prods = await sb('operation_products', 'operation_id=eq.'+id+'&select=ref,nom_produit&order=ref.asc'); } catch(e) {}

  if (!prods.length) {
    document.getElementById('modal-body').innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--txT)">Aucun produit dans cette opération.</div>';
    return;
  }

  // Calculer le nombre de jours de soldes disponibles en 2026
  const today = new Date().toISOString().slice(0,10);
  const start2026 = new Date(ed2026.start_date);
  const end2026 = new Date(Math.min(new Date(ed2026.end_date), new Date(today)));
  const daysAvailable2026 = Math.max(1, Math.round((end2026 - start2026) / 86400000) + 1);

  // Construire le sélecteur de produits + de jours
  const prodOptions = prods.map(p =>
    '<option value="'+esc(p.ref)+'">'+esc(p.ref+(p.nom_produit?' — '+p.nom_produit:''))+'</option>'
  ).join('');

  const dayOptions = Array.from({length: daysAvailable2026}, (_, i) => {
    const d2026 = new Date(start2026); d2026.setDate(start2026.getDate() + i);
    const d2025 = ed2025 ? new Date(new Date(ed2025.start_date).getTime() + i * 86400000) : null;
    const fmt = d => d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
    const lbl = 'Jour '+(i+1)+' — 2026 : '+fmt(d2026)+(d2025?' · 2025 : '+fmt(d2025):'');
    return '<option value="'+(i+1)+'">'+lbl+'</option>';
  }).join('');

  document.getElementById('modal-body').innerHTML =
    '<div style="display:grid;gap:14px">'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
    + '<div><label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Produit</label><select id="soldes-sku" style="width:100%;padding:7px 10px;border:.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit">'+prodOptions+'</select></div>'
    + '<div><label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Jour de soldes</label><select id="soldes-day" style="width:100%;padding:7px 10px;border:.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit">'+dayOptions+'</select></div>'
    + '</div>'
    + '<button onclick="loadSoldesDay(\''+esc(ed2026.start_date)+'\',\''+esc(ed2025?ed2025.start_date:'')+'\','+id+')" style="padding:9px;background:var(--gn);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Afficher</button>'
    + '<div id="soldes-result"></div>'
    + '</div>';
}

async function loadSoldesDay(start2026, start2025, opId) {
  const sku = document.getElementById('soldes-sku')?.value;
  const day = parseInt(document.getElementById('soldes-day')?.value) || 1;
  var resultEl = document.getElementById('soldes-result');
  if (!sku || !resultEl) return;
  resultEl.innerHTML = '<div style="text-align:center;color:var(--txS);font-size:12px">Chargement...</div>';

  const d2026 = new Date(start2026); d2026.setDate(d2026.getDate() + day - 1);
  const date2026 = d2026.toISOString().slice(0,10);
  const d2025 = start2025 ? new Date(start2025) : null;
  if (d2025) d2025.setDate(d2025.getDate() + day - 1);
  const date2025 = d2025 ? d2025.toISOString().slice(0,10) : null;
  const fmt = s => new Date(s+'T12:00:00Z').toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});

  let row2026 = null, row2025 = null;
  try {
    const r26 = await sb('soldes_daily_sales','edition=eq.2026&sku=eq.'+encodeURIComponent(sku)+'&marketplace=eq.'+MARKETPLACE+'&day_rank=eq.'+day+'&select=quantity,revenue_ht').catch(()=>[]);
    row2026 = r26[0] || null;
    if (date2025) {
      const r25 = await sb('soldes_daily_sales','edition=eq.2025&sku=eq.'+encodeURIComponent(sku)+'&marketplace=eq.'+MARKETPLACE+'&day_rank=eq.'+day+'&select=quantity,revenue_ht').catch(()=>[]);
      row2025 = r25[0] || null;
    }
  } catch(e) {}

  const qty26 = row2026?.quantity || 0;
  const qty25 = row2025?.quantity || 0;
  const rev26 = row2026?.revenue_ht || 0;
  const rev25 = row2025?.revenue_ht || 0;
  const varQty = qty25 > 0 ? Math.round((qty26 - qty25) / qty25 * 100) : null;
  const varRev = rev25 > 0 ? Math.round((rev26 - rev25) / rev25 * 100) : null;
  const varColor = v => v === null ? 'var(--txT)' : v >= 0 ? 'var(--gn)' : 'var(--rd)';
  const varFmt = v => v === null ? '—' : (v >= 0 ? '+' : '') + v + '%';

  resultEl.innerHTML =
    '<div style="background:var(--bg);border-radius:10px;padding:14px 16px">'
    + '<div style="font-size:13px;font-weight:700;margin-bottom:12px">Jour '+day+' des soldes — '+esc(sku)+'</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">'
    + '<div style="background:var(--card);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Date 2026</div><div style="font-size:13px;font-weight:600">'+fmt(date2026)+'</div></div>'
    + (date2025 ? '<div style="background:var(--card);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Date 2025</div><div style="font-size:13px;font-weight:600">'+fmt(date2025)+'</div></div>' : '<div></div>')
    + '<div></div>'
    + '<div style="background:var(--card);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Ventes 2026</div><div style="font-size:18px;font-weight:700;color:var(--ac)">'+qty26+'</div><div style="font-size:11px;color:var(--txT)">'+Math.round(rev26).toLocaleString('fr-FR')+' € HT</div></div>'
    + (date2025 ? '<div style="background:var(--card);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Ventes 2025</div><div style="font-size:18px;font-weight:700;color:var(--txS)">'+qty25+'</div><div style="font-size:11px;color:var(--txT)">'+Math.round(rev25).toLocaleString('fr-FR')+' € HT</div></div>' : '<div></div>')
    + '<div style="background:var(--card);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--txS);text-transform:uppercase;margin-bottom:4px">Variation unités</div><div style="font-size:18px;font-weight:700;color:'+varColor(varQty)+'">'+varFmt(varQty)+'</div><div style="font-size:11px;color:'+varColor(varRev)+'">CA : '+varFmt(varRev)+'</div></div>'
    + '</div>'
    + ((!row2026 && !row2025) ? '<div style="margin-top:10px;font-size:11px;color:var(--txT);text-align:center">Aucune donnée. Exécutez le workflow "Soldes Été Historique".</div>' : '')
    + '</div>';
}

  const debut = document.getElementById("ope-debut")?.value;

  if (debut > fin) { statusEl.innerHTML='<span style="color:var(--rd)">La date de fin doit être après le début.</span>'; return; }

  statusEl.innerHTML='<span style="color:var(--txS)">Création en cours...</span>';
  try {
    const ops = await sbInsert("commercial_operations", { marketplace: MARKETPLACE, nom, type_ope: type||null, date_debut: debut, date_fin: fin });
    const opId = ops[0]?.id;

    if (file && opId) {
      statusEl.innerHTML='<span style="color:var(--txS)">Import produits...</span>';
      const prods = await parseOpeXLS(file);
      if (prods.length) {

async function parseOpeXLS(file) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array", cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
        console.log("Row 6 (headers):", rows[5]);
        console.log("Row 7 (data):", rows[6]);
        const clean = s => s ? String(s).replace(/^'+|'+$/g,"").trim() : null;
        const result = [];
        for (let i = 6; i < rows.length; i++) {
          const r = rows[i];
          if (!r || !r[1]) continue;
          const refVal = clean(r[0]);
if (!refVal) continue;
result.push({
  ref: refVal,
  nom: clean(r[1]),
  prix: r[2] ? parseFloat(String(r[2]).replace(/[€\s]/g,"").replace(",",".")) : null,
  taux: r[3] ? parseFloat(String(r[3]).replace(/[%\s]/g,"").replace(",",".")) : null
});
        }
        console.log("Premier produit parsé:", result[0]);
        resolve(result);
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function parseOpeXLSFull(file) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array", cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
        const clean = s => s ? String(s).replace(/^'+|'+$/g,"").trim() : null;
        const parseDate = v => {
          if (!v) return null;
          if (v instanceof Date) return v.toISOString().slice(0,10);
          const s = clean(v);
          if (!s) return null;
          if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);
          // Format DD/MM/YYYY
          const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
          if (m) return (m[3].length===2?"20"+m[3]:m[3])+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
          return null;
        };
        const typeOpe = clean(rows[1]?.[1])?.split("-").pop()?.trim() || null;
        const nomOpe = clean(rows[2]?.[1]);
        const prods = [];
        let debut = null, fin = null;
        for (let i = 6; i < rows.length; i++) {
          const r = rows[i];
          if (!r || !r[1]) continue;
          const d = parseDate(r[6]);
          const f = parseDate(r[7]);
          if (d && !debut) debut = d;
          if (f) fin = f;
          const refVal = clean(r[1]);
          if (!refVal) continue;
          prods.push({
            ref: refVal,
            nom: clean(r[2]),
            prix: r[3] ? parseFloat(String(r[3]).replace(/[€\s]/g,"").replace(",",".")) : null,
            taux: r[4] ? (MARKETPLACE === 'manomano'
              ? parseFloat(String(r[4]).replace(/[€\s]/g,"").replace(",","."))
              : parseFloat(String(r[4]).replace(/[%\s]/g,"").replace(",","."))/100) : null
          });
        }
        const finalNom = nomOpe || (rows[6]?.[5] ? clean(rows[6][5]) : null);
        if (!finalNom || !debut || !fin) { resolve({ ops:[], prods:[] }); return; }
        resolve({ ops:[{ nom: finalNom, type: typeOpe, debut, fin, prods }], prods });
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

    // Pour chaque opé active : une seule requête sur ps_sales_daily
    var allBadOrders = []; // { sku, name, opNom, opPrix, orderRef, saleDate, unitPriceTtc, ecartPct }

    for (var oi = 0; oi < activeOps.length; oi++) {

          + '</tr>';
      });
    });

    html += '</tbody></table></div>';
    priceBodyEl.innerHTML = html;

  } catch(e) {

// Note SEA : score CTR (0-3 pts) + score conv (0-3 pts) + bonus volume (1 pt)
// Grille : A ≥ 5pts · B ≥ 3pts · C ≥ 1pt · D = 0pt
function seaGrade(ctr, tauxConv, conversions) {
  if (!ctr && !tauxConv) return 'D';
  var score = 0;
  if (ctr >= 1.5) score += 3; else if (ctr >= 0.7) score += 2; else if (ctr >= 0.3) score += 1;
  if (tauxConv >= 10) score += 3; else if (tauxConv >= 5) score += 2; else if (tauxConv >= 1) score += 1;
  if ((conversions||0) >= 5) score += 1;
  if (score >= 5) return 'A';
  if (score >= 3) return 'B';
  if (score >= 1) return 'C';
  return 'D';
}
function seaGradeColor(g) {
  if (g === 'A') return 'green';
  if (g === 'B') return 'accent';
  if (g === 'C') return 'amber';
  return 'red';
}

  var inp = document.querySelector('#sea-products-container input[placeholder="Rechercher..."]');
  if (inp) { inp.focus(); inp.setSelectionRange(val.length, val.length); }
}

function buildSEACampaignsHTML() {
  var campaigns = STATE.seaCampaigns || [];
  var now = new Date();
  var months = [];
  for (var i = 0; i < 6; i++) {
    var d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleDateString("fr-FR", {month:"long", year:"numeric"}) });
  }
  var OPE_COLORS_SEA = ["#2c5ea0","#e8963a","#2e9e6b","#c0392b","#8e44ad","#16a085","#d35400","#e74c3c","#27ae60","#2980b9"];
  function isActiveCamp(c) { return new Date(c.date_debut) <= now && new Date(c.date_fin) >= now; }
  var active = campaigns.filter(isActiveCamp);
  var future = campaigns.filter(function(c) { return new Date(c.date_debut) > now; });
  var totalBudget = campaigns.reduce(function(s,c) { return s+(c.budget||0); }, 0);
  var totalImp = campaigns.reduce(function(s,c) { return s+(c.impressions||0); }, 0);
  var totalClics = campaigns.reduce(function(s,c) { return s+(c.clics||0); }, 0);
  var ctrGlobal = totalImp > 0 ? (totalClics/totalImp*100).toFixed(2) : null;

  var kpis = '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">'
    + '<div class="metric"><div class="metric-label">Campagnes actives</div><div class="metric-value" style="color:var(--gn)">'+active.length+'</div></div>'
    + '<div class="metric"><div class="metric-label">A venir</div><div class="metric-value" style="color:var(--ac)">'+future.length+'</div></div>'
    + '<div class="metric"><div class="metric-label">Budget total</div><div class="metric-value" style="color:var(--am)">'+(totalBudget?Math.round(totalBudget).toLocaleString("fr-FR")+"€":"—")+'</div></div>'
    + '<div class="metric"><div class="metric-label">CTR global</div><div class="metric-value">'+(ctrGlobal!=null?ctrGlobal+"%":"—")+'</div></div>'
    + '</div>';

  var COL_W = 180, LEFT_W = 60, ROW_H = 60, HEADER_H = 72, BAR_H = 34;
  var timelineOps = campaigns.filter(function(c) {
    var fin = new Date(c.date_fin);
    var start = new Date(months[0].year, months[0].month, 1);
    var end = new Date(months[5].year, months[5].month + 1, 0);
    return fin >= start && new Date(c.date_debut) <= end;
  });
  var timelineH = Math.max(timelineOps.length * ROW_H + HEADER_H + 20, HEADER_H + 60);
  var totalW = LEFT_W + COL_W * 6;
  var timelineStart = new Date(months[0].year, months[0].month, 1);
  var timelineEnd = new Date(months[5].year, months[5].month + 1, 0);
  var totalDays = (timelineEnd - timelineStart) / 86400000;

  var svg = '<svg viewBox="0 0 '+totalW+' '+timelineH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;font-family:DM Sans,sans-serif">';
  svg += '<rect x="0" y="0" width="'+totalW+'" height="'+HEADER_H+'" fill="#f0eee9" rx="0"/>';
  svg += '<rect x="0" y="0" width="'+LEFT_W+'" height="'+timelineH+'" fill="#fafaf8"/>';
  svg += '<text x="'+(LEFT_W/2)+'" y="22" text-anchor="middle" font-size="10" fill="#6b6a65" font-weight="600">CAMP.</text>';
  months.forEach(function(m, mi) {
    var x = LEFT_W + mi * COL_W;
    var isCur = (m.year === now.getFullYear() && m.month === now.getMonth());
    var ac = isCur ? "#2c5ea0" : "#6b6a65";
    svg += '<rect x="'+x+'" y="0" width="'+COL_W+'" height="'+HEADER_H+'" fill="'+(isCur?"#e8f0fa":"#f0eee9")+'"/>';
    svg += '<text x="'+(x+COL_W/2)+'" y="22" text-anchor="middle" font-size="12" fill="'+(isCur?"#2c5ea0":"#1a1a18")+'" font-weight="700">'+m.label.charAt(0).toUpperCase()+m.label.slice(1)+'</text>';
    svg += '<rect x="'+(x+COL_W/2-14)+'" y="36" width="28" height="22" rx="6" fill="'+ac+'" opacity="0.12" style="cursor:pointer" onclick="openSEACreate(\''+m.year+'-'+String(m.month+1).padStart(2,'0')+'\')"/>';
    svg += '<text x="'+(x+COL_W/2)+'" y="52" text-anchor="middle" font-size="15" fill="'+ac+'" font-weight="700" style="cursor:pointer" onclick="openSEACreate(\''+m.year+'-'+String(m.month+1).padStart(2,'0')+'\')">+</text>';
    svg += '<line x1="'+x+'" y1="0" x2="'+x+'" y2="'+timelineH+'" stroke="#e8e6e1" stroke-width="1"/>';
  });
  svg += '<line x1="0" y1="'+HEADER_H+'" x2="'+totalW+'" y2="'+HEADER_H+'" stroke="#e8e6e1" stroke-width="1.5"/>';
  var todayX = LEFT_W + (now.getDate() / new Date(now.getFullYear(), now.getMonth()+1, 0).getDate()) * COL_W;
  svg += '<line x1="'+todayX+'" y1="'+HEADER_H+'" x2="'+todayX+'" y2="'+timelineH+'" stroke="#e8963a" stroke-width="1.5" stroke-dasharray="4,3"/>';
  svg += '<circle cx="'+todayX+'" cy="'+(HEADER_H+6)+'" r="4" fill="#e8963a"/>';
  timelineOps.forEach(function(c, ri) {
    var color = OPE_COLORS_SEA[c.id % OPE_COLORS_SEA.length];
    var isAct = isActiveCamp(c);
    var debut = new Date(Math.max(new Date(c.date_debut), timelineStart));
    var fin = new Date(Math.min(new Date(c.date_fin), timelineEnd));
    var x1 = LEFT_W + ((debut - timelineStart) / 86400000 / totalDays) * (COL_W * 6);
    var x2 = LEFT_W + ((fin - timelineStart + 86400000) / 86400000 / totalDays) * (COL_W * 6);
    var w = Math.max(x2 - x1, 30);
    var cy = HEADER_H + ROW_H / 2 + ri * ROW_H;
    svg += '<rect x="'+x1.toFixed(1)+'" y="'+(cy-BAR_H/2).toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+BAR_H+'" rx="6" fill="'+color+'" opacity="'+(isAct?1:0.5)+'" style="cursor:pointer" onclick="openSEACampaignDetail('+c.id+')"/>';
    var maxChars = Math.floor(w / 6.5);
    var nom = c.nom.length > maxChars ? c.nom.slice(0, Math.max(1, maxChars-1))+"..." : c.nom;
    svg += '<text x="'+(x1+8).toFixed(1)+'" y="'+(cy-4).toFixed(1)+'" font-size="11" fill="#fff" font-weight="600">'+esc(nom)+'</text>';
    if (w > 40) {
      var statusLabel = isAct ? "● Actif" : (new Date(c.date_debut) > now ? "○ A venir" : "○ Expire");
      var sub = statusLabel + (c.budget ? " · "+Math.round(c.budget)+"€" : "");
      svg += '<text x="'+(x1+8).toFixed(1)+'" y="'+(cy+11).toFixed(1)+'" font-size="9" fill="#fff" opacity="0.85">'+sub+'</text>';
    }
  });
  if (!timelineOps.length) {
    svg += '<text x="'+(totalW/2)+'" y="'+(HEADER_H+50)+'" text-anchor="middle" font-size="12" fill="#9c9a92">Aucune campagne sur cette periode — cliquez + pour creer</text>';
  }
  svg += '</svg>';

  // Cartes campagnes actives / à venir
  var cards = '';
  if (active.length || future.length) {
    var fmtD = function(dt) { return new Date(dt).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}); };
    function seaCard(c) {
      var isAct = isActiveCamp(c);
      var color = OPE_COLORS_SEA[c.id % OPE_COLORS_SEA.length];
      var ctr = (c.impressions && c.clics) ? (c.clics/c.impressions*100).toFixed(2)+"%" : "—";
      return '<div style="background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 16px;min-width:200px;flex:1;cursor:pointer;border-left:4px solid '+color+'" onclick="openSEACampaignDetail('+c.id+')">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
        + '<div style="font-size:13px;font-weight:700">'+esc(c.nom)+'</div>'
        + '<span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:'+(isAct?"var(--gnBg)":"var(--acBg)")+';color:'+(isAct?"var(--gn)":"var(--ac)")+'">'+( isAct?"● Actif":"A venir")+'</span>'
        + '</div>'
        + '<div style="font-size:11px;color:var(--txS);margin-bottom:6px">'+fmtD(c.date_debut)+' → '+fmtD(c.date_fin)+'</div>'
        + '<div style="display:flex;gap:12px;font-size:11px;color:var(--txS)">'
        + (c.budget ? '<span>'+Math.round(c.budget).toLocaleString("fr-FR")+'€</span>' : '')
        + (c.impressions ? '<span>'+c.impressions.toLocaleString("fr-FR")+' imp.</span>' : '')
        + '<span>CTR '+ctr+'</span>'
        + '</div></div>';
    }
    if (active.length) cards += '<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Campagnes actives</div><div style="display:flex;gap:10px;flex-wrap:wrap">'+active.map(seaCard).join("")+'</div></div>';
    if (future.length) cards += '<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">A venir</div><div style="display:flex;gap:10px;flex-wrap:wrap">'+future.map(seaCard).join("")+'</div></div>';
  }

  var actions = '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    + '<button onclick="openSEACreate(null)" style="padding:7px 16px;border:.5px solid var(--ac);border-radius:8px;font-size:12px;background:var(--acBg);color:var(--ac);cursor:pointer;font-weight:600;font-family:inherit">+ Nouvelle campagne</button>'
    + '<button onclick="openSEAImport()" style="padding:7px 16px;border:.5px solid var(--pu);border-radius:8px;font-size:12px;background:var(--puBg);color:var(--pu);cursor:pointer;font-weight:600;font-family:inherit">Import SEA</button>'
    + '<button onclick="openSEAActiveImport()" style="padding:7px 16px;border:.5px solid var(--am);border-radius:8px;font-size:12px;background:var(--amBg);color:var(--am);cursor:pointer;font-weight:600;font-family:inherit">⚡ Importer produits SEA actifs</button>'
    + '</div>';

  var mpLabel = (MARKETPLACES.find(function(m){return m.id===MARKETPLACE;})||{label:MARKETPLACE}).label;
  return '<div style="font-size:15px;font-weight:700;margin-bottom:16px">SEA — '+mpLabel+'</div>'
    + kpis + actions
    + '<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto">'+svg+'</div></div>'
    + cards;
}

function renderSEAProductsTable() {
  var stats = STATE.seaProductStats || [];
  var curYear = new Date().getFullYear();
  var today = new Date().toISOString().slice(0,10);

  // Aggrégation YTD par SKU catalogue
  var seaMap = {};
  stats.forEach(function(r) {
    if (!r.period_start || String(r.period_start).slice(0,4) !== String(curYear)) return;
    if (!seaMap[r.ref]) seaMap[r.ref] = { impressions: 0, clics: 0, conversions: 0, budget: 0 };
    seaMap[r.ref].impressions += (r.impressions||0);
    seaMap[r.ref].clics += (r.clics||0);
    seaMap[r.ref].conversions += (r.conversions||0);
    seaMap[r.ref].budget += (r.budget||0);
  });

  // Base : TOUS les produits suivis (même sans données SEA)
  var allRows = (STATE.products||[]).map(function(p) {
    var sea = p.sku ? (seaMap[p.sku]||null) : null;
    var imp = sea ? sea.impressions : 0;
    var clics = sea ? sea.clics : 0;
    var conv = sea ? sea.conversions : 0;
    var budget = sea ? sea.budget : 0;
    var ctr = imp > 0 ? clics/imp*100 : 0;
    var tauxConv = imp > 0 ? conv/imp*100 : 0;
    var hasData = imp > 0 || clics > 0 || conv > 0;
    var isActive = (STATE.seaActiveProducts||[]).some(function(a) {
      return a.sku === p.sku && a.period_start <= today && a.period_end >= today;
    });
    return {
      sku: p.sku||'', name: p.name||'', type: p.type||'', product_id: p.product_id||'',
      impressions: imp, clics: clics, conversions: conv, budget: budget,
      ctr: ctr, tauxConv: tauxConv,
      grade: hasData ? seaGrade(ctr, tauxConv, conv) : null,
      hasData: hasData, isActive: isActive
    };
  });

  // Filtres
  var f = seaFilter;
  var rows = allRows;
  if (f.onlyWithData) rows = rows.filter(function(r) { return r.hasData; });
  if (f.search) {
    var s = f.search.toLowerCase();
    rows = rows.filter(function(r) {
      return r.name.toLowerCase().indexOf(s) !== -1 || r.sku.toLowerCase().indexOf(s) !== -1;
    });
  }

  // Tri
  rows = rows.slice().sort(function(a, b) {
    var va = a[seaSortCol]; var vb = b[seaSortCol];
    if (va == null) va = typeof vb === 'string' ? '' : 0;
    if (vb == null) vb = typeof va === 'string' ? '' : 0;
    if (typeof va === 'string') { va = va.toLowerCase(); vb = String(vb).toLowerCase(); }
    if (seaSortDir === 'asc') return va < vb ? -1 : va > vb ? 1 : 0;
    return va > vb ? -1 : va < vb ? 1 : 0;
  });

  var withDataCount = allRows.filter(function(r) { return r.hasData; }).length;

  function si(col) { return seaSortCol === col ? (seaSortDir === 'asc' ? ' ↑' : ' ↓') : ''; }
  function th(col, label, align) {
    return '<th style="cursor:pointer;padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;text-align:'+(align||'right')+'" onclick="toggleSeaSort(\''+col+'\')">'+label+si(col)+'</th>';
  }

  var tbody = rows.map(function(r, i) {
    var ctrFmt = r.impressions > 0 ? r.ctr.toFixed(2)+'%' : '—';
    var convFmt = r.impressions > 0 ? r.tauxConv.toFixed(2)+'%' : '—';
    var typeLbl = r.type==="Nouveautés Q4+Q1"?"Nvtés":r.type==="Deals exclus"?"Deals":r.type;
    var typeCol = r.type==="Classe A"?"green":r.type==="Deals exclus"?"amber":"accent";
    var rowStyle = (i%2?"background:var(--bg);":"")+(r.hasData?"":"opacity:0.42;")+"border-bottom:1px solid var(--borderL);cursor:pointer";
    var budgetFmt = r.budget > 0 ? Math.round(r.budget).toLocaleString('fr-FR')+' €' : '—';
    var activeTag = r.isActive
      ? '<span style="padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:var(--gnBg);color:var(--gn)">● Actif</span>'
      : '<span style="font-size:11px;color:var(--txT)">—</span>';
    return '<tr style="'+rowStyle+'" onclick="openSEAProductDetail(\''+esc(r.sku)+'\')">'
      + '<td style="padding:7px 10px;text-align:center">'+activeTag+'</td>'
      + '<td style="padding:7px 10px;font-weight:500;max-width:240px"><div style="line-height:1.3">'+esc(r.name)+'</div></td>'
      + '<td style="padding:7px 10px;font-size:11px;color:var(--txS);white-space:nowrap"><div>'+esc(r.product_id)+'</div><div style="font-weight:600">'+esc(r.sku)+'</div></td>'
      + '<td style="padding:7px 10px;text-align:center">'+(r.type?pill(typeLbl,typeCol):'')+'</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(r.impressions>0?r.impressions.toLocaleString('fr-FR'):'—')+'</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(r.clics>0?r.clics.toLocaleString('fr-FR'):'—')+'</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(r.conversions>0?r.conversions:'—')+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:500">'+ctrFmt+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:500">'+convFmt+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:600;color:'+(r.budget>0?'var(--tx)':'var(--txT)')+'">'+budgetFmt+'</td>'
      + '<td style="padding:7px 10px;text-align:center">'+(r.grade?pill(r.grade,seaGradeColor(r.grade)):'<span style="color:var(--txT);font-size:11px">—</span>')+'</td>'
      + '</tr>';
  }).join('');

  // Ligne "Autres produits" — cumul des produits non suivis dans le catalogue
  var autresSeaAgg = seaMap['__AUTRES__'];
  if (autresSeaAgg && (autresSeaAgg.impressions > 0 || autresSeaAgg.clics > 0)) {
    var aImp = autresSeaAgg.impressions, aClics = autresSeaAgg.clics, aConv = autresSeaAgg.conversions;
    var aCtr = aImp > 0 ? (aClics/aImp*100).toFixed(2)+'%' : '—';
    var aConvFmt = aClics > 0 ? (aConv/aClics*100).toFixed(2)+'%' : '—';
    var aBudget = autresSeaAgg.budget;
    tbody += '<tr style="border-top:2px solid var(--border);background:var(--bg);font-style:italic;color:var(--txS)">'
      + '<td style="padding:7px 10px;text-align:center">—</td>'
      + '<td style="padding:7px 10px;font-weight:600;color:var(--txS)">Autres produits</td>'
      + '<td style="padding:7px 10px;font-size:11px;color:var(--txT)">Non suivis dans le catalogue</td>'
      + '<td style="padding:7px 10px;text-align:center">—</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(aImp>0?aImp.toLocaleString('fr-FR'):'—')+'</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(aClics>0?aClics.toLocaleString('fr-FR'):'—')+'</td>'
      + '<td style="padding:7px 10px;text-align:right">'+(aConv>0?aConv:'—')+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:500">'+aCtr+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:500">'+aConvFmt+'</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:600">'+(aBudget>0?Math.round(aBudget).toLocaleString('fr-FR')+' €':'—')+'</td>'
      + '<td style="padding:7px 10px;text-align:center">—</td>'
      + '</tr>';
  }

  var noDataBanner = stats.length === 0
    ? '<div style="background:var(--acBg);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--ac);margin-bottom:12px">Aucune donnée SEA importée pour '+curYear+'. Importez un fichier brut via <strong>Import SEA</strong>.</div>'
    : '';

  return '<div style="margin-top:20px">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">'
    + '<div style="font-size:13px;font-weight:700">Produits sponsorisés — YTD '+curYear+'</div>'
    + '<div style="font-size:12px;color:var(--txS)">'+withDataCount+' / '+allRows.length+' produits avec données SEA</div>'
    + '</div>'
    + noDataBanner
    + '<div class="filters" style="margin-bottom:12px">'
    + '<input placeholder="Rechercher..." value="'+esc(seaFilter.search)+'" oninput="seaSearchChange(this.value)" style="flex:1;min-width:180px"/>'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txS);cursor:pointer;white-space:nowrap"><input type="checkbox" '+(seaFilter.onlyWithData?'checked':'')+' onchange="seaFilter.onlyWithData=this.checked;renderSeaProductsOnly()" style="cursor:pointer"> Avec données uniquement</label>'
    + '</div>'
    + '<div class="card" style="padding:0;overflow:hidden"><div class="scroll-table"><table style="min-width:1050px">'
    + '<thead><tr style="border-bottom:1px solid var(--border);background:var(--bg)">'
    + '<th style="padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;text-align:center">Statut</th>'
    + th('name','Produit','left')
    + '<th style="padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;text-align:left">Réfs</th>'
    + '<th style="padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;text-align:center">Type</th>'
    + th('impressions','Impressions')+th('clics','Clics')+th('conversions','Conversions')
    + th('ctr','CTR%')+th('tauxConv','Conv%')+th('budget','Budget €')
    + '<th style="padding:8px 10px;font-size:11px;font-weight:600;color:var(--txS);text-transform:uppercase;text-align:center">Note</th>'
    + '</tr></thead><tbody>'+tbody+'</tbody></table></div></div></div>';
}

function toggleSeaSort(col) {
  if (seaSortCol === col) seaSortDir = seaSortDir === 'asc' ? 'desc' : 'asc';
  else { seaSortCol = col; seaSortDir = 'desc'; }
  renderSeaProductsOnly();
}

async function openSEAProductDetail(ref) {
  var stats = (STATE.seaProductStats||[]).filter(function(r) { return r.ref === ref; });
  if (!stats.length) { openModal("Detail SEA — "+ref, '<div style="padding:20px;text-align:center;color:var(--txT)">Aucune donnee disponible.</div>'); return; }
  var months = stats.filter(function(r) { return r.period_type === 'month'; }).sort(function(a,b) { return a.period_start > b.period_start ? 1 : -1; });
  var weeks = stats.filter(function(r) { return r.period_type === 'week'; }).sort(function(a,b) { return a.period_start > b.period_start ? 1 : -1; });
  function fmtNum(v) { return v != null ? Number(v).toLocaleString("fr-FR") : "—"; }
  function rowHtml(r, indent) {
    var ctr = r.impressions > 0 ? (r.clics/r.impressions*100).toFixed(2)+"%" : "—";
    var conv = r.impressions > 0 ? (r.conversions/r.impressions*100).toFixed(2)+"%" : "—";
    return '<tr style="'+(indent?"background:var(--bg)":"")+';border-bottom:1px solid var(--borderL)">'
      + '<td style="padding:5px 10px;font-size:11px;color:var(--txS);padding-left:'+(indent?20:10)+'px">'+esc(r.period_label||r.period_start)+'</td>'
      + '<td style="padding:5px 10px;text-align:right;font-weight:'+(indent?400:600)+'">'+(r.budget?Math.round(r.budget).toLocaleString("fr-FR")+"€":"—")+'</td>'
      + '<td style="padding:5px 10px;text-align:right">'+fmtNum(r.impressions)+'</td>'
      + '<td style="padding:5px 10px;text-align:right">'+fmtNum(r.clics)+'</td>'
      + '<td style="padding:5px 10px;text-align:right">'+fmtNum(r.conversions)+'</td>'
      + '<td style="padding:5px 10px;text-align:right">'+ctr+'</td>'
      + '<td style="padding:5px 10px;text-align:right">'+conv+'</td>'
      + '</tr>';
  }

// Génère automatiquement un label lisible pour la période SEA
function generateSeaLabel(type, debut, fin) {
  if (type === 'month') {
    var d = new Date(debut + 'T12:00:00Z');
    return d.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric', timeZone: 'UTC' });
  }
  var fmtD = function(s) {
    return new Date(s + 'T12:00:00Z').toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', timeZone: 'UTC' });
  };
  return fmtD(debut) + ' – ' + fmtD(fin);
}

async function confirmSEAImport() {
  var statusEl = document.getElementById("sea-imp-status");
  var pwd = document.getElementById("sea-imp-pwd")?.value;
  var file = document.getElementById("sea-imp-file")?.files[0];
  var periodType = document.getElementById("sea-imp-type")?.value;
  var debut = document.getElementById("sea-imp-debut")?.value;
  var fin = document.getElementById("sea-imp-fin")?.value;
  if (pwd !== ADMIN_PASSWORD) { statusEl.innerHTML='<span style="color:var(--rd)">Mot de passe incorrect.</span>'; return; }
  if (!file || !debut || !fin) { statusEl.innerHTML='<span style="color:var(--rd)">Tous les champs sont obligatoires.</span>'; return; }
  var label = generateSeaLabel(periodType, debut, fin);
  statusEl.innerHTML='<span style="color:var(--txS)">Lecture du fichier en cours...</span>';
  try {
    var parsed = await parseSEAXLS(file);
    var rows = parsed.rows;
    var autresData = parsed.autresData;
    var horsLigneCount = parsed.horsLigneCount;
    console.log('[SEA Import] Résultat parsing :', rows.length, 'produits suivis matchés,', horsLigneCount, 'lignes invalides, autresData:', JSON.stringify(autresData));
    if (!rows.length && autresData.impressions === 0) {
      statusEl.innerHTML='<span style="color:var(--am)">Aucune ligne reconnue ('+ horsLigneCount +' lignes invalides). Vérifiez la console (F12) pour le détail.</span>';
      return;
    }
    // Détection et suppression des données existantes pour cette période exacte
    // Contrainte unique : (marketplace, ref, period_start, period_end, period_type)
    var periodQ = "marketplace=eq."+MARKETPLACE+"&period_start=eq."+debut+"&period_end=eq."+fin+"&period_type=eq."+periodType;
    var existing = await sb("sea_product_stats", periodQ+"&select=id");
    if (existing.length > 0) {
      if (!confirm(existing.length+" entrée(s) existante(s) pour cette période seront remplacées. Continuer ?")) { statusEl.innerHTML=''; return; }
      await sbDelete("sea_product_stats", periodQ);
    }
    // Construction du payload — impressions/clics/conversions arrondis à l'entier (bigint Supabase)
    var toInt = function(v) { return Math.round(v)||0; };
    var insertRows = rows.map(function(r) {
      return { marketplace: MARKETPLACE, ref: r.ref, period_start: debut, period_end: fin, period_type: periodType, period_label: label, budget: r.budget||null, impressions: toInt(r.impressions), clics: toInt(r.clics), conversions: toInt(r.conversions) };
    });
    // Ligne "Autres produits" (produits hors catalogue suivi)
    if (autresData.impressions > 0 || autresData.clics > 0) {
      insertRows.push({ marketplace: MARKETPLACE, ref: '__AUTRES__', period_start: debut, period_end: fin, period_type: periodType, period_label: label, budget: autresData.budget||null, impressions: toInt(autresData.impressions), clics: toInt(autresData.clics), conversions: toInt(autresData.conversions) });
    }
    console.log('[SEA Import] Insertion de', insertRows.length, 'lignes. Échantillon :', JSON.stringify(insertRows.slice(0,2)));
    statusEl.innerHTML='<span style="color:var(--txS)">Insertion de '+insertRows.length+' lignes dans Supabase...</span>';
    var totalInserted = 0;
    for (var i = 0; i < insertRows.length; i += 200) {
      var batch = insertRows.slice(i, i+200);
      var resp = await fetch(SB_URL+"/rest/v1/sea_product_stats", {
        method:"POST",
        headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,Prefer:"return=minimal,resolution=merge-duplicates"},
        body:JSON.stringify(batch)
      });
      if (!resp.ok) {
        var errText = await resp.text();
        console.error('[SEA Import] Erreur Supabase batch', Math.floor(i/200)+1, ':', resp.status, errText);
        throw new Error('Supabase ' + resp.status + ' : ' + errText);
      }
      totalInserted += batch.length;
      console.log('[SEA Import] Batch', Math.floor(i/200)+1, 'OK —', batch.length, 'lignes (total:', totalInserted+')');
    }
    var autresMsg = (autresData.impressions > 0) ? ' · Autres produits : '+autresData.impressions.toLocaleString('fr-FR')+' impr.' : '';
    var horsLigneMsg = horsLigneCount > 0 ? ' · '+horsLigneCount+' lignes invalides ignorées' : '';
    statusEl.innerHTML='<span style="color:var(--gn)">✓ '+rows.length+' produits importés'+autresMsg+horsLigneMsg+'</span>';
    setTimeout(function() { closeModal(); loadData(); }, 1400);
  } catch(e) {
    console.error('[SEA Import] Erreur globale :', e);
    statusEl.innerHTML='<span style="color:var(--rd)">Erreur : '+esc(e.message)+'</span>';
  }
}

// ── Import produits SEA actifs ──────────────────────────────────
function openSEAActiveImport() {
  var mpLabel = (MARKETPLACES.find(function(m){return m.id===MARKETPLACE;})||{label:MARKETPLACE}).label;
  // Calcul semaines ISO de l'année courante
  var yr = new Date().getFullYear();
  function isoWeekDates(week, year) {
    var jan4 = new Date(year, 0, 4);
    var dayOfWeek = jan4.getDay() || 7;
    var monday = new Date(jan4);
    monday.setDate(jan4.getDate() - dayOfWeek + 1 + (week - 1) * 7);
    var sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    return {
      start: monday.toISOString().slice(0,10),
      end: sunday.toISOString().slice(0,10),
      label: 'S' + week + ' — ' + monday.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) + ' au ' + sunday.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})
    };
  }
  var weekOptions = '';
  for (var w = 1; w <= 52; w++) {
    var wd = isoWeekDates(w, yr);
    weekOptions += '<option value="'+wd.start+'|'+wd.end+'">'+wd.label+'</option>';
  }
  var today = new Date().toISOString().slice(0,10);
  openModal('⚡ Produits SEA actifs — '+mpLabel, '<div style="display:grid;gap:14px">'
    + '<div style="background:var(--amBg);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--am)">Format : colonne A = SKU produit. Le tag ⚡ SEA sera piloté exclusivement par ces imports.</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border:.5px solid var(--border);border-radius:8px;overflow:hidden">'
    + '<label id="seaact-lbl-week" style="display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;background:var(--ac);color:#fff;font-size:12px;font-weight:600">'
    + '<input type="radio" name="seaact-mode" value="week" checked onchange="seaActTogglePeriod()" style="accent-color:#fff"> Semaine</label>'
    + '<label id="seaact-lbl-custom" style="display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;background:var(--card);color:var(--txS);font-size:12px;font-weight:600;border-left:.5px solid var(--border)">'
    + '<input type="radio" name="seaact-mode" value="custom" onchange="seaActTogglePeriod()"> Période personnalisée</label>'
    + '</div>'
    + '<div id="seaact-week-block"><select id="seaact-week" style="width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit">'+weekOptions+'</select></div>'
    + '<div id="seaact-custom-block" style="display:none;grid-template-columns:1fr 1fr;gap:8px">'
    + '<div><label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Date début</label><input id="seaact-debut" type="date" value="'+today+'" style="width:100%;padding:7px 10px;border:.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit"></div>'
    + '<div><label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Date fin</label><input id="seaact-fin" type="date" value="'+today+'" style="width:100%;padding:7px 10px;border:.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit"></div>'
    + '</div>'
    + '<div><label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Fichier (colonne A = SKU)</label><input id="seaact-file" type="file" accept=".xls,.xlsx,.csv" style="width:100%;padding:6px;border:.5px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;background:var(--card)"></div>'
    + '<div><label style="font-size:11px;color:var(--txS);display:block;margin-bottom:4px">Mot de passe admin</label><input id="seaact-pwd" type="password" style="width:100%;padding:7px 10px;border:.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit"></div>'

  if (btoa(pwd) !== _ADMIN_HASH) { statusEl.innerHTML = '<span style="color:var(--rd)">Mot de passe incorrect.</span>'; return; }
  if (!file) { statusEl.innerHTML = '<span style="color:var(--rd)">Sélectionnez un fichier.</span>'; return; }

  var periodType = document.querySelector('input[name="seaact-mode"]:checked')?.value || 'week';
  var periodStart, periodEnd;
  if (periodType === 'week') {
    var parts = (document.getElementById('seaact-week')?.value || '').split('|');
    periodStart = parts[0]; periodEnd = parts[1];
  } else {
    periodStart = document.getElementById('seaact-debut')?.value;
    periodEnd   = document.getElementById('seaact-fin')?.value;
  }
  if (!periodStart || !periodEnd) { statusEl.innerHTML = '<span style="color:var(--rd)">Période invalide.</span>'; return; }

  statusEl.innerHTML = 'Lecture du fichier…';
  try {
    var skus = await new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
          var ws = wb.Sheets[wb.SheetNames[0]];
          var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          var result = [];
          data.slice(1).forEach(function(row) {
            var sku = String(row[0]||'').trim();
            if (sku && sku.toLowerCase() !== 'sku') result.push(sku);
          });
          resolve(result);
        } catch(e) { reject(e); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });

    if (!skus.length) { statusEl.innerHTML = '<span style="color:var(--rd)">Aucun SKU trouvé en colonne A.</span>'; return; }
    statusEl.innerHTML = skus.length + ' SKUs trouvés — suppression ancienne période puis import…';

    // Supprimer les enregistrements existants pour cette marketplace + période
    await fetch(SB_URL+'/rest/v1/sea_active_products?marketplace=eq.'+MARKETPLACE+'&period_start=eq.'+periodStart+'&period_end=eq.'+periodEnd, {
      method: 'DELETE',
      headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY }
    });

    // Insérer par batch de 200
    var rows = skus.map(function(sku) {
      return { marketplace: MARKETPLACE, sku: sku, period_start: periodStart, period_end: periodEnd };
    });
    var BATCH = 200;
    var inserted = 0;
    for (var i = 0; i < rows.length; i += BATCH) {
      var batch = rows.slice(i, i + BATCH);
      var r = await fetch(SB_URL+'/rest/v1/sea_active_products', {
        method: 'POST',
        headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify(batch)
      });
      if (!r.ok) throw new Error('HTTP '+r.status);
      inserted += batch.length;
    }
    statusEl.innerHTML = '<span style="color:var(--gn)">✓ '+inserted+' produits SEA actifs enregistrés ('+periodStart+' → '+periodEnd+')</span>';
    setTimeout(function() { closeModal(); loadData(); }, 1400);
  } catch(e) {
    statusEl.innerHTML = '<span style="color:var(--rd)">Erreur : '+esc(e.message)+'</span>';
  }
}

// Charge et met en cache la table de correspondance SEA depuis le repo
async function loadSeaCorrespondence() {
  if (_seaCorrespCache) return _seaCorrespCache;
  // Priorité : nouveau fichier avec ManoMano + Conforama, puis ancien fichier en fallback
  var urls = [
    '/Fichiers%20correspondance%20-%20SEA%20avec%20ManoMano-Confo.xlsx',
    '/Fichiers correspondance - SEA avec ManoMano-Confo.xlsx',
    '/Fichiers%20correspondance%20-%20SEA.xlsx',
    '/Fichiers correspondance - SEA.xlsx'
  ];
  var resp, lastErr;
  for (var ui = 0; ui < urls.length; ui++) {
    console.log('[SEA Corresp] Tentative chargement :', urls[ui]);
    try { resp = await fetch(urls[ui]); if (resp.ok) break; lastErr = 'HTTP '+resp.status; } catch(e) { lastErr = e.message; }
    resp = null;
  }
  if (!resp || !resp.ok) throw new Error('Impossible de charger la table de correspondance SEA (' + lastErr + ')');
  var buf = await resp.arrayBuffer();
  var wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
  var ws = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  console.log('[SEA Corresp] Feuille lue :', rows.length, 'lignes (dont 1 en-tête)');
  if (rows.length > 0) console.log('[SEA Corresp] En-tête :', JSON.stringify(rows[0]).slice(0,300));
  if (rows.length > 1) console.log('[SEA Corresp] Ligne 1 :', JSON.stringify(rows[1]).slice(0,300));
  var maps = { mdm: {}, but: {}, cds: {}, conforama: {}, manomano: {} };
  function isNA(v) { var s = String(v||'').trim(); return !s || s === '#N/A' || s.startsWith('#'); }
  rows.slice(1).forEach(function(r) {
    var sku = String(r[0]||'').trim();
    if (!sku) return;
    // col A(0)=sku · col B(1)=id (format 836_5565, clé ManoMano) · col C(2)=réf MdM · col D(3)=réf BUT
    // col E(4)=réf CDS · col G(6)=réf Conforama · col H(7)=réf ManoMano col H (non utilisée, id col B = 100%)
    var manoId   = String(r[1]||'').trim();
    var mdmRef   = String(r[2]||'').trim();
    var butRef   = String(r[3]||'').trim();
    var cdsRef   = String(r[4]||'').trim();
    var confoRef = String(r[6]||'').trim();
    if (!isNA(manoId))   maps.manomano[manoId]    = sku;
    if (!isNA(mdmRef))   maps.mdm[mdmRef]         = sku;
    if (!isNA(butRef))   maps.but[butRef]          = sku;
    if (!isNA(cdsRef))   maps.cds[cdsRef]          = sku;
    if (!isNA(confoRef)) maps.conforama[confoRef]  = sku;
  });
  console.log('[SEA Corresp] Maps construites — MdM:', Object.keys(maps.mdm).length,
    '/ BUT:', Object.keys(maps.but).length, '/ CDS:', Object.keys(maps.cds).length,
    '/ Confo:', Object.keys(maps.conforama).length, '/ Mano:', Object.keys(maps.manomano).length);
  var manoKeys = Object.keys(maps.manomano).slice(0,3);
  console.log('[SEA Corresp] Exemples ManoMano :', manoKeys.map(function(k){ return k+'→'+maps.manomano[k]; }).join(', '));
  var confoKeys = Object.keys(maps.conforama).slice(0,3);
  console.log('[SEA Corresp] Exemples Conforama :', confoKeys.map(function(k){ return k+'→'+maps.conforama[k]; }).join(', '));
  _seaCorrespCache = maps;
  return maps;
}

async function parseSEAXLS(file) {
  var corresp = await loadSeaCorrespondence();
  var mp = MARKETPLACE;
  var refMap = mp === 'maisonsdumonde' ? corresp.mdm
    : mp === 'but'        ? corresp.but
    : mp === 'conforama'  ? corresp.conforama
    : mp === 'manomano'   ? corresp.manomano
    : corresp.cds;
  console.log('[SEA Parse] Marketplace:', mp, '— taille refMap:', Object.keys(refMap).length);

  // Set des SKUs suivis dans le catalogue
  var trackedSkus = new Set((STATE.products||[]).map(function(p) { return p.sku; }).filter(Boolean));

  // Table des prix courants pour conversions BUT (CA TTC / prix)
  var priceMap = {};
  (STATE.products||[]).forEach(function(p) {
    if (p.sku && p._price != null) priceMap[p.sku] = p._price;
  });

  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
        console.log('[SEA Parse] Fichier lu :', data.length, 'lignes (avec en-tête)');
        if (data.length > 0) console.log('[SEA Parse] En-tête :', JSON.stringify(data[0]).slice(0,300));
        if (data.length > 1) console.log('[SEA Parse] Ligne 1 :', JSON.stringify(data[1]).slice(0,300));

        var dataRows = data.slice(1).filter(function(r) {
          return r.some(function(v) { return v !== '' && v != null; });
        });
        console.log('[SEA Parse] Lignes de données non vides :', dataRows.length);

        function isNA(v) { var s = String(v||'').trim(); return !s || s === '#N/A' || s.startsWith('#'); }
        function parseNum(v) {
          if (v == null || v === '') return 0;
          // Supprime espaces, symboles monétaires, %
          var s = String(v).trim().replace(/[€$%\s ]/g, '');
          if (!s || s === '-') return 0;
          var commas = (s.match(/,/g)||[]).length;
          var dots   = (s.match(/\./g)||[]).length;
          if (commas > 1) {
            s = s.replace(/,/g, '');                        // "1,234,567" → 1234567
          } else if (commas === 1 && dots === 0) {
            if (/,\d{3}$/.test(s)) s = s.replace(',', ''); // "288,597"  → 288597
            else s = s.replace(',', '.');                   // "1,5"      → 1.5
          } else if (commas === 1 && dots >= 1) {
            if (s.lastIndexOf(',') > s.lastIndexOf('.'))
              s = s.replace(/\./g, '').replace(',', '.');   // "1.234,56" → 1234.56
            else
              s = s.replace(/,/g, '');                      // "1,234.56" → 1234.56
          } else if (dots > 1) {
            s = s.replace(/\./g, '');                       // "1.234.567" → 1234567
          }
          var n = parseFloat(s);
          return isNaN(n) ? 0 : Math.max(0, n);
        }
        function addTo(obj, imp, clic, conv, bud) {
          obj.impressions += imp; obj.clics += clic; obj.conversions += conv; obj.budget += bud;
        }

        var aggMap = {};
        var autresAgg = { impressions:0, clics:0, conversions:0, budget:0 };
        var horsLigneCount = 0, matchCount = 0, noMatchCount = 0;

        function handleRow(seaRef, imp, clic, conv, bud) {
          if (!seaRef || isNA(seaRef)) { horsLigneCount++; return; }
          var sku = refMap[seaRef];
          if (!sku) {
            // Réf absente du fichier de correspondance → Autres
            noMatchCount++;
            addTo(autresAgg, imp, clic, conv, bud);
            if (noMatchCount <= 5) console.log('[SEA Parse] Non trouvé corresp — ref:', seaRef);
            return;
          }
          // Réf trouvée dans la correspondance : cumuler (source de vérité, indépendant de STATE.products)
          matchCount++;
          if (!aggMap[sku]) aggMap[sku] = { impressions:0, clics:0, conversions:0, budget:0 };
          addTo(aggMap[sku], imp, clic, conv, bud);
        }

        if (mp === 'cdiscount') {
          // col A(0)=ref SEA (BES...) . col C(2)=Imp . col D(3)=Clics . col F(5)=Budget . col H(7)=Conv
          dataRows.forEach(function(r) {
            handleRow(String(r[0]||'').trim(), parseNum(r[2]), parseNum(r[3]), parseNum(r[7]), parseNum(r[5]));
          });
        } else if (mp === 'maisonsdumonde') {
          // col C(2)=Product SKU (ref SEA) . col G(6)=Imp . col H(7)=Clics . col I(8)=Budget . col J(9)=Conv
          dataRows.forEach(function(r) {
            handleRow(String(r[2]||'').trim(), parseNum(r[6]), parseNum(r[7]), parseNum(r[9]), parseNum(r[8]));
          });
        } else if (mp === 'but') {
          // col J(9)=ref SEA (prefixe 2177_ supprime) . col M(12)=Vues . col N(13)=Clics . col Q(16)=Dépense . col R(17)=CA → conv
          // Conversions = CA total par SKU / prix (même logique que Conforama)
          var butCABySku = {};
          dataRows.forEach(function(r) {
            var seaRef = String(r[9]||'').trim().replace(/^2177_/,'');
            var sku = refMap[seaRef];
            handleRow(seaRef, parseNum(r[12]), parseNum(r[13]), 0, parseNum(r[16]));
            if (sku && trackedSkus.has(sku)) {
              var ca = parseNum(r[17]);
              if (ca > 0) butCABySku[sku] = (butCABySku[sku]||0) + ca;
            }
          });
          Object.keys(butCABySku).forEach(function(sku) {
            var price = priceMap[sku];
            if (aggMap[sku] && price && price > 0) {
              aggMap[sku].conversions = Math.round(butCABySku[sku] / price);
            }
          });
        } else if (mp === 'manomano') {
          // col C(2)=SKU BestMobilier (ex: "836_5565") → rapprochement via col B (id) du fichier corresp → 100% match
          // col F(5)=Dépenses publicitaires (budget) · col R(17)=Impressions · col S(18)=Clics · col T(19)=Achats (conv)
          // En-tête en ligne 0 (null,Article,SKU,Identifiant,...) — données à partir de la ligne 1
          dataRows.forEach(function(r) {
            var seaRef = String(r[2]||'').trim(); // col C = SKU = "836_5565"
            handleRow(seaRef, parseNum(r[17]), parseNum(r[18]), parseNum(r[19]), parseNum(r[5]));
          });
        } else if (mp === 'conforama') {
          // col J(9)=ref SEA (V_XXXXX_REF → REF) · col R(17)=Vues · col S(18)=Clics · col V(21)=Budget · col W(22)=CA
          // Conversions = CA total par SKU / prix (calcul APRÈS cumul pour éviter pertes d'arrondi ligne par ligne)
          var confoCABySku = {};
          dataRows.forEach(function(r) {
            var rawRef = String(r[9]||'').trim();
            var parts = rawRef.split('_');
            var seaRef = parts.length >= 3 ? parts.slice(2).join('_') : rawRef;
            if (!seaRef) { horsLigneCount++; return; }
            // Impressions, clics, budget : cumulés via handleRow (conv=0, calculé après)
            handleRow(seaRef, parseNum(r[17]), parseNum(r[18]), 0, parseNum(r[21]));
            // Accumuler le CA séparément pour calcul de conversions précis
            var sku = refMap[seaRef];
            if (sku && trackedSkus.has(sku)) {
              var ca = parseNum(r[22]);
              if (ca > 0) confoCABySku[sku] = (confoCABySku[sku]||0) + ca;
            }
          });
          // Calcul conversions en une seule division sur le CA total — pas de perte d'arrondi
          Object.keys(confoCABySku).forEach(function(sku) {
            var price = priceMap[sku];
            if (aggMap[sku] && price && price > 0) {
              aggMap[sku].conversions = Math.round(confoCABySku[sku] / price);
            }
          });
        }

        console.log('[SEA Parse] Resume :', matchCount, 'matches,', noMatchCount, '-> Autres,', horsLigneCount, 'invalides');
        console.log('[SEA Parse] SKUs matches:', Object.keys(aggMap).length, '-- autresAgg:', JSON.stringify(autresAgg));

        var rows = Object.keys(aggMap).map(function(sku) {
          var d = aggMap[sku];
          return { ref: sku, impressions: d.impressions, clics: d.clics, conversions: d.conversions, budget: d.budget };
        });
        resolve({ rows: rows, autresData: autresAgg, horsLigneCount: horsLigneCount });
      } catch(err) {
        console.error('[SEA Parse] Exception :', err);
        reject(err);
      }
    };
    reader.onerror = function(e) { reject(new Error('Erreur lecture fichier')); };
    reader.readAsArrayBuffer(file);
  });
}

// Parsing du fichier Stocks : col A = ref (index 0), col G = warehouse_stock (index 6)
async function parseStocksFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
        const map = {};
        let rowCount = 0, refCount = 0;
        rows.forEach((row, i) => {
          if (i === 0) return;
          rowCount++;
          const ref = row[0] != null ? String(row[0]).trim() : null;
          const stock = row[6] != null ? Number(row[6]) : null;
          if (!ref) return;
          refCount++;
          if (!map[ref]) map[ref] = { warehouse_stock: null };
          if (stock != null && !isNaN(stock)) map[ref].warehouse_stock = stock;
        });
        console.log(`[Supply] Stocks: ${rowCount} lignes lues, ${refCount} refs uniques`);
        resolve({ map, rowCount, refCount });
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// Fusion des deux fichiers et filtrage sur produits suivis uniquement
function mergeSupplyData(stocksResult, asiaResult, trackedSkus, importDate) {
  const allRefs = new Set();
  if (stocksResult) Object.keys(stocksResult.map).forEach(r => allRefs.add(r));
  if (asiaResult) Object.keys(asiaResult.map).forEach(r => allRefs.add(r));
  const rows = [];
  let ignored = 0;
  allRefs.forEach(ref => {
    if (!trackedSkus.has(ref)) { ignored++; return; }
    const s = stocksResult ? (stocksResult.map[ref] || {}) : {};
    const a = asiaResult ? (asiaResult.map[ref] || {}) : {};
    rows.push({
      product_ref: ref,
      warehouse_stock: s.warehouse_stock != null ? s.warehouse_stock : null,
      in_transit_stock: a.in_transit_stock != null ? a.in_transit_stock : null,
      unshipped_orders: a.unshipped_orders != null ? a.unshipped_orders : null,
      import_date: importDate,
    });
  });
  return { rows, ignored, totalRefs: allRefs.size };
}

// Insertion dans Supabase (suppression préalable des doublons + batch de 500)
async function saveSupplySnapshot(rows, importDate, logFn) {
  const refs = rows.map(r => r.product_ref);
  for (let i = 0; i < refs.length; i += 200) {
    const batch = refs.slice(i, i + 200);
    await sbDelete("product_supply_stats", `import_date=eq.${importDate}&product_ref=in.(${batch.join(",")})`);
  }
  logFn("Doublons existants supprimés — insertion en cours...");
  let inserted = 0;
  for (let i = 0; i < rows.length; i += 500) {
    const batch = rows.slice(i, i + 500);
    await sbInsert("product_supply_stats", batch);
    inserted += batch.length;
    const pct = Math.round((inserted / rows.length) * 100);
    const pb = document.getElementById("supply-progress-bar");
    if (pb) pb.style.width = pct + "%";
    logFn(`${inserted} / ${rows.length} lignes insérées...`);
  }
  return inserted;
}

    <div id="supply-log" style="background:var(--bg);border:.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px;font-family:monospace;max-height:220px;overflow-y:auto;display:none;line-height:1.7"></div>
    <div id="supply-progress-wrap" style="display:none">
      <div style="height:6px;background:var(--border);border-radius:99px;overflow:hidden">
        <div id="supply-progress-bar" style="height:100%;width:0%;background:var(--ac);transition:width .3s"></div>
      </div>
    </div>
    <button onclick="runSupplyImport()" style="padding:10px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">⬆ Importer stocks</button>
    <div id="supply-status" style="font-size:12px;text-align:center;min-height:16px"></div>
  </div>`);
  setTimeout(() => {
    const ds = document.getElementById('supply-drop-stocks');
    const da = document.getElementById('supply-drop-asia');
    if (ds) ds.addEventListener('click', () => document.getElementById('supply-file-stocks').click());
    if (da) da.addEventListener('click', () => document.getElementById('supply-file-asia').click());
  }, 50);
}

// Lancement de l'import Supply
async function runSupplyImport() {
  if (!_supplyStocksFile && !_supplyAsiaFile) {
    document.getElementById('supply-status').innerHTML = '<span style="color:var(--rd)">Veuillez déposer au moins un fichier.</span>';
    return;
  }
  const logEl = document.getElementById('supply-log');
  const statusEl = document.getElementById('supply-status');
  const progressWrap = document.getElementById('supply-progress-wrap');
  const lines = [];
  function log(msg) {
    lines.push(msg);
    logEl.style.display = 'block';
    logEl.innerHTML = lines.map(l => `<div>${l}</div>`).join('');
    logEl.scrollTop = logEl.scrollHeight;
    console.log('[Supply]', msg);
  }

  statusEl.innerHTML = '<span style="color:var(--txS)">⏳ Import en cours...</span>';
  progressWrap.style.display = 'block';

  try {
    const importDate = new Date().toISOString().slice(0, 10);
    let stocksResult = null, asiaResult = null;

    if (_supplyStocksFile) {
      log(`📦 Fichier Stocks détecté : ${_supplyStocksFile.name}`);
      stocksResult = await parseStocksFile(_supplyStocksFile);
      log(`✓ ${stocksResult.rowCount} lignes lues`);
      log(`✓ ${stocksResult.refCount} références uniques détectées`);
    }
    if (_supplyAsiaFile) {
      log(`🌏 Fichier Asie détecté : ${_supplyAsiaFile.name}`);
      asiaResult = await parseAsiaFile(_supplyAsiaFile);
      log(`✓ ${asiaResult.rowCount} lignes lues`);
      log(`✓ ${asiaResult.refCount} références uniques détectées`);
    }

    log("🔀 Fusion en cours...");
    // Fetch ALL tracked SKUs across all marketplaces (pas juste le marketplace courant)
    let trackedSkus;
    try {
      const allProds = await sb("products", "active=eq.true&select=sku");
      trackedSkus = new Set(allProds.map(p => p.sku).filter(Boolean));
    } catch(e) {
      // Fallback: utiliser les produits déjà en STATE
      trackedSkus = new Set((STATE.products || []).map(p => p.sku).filter(Boolean));
    }
    log(`📋 ${trackedSkus.size} produits suivis dans l'application`);

    const { rows, ignored, totalRefs } = mergeSupplyData(stocksResult, asiaResult, trackedSkus, importDate);
    log(`✓ ${totalRefs} références analysées au total`);
    log(`✓ ${rows.length} produits suivis reconnus`);
    log(`✓ ${ignored} références ignorées (non suivies)`);
    log(`📤 ${rows.length} lignes prêtes à être insérées`);

    if (rows.length === 0) {
      statusEl.innerHTML = '<span style="color:var(--am)">Aucune référence suivie trouvée dans les fichiers fournis.</span>';
      return;
    }

    log(`🗄  Insertion dans Supabase — snapshot du ${importDate}...`);
    const inserted = await saveSupplySnapshot(rows, importDate, log);

    log('');
    log(`✅ Import terminé`);
    log(`   • ${totalRefs} références analysées`);
    log(`   • ${rows.length} produits suivis reconnus`);
    log(`   • ${ignored} références ignorées`);
    log(`   • ${inserted} lignes insérées dans product_supply_stats`);
    log(`   • Snapshot du ${importDate} créé avec succès`);
    const pb = document.getElementById('supply-progress-bar');
    if (pb) pb.style.width = '100%';
    statusEl.innerHTML = `<span style="color:var(--gn);font-weight:600">✓ ${inserted} lignes insérées — snapshot du ${importDate}</span>`;
    setTimeout(() => { closeModal(); loadData(); }, 2500);
  } catch(err) {
    console.error('[Supply] Erreur:', err);
    log(`❌ Erreur : ${err.message}`);
    statusEl.innerHTML = `<span style="color:var(--rd)">Erreur : ${esc(err.message)}</span>`;
  }
}

// Init — mode admin activé : accès direct sans code requis
sessionStorage.setItem("mkp_access", "1");
sessionStorage.setItem("admin_access", ADMIN_CODE);

 if (MAINTENANCE_MODE) {
  const stored = sessionStorage.getItem("admin_access");
  if (stored !== ADMIN_CODE) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;background:#fafaf8;gap:16px">
        <div style="font-size:20px;font-weight:700;color:#1a1a18">Outil en cours de modification</div>
        <div style="font-size:14px;color:#6b6a65">Non accessible pour le moment.</div>
        <input id="admin-input" type="password" placeholder="Code admin" style="padding:8px 14px;border:1px solid #e8e6e1;border-radius:8px;font-size:14px;font-family:inherit;margin-top:8px">
        <button onclick="checkAdmin()" style="padding:8px 20px;background:#2c5ea0;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Accéder</button>
        <div id="admin-err" style="font-size:12px;color:#b5312c"></div>
      </div>`;
    window.checkAdmin = () => {
      const val = document.getElementById("admin-input").value;
      if (val === ADMIN_CODE) { sessionStorage.setItem("admin_access", ADMIN_CODE); location.reload(); }
      else document.getElementById("admin-err").textContent = "Code incorrect.";
    };
    document.getElementById("admin-input").addEventListener("keydown", e => { if(e.key==="Enter") checkAdmin(); });
    throw new Error("MAINTENANCE");
  }
}
// Code d'accès général
const accessGranted = sessionStorage.getItem("mkp_access");
if (!accessGranted) {
  document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;background:#fafaf8;gap:16px">
      <div style="font-size:28px;font-weight:800;color:#1a1a18;letter-spacing:-0.02em">Marketplace Tracker</div>
      <div style="font-size:14px;color:#6b6a65;margin-bottom:8px">Entrez le code d'accès pour continuer</div>
      <input id="access-input" type="password" placeholder="Code d'accès" style="padding:10px 16px;border:1px solid #e8e6e1;border-radius:8px;font-size:14px;font-family:inherit;width:260px;text-align:center">
      <button onclick="checkAccess()" style="padding:10px 28px;background:#2c5ea0;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Accéder</button>
      <div id="access-err" style="font-size:12px;color:#b5312c"></div>
    </div>`;
  window.checkAccess = () => {
    const val = document.getElementById("access-input").value;
    if (val === ACCESS_CODE || val === ADMIN_CODE) {
      sessionStorage.setItem("mkp_access", "1");
      location.reload();
    } else {
      document.getElementById("access-err").textContent = "Code incorrect.";
    }
  };
  document.getElementById("access-input").addEventListener("keydown", e => { if(e.key==="Enter") checkAccess(); });
  throw new Error("ACCESS");
}
loadScrapingIndicators();
applyMpTheme(MARKETPLACE);
loadData();</script>
