name: Soldes Été Historique

on:
  workflow_dispatch:
    inputs:
      edition:
        description: "Édition à construire (2025 ou 2026)"
        required: true
        default: "2026"
        type: choice
        options:
          - "2025"
          - "2026"
      start_date:
        description: "Date début soldes (YYYY-MM-DD) — ex: 2025-06-25 pour l'édition 2025 / ignoré si 2026"
        required: false
        default: ""
        type: string
      end_date:
        description: "Date fin soldes (YYYY-MM-DD) — ex: 2025-07-22 pour l'édition 2025 / ignoré si 2026"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run — affiche les données sans écrire dans Supabase"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-soldes:
    name: Construire base Soldes Été ${{ github.event.inputs.edition }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sync/package.json

      - name: Install dependencies
        working-directory: sync
        run: npm install --omit=dev

      - name: Run Soldes Été sync
        working-directory: sync
        env:
          PRESTASHOP_API_URL: ${{ secrets.PRESTASHOP_API_URL }}
          PRESTASHOP_API_KEY: ${{ secrets.PRESTASHOP_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EDITION: ${{ github.event.inputs.edition }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          NODE_ENV: production
        run: node soldes_sync.js

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Le sync Soldes Été a échoué. Vérifiez les logs."
          echo "::error::Secrets requis : PRESTASHOP_API_URL, PRESTASHOP_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY"
