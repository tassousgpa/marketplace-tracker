name: Prestashop Sales Sync

on:
  # ── Exécution automatique quotidienne ────────────────────────────
  # Europe/Paris = UTC+2 (CEST) en été → 02:00 UTC = 04:00 Paris
  # Europe/Paris = UTC+1 (CET)  en hiver → 02:00 UTC = 03:00 Paris
  # GitHub Actions ne supporte pas les fuseaux — le cron est en UTC.
  schedule:
    - cron: "0 2 * * *"

  # ── Déclenchement manuel depuis GitHub Actions ───────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "automatic = sync incrémental (last_order_id) | manual = import d'une plage d'IDs"
        required: false
        default: "automatic"
        type: choice
        options:
          - "automatic"
          - "manual"
      start_order_id:
        description: "ID début — mode manual uniquement (ex: 450000)"
        required: false
        default: ""
        type: string
      end_order_id:
        description: "ID fin   — mode manual uniquement (ex: 460000)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (affiche les commandes sans écrire dans Supabase)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  sync:
    name: Sync Prestashop → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sync/package.json

      - name: Install dependencies
        working-directory: sync
        run: npm install --omit=dev

      - name: Run Prestashop sync
        working-directory: sync
        env:
          PRESTASHOP_API_URL: ${{ secrets.PRESTASHOP_API_URL }}
          PRESTASHOP_API_KEY: ${{ secrets.PRESTASHOP_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Mode : automatic (défaut cron) | manual (workflow_dispatch)
          SYNC_MODE: ${{ github.event.inputs.mode || 'automatic' }}
          # Paramètres mode manuel (ignorés en mode automatic)
          START_ORDER_ID: ${{ github.event.inputs.start_order_id || '' }}
          END_ORDER_ID: ${{ github.event.inputs.end_order_id || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          NODE_ENV: production
        run: node ps_sync.js

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::La synchronisation Prestashop a échoué. Vérifiez les logs ci-dessus."
          echo "::error::Vérifiez que les secrets PRESTASHOP_API_URL, PRESTASHOP_API_KEY, SUPABASE_URL et SUPABASE_SERVICE_ROLE_KEY sont bien configurés dans Settings → Secrets → Actions."
